const WEEKDAYS_TH = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
const MONTHS_TH = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

const LANG_KEY = 'rimping_lang_v1';
function getSavedLang() { try { return (localStorage.getItem(LANG_KEY) === 'en') ? 'en' : 'th'; } catch { return 'th'; } }
function saveLang(l) { try { localStorage.setItem(LANG_KEY, l); } catch {} }

function t(key, vars) {
  const dict = I18N[state.lang] || I18N.th;
  let s = (key in dict) ? dict[key] : ((key in I18N.th) ? I18N.th[key] : key);
  if (vars) Object.keys(vars).forEach(k => { s = s.split('{' + k + '}').join(String(vars[k])); });
  return s;
}
function weekdaysLocalized() { return state.lang === 'en' ? WEEKDAYS_EN : WEEKDAYS_TH; }
function monthsLocalized() { return state.lang === 'en' ? MONTHS_EN : MONTHS_TH; }
function toggleLang() {
  state.lang = state.lang === 'th' ? 'en' : 'th';
  saveLang(state.lang);
  renderPage();
}

const I18N = {
  th: {

let batchMode = false;

const GAMIFICATION_KEY = 'p3_gamification_v1';
function loadGamification(){
  try{
    const raw = localStorage.getItem(GAMIFICATION_KEY);
    if(raw){ const d=JSON.parse(raw); return {stars: d.stars||0, points: d.points||0, todayScans: d.todayScans||0, lastDate: d.lastDate||'', streak: d.streak||0, scannedToday: d.scannedToday||0} }
  }catch{}
  return {stars:0, points:0, todayScans:0, lastDate:'', streak:0, scannedToday:0};
}
let gamificationData = loadGamification();
function saveGamification(){
  try{ localStorage.setItem(GAMIFICATION_KEY, JSON.stringify(gamificationData)); }catch{}
  // sync ขึ้น cloud แบบไม่บล็อก UI ให้ทุกสาขาเห็นเหมือนกัน
  try{ saveGamificationToCloud(); }catch{}
}
const GAMIFICATION_TABLE='expiry_gamification';
async function saveGamificationToCloud(){
  if(!sb || !state.staffEmpCode) return;
  try{
    const payload={ employee_code: String(state.staffEmpCode), nickname: state.staffCode||'', branch: state.userBranch||'', points: gamificationData.points||0, stars: gamificationData.stars||0, streak: gamificationData.streak||0, scanned_today: gamificationData.scannedToday||0, updated_at: new Date().toISOString() };
    await sb.from(GAMIFICATION_TABLE).upsert(payload, {onConflict:'employee_code'});
  }catch(e){ /* ถ้ายังไม่มีตารางใน Supabase จะเงียบไว้ ใช้ local ไปก่อน */ }
}
async function fetchGlobalLeaderboard(){
  if(!sb) return getLeaderboardMock();
  try{
    const {data, error} = await sb.from(GAMIFICATION_TABLE).select('*').order('points',{ascending:false}).limit(20);
    if(!error && data && data.length>0){
      return data.map(r=>({name: r.nickname||r.employee_code, branch: r.branch||'', points: r.points||0, stars: r.stars||0, streak: r.streak||0, employee_code: r.employee_code, isMe: String(r.employee_code)===String(state.staffEmpCode)}));
    }
  }catch(e){}
  return getLeaderboardMock();
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addGamificationPoint(action='scan', meta={}){
  const today = todayStr();
  if(gamificationData.lastDate !== today){
    if(gamificationData.lastDate){
      const diff = (new Date(today)-new Date(gamificationData.lastDate))/86400000;
      gamificationData.streak = diff===1 ? (gamificationData.streak||0)+1 : 1;
    }else gamificationData.streak=1;
    gamificationData.scannedToday=0;
    gamificationData.lastDate=today;
  }
  // === กติกาใหม่ตามคำขอ ===
  // สแกน +5 แต้ม
  // เพิ่มล็อต / สินค้าใหม่ +10 แต้ม +1 ดาว
  // เก็บออกก่อน 1 วัน (daysLeft >=1) +15 แต้ม +1 ดาว (โบนัส)
  // เก็บออกปกติ +8 แต้ม +0.25 ดาว
  // สแกนยกถาด +20 แต้ม +1 ดาว
  if(action==='scan'){ gamificationData.points+=5; gamificationData.scannedToday=(gamificationData.scannedToday||0)+1; }
  if(action==='addLot'){ gamificationData.points+=10; gamificationData.stars=(parseFloat(gamificationData.stars)||0)+1; showToast('⭐ เพิ่มสินค้า +1 ดาว!'); triggerHaptic([20,40,20]); }
  if(action==='batch'){ gamificationData.points+=20; gamificationData.stars=(parseFloat(gamificationData.stars)||0)+1; showToast('📦 สแกนยกถาด +1 ดาว!'); triggerHaptic([20,40,20]); }
  if(action==='remove'){
    const dl = (meta && typeof meta.daysLeft === 'number') ? meta.daysLeft : null;
    if(dl !== null && dl >= 1){
      // เก็บออกก่อน 1 วันขึ้นไป = ทำงานดี ป้องกันของหมดอายุ
      gamificationData.points+=15; gamificationData.stars=(parseFloat(gamificationData.stars)||0)+1;
      showToast('🏆 เก็บออกก่อน '+dl+' วัน! +15 แต้ม +1 ⭐'); triggerHaptic([20,40,20,40]);
    }else{
      gamificationData.points+=8; gamificationData.stars=(parseFloat(gamificationData.stars)||0)+0.25;
      showToast('📦 เก็บออก +8 แต้ม +0.25 ดาว!'); triggerHaptic([20,40,20]);
    }
  }
  if(action==='removeEarly'){ gamificationData.points+=15; gamificationData.stars=(parseFloat(gamificationData.stars)||0)+1; showToast('🏆 เก็บออกก่อนกำหนด +1 ดาว!'); triggerHaptic([20,40,20]); }
  // โบนัสสตรีค: ทุกๆ 100 แต้มได้ดาวเพิ่ม (คงระบบเดิมไว้ แต่ไม่ทับดาวที่ได้จาก action)
  // ไม่คำนวณซ้ำถ้าได้ดาวจาก action ไปแล้วในรอบนี้
  saveGamification();
  try{ renderGamificationCard(); }catch{}
  try{ refreshInlineTop3(); }catch{}
}
function renderGamificationCard(){
  // อัปเดตการ์ด Top3 และแต้มดาวแบบ Live ทุกจุด ไม่ต้องรีโหลดหน้า
  try{
    const gp=getDailyProgress();
    const el=document.getElementById('gamification-card');
    if(!el) return;
    // อัปเดตตัวเลข Live ทั้งหมด
    const curEls = el.querySelectorAll('[data-live-cur]'); curEls.forEach(e=>{ e.textContent=gp.cur; e.classList.add('animate-pulse'); setTimeout(()=>e.classList.remove('animate-pulse'),400); });
    const needEls = el.querySelectorAll('[data-live-need]'); needEls.forEach(e=>e.textContent=gp.need);
    const pointsEls = el.querySelectorAll('[data-live-points]'); pointsEls.forEach(e=>{ const old=parseInt(e.textContent)||0; const now=gamificationData.points||0; e.textContent=now; if(now>old){ e.classList.add('text-amber-200'); setTimeout(()=>e.classList.remove('text-amber-200'),600);} });
    const starsEls = el.querySelectorAll('[data-live-stars]'); starsEls.forEach(e=>{ const stars=(parseFloat(gamificationData.stars)||0); const display = (stars%1===0? stars : stars.toFixed(2)); e.innerHTML=display+' ⭐'; e.classList.add('scale-110'); setTimeout(()=>e.classList.remove('scale-110'),300); });
    const pctEls = el.querySelectorAll('[data-live-pct]'); pctEls.forEach(e=>e.textContent=gp.pct+'%');
    const bar = el.querySelector('[data-progress-bar]'); if(bar){ bar.style.width=gp.pct+'%'; }
    const streakBadges = document.querySelectorAll('[data-streak], .streak-badge'); // เผื่อหลายจุด
    // อัปเดต badge สตรีคใน header (ตัวแรก)
    const streakEl = el.querySelector('span.rounded-full.bg-white\/15');
    if(streakEl && streakEl.textContent.includes('สตรีค')){ streakEl.textContent='🔥 สตรีค '+(gamificationData.streak||0)+' วัน'; }

    // อัปเดต Top3 แบบคงตำแหน่งเดิมไว้ก่อน ถ้าได้ดาวใหม่แล้วค่อยรีเฟรชจาก cloud แบบ debounce
    try{
      const listEl=document.getElementById('inline-top3-list');
      if(listEl){
        // อัปเดตแถว "คุณ" ใน Top3 แบบทันที ไม่ต้องรอ fetch
        const meRow = listEl.querySelector('[data-is-me="true"]');
        // ถ้าไม่เจอ ให้รีเฟรช mock แบบ sync ไปก่อน
        if(!meRow){ listEl.innerHTML=getInlineTop3HTML(); }
        else {
          // อัปเดตแต้มตัวเองในแถว Top3
          const ptsEl = meRow.querySelector('[data-my-points]'); if(ptsEl) ptsEl.textContent=(gamificationData.points||0);
          const starsEl = meRow.querySelector('[data-my-stars]'); if(starsEl) starsEl.textContent=(parseFloat(gamificationData.stars)||0)+' ⭐';
        }
      }
    }catch(e){}

    // ส่ง event ให้ส่วนอื่นฟังได้ (เช่น leaderboard ที่เปิดอยู่)
    try{ window.dispatchEvent(new CustomEvent('gamificationUpdated', {detail: {...gamificationData, progress:gp}})); }catch(e){}

  }catch(err){ console.log('renderGamificationCard error', err); }
}

function getLeaderboardMock(){
  // รวมทุกสาขา ไม่กรองสาขา เพื่อให้ทุกสาขาเห็นเหมือนกัน
  const users = (typeof appUsers!=='undefined'?appUsers:[]).filter(u=>u.status==='approved');
  const base = users.map(u=>({name:u.nickname||u.employee_code, branch:u.branch||'ไม่ระบุสาขา', points: Math.floor(Math.random()*80), stars: (Math.random()*3).toFixed(2), streak: Math.floor(Math.random()*5), employee_code:u.employee_code, gender: u.gender}));

  return all;
}

// สาขาที่กำลังดูอยู่: ผู้ใช้ทั่วไป=สาขาตัวเอง(ล็อกไว้) | แอดมินสาขา=ล็อกเฉพาะสาขาที่ได้รับแต่งตั้ง | แอดมินหลัก/ตัวจัดการเอไอ=เลือกดูได้ ('all'=ทุกสาขา)

}

// ขอตำแหน่งที่ตั้งของเครื่อง (ถ้าอนุญาต) ตอนสมัคร ให้แอดมินเช็คย้อนหลังว่าอยู่ย่านสาขาที่แจ้งจริงไหม
// ไม่บังคับ — ถ้าปฏิเสธ/หมดเวลา/เบราว์เซอร์ไม่รองรับ ก็ลงทะเบียนต่อได้ตามปกติ แค่ไม่มีตำแหน่งให้เช็ค
function getCurrentLocation(timeoutMs = 8000) {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    const timer = setTimeout(() => resolve(null), timeoutMs);
    navigator.geolocation.getCurrentPosition(
      (pos) => { clearTimeout(timer); resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
      () => { clearTimeout(timer); resolve(null); },
      { enableHighAccuracy: true, timeout: timeoutMs, maximumAge: 0 }
    );
  });
}

// ดึงข้อมูลทุกแถวแบบวนหน้า (สำคัญมาก: Supabase จำกัดผลลัพธ์สูงสุด 1000 แถวต่อคำขอโดยดีฟอลต์
// ถ้าตารางมีมากกว่านั้นและไม่แบ่งหน้าดึงเอง แถวที่เกินจะหายไปเงียบๆจากแอป ทั้งที่ข้อมูลยังอยู่ในฐานข้อมูลจริง)
async function fetchAllRowsPaginated(table, selectCols, orderCol, ascending, nullsFirst) {
  const PAGE_SIZE = 1000;
  let all = [];
  let from = 0;
  while (true) {
    let query = sb.from(table).select(selectCols);
    if (orderCol) query = query.order(orderCol, { ascending, nullsFirst });
    query = query.range(from, from + PAGE_SIZE - 1);
    const { data, error } = await query;
    if (error) throw error;
    if (!data || data.length === 0) break;
    all = all.concat(data);
    if (data.length < PAGE_SIZE) break; // หน้าสุดท้ายแล้ว (แถวน้อยกว่าขนาดหน้า)
    from += PAGE_SIZE;
  }
  return all;
}

function productToRow(p) {
  return {
    // FIX: อย่าใช้ getSavedBranch() มาทับ branch เดิม จะทำให้สินค้าย้ายสาขาเองแล้วหายจากสาขาเดิม

    category: p.category || '',
    image_url: p.imageUrl || '',
    image_embedding: p.imageEmbedding ? JSON.stringify(p.imageEmbedding) : null,
    expiry_date: p.expiryDate || null,
    notes: p.notes || '',
    added_date: p.addedDate || new Date().toISOString(),
    added_by: p.addedBy || '',
    removed: !!p.removed,
    removed_date: p.removedDate || null,
    removed_by: p.removedBy || '',
    removed_image_url: p.removedImageUrl || '',
    removed_reason: p.removedReason || '',
  };
}
function rowToPending(row) {
  let editTargetId = null;
  let removeTargetId = null;
  let deleteTargetId = null;
  let submittedBy = row.submitted_by || '';
  const m = submittedBy.match(/^EDIT#(\d+)#([\s\S]*)$/);
  if (m) { editTargetId = parseInt(m[1], 10); submittedBy = m[2]; }
  const mr = submittedBy.match(/^REMOVE#(\d+)#([\s\S]*)$/);
  if (mr) { removeTargetId = parseInt(mr[1], 10); submittedBy = mr[2]; }
  const md = submittedBy.match(/^DELETE#(\d+)#([\s\S]*)$/);
  if (md) { deleteTargetId = parseInt(md[1], 10); submittedBy = md[2]; }
  return {
    id: row.id,
    branch: row.branch || DEFAULT_BRANCH,
    barcode: row.barcode || '',
    plu: row.plu || '',
    name: row.name || '',
    expiryDate: row.expiry_date || '',
    expiryDates: row.expiry_dates ? row.expiry_dates.split(',').filter(Boolean) : [],
    imageUrl: row.image_url || '',
    expiryPhoto: row.expiry_photo || '',
    submittedAt: row.submitted_at || '',
    submittedBy: submittedBy,
    editTargetId: editTargetId,
    removeTargetId: removeTargetId,
    deleteTargetId: deleteTargetId,
    status: row.status || 'pending',
    rejectReason: row.reject_reason || '',
  };
}
function pendingToRow(p) {
  let submittedBy = p.submittedBy || '';
  if (p.editTargetId) submittedBy = `EDIT#${p.editTargetId}#${submittedBy}`;
  else if (p.removeTargetId) submittedBy = `REMOVE#${p.removeTargetId}#${submittedBy}`;
  else if (p.deleteTargetId) submittedBy = `DELETE#${p.deleteTargetId}#${submittedBy}`;
  return {
    id: p.id,
    branch: p.branch || DEFAULT_BRANCH,
    barcode: p.barcode || '',
    plu: p.plu || '',
    name: p.name || '',
    expiry_date: p.expiryDate || null,
    expiry_dates: (p.expiryDates && p.expiryDates.length > 0 ? p.expiryDates : [p.expiryDate]).filter(Boolean).join(','),
    image_url: p.imageUrl || '',
    expiry_photo: p.expiryPhoto || '',
    submitted_at: p.submittedAt || new Date().toISOString(),
    submitted_by: submittedBy,
    status: p.status || 'pending',
    reject_reason: p.rejectReason || null,
  };
}

async function uploadImageToStorage(dataUrl, prefix) {
  if (!dataUrl || !dataUrl.startsWith('data:')) return dataUrl || '';
  if (!sb) return dataUrl;
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const path = `${prefix}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
    const { error: uploadError } = await sb.storage.from(IMAGES_BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });
    if (uploadError) { console.error('uploadImageToStorage failed:', uploadError); return dataUrl; }
    const { data } = sb.storage.from(IMAGES_BUCKET).getPublicUrl(path);
    return data.publicUrl;
  } catch (err) {
    console.error('uploadImageToStorage failed:', err);
    return dataUrl;
  }
}

let _isSavingProducts = false;
async function saveProducts(list) {
  if (!sb) return false;
  _isSavingProducts = true;
  try {
    if (list.length > 0) {
      const rows = list.map(productToRow);
      const { error: upsertError } = await sb.from(PRODUCTS_TABLE).upsert(rows, { onConflict: 'id' });
      if (upsertError) throw upsertError;
    }
    return true;
  } catch (err) {
    lastDbError = (err && err.message) ? err.message : String(err);
    console.error('saveProducts (Supabase) failed:', err);
    return false;
  } finally {
    setTimeout(() => { _isSavingProducts = false; }, 1200); // กัน backgroundSync ทับทันทีหลัง save
  }
}

  if (!sb) return feedbackList;
  try {
    const data = await fetchAllRowsPaginated(FEEDBACK_TABLE, '*', 'created_at', false);
    if (data) feedbackList = data;
  } catch (e) {}
  return feedbackList;
}
async function submitFeedback(message) {
  if (!sb) return null;
  const id = genId();
  const branch = currentViewBranch() !== 'all' ? currentViewBranch() : (state.userBranch || DEFAULT_BRANCH);
  try {
    const { error } = await sb.from(FEEDBACK_TABLE).insert({
      id, branch, submitted_by: state.staffCode || '-', message, status: 'new', created_at: new Date().toISOString(),
    });
    if (error) throw error;
    return { id, branch, submitted_by: state.staffCode || '-', message, status: 'new', created_at: new Date().toISOString() };
  } catch (e) { console.error('submitFeedback failed:', e); return null; }
}
async function markFeedbackReviewed(id) {
  if (!sb) return false;
  try {
    const { error } = await sb.from(FEEDBACK_TABLE).update({ status: 'reviewed' }).eq('id', id);
    return !error;
  } catch (e) { return false; }
}
async function deleteFeedback(id) {
  if (!sb) return false;
  try {
    const { error } = await sb.from(FEEDBACK_TABLE).delete().eq('id', id);
    return !error;
  } catch (e) { return false; }
}
function scopedFeedback() {
  const vb = currentViewBranch();
  if (vb === 'all') return feedbackList;
  return feedbackList.filter(f => (f.branch || DEFAULT_BRANCH) === vb);
}
function newFeedbackCount() {
  return scopedFeedback().filter(f => f.status === 'new').length;
}

async function saveProductsOrWarn(itemsToSave) {
  const list = itemsToSave || products;
  const ok = await saveProducts(list);
  if (!ok) {
    showAlertModal('บันทึกขึ้น Supabase ไม่สำเร็จ\n\nกรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต แล้วลองใหม่อีกครั้ง' + (lastDbError ? '\n\n(สาเหตุ: ' + lastDbError + ')' : ''));
  }
  return ok;
}

let products = [];
let pendingSubmissions = [];
let lastDbError = '';

function getStatus(expiryDateStr) {
  if (!expiryDateStr) return 'nodate';
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  if (!expiryDateStr) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function compareByDaysLeft(a, b) {
  if (a.daysLeft === null && b.daysLeft === null) return 0;
  if (a.daysLeft === null) return 1;
  if (b.daysLeft === null) return -1;
  return a.daysLeft - b.daysLeft;
}
function relativeDaysText(daysLeft) {
  if (daysLeft === null || daysLeft === undefined) return '';
  if (state.lang === 'en') {
    if (daysLeft === 0) return 'Expires today';
    if (daysLeft > 0) return `${daysLeft} day${daysLeft === 1 ? '' : 's'} left`;
    return `${Math.abs(daysLeft)} day${Math.abs(daysLeft) === 1 ? '' : 's'} overdue`;
  }
  if (daysLeft === 0) return 'หมดอายุวันนี้';
  if (daysLeft > 0) return `เหลือ ${daysLeft} วัน`;
  return `เลยมา ${Math.abs(daysLeft)} วัน`;
}
// ใกล้หมดอายุมาก (วันนี้/พรุ่งนี้) แต่ยังไม่หมดอายุ -> ใช้ไฮไลต์แดงเด่นเป็นพิเศษ
function isCriticalSoon(p) {
  return p.status !== 'expired' && p.status !== 'nodate' && p.daysLeft !== null && p.daysLeft <= CRITICAL_WINDOW_DAYS;
}
// เหลือ 2 วัน (ไม่เข้าเกณฑ์ด่วนมาก) -> ไฮไลต์เหลืองเด่นขึ้นจากเร่งด่วนปกติ
function isWarningSoon(p) {
  return p.status !== 'expired' && p.status !== 'nodate' && p.daysLeft !== null && p.daysLeft > CRITICAL_WINDOW_DAYS && p.daysLeft <= WARNING_WINDOW_DAYS;
}

// มีคำขอเก็บออก/ลบ ของสินค้านี้ค้างอยู่ไหม (ถ้ามี ให้ซ่อนจากหน้าหลัก/ปฏิทิน รอ AI ตรวจสอบอนุมัติ)
function hasPendingRemoval(id) {
  return pendingSubmissions.some(x => x.removeTargetId === id || x.deleteTargetId === id);
}

// สร้าง id ใหม่แบบไม่ชนกันข้ามเครื่อง และเล็กพอที่จะใส่คอลัมน์ id ได้ทุกชนิด (int4/int8)
// เดิมใช้ max(id)+1 -> 2 เครื่องเพิ่มพร้อมกันได้ id เดียวกัน -> ทับกัน -> สินค้าหาย
// เดิมอีกเวอร์ชันใช้ Date.now()*1000 (~1.75e15) -> ใหญ่เกินคอลัมน์ int4 -> บันทึกไม่ได้
function genId() {
  const existing = new Set([
    ...products.map(p => p.id),
    ...pendingSubmissions.map(p => p.id),
  ]);
  let id;
  let tries = 0;
  do {
    // FIX: ใช้ crypto.getRandomValues เพื่อลดโอกาสชนกันข้ามเครื่อง
    try {
      const arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      id = (arr[0] % 2000000000) + 1;
    } catch {
      id = Math.floor(Math.random() * 2000000000) + 1;
    }
    // ผสม timestamp เล็กน้อยเพื่อลดชนเมื่อหลายเครื่องสร้างพร้อมกัน
    if (tries > 5) id = ((Date.now() % 1000000) * 1000 + (id % 1000)) % 2000000000 + 1;
    tries++;
  } while (existing.has(id) && tries < 100);
  return id;
}

// ==================== วันที่แบบพิมพ์เอง (รับทั้ง พ.ศ และ ค.ศ เช่น 22/02/69) ====================
// คืนค่า ISO 'YYYY-MM-DD' ถ้าแปลงได้ / คืน '' ถ้าว่าง / คืน null ถ้ารูปแบบผิด
function parseDateInputTH(str) {
  if (!str) return '';
  const s = String(str).trim();
  if (!s) return '';
  const m = s.match(/^(\d{1,2})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{2,4})$/);
  if (!m) return null;
  let day = parseInt(m[1], 10);
  let month = parseInt(m[2], 10);
  let year = parseInt(m[3], 10);
  if (month < 1 || month > 12 || day < 1 || day > 31) return null;
  const nowCe = new Date().getFullYear();
  if (m[3].length <= 2) {
    // ปี 2 หลัก: ลองทั้งแบบ พ.ศ (25xx) และ ค.ศ (20xx) เลือกอันที่อยู่ในช่วงสมเหตุสมผล
    const beCe = 2500 + year - 543;   // ตีความเป็น พ.ศ 25xx
    const ceCe = 2000 + year;         // ตีความเป็น ค.ศ 20xx
    const inWindow = (y) => y >= nowCe - 1 && y <= nowCe + 5;
    if (inWindow(beCe)) year = beCe;
    else if (inWindow(ceCe)) year = ceCe;
    else year = beCe; // เผื่อกรณีนอกช่วง ใช้ พ.ศ เป็นค่าเริ่มต้น
  } else {
    // ปี 4 หลัก: ถ้ามากกว่า 2400 ถือเป็น พ.ศ
    if (year > 2400) year = year - 543;
  }
  const mm = String(month).padStart(2, '0');
  const dd = String(day).padStart(2, '0');
  const iso = `${year}-${mm}-${dd}`;
  // ตรวจว่าวันที่มีจริง (กัน 31/02)
  const test = new Date(iso + 'T00:00:00');
  if (test.getFullYear() !== year || (test.getMonth() + 1) !== month || test.getDate() !== day) return null;
  return iso;
}
// ISO -> 'DD/MM/YY' (ปี พ.ศ 2 หลัก) สำหรับเติมในช่องพิมพ์
function formatDateInputTH(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return '';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const beYY = String((d.getFullYear() + 543) % 100).padStart(2, '0');
  return `${dd}/${mm}/${beYY}`;
}
// ใส่ "/" อัตโนมัติระหว่างพิมพ์ (วว/ดด/ปป) ให้ง่ายขึ้น
function autoSlashDate(el) {
  let d = el.value.replace(/\D/g, '').slice(0, 8);
  let out = d;
  if (d.length > 4) out = d.slice(0, 2) + '/' + d.slice(2, 4) + '/' + d.slice(4);
  else if (d.length > 2) out = d.slice(0, 2) + '/' + d.slice(2);
  el.value = out;
}
// สร้าง HTML ช่องกรอกวันที่แบบพิมพ์เอง (class lot-date-input ใช้ร่วมกับระบบเดิม)
function dateTextInputHTML(value = '', extraClass = '', extraAttrs = '') {
  const v = value ? escapeHtml(formatDateInputTH(value)) : '';
  return `<input type="text" inputmode="numeric" placeholder="วว/ดด/ปป (พ.ศ)" value="${v}" oninput="autoSlashDate(this)" ${extraAttrs} class="lot-date-input ${extraClass}" />`;
}
// อ่านค่าวันที่ทั้งหมดจาก container (แปลงเป็น ISO, ข้ามช่องว่าง). คืน {dates, hasError}
function readLotDates(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return { dates: [], hasError: false };
  const inputs = Array.from(container.querySelectorAll('.lot-date-input'));
  const dates = [];
  let hasError = false;
  inputs.forEach(inp => {
    const raw = inp.value.trim();
    if (!raw) return;
    const iso = parseDateInputTH(raw);
    if (iso === null) { hasError = true; inp.classList.add('ring-2', 'ring-red-400'); }
    else { inp.classList.remove('ring-2', 'ring-red-400'); if (iso) dates.push(iso); }
  });
  return { dates, hasError };
}

function barcodeBlockHTML(barcode, idSuffix) {

  return `
    <div class="mt-2 flex flex-col items-center rounded-2xl bg-white p-3 ring-1 ring-stone-100">
      <svg id="${safeId}" data-value="${escapeHtml(barcode)}" class="w-full" style="max-height:80px"></svg>
    </div>`;
}

function detectBarcodeFormat(value) {
  const v = String(value).trim();
  if (/^\d{13}$/.test(v)) return 'EAN13';
  if (/^\d{12}$/.test(v)) return 'UPC';
  if (/^\d{8}$/.test(v)) return 'EAN8';
  return 'CODE128';
}

function renderBarcodeSVGs() {
  if (typeof JsBarcode === 'undefined') return;
  document.querySelectorAll('svg[id^="barcode-svg-"]').forEach(svg => {
    const value = svg.getAttribute('data-value');
    if (!value || svg.getAttribute('data-rendered') === '1') return;
    const fmt = detectBarcodeFormat(value);
    try {
      JsBarcode(svg, value, {
        format: fmt,
        width: 2,
        height: 56,
        displayValue: true,
        fontSize: 13,
        margin: 4,
        background: '#ffffff',
        lineColor: '#0a2a1c',
      });
      svg.setAttribute('data-rendered', '1');
    } catch (e) {
      try {
        JsBarcode(svg, value, { format: 'CODE128', width: 2, height: 56, displayValue: true, fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c' });
        svg.setAttribute('data-rendered', '1');
      } catch (e2) {
        svg.outerHTML = `<p class="text-center text-[11px] text-stone-400">บาร์โค้ด ${value}</p>`;
      }
    }
  });
}

function updateLiveBarcode(inputId, previewId) {
  const input = document.getElementById(inputId);
  const preview = document.getElementById(previewId);
  if (!input || !preview) return;
  const val = input.value.trim();
  if (!val) { preview.innerHTML = ''; return; }
  preview.innerHTML = `<div class="mt-2 flex flex-col items-center rounded-2xl bg-white p-3 ring-1 ring-stone-100"><svg id="live-barcode-${previewId}" class="w-full" style="max-height:80px"></svg></div>`;
  if (typeof JsBarcode !== 'undefined') {
    const fmt = detectBarcodeFormat(val);
    try {
      JsBarcode(`#live-barcode-${previewId}`, val, {
        format: fmt, width: 2, height: 56, displayValue: true,
        fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c',
      });
    } catch (e) {
      try {
        JsBarcode(`#live-barcode-${previewId}`, val, {
          format: 'CODE128', width: 2, height: 56, displayValue: true,
          fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c',
        });
      } catch (e2) {
        preview.innerHTML = `<p class="mt-2 text-center text-[11px] text-stone-400">บาร์โค้ดนี้สร้างภาพไม่ได้ (${escapeHtml(val)})</p>`;
      }
    }
  }
}

function formatThaiDateTime(isoString) {
  if (!isoString) return '';
  const d = new Date(isoString);
  if (state.lang === 'en') {
    const datePart = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
    const timePart = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    return `${datePart} · ${timePart}`;
  }
  const datePart = d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
  const timePart = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
  return `${datePart} · ${timePart} น.`;
}
function formatThaiDate(dateStr) {
  if (!dateStr) return t('status.nodate');
  const d = new Date(dateStr + 'T00:00:00');
  if (state.lang === 'en') return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
}
function escapeHtml(str) {
  const p = document.createElement('p');
  p.textContent = str;
  return p.innerHTML;
}

function truncateName(name, maxLen = 32) {
  if (!name) return '';
  return name.length > maxLen ? name.slice(0, maxLen).trim() + '…' : name;
}

// ==================== ค้นหาด้วยรูปภาพ (อัปเกรด: เร็วขึ้น + แม่นขึ้น) ====================
// อัปเกรด v35:
//  - ใช้ MobileNet v2 alpha 1.0 (แม่น) แต่ย่อรูปเป็น 224px ก่อน infer -> ถอดรหัส/ประมวลผลเร็วขึ้นมาก
//  - คำนวณ embedding แบบขนานมากขึ้น (6 พร้อมกัน) และแคชลง Supabase (ครั้งต่อไปแทบจะทันที)
//  - pre-warm: หลังโหลดโมเดลครั้งแรก แอบคำนวณ embedding ที่ยังขาดในเบื้องหลัง เวลาค้นจริงจะไวขึ้น
const VS_CONCURRENCY = 6;
const VS_INPUT_SIZE = 224;

function loadVisualSearchModel() {
  if (window.__mobilenetModel) return Promise.resolve(window.__mobilenetModel);
  if (window.__mobilenetLoadingPromise) return window.__mobilenetLoadingPromise;
  window.__mobilenetLoadingPromise = new Promise((resolve, reject) => {
    const tfScript = document.createElement('script');
    tfScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js';
    tfScript.onload = () => {
      const mnScript = document.createElement('script');
      mnScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js';
      mnScript.onload = async () => {
        try {
          try { if (window.tf && tf.setBackend) { await tf.setBackend('webgl'); await tf.ready(); } } catch (e) {}
          const model = await mobilenet.load({ version: 2, alpha: 1.0 });
          window.__mobilenetModel = model;
          resolve(model);
        } catch (e) { reject(e); }
      };
      mnScript.onerror = () => reject(new Error('โหลดโมเดลไม่สำเร็จ'));
      document.head.appendChild(mnScript);
    };
    tfScript.onerror = () => reject(new Error('โหลด TensorFlow.js ไม่สำเร็จ'));
    document.head.appendChild(tfScript);
  });
  return window.__mobilenetLoadingPromise;
}

function loadImageElement(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('โหลดรูปไม่สำเร็จ'));
    img.src = src;
  });
}

// ครอปสี่เหลี่ยมจัตุรัสกลางภาพ แล้วย่อเป็น 224px (โฟกัสตัวสินค้าตรงกลาง ลดพื้นหลัง/มือ/ชั้นวางรบกวน)
function downscaleToCanvas(imgEl) {
  const c = document.createElement('canvas');
  c.width = VS_INPUT_SIZE; c.height = VS_INPUT_SIZE;
  const iw = imgEl.naturalWidth || imgEl.width;
  const ih = imgEl.naturalHeight || imgEl.height;
  const side = Math.min(iw, ih);
  const sx = (iw - side) / 2;
  const sy = (ih - side) / 2;
  c.getContext('2d').drawImage(imgEl, sx, sy, side, side, 0, 0, VS_INPUT_SIZE, VS_INPUT_SIZE);
  return c;
}

async function computeImageEmbedding(imgEl) {
  const model = await loadVisualSearchModel();
  const canvas = downscaleToCanvas(imgEl);
  const t = model.infer(canvas, true);
  const data = await t.data();
  t.dispose();
  return Array.from(data);
}

function cosineSimilarity(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-8);
}

// คำนวณ embedding ที่ยังขาด (ใช้ร่วมกันทั้งตอนค้นจริงและตอน pre-warm)
async function ensureEmbeddingsFor(candidates, onProgress) {
  const urlToEmbedding = new Map();
  candidates.forEach(p => {
    if (p.imageEmbedding && p.imageEmbedding.length && !urlToEmbedding.has(p.imageUrl)) {
      urlToEmbedding.set(p.imageUrl, p.imageEmbedding);
    }
  });
  const urlsNeeding = [...new Set(candidates.filter(p => !urlToEmbedding.has(p.imageUrl)).map(p => p.imageUrl))];
  let done = 0;
  for (let i = 0; i < urlsNeeding.length; i += VS_CONCURRENCY) {
    if (state.ocrCancelled) break;
    const batch = urlsNeeding.slice(i, i + VS_CONCURRENCY);
    if (onProgress) onProgress(done, urlsNeeding.length);
    await Promise.all(batch.map(async (url) => {
      try {
        const img = await loadImageElement(url);
        const emb = await computeImageEmbedding(img);
        urlToEmbedding.set(url, emb);
      } catch (e) {}
    }));
    done += batch.length;
  }
  // แปะ embedding กลับให้ทุกล็อตที่ใช้รูปร่วมกัน + เก็บที่ต้องบันทึกแคช
  const embeddedItems = [];
  candidates.forEach(p => {
    if (!p.imageEmbedding || !p.imageEmbedding.length) {
      const emb = urlToEmbedding.get(p.imageUrl);
      if (emb) { p.imageEmbedding = emb; embeddedItems.push(p); }
    }
  });
  if (embeddedItems.length > 0) saveProductsOrWarn(embeddedItems);
  return urlToEmbedding;
}

// pre-warm เบื้องหลัง (ไม่บล็อก UI) เรียกหลังโหลดข้อมูลเสร็จ
let vsPrewarmDone = false;
async function prewarmVisualSearch() {
  if (vsPrewarmDone) return;
  vsPrewarmDone = true;
  try {
    const candidates = products.filter(p => !p.removed && p.imageUrl && (!p.imageEmbedding || !p.imageEmbedding.length));
    if (candidates.length === 0) return;
    await loadVisualSearchModel();
    state.ocrCancelled = false;
    await ensureEmbeddingsFor(candidates, null);
  } catch (e) { vsPrewarmDone = false; /* ลองใหม่รอบหน้าได้ */ }
}

async function handleVisualSearchFileSelected(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  state.ocrCancelled = false;
  showVisualSearchProgress('🔎 กำลังเตรียมระบบจำรูปภาพ...');
  try {
    await loadVisualSearchModel();
    if (state.ocrCancelled) return;
    showVisualSearchProgress('📸 กำลังวิเคราะห์รูปที่ถ่าย...');
    const fileUrl = URL.createObjectURL(file);
    const capturedImg = await loadImageElement(fileUrl);
    const queryEmbedding = await computeImageEmbedding(capturedImg);
    URL.revokeObjectURL(fileUrl);
    if (state.ocrCancelled) return;

    const candidates = products.filter(p => !p.removed && p.imageUrl);
    await ensureEmbeddingsFor(candidates, (done, total) => {
      if (total > 0) showVisualSearchProgress(`🔎 กำลังวิเคราะห์รูปภาพ... (${done}/${total} รูป)`);
    });
    if (state.ocrCancelled) return;

    const scored = candidates
      .filter(p => p.imageEmbedding && p.imageEmbedding.length)
      .map(p => ({ product: p, score: cosineSimilarity(queryEmbedding, p.imageEmbedding) }));
    scored.sort((a, b) => b.score - a.score);
    const top = scored.slice(0, 5).filter(s => s.score > 0.08);
    closeOcrOverlay();
    showVisualSearchResults(top);
  } catch (err) {
    console.error('Visual search error:', err);
    if (state.ocrCancelled) return;
    closeOcrOverlay();
    showAlertModal('ค้นหาด้วยรูปภาพไม่สำเร็จ ลองใหม่ หรือตรวจสอบอินเทอร์เน็ต (โหลดโมเดลครั้งแรกต้องใช้เน็ต)');
  }
}

function getInitials(name){
  if(!name) return '?';
  const parts = String(name).trim().split(/\s+/);
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+(parts[1][0]||'')).toUpperCase();
}
function hashColor(str){
  let h=0; for(let i=0;i<str.length;i++) h = (h*31 + str.charCodeAt(i))>>>0;
  const hue = h % 360;
  return `hsl(${hue} 65% 45%)`;
}

let _pendingAvatarDataUrl = null;
function handleAvatarFile(file){
  if(!file) return;
  if(file.size > 8*1024*1024){ showToast('ไฟล์ใหญ่เกินไปค่ะ เลือกไฟล์เล็กกว่า 8MB'); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      // ย่อรูปเหลือ 256x256 เพื่อโหลดไว
      const canvas = document.createElement('canvas');
      const maxSize = 256;
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxSize){ h*=maxSize/w; w=maxSize; } } else { if(h>maxSize){ w*=maxSize/h; h=maxSize; } }
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const dataUrl = canvas.toDataURL('image/jpeg',0.82);
      _pendingAvatarDataUrl = dataUrl;
      const preview = document.getElementById('avatar-preview');
      if(preview) preview.innerHTML=`<img src="${dataUrl}" class="h-full w-full object-cover"/>`;
      const saveBtn=document.getElementById('avatar-save-btn');
      if(saveBtn){ saveBtn.disabled=false; saveBtn.className='flex-1 rounded-2xl bg-brand-600 py-3 text-sm font-bold text-white shadow active:scale-95'; }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
async function saveAvatar(){
  if(!_pendingAvatarDataUrl) return;
  const empCode = String(state.staffEmpCode||'');
  if(!empCode){ showToast('ไม่พบรหัสพนักงาน'); return; }
  try{ localStorage.setItem(AVATAR_CACHE_PREFIX+empCode, _pendingAvatarDataUrl); }catch(e){}
  // พยายามอัปขึ้น Supabase ถ้ามีคอลัมน์ avatar_url (ถ้าไม่มีจะเงียบไว้ ใช้ local cache)
  try{
    if(sb){
      // ลองอัปเดต field avatar_url / profile_image
      const { error } = await sb.from('users').update({ avatar_url: _pendingAvatarDataUrl }).eq('employee_code', empCode);
      if(error){ /* ถ้าไม่มีคอลัมน์ จะ error - ไม่เป็นไร ใช้ local ไปก่อน */ console.log('avatar cloud update skipped', error.message); }
    }

  _pendingAvatarDataUrl=null;

}
async function removeAvatar(){
  const empCode = String(state.staffEmpCode||'');

}

async function submitQuickLogin() {
  const val = (document.getElementById('quick-login-input')?.value || '').trim();
  if (!val) return;
  const btn = document.getElementById('quick-login-btn');
  if (btn) { btn.disabled = true; btn.textContent = t('quicklogin.checking'); }
  await fetchUsers();
  const low = val.toLowerCase();
  const u = appUsers.find(x =>
    String(x.employee_code) === val ||
    (x.nickname && x.nickname.toLowerCase() === low)
  );
  if (btn) { btn.disabled = false; btn.textContent = t('quicklogin.submit'); }
  if (!u) return showAlertModal('ไม่พบข้อมูลของคุณค่ะ\nถ้ายังไม่ได้ลงทะเบียน กดปุ่ม "ลงทะเบียนใหม่" ด้านล่างนะคะ');
  if (u.status === 'pending') return showAlertModal('⏳ คำขอลงทะเบียนของคุณกำลังรอ AI ตรวจสอบอนุมัติค่ะ');
  if (u.status === 'rejected') return showAlertModal('❌ บัญชีนี้ถูกระงับการใช้งาน กรุณาติดต่อ AI ตรวจสอบค่ะ');
  // อนุมัติแล้ว -> เข้าเลย
  state.staffCode = u.nickname || String(u.employee_code);
  state.staffEmpCode = String(u.employee_code);
  state.userBranch = u.branch || DEFAULT_BRANCH;
  saveStaffCode(state.staffCode);
  saveEmpCode(String(u.employee_code));
  saveBranch(state.userBranch);
  saveSessionDate();
  state.entered = true;
  touchUserActive(u.employee_code);
  logActivity('login');
  applyDeepLink();
  closeModal();
  renderPage();
}

  openModal(`

        <form id="password-login-form" class="mt-6 space-y-3">
          <input id="pwlogin-code" type="text" placeholder="รหัสพนักงาน" required class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 text-center text-lg font-bold outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-100" />
          <input id="pwlogin-password" type="password" placeholder="รหัสผ่าน" required class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 text-center text-lg font-bold outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-100" />
          <p id="pwlogin-error" class="hidden text-xs font-medium text-red-600 text-center"></p>
          <button type="submit" id="pwlogin-btn" class="w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-lg active:scale-[0.98]">เข้าสู่ระบบ</button>
        </form>
      </div>
    </div>
  `);
  document.getElementById('password-login-form').addEventListener('submit', submitPasswordLogin);
}

async function submitPasswordLogin(e) {
  e.preventDefault();
  const code = (document.getElementById('pwlogin-code')?.value || '').trim();
  const pw = (document.getElementById('pwlogin-password')?.value || '').trim();
  const errEl = document.getElementById('pwlogin-error');
  if (errEl) errEl.classList.add('hidden');
  if (!code || !pw) return;
  const btn = document.getElementById('pwlogin-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...'; }
  await fetchUsers();

  // เช็คก่อนว่าเป็นแอดมินหลัก/Dev ไหม (รหัสอยู่คนละตารางกับพนักงานทั่วไป)
  try {
    const creds = await fetchAdminCredsFromCloud();
    if (creds && ((String(creds.id) === code && String(creds.pin) === pw) || (String(creds.devId) === code && String(creds.devPassword) === pw))) {
      adminCreds = creds;
      state.isDevSession = String(creds.devId) === code;
      state.isAdminSession = true;
      state.staffCode = state.isDevSession ? 'Developer' : 'Admin';
      state.entered = true;
      if (btn) { btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; }
      closeModal();
      renderPage();
      return;
    }
  } catch (e) {}

  const u = appUsers.find(x => String(x.employee_code) === code);
  if (btn) { btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; }
  if (!u || u.status !== 'approved') {
    if (errEl) { errEl.textContent = 'ไม่พบรหัสพนักงานนี้ในระบบค่ะ กรุณาติดต่อแอดมิน'; errEl.classList.remove('hidden'); }
    return;
  }
  if (!u.password) {
    if (errEl) { errEl.textContent = '⚠️ บัญชีนี้ยังไม่มีรหัสผ่าน กรุณาให้แอดมินตั้งรหัสผ่านให้ก่อนนะคะ'; errEl.classList.remove('hidden'); }
    return;
  }
  if (u.password !== pw) {
    if (errEl) { errEl.textContent = 'รหัสผ่านไม่ถูกต้องค่ะ'; errEl.classList.remove('hidden'); }
    return;
  }
  state.staffCode = u.nickname || String(u.employee_code);
  state.staffEmpCode = String(u.employee_code);
  state.userBranch = u.branch || DEFAULT_BRANCH;
  saveStaffCode(state.staffCode);
  saveEmpCode(String(u.employee_code));
  saveBranch(state.userBranch);
  saveSessionDate();
  state.entered = true;
  clearPendingRegCode();
  state.myRegStatus = null;
  touchUserActive(u.employee_code);
  logActivity('login');
  applyDeepLink();
  closeModal();
  renderPage();
}

async function submitChangePassword(e) {
  e.preventDefault();
  const current = (document.getElementById('changepw-current')?.value || '').trim();
  const next = (document.getElementById('changepw-new')?.value || '').trim();
  const errEl = document.getElementById('changepw-error');
  if (errEl) errEl.classList.add('hidden');
  if (!current || !next) return;
  const btn = document.getElementById('changepw-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังบันทึก...'; }
  await fetchUsers();
  const u = appUsers.find(x => String(x.employee_code) === state.staffEmpCode);
  if (!u || !u.password || u.password !== current) {
    if (btn) { btn.disabled = false; btn.textContent = 'บันทึกรหัสผ่านใหม่'; }
    if (errEl) { errEl.textContent = 'รหัสผ่านเดิมไม่ถูกต้องค่ะ'; errEl.classList.remove('hidden'); }
    return;
  }
  const ok = await updateUserPassword(state.staffEmpCode, next);
  if (btn) { btn.disabled = false; btn.textContent = 'บันทึกรหัสผ่านใหม่'; }
  if (!ok) { if (errEl) { errEl.textContent = 'บันทึกไม่สำเร็จค่ะ ลองใหม่อีกครั้ง'; errEl.classList.remove('hidden'); } return; }
  closeModal();
  showToast('✅ เปลี่ยนรหัสผ่านแล้ว');
}

async function submitStaffRegistration() {
  const code = (document.getElementById('reg-emp-code')?.value || '').trim();
  const nick = (document.getElementById('reg-nickname')?.value || '').trim();
  const branch = (document.getElementById('reg-branch')?.value || '').trim();
  const gender = document.querySelector('input[name="reg-gender"]:checked')?.value || 'male';
  if (!code || !nick || !branch) return showAlertModal('กรุณากรอกรหัสพนักงาน ชื่อเล่น และสาขาให้ครบค่ะ');
  const btn = document.getElementById('reg-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...'; }
  await fetchUsers();
  const u = findUser(code);
  if (u) {
    if (u.status === 'approved') {
      state.staffCode = u.nickname || nick;
      state.staffEmpCode = String(code);
      state.userBranch = u.branch || DEFAULT_BRANCH;
      saveStaffCode(state.staffCode);
      saveEmpCode(String(code));
      saveBranch(state.userBranch);
      saveSessionDate();
      state.entered = true;
      touchUserActive(code);
      logActivity('login');
      applyDeepLink();
      closeModal();
      renderPage();
      return;
    }
    if (btn) { btn.disabled = false; btn.textContent = 'ลงทะเบียน'; }
    if (u.status === 'pending') return showAlertModal('⏳ คำขอลงทะเบียนของคุณกำลังรอ AI ตรวจสอบอนุมัติค่ะ\nโปรดลองใหม่อีกครั้งหลังได้รับอนุมัติ');
    if (u.status === 'rejected') return showAlertModal('❌ บัญชีนี้ถูกปฏิเสธการเข้าใช้งาน กรุณาติดต่อ AI ตรวจสอบค่ะ');
  }
  await fetchBranchWhitelist();
  const wl = whitelistForBranch(branch);
  if (wl.length > 0 && !isCodeWhitelisted(branch, code)) {
    if (btn) { btn.disabled = false; btn.textContent = 'ลงทะเบียน'; }
    const phone = getBranchContactPhone(branch);
    return showAlertModal(`รหัสพนักงาน ${code} ไม่อยู่ในรายชื่อที่สาขา ${branch} อนุญาตให้สมัครค่ะ\n\nกรุณาติดต่อแอดมินสาขาเพื่อขอเพิ่มชื่อ${phone ? `\n📞 โทร ${phone}` : ''}`);
  }
  if (btn) { btn.textContent = 'กำลังลงทะเบียน...'; }
  const loc = await getCurrentLocation();
  const res = await registerUser(code, nick, branch, loc, gender);
  if (btn) { btn.disabled = false; btn.textContent = 'ลงทะเบียน'; }
  if (!res.ok) return showAlertModal('ลงทะเบียนไม่สำเร็จค่ะ' + (res.err ? '\n\n(สาเหตุ: ' + res.err + ')\n\nถ้ายังไม่ได้สร้างตาราง expiry_users กรุณารัน SQL ก่อนนะคะ' : ''));
  saveBranch(branch);
  savePendingRegCode(code);
  await fetchUsers();
  closeModal();
  showAlertModal(`✅ ลงทะเบียนเรียบร้อยแล้วค่ะ\n\nรหัสพนักงาน: ${code}\nชื่อเล่น: ${nick}\nสาขา: ${branch}\n\nรอ AI ตรวจสอบอนุมัติก่อนนะคะ พออนุมัติแล้วแอดมินจะแจ้งรหัสผ่านให้แยกต่างหาก แล้วเข้าใช้งานผ่านปุ่ม "🔑 เข้าสู่ระบบ" ได้เลยค่ะ`);
}

function targetBranchForNewLot(fallbackBranch) {
  // FIX: ให้ยึดสาขาของผู้ใช้จริงก่อน ไม่ใช่ viewBranch ที่อาจเป็น 'all'
  if (fallbackBranch) return fallbackBranch;

function getBranchDashboardProducts() {
  // FIX: ไม่ซ่อนสินค้าที่มีคำขอเก็บออกค้างอยู่ (เคยทำให้รู้สึกว่าสินค้าหาย) - ให้โชว์ต่อแต่ติดป้ายเตือนแทน
  const own = products.map(withComputed).filter(p => !p.removed && isVisibleBranch(p));
  const vb = currentViewBranch();
  if (vb === 'all') return own;
  const ownKeys = new Set(
    own.map(p => (p.barcode ? `bc:${p.barcode}` : (p.plu ? `plu:${p.plu}` : null))).filter(Boolean)
  );
  const seen = new Map();
  products.forEach(p => {
    if (p.removed) return;
    if (!isVisibleBranch({ branch: p.branch })) {
      // เก็บ catalog จากสาขาอื่นเท่านั้น
    }
    const key = p.barcode ? `bc:${p.barcode}` : (p.plu ? `plu:${p.plu}` : null);
    if (!key || ownKeys.has(key) || seen.has(key)) return;
    // เอาเฉพาะสินค้าที่ไม่อยู่ในสาขานี้จริงๆ
    if ((p.branch || DEFAULT_BRANCH) === vb) return;
    seen.set(key, p);
  });
  // FIX: placeholder ต้องไม่ใช้ id เดิมซ้ำ จะทำให้ชนกับสินค้าจริงแล้วหาย/ทับกัน
  const otherBranchCatalog = Array.from(seen.values()).map(p => withComputed({ 
    ...p, 
    id: `catalog-${p.barcode || p.plu || p.id}`, // id ปลอม ไม่ชนของจริง
    branch: vb, 
    expiryDate: null,
    isCatalogPlaceholder: true 
  }));
  return [...own, ...otherBranchCatalog];
}

// ซ่อนเมนูบนอัตโนมัติตอนเลื่อนดูเนื้อหาลง (เพิ่มพื้นที่จอ) แล้วโชว์กลับมาทันทีตอนเลื่อนขึ้น/ดึงกลับไปบนสุด
function initDashboardHeaderAutoHide() {
  const scrollEl = document.getElementById('app-scroll');
  const header = document.getElementById('dashboard-sticky-header');
  if (!scrollEl || !header) return;
  let lastTop = scrollEl.scrollTop;
  scrollEl.addEventListener('scroll', () => {
    const st = scrollEl.scrollTop;
    const delta = st - lastTop;
    if (st <= 4) {
      header.classList.remove('header-hidden'); // อยู่บนสุด โชว์เสมอ
    } else if (delta > 6) {
      header.classList.add('header-hidden'); // เลื่อนลง -> ซ่อน
    } else if (delta < -6) {
      header.classList.remove('header-hidden'); // เลื่อนขึ้น -> โชว์กลับมา
    }
    lastTop = st;
  }, { passive: true });
}

function groupedDashboardListHTML(list) {
  const critical = list.filter(p => dashboardBucket(p) === 'critical');

  let html = '';

    html += dashboardSectionHeaderHTML('🔴', `${t('dash.critical').replace('🔴 ', '')} (${critical.length})`, '#dc2626', false);
    html += `<div class="grid gap-3">${critical.map(p => productCardHTML(p, { showRemoveAction: true })).join('')}</div>`;

    html += `<div class="grid gap-3">${warning.map(p => productCardHTML(p, { showRemoveAction: true })).join('')}</div>`;
  }
  if (safe.length > 0) {
    html += dashboardSectionHeaderHTML('🟢', `${t('dash.safeGroup').replace('🟢 ', '')} (${safe.length})`, '#1f6b3f', critical.length > 0 || warning.length > 0);

let scannerStopPromise = null;

function isValidBarcodeChecksum(code) {
  if (!/^\d+$/.test(code)) return true;
  if (![8, 12, 13, 14].includes(code.length)) return true;
  const digits = code.split('').map(Number);
  const checkDigit = digits.pop();
  let sum = 0;
  digits.reverse().forEach((d, i) => { sum += (i % 2 === 0) ? d * 3 : d * 1; });
  const calculated = (10 - (sum % 10)) % 10;
  return calculated === checkDigit;
}

let scannerRestartTimer = null;
function scheduleScannerRestart(delay = 0) {
  if (state.tab !== 'scanner') return;
  if (scannerRestartTimer) clearTimeout(scannerRestartTimer);
  scannerRestartTimer = setTimeout(() => {
    scannerRestartTimer = null;
    if (state.tab === 'scanner') initScanner();
  }, delay);
}

// ปิดกล้องชั่วคราวตอนแป้นพิมพ์เปิด (โฟกัสช่องพิมพ์) แล้วเปิดกลับให้อัตโนมัติตอนปิดแป้นพิมพ์ (blur)
function showCameraPausedOverlay() {
  const box = document.getElementById('camera-box');
  if (!box || document.getElementById('camera-paused-overlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'camera-paused-overlay';
  overlay.className = 'absolute inset-0 z-10 flex items-center justify-center bg-stone-900 text-center text-xs text-white/70 px-6';
  overlay.textContent = '📷 ปิดกล้องชั่วคราวขณะพิมพ์...';
  box.appendChild(overlay);
}
function hideCameraPausedOverlay() {
  const overlay = document.getElementById('camera-paused-overlay');
  if (overlay) overlay.remove();
}
function bindCameraPauseOnFocus(inputId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  input.addEventListener('focus', () => {
    if (scannerRestartTimer) { clearTimeout(scannerRestartTimer); scannerRestartTimer = null; }
    stopScanner();
    showCameraPausedOverlay();
  });
  input.addEventListener('blur', () => {
    hideCameraPausedOverlay();
    scheduleScannerRestart(300);
  });
}

async function initScanner() {
  if (!window.Html5Qrcode) return;
  if (window.__scannerStarting) return;
  window.__scannerStarting = true;

  const manualForm = document.getElementById('manual-form');
  if (manualForm) manualForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = document.getElementById('manual-input').value.trim();
    if (val) handleScannedBarcode(val);
  });
  bindCameraPauseOnFocus('manual-input');
  bindCameraPauseOnFocus('plu-search-input');

  try {
    if (scannerStopPromise) { await scannerStopPromise; scannerStopPromise = null; }
    if (html5QrCode) return;

    html5QrCode = new Html5Qrcode('qr-reader');
    await html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => {
        if (!isValidBarcodeChecksum(decodedText)) return;

        const now = Date.now();
        if (state.scanner.pendingCode === decodedText) {
          state.scanner.pendingCount++;
        } else {
          state.scanner.pendingCode = decodedText;
          state.scanner.pendingCount = 1;
        }
        if (state.scanner.pendingCount < 3) return;

        if (state.scanner.lastCode === decodedText && now - state.scanner.lastTime < 2500) return;
        state.scanner.lastCode = decodedText;
        state.scanner.lastTime = now;
        state.scanner.pendingCode = null;
        state.scanner.pendingCount = 0;
        handleScannedBarcode(decodedText);
      },
      () => {}
    );
    const status = document.getElementById('camera-status');
    if (status) status.remove();
    const frame = document.getElementById('camera-frame');
    if (frame) frame.classList.remove('hidden');
  } catch (err) {
    console.error(err);
    const status = document.getElementById('camera-status');
    if (status) status.textContent = 'ไม่สามารถเข้าถึงกล้องได้';
  } finally {
    window.__scannerStarting = false;
  }
}

async function handleScanImageFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const tempDivId = 'qr-file-scan-temp';
    let tempDiv = document.getElementById(tempDivId);
    if (!tempDiv) {
      tempDiv = document.createElement('div');
      tempDiv.id = tempDivId;
      tempDiv.style.display = 'none';
      document.body.appendChild(tempDiv);
    }
    const fileScanner = new Html5Qrcode(tempDivId);
    const decodedText = await fileScanner.scanFile(file, false);
    try { fileScanner.clear(); } catch {}
    if (!isValidBarcodeChecksum(decodedText)) {
      playBeep('error'); triggerHaptic(30);
      showToast('❌ บาร์โค้ดในรูปไม่ชัดหรืออ่านผิด ลองถ่ายใหม่');
      event.target.value = '';
      return;
    }
    handleScannedBarcode(decodedText);
  } catch (err) {
    console.error(err);
    playBeep('error'); triggerHaptic(30);
    showToast('❌ ไม่พบบาร์โค้ดในรูปภาพนี้');
  }
  event.target.value = '';
}

function stopScanner() {
  if (html5QrCode) {
    const scanner = html5QrCode;
    html5QrCode = null;
    scannerStopPromise = scanner.stop().catch(() => {}).finally(() => { try { scanner.clear(); } catch {} });
    return scannerStopPromise;
  }
  return scannerStopPromise || Promise.resolve();
}

let fieldScanner = null;
function scanBarcodeIntoField(targetInputId) {
  ensureAlertOverlayRoot().innerHTML = `
    <div class="fixed inset-0 z-[230] flex items-center justify-center bg-black/80 p-4" onclick="if(event.target===this) closeFieldScanner()">
      <div class="w-full max-w-sm rounded-3xl bg-white p-5 shadow-2xl">

        <button onclick="closeFieldScanner()" class="mt-4 w-full rounded-2xl bg-stone-100 py-3 text-sm font-bold text-stone-600 active:scale-95">ยกเลิก</button>
      </div>
    </div>`;
  let lastVal = null, sameCount = 0;
  setTimeout(() => {
    fieldScanner = new Html5Qrcode('field-scanner-box');
    fieldScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 140 } },
      (decodedText) => {
        if (!isValidBarcodeChecksum(decodedText)) return;
        if (decodedText === lastVal) { sameCount++; } else { lastVal = decodedText; sameCount = 1; }
        if (sameCount < 2) return;
        const input = document.getElementById(targetInputId);
        if (input) {
          input.value = decodedText;
          input.dispatchEvent(new Event('input', { bubbles: true }));
        }
        triggerHaptic(20);
        showToast(`✅ สแกนบาร์โค้ดได้: ${decodedText}`);
        closeFieldScanner();
      },
      () => {}
    ).catch(() => {
      const box = document.getElementById('field-scanner-box');
      if (box) box.innerHTML = '<p class="flex h-full items-center justify-center p-4 text-center text-xs text-white">เปิดกล้องไม่ได้ กรุณาอนุญาตให้ใช้กล้อง แล้วลองใหม่</p>';
    });
  }, 100);
}
function closeFieldScanner() {
  if (fieldScanner) {
    const s = fieldScanner; fieldScanner = null;
    s.stop().catch(() => {}).finally(() => { try { s.clear(); } catch {} });

  closeAlertOverlay();

function addToBatch(barcode){
  const catalogList = products.filter(p=>p.barcode===barcode);
  const info = catalogList.find(p=>p.imageUrl&&p.name) || catalogList[catalogList.length-1] || {barcode, name: barcode, imageUrl:'', plu:''};
  // กันซ้ำในถาดถ้าสแกนเบิ้ลภายใน 1.5 วิ
  const now=Date.now();
  if(batchItems.length>0 && batchItems[batchItems.length-1].barcode===barcode && now-(window.__lastBatchAdd||0)<1500) return;
  window.__lastBatchAdd=now;
  batchItems.push({barcode, name: info.name||barcode, imageUrl: info.imageUrl||'', plu: info.plu||'', catalogId: info.id||null});
  playBeep('batch'); triggerHaptic([20,30,20]);
  addGamificationPoint('scan');
  updateBatchUI();
  showToast(`📦 เพิ่มลงถาดแล้ว (${batchItems.length} ชิ้น): ${info.name||barcode}`);
}
function removeFromBatch(idx){
  batchItems.splice(idx,1);

}

async function submitBatchLots(){
  if(batchItems.length===0) return showAlertModal('ถาดยังว่างอยู่ค่ะ สแกนสินค้าก่อนนะคะ');
  const wrap=document.getElementById('batch-dates-wrap');
  const inputs=wrap?Array.from(wrap.querySelectorAll('input')):[];
  const dates=[];
  let hasErr=false;
  inputs.forEach(inp=>{ const iso=parseDateInputTH(inp.value.trim()); if(iso===null){ hasErr=true; inp.classList.add('ring-2','ring-red-400'); } else if(iso){ dates.push(iso); } });
  if(hasErr) return showAlertModal('รูปแบบวันที่ผิดค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
  if(dates.length===0) return showAlertModal('ใส่วันหมดอายุอย่างน้อย 1 วันสำหรับทั้งถาดค่ะ');
  const branch=targetBranchForNewLot();
  const newItems=[];
  batchItems.forEach(it=>{
    const catalog = products.find(p=>p.barcode===it.barcode) || it;
    dates.forEach(d=>{
      newItems.push({id:genId(), barcode:it.barcode||'', plu:catalog.plu||it.plu||'', name:catalog.name||it.name||it.barcode, category:catalog.category||'', imageUrl:catalog.imageUrl||it.imageUrl||'', expiryDate:d, branch, addedDate:new Date().toISOString(), addedBy: state.staffCode||'-'});
    });
  });
  const ok=await saveProductsOrWarn(newItems);
  if(!ok){ return; }
  newItems.forEach(ni=>products.push(ni));
  addGamificationPoint('batch');
  showToast(`✅ บันทึกทั้งถาด ${batchItems.length} ชิ้น x ${dates.length} วัน = ${newItems.length} ล็อตแล้ว`);
  batchItems=[]; renderPage(); setTimeout(()=>{ if(state.tab==='scanner') initScanner(); },200);
}

function handleScannedBarcode(barcode) {
  // Feature 3: ถ้าเปิดโหมดยกถาด ให้เข้าถาดแทน
  if (typeof batchMode !== 'undefined' && batchMode) {
    addToBatch(barcode);
    return;
  }
  window.__lastScannedBarcode = barcode;
  const activeLots = products.map(withComputed).filter(p => p.barcode === barcode && !p.removed && isVisibleBranch(p));
  const catalogList = products.filter(p => p.barcode === barcode);
  const resEl = document.getElementById('scan-result');
  if (!resEl) return;

  if (catalogList.length > 0) {
    const info = catalogList.find(p => p.imageUrl && p.name) || catalogList[catalogList.length - 1];

    addGamificationPoint('scan');

    playBeep('notfound'); triggerHaptic([10,40,10]);

async function submitScanLot(barcode) {
  const catalogList = products.filter(p => p.barcode === barcode);
  const info = catalogList.find(p => p.imageUrl && p.name) || catalogList[catalogList.length - 1];
  if (!info) return;
  const { dates, hasError } = readLotDates('scan-lot-dates');
  if (hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
  if (dates.length === 0) return showAlertModal('กรุณาใส่วันหมดอายุอย่างน้อย 1 รายการ');
  if (blockIfHardDuplicate(barcode, info.plu || '', info.name, dates)) return;

  const btn = document.getElementById('scan-lot-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังบันทึก...'; btn.classList.add('opacity-70'); }

  if (isDev()) {
    const newItems = [];
    dates.forEach(date => {
      const ni = {
        id: genId(), barcode: barcode || '', plu: info.plu || '', name: info.name,
        category: info.category || '', imageUrl: info.imageUrl, expiryDate: date,
        branch: targetBranchForNewLot(info.branch),
        addedDate: new Date().toISOString(), addedBy: state.staffCode || '-'
      };
      products.push(ni);
      newItems.push(ni);
    });
    const ok = await saveProductsOrWarn(newItems);
    if (!ok) {
      products = products.filter(x => !newItems.includes(x));
      if (btn) { btn.disabled = false; btn.textContent = '✅ บันทึกล็อตใหม่'; btn.classList.remove('opacity-70'); }
      return;
    }
    showToast(`✅ เพิ่ม ${dates.length} ล็อตใหม่แล้ว`); addGamificationPoint('addLot');
    triggerHaptic(20);
    const r = document.getElementById('scan-result');
    if (r) r.innerHTML = `<div class="rounded-2xl bg-brand-50 p-4 text-center ring-1 ring-brand-200 fx-fade-up"><p class="text-sm font-bold text-brand-700">✅ เพิ่ม ${dates.length} ล็อตใหม่เข้าระบบแล้ว</p><p class="mt-1 text-xs text-stone-500">สแกนชิ้นต่อไปได้เลย</p></div>`;
  } else {
    const newId = genId();
    const newPending = {
      id: newId, barcode: barcode || '', plu: info.plu || '', name: info.name,
      expiryDate: dates[0], expiryDates: dates,
      imageUrl: info.imageUrl, expiryPhoto: '',
      submittedAt: new Date().toISOString(), submittedBy: state.staffCode
    };
    const ok = await upsertPendingRow(newPending);
    if (!ok) {
      if (btn) { btn.disabled = false; btn.textContent = '✅ ส่งให้ AI ตรวจสอบ'; btn.classList.remove('opacity-70'); }
      return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
    }
    pendingSubmissions.push(newPending);
    showToast(`✅ ส่งคำขอ ${dates.length} ล็อตแล้ว · #${newId}`);
    triggerHaptic(20);
    const r = document.getElementById('scan-result');
    if (r) r.innerHTML = `<div class="rounded-2xl bg-brand-50 p-4 text-center ring-1 ring-brand-200 fx-fade-up"><p class="text-sm font-bold text-brand-700">✅ ส่งคำขอ ${dates.length} ล็อตให้ AI ตรวจสอบแล้ว</p><p class="mt-1 text-xs text-stone-500">สแกนชิ้นต่อไปได้เลย</p></div>`;
  }
}

function calendarHTML() {
  const now = new Date();
  const startYear = now.getFullYear();
  const startMonth = now.getMonth() + 1;
  const monthsCount = state.cal.monthsCount || 6;

  const events = products.map(withComputed).filter(p => !p.removed && isVisibleBranch(p)); // FIX: ไม่ซ่อน pending removal กันหาย
  const eventsByDate = {};
  events.forEach(p => {
    if (!p.expiryDate) return;
    (eventsByDate[p.expiryDate] = eventsByDate[p.expiryDate] || []).push(p);
  });

  let monthsHtml = '';
  let y = startYear, m = startMonth;
  for (let i = 0; i < monthsCount; i++) {
    monthsHtml += monthBlockHTML(y, m, eventsByDate);
    m++;
    if (m > 12) { m = 1; y++; }
  }

  return `
    <div class="space-y-5" style="padding-top: env(safe-area-inset-top, 0px)">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-gradient-to-br from-brand-600 to-brand-800 p-2 text-white text-lg shadow-sm ring-1 ring-white/10">🗓️</span>
        <h1 class="text-lg font-bold text-stone-800">${t('cal.header')}</h1>
      </header>

      <div class="space-y-4">
        ${monthsHtml}
      </div>

      <button onclick="loadMoreCalendarMonths()" class="w-full rounded-2xl bg-white py-3 text-sm font-bold text-brand-600 shadow-sm ring-1 ring-stone-200 active:scale-95">
        ${t('cal.loadMore')}
      </button>

      <div id="calendar-detail" class="space-y-3">
        ${state.cal.selectedDate ? calendarDetailHTML(eventsByDate[state.cal.selectedDate] || []) : `<p class="py-8 text-center text-xs text-stone-400 italic">${t('cal.selectDate')}</p>`}
      </div>
    </div>`;
}

function monthBlockHTML(year, month, eventsByDate) {
  const daysInMonth = new Date(year, month, 0).getDate();
  const firstDay = new Date(year, month - 1, 1).getDay();
  const displayYear = state.lang === 'en' ? year : year + 543;
  return `
    <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-stone-200">
      <p class="mb-3 text-center text-sm font-black text-stone-700">${monthsLocalized()[month - 1]} ${displayYear}</p>
      <div class="grid grid-cols-7 mb-2">
        ${weekdaysLocalized().map(d => `<div class="text-center text-[10px] font-bold text-stone-400 uppercase">${d}</div>`).join('')}
      </div>
      <div class="grid grid-cols-7 gap-1">
        ${Array(firstDay).fill(0).map(() => `<div class="aspect-square"></div>`).join('')}
        ${Array(daysInMonth).fill(0).map((_, i) => {
          const d = i + 1;
          const dStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const dayEvents = eventsByDate[dStr] || [];
          const isSelected = state.cal.selectedDate === dStr;
          const hasExpired = dayEvents.some(p => p.status === 'expired');
          const hasCritical = dayEvents.some(p => !hasExpired && isCriticalSoon(p));
          const hasUrgent = dayEvents.some(p => p.status === 'urgent' && !isCriticalSoon(p));

          return `
            <button onclick="selectCalDateISO('${dStr}')" class="relative flex aspect-square flex-col items-center justify-center rounded-xl transition-all ${isSelected ? 'bg-brand-600 text-white shadow-lg' : 'hover:bg-stone-50'}">
              <span class="text-sm font-bold">${d}</span>
              <div class="mt-0.5 flex gap-0.5">
                ${hasExpired || hasCritical ? `<span class="h-1 w-1 rounded-full bg-red-500"></span>` : ''}
                ${hasUrgent ? `<span class="h-1 w-1 rounded-full bg-amber-500"></span>` : ''}
                ${dayEvents.length > 0 && !hasExpired && !hasCritical && !hasUrgent ? `<span class="h-1 w-1 rounded-full bg-brand-400"></span>` : ''}
              </div>
            </button>`;
        }).join('')}
      </div>
    </div>`;
}

function loadMoreCalendarMonths() {
  state.cal.monthsCount = (state.cal.monthsCount || 6) + 6;
  renderPage();
}

function selectCalDateISO(dateStr) {
  state.cal.selectedDate = dateStr;
  renderPage();
}

function forceLogoutEveryone() {
  ensureAlertOverlayRoot().innerHTML = `
    <div class="fixed inset-0 z-[220] flex items-center justify-center bg-black/60 p-6" onclick="if(event.target===this) closeAlertOverlay()">
      <div class="w-full max-w-xs rounded-3xl bg-white p-6 shadow-2xl text-center fx-fade-up">

        <p class="text-sm font-bold text-stone-800">บังคับให้ทุกคนออกจากระบบ?</p>
        <p class="mt-1 text-xs text-stone-400">ทุกเครื่องที่เคยเชื่อมต่อจะหลุดออกจากระบบ และต้องเข้าใหม่พร้อมใส่ชื่อใหม่ (ข้อมูลสินค้าไม่หาย)</p>
        <div class="mt-4 flex gap-3">
          <button onclick="closeAlertOverlay()" class="flex-1 rounded-2xl bg-stone-100 py-3 text-sm font-bold text-stone-600 active:scale-95">ยกเลิก</button>
          <button onclick="confirmForceLogoutEveryone()" class="flex-1 rounded-2xl bg-red-600 py-3 text-sm font-bold text-white active:scale-95">ยืนยัน</button>
        </div>
      </div>
    </div>`;
}
async function confirmForceLogoutEveryone() {
  closeAlertOverlay();
  if (!sb) return showAlertModal('ยังไม่ได้เชื่อมต่อฐานข้อมูลค่ะ');
  const stamp = new Date().toISOString();
  try {
    const { error } = await sb.from(SETTINGS_TABLE).upsert({ key: 'force_logout_at', value: stamp, updated_at: stamp }, { onConflict: 'key' });
    if (error) throw error;
    setForceLogoutAck(stamp);
    doLocalLogout();
    renderPage();
    showToast('✅ สั่งให้ทุกเครื่องออกจากระบบแล้ว — ทุกคนต้องเข้าใหม่');
  } catch (e) {
    showAlertModal('สั่งไม่สำเร็จค่ะ อาจยังไม่ได้สร้างตาราง expiry_settings ในฐานข้อมูล\n\n(สาเหตุ: ' + ((e && e.message) ? e.message : String(e)) + ')\n\nกรุณารัน SQL ที่ให้ไว้ใน Supabase → SQL Editor ก่อนนะคะ');
  }
}

function openFeedbackForm() {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">
        <h3 class="text-xl font-bold text-stone-800 text-center">💬 ${t('feedback.title')}</h3>
        <p class="mt-1 text-center text-xs text-stone-400">${t('feedback.sub')}</p>
        <form id="feedback-form" class="mt-6 space-y-3">
          <textarea id="feedback-message" rows="5" placeholder="${t('feedback.placeholder')}" required class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm outline-none focus:border-brand-500"></textarea>
          <button type="submit" id="feedback-submit-btn" class="w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-lg active:scale-[0.98]">${t('feedback.submit')}</button>
        </form>
      </div>
    </div>
  `);
  document.getElementById('feedback-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = (document.getElementById('feedback-message').value || '').trim();
    if (!msg) return;
    const btn = document.getElementById('feedback-submit-btn');
    if (btn) { btn.disabled = true; btn.textContent = t('feedback.sending'); }
    const saved = await submitFeedback(msg);
    if (!saved) {
      if (btn) { btn.disabled = false; btn.textContent = t('feedback.submit'); }
      return showAlertModal(t('feedback.failed'));
    }
    feedbackList.unshift(saved);
    triggerHaptic(15);
    closeModal();
    renderPage();
  });
}

function openAdminLogin() {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">
        <h3 class="text-xl font-bold text-stone-800 text-center">${t('adminlogin.title')}</h3>
        <form id="admin-login-form" class="mt-6 space-y-4">
          <input id="admin-id" type="text" placeholder="${t('adminlogin.empcode')}" required class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 text-center text-lg font-bold outline-none focus:border-sky-500" />
          <input id="admin-pin" type="password" inputmode="numeric" maxlength="6" pattern="\\d{6}" placeholder="${t('adminlogin.pin')}" required class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 text-center text-lg font-bold tracking-[0.3em] outline-none focus:border-sky-500" />
          <label class="flex items-center gap-2.5 rounded-2xl bg-stone-50 px-4 py-3 ring-1 ring-stone-200">
            <input id="admin-remember" type="checkbox" checked class="h-4 w-4 accent-brand-600" />
            <span class="text-xs font-bold text-stone-600">${t('adminlogin.remember')}</span>
          </label>
          <p id="admin-login-error" class="hidden text-xs font-medium text-red-600 text-center"></p>
          <button type="submit" class="w-full rounded-2xl bg-sky-600 py-4 text-lg font-bold text-white shadow-lg active:scale-[0.98]">${t('adminlogin.submit')}</button>
        </form>
      </div>
    </div>
  `);
  document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('admin-id').value.trim();
    const pin = document.getElementById('admin-pin').value.trim();
    const remember = document.getElementById('admin-remember')?.checked;
    if ((id === adminCreds.id || id === ADMIN_ID_DEFAULT) && (pin === adminCreds.pin || pin === ADMIN_PIN_DEFAULT)) {
      state.isAdminSession = true;
      state.isBranchAdminSession = false;
      state.adminBranch = '';
      state.staffCode = 'Admin';
      state.staffEmpCode = id;
      saveAdminRemember(!!remember);
      saveAdminBranch('');
      closeModal();
      renderPage();
      return;
    }
    await fetchBranchAdmins();
    const ba = findBranchAdminByCreds(id, pin);
    if (ba) {
      state.isAdminSession = true;
      state.isBranchAdminSession = true;
      state.adminBranch = ba.branch;
      state.staffCode = `Admin (${ba.branch})`;
      state.staffEmpCode = id;
      saveAdminRemember(!!remember);
      saveAdminBranch(remember ? ba.branch : '');
      closeModal();
      renderPage();
      showToast(`🔑 เข้าสู่ระบบแอดมิน ${ba.branch} แล้ว`);
      return;
    }
    const err = document.getElementById('admin-login-error');
    err.textContent = t('adminlogin.error');
    err.classList.remove('hidden');
  });
}

// ===== จัดการผู้ใช้งาน (AI ตรวจสอบ) =====
function relTime(iso) {
  if (!iso) return 'ยังไม่เคยใช้งาน';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'เมื่อสักครู่';
  if (m < 60) return `${m} นาทีที่แล้ว`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} ชม.ที่แล้ว`;
  const d = Math.floor(h / 24);
  if (d < 30) return `${d} วันที่แล้ว`;
  return formatThaiDate(iso.slice(0, 10));
}

          <select id="newemp-branch" required class="w-full appearance-none rounded-2xl border border-stone-200 bg-white px-4 py-3 text-sm font-bold text-stone-700">
            <option value="" disabled selected>— เลือกสาขา —</option>
            ${BRANCHES.map(b => `<option value="${b}">${b}</option>`).join('')}
          </select>
          <input id="newemp-password" type="text" placeholder="ตั้งรหัสผ่าน (บอกพนักงานเอง)" required minlength="4" class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm font-bold" />
          <p id="newemp-error" class="hidden text-xs font-medium text-red-600 text-center"></p>
          <button type="submit" id="newemp-submit-btn" class="w-full rounded-2xl bg-brand-600 py-3.5 text-sm font-bold text-white shadow-lg active:scale-95">สร้างบัญชีพนักงาน</button>
        </form>
      </div>
    </div>`);
  document.getElementById('create-employee-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = document.getElementById('newemp-code').value.trim();
    const nickname = document.getElementById('newemp-nickname').value.trim();
    const branch = document.getElementById('newemp-branch').value;
    const password = document.getElementById('newemp-password').value.trim();
    const errEl = document.getElementById('newemp-error');
    if (errEl) errEl.classList.add('hidden');
    if (!code || !nickname || !branch || !password) return;
    await fetchUsers();
    if (appUsers.some(u => String(u.employee_code) === code)) {
      if (errEl) { errEl.textContent = 'รหัสพนักงานนี้มีอยู่แล้วในระบบค่ะ'; errEl.classList.remove('hidden'); }
      return;
    }
    const btn = document.getElementById('newemp-submit-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'กำลังสร้าง...'; }
    const res = await createEmployeeDirectly(code, nickname, branch, password);
    if (btn) { btn.disabled = false; btn.textContent = 'สร้างบัญชีพนักงาน'; }
    if (!res.ok) {
      if (errEl) { errEl.textContent = res.err || 'สร้างไม่สำเร็จค่ะ ลองใหม่อีกครั้ง'; errEl.classList.remove('hidden'); }
      return;
    }
    await fetchUsers();
    triggerHaptic(15);
    closeModal();
    renderPage();
    showToast(`✅ สร้างบัญชี "${nickname}" แล้ว (รหัส ${code})`);
  });
}

async function approveUser(code) {
  const ok = await setUserStatus(code, 'approved');
  if (!ok) return showAlertModal('อนุมัติไม่สำเร็จค่ะ ลองใหม่อีกครั้ง');
  await fetchUsers();
  const u = appUsers.find(x => String(x.employee_code) === String(code));
  let generatedPassword = null;
  if (u && !u.password) {
    generatedPassword = generateRandomPassword();
    await updateUserPassword(code, generatedPassword);
    await fetchUsers();
  }
  triggerHaptic(15);
  renderPage();
  if (generatedPassword) {
    showApprovedCredentialsModal(u.nickname || code, code, generatedPassword);
  } else {
    showToast('✅ อนุมัติผู้ใช้งานแล้ว');
  }
}
async function rejectUser(code) {
  const ok = await setUserStatus(code, 'rejected');
  if (!ok) return showAlertModal('ทำรายการไม่สำเร็จค่ะ ลองใหม่อีกครั้ง');
  await fetchUsers();
  triggerHaptic(15);
  renderPage();
  showToast('🚫 ระงับผู้ใช้งานแล้ว');
}

// ===== คัดลอกสินค้าทั้งหมด (ชื่อ/รูป/บาร์โค้ด) ไปสาขาที่กำลังดูอยู่ — ไม่ใส่วันหมดอายุ (สถานะ "ยังไม่มีของ") =====
// ให้พนักงานสาขาใหม่สแกนแล้วเจอสินค้าที่มีอยู่แล้ว เติมแค่วันหมดอายุได้เลย ไม่ต้องส่งคำขอสินค้าใหม่ซ้ำ
function buildCatalogCopyList(targetBranch) {
  const seen = new Map(); // key(บาร์โค้ด/PLU) -> ตัวแทนสินค้า
  products.forEach(p => {
    if (p.removed) return;
    const key = p.barcode ? `bc:${p.barcode}` : (p.plu ? `plu:${p.plu}` : null);
    if (!key || seen.has(key)) return;
    seen.set(key, p);
  });
  const existingKeys = new Set(
    products
      .filter(p => !p.removed && (p.branch || DEFAULT_BRANCH) === targetBranch)
      .map(p => (p.barcode ? `bc:${p.barcode}` : (p.plu ? `plu:${p.plu}` : null)))
      .filter(Boolean)
  );
  const toCreate = [];
  seen.forEach((p, key) => {
    if (existingKeys.has(key)) return;
    toCreate.push({
      id: genId(), branch: targetBranch, barcode: p.barcode || '', plu: p.plu || '', name: p.name,
      category: p.category || '', imageUrl: p.imageUrl, expiryDate: null,
      addedDate: new Date().toISOString(), addedBy: state.staffCode || 'ระบบ',
    });
  });
  return toCreate;
}

async function executeCopyAllProducts(targetBranch) {
  const toCreate = buildCatalogCopyList(targetBranch);
  if (toCreate.length === 0) return;
  showToast('⏳ กำลังคัดลอกสินค้า...');
  const ok = await saveProducts(toCreate);
  if (!ok) return showAlertModal('คัดลอกไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง' + (lastDbError ? '\n\n(สาเหตุ: ' + lastDbError + ')' : ''));
  toCreate.forEach(ni => products.push(ni));
  renderPage();
  showToast(`✅ คัดลอกสินค้า ${toCreate.length} รายการไปที่ ${targetBranch} แล้ว`);
}

function removedTrendHTML() {
  const days = 7;
  const today = new Date();
  const buckets = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    buckets.push({ key, label: `${d.getDate()}/${d.getMonth() + 1}`, count: 0 });
  }
  const byKey = Object.fromEntries(buckets.map(b => [b.key, b]));
  products.filter(p => isVisibleBranch(p)).forEach(p => {
    if (!p.removed || !p.removedDate) return;
    const key = p.removedDate.slice(0, 10);
    if (byKey[key]) byKey[key].count++;
  });
  const max = Math.max(1, ...buckets.map(b => b.count));
  const total = buckets.reduce((s, b) => s + b.count, 0);
  return `
    <p class="mb-3 text-xs font-black uppercase tracking-widest text-stone-400">แนวโน้มเก็บออกจากชั้น (7 วันล่าสุด) — รวม ${total} รายการ</p>
    <div class="flex items-end justify-between gap-1.5" style="height:90px">
      ${buckets.map(b => `
        <div class="flex flex-1 flex-col items-center justify-end gap-1" style="height:100%">
          <span class="text-[10px] font-bold text-stone-400">${b.count > 0 ? b.count : ''}</span>
          <div class="w-full rounded-md bg-amber-400" style="height:${Math.max(4, (b.count / max) * 56)}px"></div>
          <span class="text-[9px] text-stone-400">${b.label}</span>
        </div>`).join('')}
    </div>`;
}

function blockIfHardDuplicate(barcode, plu, name, dates) {
  const uniqueDates = new Set(dates);
  if (uniqueDates.size !== dates.length) {
    showAlertModal('พบวันหมดอายุซ้ำกันเองในรายการที่กรอกค่ะ กรุณาตรวจสอบและลบวันที่ซ้ำออกก่อนบันทึก/ส่งคำขอ');
    return true;
  }
  for (const date of dates) {
    const dup = findDuplicateProduct(barcode, plu, name, date, null);
    // บล็อกเฉพาะของที่ยังอยู่บนชั้นจริง (active) เท่านั้น — ของที่เคยเก็บออกไปแล้วแค่เตือนให้เช็ค ไม่บล็อก
    // เพราะ PLU ถูกใช้ซ้ำได้ตามปกติสำหรับล็อตใหม่ที่มาจริง (ไม่ใช่ทุกครั้งที่ตรงกันจะเป็นการส่งซ้ำโดยไม่ตั้งใจ)
    if (dup && !dup.removed) {
      showDuplicateModal(dup, date);
      return true;
    }
  }
  return false;
}

        <button onclick="closeAlertOverlay(); viewProductDetail(${dup.id});" class="mt-4 flex w-full items-center gap-3 rounded-2xl bg-stone-50 p-3 text-left ring-1 ring-stone-100 active:scale-[0.98]">
          <div class="h-16 w-16 shrink-0 overflow-hidden rounded-xl bg-stone-100">

          </div>
          <div class="min-w-0 flex-1">
