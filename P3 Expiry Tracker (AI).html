      </div>
    </div>`;
}

function findDuplicateProduct(barcode, plu, name, expiryDate, excludeId) {
  return products.find(p => {
    if (p.id === excludeId || p.expiryDate !== expiryDate) return false;
    if (barcode && p.barcode === barcode) return true;
    if (plu && p.plu === plu) return true;
    if (!barcode && !plu && !p.barcode && !p.plu && name && p.name.trim().toLowerCase() === name.trim().toLowerCase()) return true;
    return false;
  });
}

// เช็คซ้ำ + ตรวจรูปแบบวันที่ที่พิมพ์เอง (real-time)
function liveCheckDateDuplicates(containerId, warnAreaId, getBarcode, getPlu, getName, getExcludeId, submitBtnId) {
  const container = document.getElementById(containerId);
  const warnArea = document.getElementById(warnAreaId);
  if (!container) return;
  const run = () => {
    const inputs = Array.from(container.querySelectorAll('.lot-date-input'));
    const dates = [];
    let msg = '';
    let formatError = false;
    inputs.forEach(inp => {
      const raw = inp.value.trim();
      if (!raw) { inp.classList.remove('ring-2', 'ring-red-400'); return; }
      const iso = parseDateInputTH(raw);
      if (iso === null) { formatError = true; inp.classList.add('ring-2', 'ring-red-400'); }
      else { inp.classList.remove('ring-2', 'ring-red-400'); if (iso) dates.push(iso); }
    });
    if (formatError) {
      msg = '⚠️ รูปแบบวันที่ไม่ถูกต้อง พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69';
    } else if (new Set(dates).size !== dates.length) {
      msg = '⚠️ มีวันหมดอายุซ้ำกันเองในรายการนี้ กรุณาตรวจสอบ';
    }
    let dupProduct = null, dupDate = null;
    if (!formatError && new Set(dates).size === dates.length) {
      const barcode = getBarcode ? getBarcode() : '';
      const plu = getPlu ? getPlu() : '';
      const name = getName ? getName() : '';
      const excludeId = getExcludeId ? getExcludeId() : null;
      for (const d of dates) {
        const dup = findDuplicateProduct(barcode, plu, name, d, excludeId);
        if (dup) { dupProduct = dup; dupDate = d; break; }
      }
    }
    if (warnArea) {
      if (dupProduct) {
        const c = withComputed(dupProduct);
        const headline = dupProduct.removed
          ? '⛔ สินค้านี้เคยเก็บออกจากชั้นไปแล้วด้วยวันหมดอายุนี้ (เช็คก่อนว่าซ้ำกันไหม)'
          : '⛔ สินค้านี้มีในระบบแล้ว (วันหมดอายุตรงกัน)';
        warnArea.innerHTML = `
          <div class="mt-2 rounded-2xl bg-red-50 p-2.5 ring-1 ring-red-200 fx-fade-up">
            <p class="mb-1.5 text-xs font-black text-red-600">${headline}</p>
            <button type="button" onclick="viewProductDetail(${dupProduct.id})" class="flex w-full items-center gap-2.5 rounded-xl bg-white p-2 text-left ring-1 ring-red-100 active:scale-[0.98]">
              <div class="h-11 w-11 shrink-0 overflow-hidden rounded-lg bg-stone-100">${dupProduct.imageUrl ? `<img src="${dupProduct.imageUrl}" class="h-full w-full object-cover" />` : `<div class="flex h-full w-full items-center justify-center text-lg">📦</div>`}</div>
              <div class="min-w-0 flex-1">
                <p class="truncate text-xs font-bold text-stone-800">${escapeHtml(truncateName(dupProduct.name))}</p>
                <p class="text-[11px] font-bold" style="color:${dupProduct.removed ? '#78716c' : STATUS_COLOR[c.status]}">${dupProduct.removed ? `เก็บออกแล้วเมื่อ ${formatThaiDate(dupProduct.removedDate ? dupProduct.removedDate.slice(0,10) : '')}` : `หมดอายุ ${formatThaiDate(dupDate)} · ${relativeDaysText(c.daysLeft)}`}</p>
              </div>
              <span class="shrink-0 text-[11px] font-bold text-red-400">ดู ›</span>
            </button>
            <p class="mt-1.5 text-[11px] text-red-500">ถ้าเป็นล็อตใหม่จริง กรุณาเปลี่ยนวันหมดอายุให้ต่างจากนี้</p>
          </div>`;
        const key = String(dupProduct.id) + dupDate;
        if (warnArea.dataset.lastDup !== key) { try { triggerHaptic(25); } catch (e) {} warnArea.dataset.lastDup = key; }
      } else {
        warnArea.innerHTML = msg ? `<p class="mt-1 text-xs font-bold text-red-500">${escapeHtml(msg)}</p>` : '';
        warnArea.dataset.lastDup = '';
      }
    }
    const blocked = !!msg || (!!dupProduct && !dupProduct.removed);
    const btn = submitBtnId ? document.getElementById(submitBtnId) : null;
    if (btn) btn.disabled = blocked;
    if (btn) btn.classList.toggle('opacity-50', blocked);
  };
  container.addEventListener('input', run);
  container.addEventListener('change', run);
  run();
  return run;
}

async function restoreProduct(id) {
  const idx = products.findIndex(x => x.id === id);
  if (idx === -1) return;
  const p = products[idx];
  products[idx] = { ...p, removed: false, removedDate: null, removedBy: '', removedImageUrl: '', removedReason: '' };
  await saveProductsOrWarn([products[idx]]);
  triggerHaptic(12);
  showToast(`↩️ กู้คืน "${truncateName(p.name)}" แล้ว`);
  renderPage();
}

function exportProductsCSV() {
  const active = products.map(withComputed).filter(p => !p.removed && isVisibleBranch(p));
  const header = ['ชื่อสินค้า', 'บาร์โค้ด', 'วันหมดอายุ', 'สถานะ', 'เพิ่มโดย', 'วันที่เพิ่ม'];
  const rows = active.map(p => [
    p.name, p.barcode, formatThaiDate(p.expiryDate),
    statusLabel(p.status), p.addedBy || '-', p.addedDate ? new Date(p.addedDate).toLocaleDateString('th-TH') : '-'
  ]);
  const csv = '\ufeff' + [header, ...rows].map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `p3-expiry-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('📊 ดาวน์โหลดไฟล์ Excel แล้ว');
}

async function approvePending(id) {
  const item = pendingSubmissions.find(p => p.id === id);
  if (!item) return;
  
  const name = document.getElementById(`pending-name-${id}`).value.trim();
  const barcode = document.getElementById(`pending-barcode-${id}`).value.trim();
  const plu = document.getElementById(`pending-plu-${id}`).value.trim();
  const { dates, hasError } = readLotDates(`pending-dates-${id}`);
  
  if (hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
  if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');
  // อนุญาตให้อนุมัติแบบ "ยังไม่มีวันหมดอายุ" ได้ ถ้าไม่ใส่วันเลย
  const datesToSave = dates.length > 0 ? dates : [null];
  if (dates.length > 0 && blockIfHardDuplicate(barcode, plu, name, dates)) return;
  
  const newItems = [];
  datesToSave.forEach(expiryDate => {
    const newItem = {
      id: genId(), barcode, plu, name,
      imageUrl: item.imageUrl,
      expiryDate, addedDate: new Date().toISOString(),
      addedBy: item.submittedBy || state.staffCode
    };
    products.push(newItem);
    newItems.push(newItem);
  });
  
  const ok = await saveProducts(newItems);
  if (!ok) {
    products = products.filter(p => !newItems.includes(p));
    renderPage();
    showAlertModal('บันทึกสินค้าเข้าสู่ระบบไม่สำเร็จค่ะ\n\nคำขอนี้ยังอยู่ใน "คำขอรอตรวจสอบ" เหมือนเดิม ไม่หายไปไหน กรุณาตรวจสอบอินเทอร์เน็ต แล้วลองกดอนุมัติใหม่อีกครั้ง' + (lastDbError ? '\n\n(สาเหตุ: ' + lastDbError + ')' : ''));
    return;
  }
  
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== id);
  const pendingSaveOk = await deletePendingById(id);
  renderPage();
  if (pendingSaveOk) {
    showToast(`✅ อนุมัติสินค้าเข้าสู่ระบบแล้ว (${datesToSave.length} ล็อต)`);
  } else {
    showAlertModal('สินค้าเข้าระบบแล้ว แต่ลบออกจาก "คำขอรอตรวจสอบ" ไม่สำเร็จ\n\nอาจเห็นรายการนี้ซ้ำอยู่ในคำขอรอตรวจสอบ กดรีเฟรชแล้วลองปฏิเสธรายการที่ซ้ำออกได้เลยค่ะ');
  }
}

async function executeApproveAllPending() {
  const btn = document.getElementById('approve-all-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังอนุมัติทั้งหมด... โปรดรอสักครู่'; btn.classList.add('opacity-70'); }

  const itemsSnapshot = [...visiblePendingSubmissions()];
  const allNewItems = [];
  const approvedPendingIds = [];
  const skippedNames = [];

  for (const item of itemsSnapshot) {
    const id = item.id;
    if (item.editTargetId) continue;
    if (item.removeTargetId) continue;
    if (item.deleteTargetId) continue;
    const nameEl = document.getElementById(`pending-name-${id}`);
    const datesContainer = document.getElementById(`pending-dates-${id}`);
    if (!nameEl || !datesContainer) { skippedNames.push(item.name || '(ไม่มีชื่อ)'); continue; }

    const name = nameEl.value.trim();
    const barcodeEl = document.getElementById(`pending-barcode-${id}`);
    const pluEl = document.getElementById(`pending-plu-${id}`);
    const barcode = barcodeEl ? barcodeEl.value.trim() : '';
    const plu = pluEl ? pluEl.value.trim() : '';
    const { dates, hasError } = readLotDates(`pending-dates-${id}`);

    if (hasError) { skippedNames.push(`${name || '(ไม่มีชื่อ)'} — วันที่ผิดรูปแบบ`); continue; }
    if (!name) { skippedNames.push(`(ไม่มีชื่อ) — ข้อมูลไม่ครบ`); continue; }
    if (new Set(dates).size !== dates.length) { skippedNames.push(`${name} — วันหมดอายุซ้ำกันเอง`); continue; }
    const datesToSave = dates.length > 0 ? dates : [null];

    let hasDup = false;
    for (const date of dates) {
      const dupExisting = findDuplicateProduct(barcode, plu, name, date, null);
      const dupInBatch = allNewItems.find(ni => date === ni.expiryDate && (
        (barcode && ni.barcode === barcode) || (plu && ni.plu === plu) ||
        (!barcode && !plu && !ni.barcode && !ni.plu && ni.name.toLowerCase() === name.toLowerCase())
      ));
      if ((dupExisting && !dupExisting.removed) || dupInBatch) { hasDup = true; break; }
    }
    if (hasDup) { skippedNames.push(`${name} — ซ้ำกับของเดิมในระบบ`); continue; }

    datesToSave.forEach(expiryDate => {
      const newItem = {
        id: genId(), barcode, plu, name,
        imageUrl: item.imageUrl,
        expiryDate, addedDate: new Date().toISOString(),
        addedBy: item.submittedBy || state.staffCode
      };
      products.push(newItem);
      allNewItems.push(newItem);
    });
    approvedPendingIds.push(id);
  }

  if (allNewItems.length === 0) {
    if (btn) { btn.disabled = false; btn.textContent = `✅ อนุมัติทั้งหมด (${visiblePendingSubmissions().length} รายการ)`; btn.classList.remove('opacity-70'); }
    return showAlertModal(`อนุมัติไม่ได้เลยสักรายการค่ะ ทุกรายการมีปัญหา:\n\n${skippedNames.join('\n')}`);
  }

  const ok = await saveProducts(allNewItems);
  if (!ok) {
    products = products.filter(p => !allNewItems.includes(p));
    renderPage();
    return showAlertModal('บันทึกสินค้าเข้าสู่ระบบไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
  }

  pendingSubmissions = pendingSubmissions.filter(p => !approvedPendingIds.includes(p.id));
  const delOk = await deletePendingByIds(approvedPendingIds);
  renderPage();

  let msg = `✅ อนุมัติสำเร็จ ${approvedPendingIds.length} รายการ (${allNewItems.length} ล็อต)`;
  if (skippedNames.length > 0) msg += ` — ข้าม ${skippedNames.length} รายการ`;
  showToast(msg);

  if (skippedNames.length > 0) {
    showAlertModal(`ข้ามไป ${skippedNames.length} รายการ เพราะข้อมูลไม่ครบ/ซ้ำกับของเดิม:\n\n${skippedNames.join('\n')}\n\nไปแก้ไขแล้วกดอนุมัติทีละรายการที่เหลือได้เลยค่ะ`);
  } else if (!delOk) {
    showAlertModal('สินค้าเข้าระบบครบแล้ว แต่ลบออกจาก "คำขอรอตรวจสอบ" บางรายการไม่สำเร็จ ลองรีเฟรชแล้วปฏิเสธรายการที่ซ้ำออกได้เลยค่ะ');
  }
}

async function approveEditRequest(pendingId) {
  const req = pendingSubmissions.find(p => p.id === pendingId);
  if (!req || !req.editTargetId) return;
  const idx = products.findIndex(p => p.id === req.editTargetId);
  if (idx === -1) {
    showAlertModal('ไม่พบสินค้าต้นทางในระบบแล้ว (อาจถูกแก้ไขหรือลบไปก่อนหน้า) — กรุณาปฏิเสธคำขอนี้');
    return;
  }
  if (req.barcode) {
    const clash = products.find(p => p.id !== req.editTargetId && !p.removed && p.barcode === req.barcode);
    if (clash) {
      showAlertModal(`บาร์โค้ด ${req.barcode} นี้มีสินค้าอื่นใช้อยู่แล้ว ("${truncateName(clash.name)}") กรุณาตรวจสอบก่อนอนุมัติ`);
      return;
    }
  }
  const backup = products[idx];
  products[idx] = { ...backup, name: req.name, barcode: req.barcode, plu: req.plu, imageUrl: req.imageUrl, imageEmbedding: null };
  const ok = await saveProducts([products[idx]]);
  if (!ok) {
    products[idx] = backup;
    renderPage();
    return showAlertModal('อัปเดตข้อมูลไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
  }
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== pendingId);
  await deletePendingById(pendingId);
  triggerHaptic(20);
  renderPage();
  showToast('✅ อนุมัติการแก้ไขแล้ว ข้อมูลสินค้าอัปเดตเรียบร้อย');
}

function fixRejectedRequest(id) {
  const p = pendingSubmissions.find(x => x.id === id);
  if (!p) return closeModal();
  if (!p.editTargetId && !p.removeTargetId && !p.deleteTargetId) {
    openFixNewProductForm(p);
  } else {
    resendRejectedAsIs(p);
  }
}

async function resendRejectedAsIs(p) {
  const updated = { ...p, status: 'pending', rejectReason: '' };
  const ok = await upsertPendingRow(updated);
  if (!ok) return showAlertModal('ส่งใหม่ไม่สำเร็จค่ะ ลองใหม่อีกครั้ง');
  const idx = pendingSubmissions.findIndex(x => x.id === p.id);
  if (idx !== -1) pendingSubmissions[idx] = updated;
  closeModal();
  renderPage();
  showToast('✅ ส่งคำขอใหม่อีกครั้งแล้ว รอ AI ตรวจสอบอนุมัติ');
}

function openFixNewProductForm(p) {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/50 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">
        <h3 class="text-lg font-bold text-stone-800">✏️ แก้ไขคำขอสินค้าใหม่</h3>
        <p class="mt-1 mb-4 rounded-xl bg-red-50 px-3 py-2 text-xs text-red-600">💬 ${escapeHtml(p.rejectReason || '')}</p>
        <form id="fix-rejected-form" class="space-y-3">
          <input id="fix-rejected-name" value="${escapeHtml(p.name)}" class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm font-bold" placeholder="ชื่อสินค้า" />
          <label class="block cursor-pointer rounded-2xl border border-stone-200 bg-white p-3 text-center">
            <div id="fix-rejected-img-preview">${p.imageUrl ? `<img src="${p.imageUrl}" class="h-24 w-full object-cover rounded-lg" />` : '<span class="text-xs text-stone-400">📸 แตะเพื่อถ่ายรูปใหม่</span>'}</div>
            <input id="fix-rejected-img" type="file" accept="image/*" capture="environment" class="hidden" />
          </label>
          <div id="fix-rejected-dates" class="space-y-2">
            ${(p.expiryDates && p.expiryDates.length ? p.expiryDates : [p.expiryDate || '']).map(d => `
              <div class="flex gap-2 date-row">${dateTextInputHTML(d, 'flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm font-bold')}</div>`).join('')}
          </div>
          <button type="button" onclick="addLotDateRow('fix-rejected-dates')" class="w-full rounded-2xl border border-stone-200 bg-white py-2.5 text-xs font-bold text-stone-500">+ เพิ่มวันหมดอายุ</button>
          <button type="submit" class="w-full rounded-2xl bg-brand-600 py-3.5 text-sm font-bold text-white shadow-lg">ส่งใหม่ให้ AI ตรวจสอบ</button>
        </form>
      </div>
    </div>`);
  let newImg = '';
  document.getElementById('fix-rejected-img').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) {
      newImg = await compressImageFile(file);
      document.getElementById('fix-rejected-img-preview').innerHTML = `<img src="${newImg}" class="h-24 w-full object-cover rounded-lg" />`;
    }
  });
  document.getElementById('fix-rejected-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('fix-rejected-name').value.trim();
    if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');
    const r = readLotDates('fix-rejected-dates');
    if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
    const dates = r.dates;
    const submitBtn = e.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true; submitBtn.textContent = 'กำลังส่ง...';
    const uploadedImg = newImg ? await uploadImageToStorage(newImg, 'products') : p.imageUrl;
    const updated = { ...p, name, imageUrl: uploadedImg, expiryDate: dates[0] || p.expiryDate, expiryDates: dates, status: 'pending', rejectReason: '' };
    const ok = await upsertPendingRow(updated);
    if (!ok) { submitBtn.disabled = false; submitBtn.textContent = 'ส่งใหม่ให้ AI ตรวจสอบ'; return showAlertModal('ส่งไม่สำเร็จค่ะ ลองใหม่อีกครั้ง'); }
    const idx = pendingSubmissions.findIndex(x => x.id === p.id);
    if (idx !== -1) pendingSubmissions[idx] = updated;
    closeModal();
    renderPage();
    showToast('✅ ส่งคำขอใหม่แล้ว รอ AI ตรวจสอบอนุมัติ');
  });
}

function rejectPending(id) {
  const item = pendingSubmissions.find(p => p.id === id);
  if (!item) return;
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">
        <h3 class="text-xl font-bold text-stone-800 text-center">❌ ตีกลับคำขอนี้</h3>
        <p class="mt-1 text-center text-xs text-stone-400">บอกเหตุผลให้คนที่ส่งมารู้ว่าต้องแก้ไขอะไร — จะไปเด้งแจ้งเตือนในแอปของเขาทันที ไม่ใช่การลบทิ้ง เขาจะแก้ไขแล้วส่งใหม่ได้</p>
        <form id="reject-reason-form" class="mt-4 space-y-3">
          <textarea id="reject-reason-input" rows="3" placeholder="เช่น รูปไม่ชัด, วันหมดอายุผิด, ชื่อสินค้าไม่ตรง" required class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm outline-none focus:border-red-500"></textarea>
          <button type="submit" class="w-full rounded-2xl bg-red-600 py-3.5 text-sm font-bold text-white shadow-lg active:scale-95">ตีกลับพร้อมเหตุผลนี้</button>
        </form>
      </div>
    </div>
  `);
  document.getElementById('reject-reason-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const reason = document.getElementById('reject-reason-input').value.trim();
    if (!reason) return;
    const idx = pendingSubmissions.findIndex(p => p.id === id);
    if (idx === -1) return closeModal();
    const updated = { ...pendingSubmissions[idx], status: 'rejected', rejectReason: reason };
    const ok = await upsertPendingRow(updated);
    if (!ok) { closeModal(); return showAlertModal('ตีกลับไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่'); }
    pendingSubmissions[idx] = updated;
    triggerHaptic(15);
    closeModal();
    renderPage();
    showToast('🔙 ตีกลับคำขอแล้ว');
  });
}
// ==================== Forms & Modals ====================
function openModal(html) {
  stopScanner();
  const root = document.getElementById('modal-root');
  root.innerHTML = html;
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
  if (state.tab === 'scanner') scheduleScannerRestart(300);
}

function openSubmissionForm(barcode) {
  const existing = products.find(p => p.barcode === barcode);
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 class="text-xl font-bold text-stone-800">ส่งคำขอให้ AI ตรวจสอบ</h3>
        <form id="submission-form" class="mt-4 space-y-4">
          ${nameFieldWithOcrHTML('sub-name', 'ชื่อสินค้า *', existing ? escapeHtml(existing.name) : '')}
          <input id="sub-barcode" placeholder="บาร์โค้ด" value="${barcode}" class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm" oninput="updateLiveBarcode('sub-barcode','sub-barcode-preview')" />
          <div id="sub-barcode-preview"></div>
          <label class="flex items-center gap-2 rounded-2xl bg-stone-50 px-4 py-3 ring-1 ring-stone-200">
            <input id="sub-nodate" type="checkbox" onchange="toggleNoDateMode('sub-dates-wrap','sub-nodate','sub-dup-warning','submission-form-submit-btn')" class="h-4 w-4 accent-brand-600" />
            <span class="text-xs font-bold text-stone-600">📋 ยังไม่ใส่วันที่ — บันทึกชื่อ/รูปไว้ก่อน (ใส่วันหมดอายุภายหลัง)</span>
          </label>
          <div id="sub-dates-wrap">
            <p class="mb-1 text-[11px] text-stone-500">พิมพ์วันที่เอง เช่น 22/02/69 (พ.ศ) หรือ 22/02/2026 (ค.ศ)</p>
            <div id="sub-dates" class="space-y-2">
              <div class="flex gap-2 date-row">
                ${dateTextInputHTML('', 'min-w-0 flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm')}
              </div>
            </div>
            <button type="button" onclick="addLotDateRow('sub-dates')" class="mt-2 w-full rounded-2xl border border-stone-200 bg-white py-3 text-xs font-bold text-stone-500 active:scale-95">+ เพิ่มอีกวันหมดอายุ (สินค้าหลายล็อต)</button>
          </div>
          <div id="sub-dup-warning"></div>
          <div class="flex gap-3">
            <label class="flex-1 cursor-pointer rounded-2xl bg-stone-50 p-4 text-center ring-1 ring-stone-200">
              <div id="sub-img-prod-preview" class="text-xs font-bold text-red-500">📸 รูปสินค้า *</div>
              <input id="sub-img-prod" type="file" accept="image/*" capture="environment" class="hidden" />
            </label>
            <label class="flex-1 cursor-pointer rounded-2xl bg-stone-50 p-4 text-center ring-1 ring-stone-200">
              <div id="sub-img-exp-preview" class="text-xs text-stone-400">📸 รูปภาพเพิ่มเติม (ไม่บังคับ)</div>
              <input id="sub-img-exp" type="file" accept="image/*" capture="environment" class="hidden" />
            </label>
          </div>
          <button type="submit" id="submission-form-submit-btn" class="w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-lg">ส่งคำขอ</button>
        </form>
      </div>
    </div>
  `);
  
  let prodImg = existing ? existing.imageUrl : '';
  let expImg = '';
  if (existing) document.getElementById('sub-img-prod-preview').innerHTML = `<img src="${existing.imageUrl}" class="h-12 w-full object-cover rounded-lg" />`;

  const runSubDupCheck = liveCheckDateDuplicates(
    'sub-dates', 'sub-dup-warning',
    () => document.getElementById('sub-barcode').value.trim(),
    () => '',
    () => document.getElementById('sub-name').value.trim(),
    null, 'submission-form-submit-btn'
  );
  document.getElementById('sub-barcode').addEventListener('input', runSubDupCheck);
  document.getElementById('sub-name').addEventListener('input', runSubDupCheck);
  updateLiveBarcode('sub-barcode', 'sub-barcode-preview');

  document.getElementById('sub-img-prod').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) {
      prodImg = await compressImageFile(file);
      document.getElementById('sub-img-prod-preview').innerHTML = `<img src="${prodImg}" class="h-12 w-full object-cover rounded-lg" />`;
    }
  });
  document.getElementById('sub-img-exp').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) {
      expImg = await compressImageFile(file);
      document.getElementById('sub-img-exp-preview').innerHTML = `<img src="${expImg}" class="h-12 w-full object-cover rounded-lg" />`;
    }
  });

  document.getElementById('submission-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('sub-name').value.trim();
    const bc = document.getElementById('sub-barcode').value.trim();
    const noDateMode = document.getElementById('sub-nodate')?.checked;
    let dates = [];
    if (!noDateMode) {
      const r = readLotDates('sub-dates');
      if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
      dates = r.dates;
      if (dates.length === 0) return showAlertModal('กรุณากรอกวันหมดอายุอย่างน้อย 1 รายการ (หรือติ๊ก "ยังไม่ใส่วันที่")');
    }
    if (!name || !prodImg) return showAlertModal('กรุณากรอกชื่อสินค้า และถ่ายรูปสินค้าให้ครบถ้วน');
    
    if (bc && dates.length > 0 && blockIfHardDuplicate(bc, '', name, dates)) return;
    
    const submitBtn = document.getElementById('submission-form-submit-btn');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'กำลังส่งคำขอ... โปรดรอสักครู่'; submitBtn.classList.add('opacity-70'); }
    
    const uploadedProd = await uploadImageToStorage(prodImg, 'products');
    const uploadedExp = await uploadImageToStorage(expImg, 'expiry-photos');
    
    const newPendingId = genId();
    const newPendingItem = {
      id: newPendingId, barcode: bc, name, expiryDate: dates[0] || null, expiryDates: dates,
      imageUrl: uploadedProd, expiryPhoto: uploadedExp,
      submittedAt: new Date().toISOString(), submittedBy: state.staffCode
    };
    
    const ok = await upsertPendingRow(newPendingItem);
    if (!ok) {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'ส่งคำขอ'; submitBtn.classList.remove('opacity-70'); }
      return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองกดส่งคำขอใหม่อีกครั้ง' + (lastDbError ? '\n\n(สาเหตุ: ' + lastDbError + ')' : ''));
    }
    pendingSubmissions.push(newPendingItem);
    triggerHaptic(15);
    closeModal();
    renderPage();
  });
}

function openProductForm(productId = null, prefillBarcode = '') {

            <button type="button" onclick="scanBarcodeIntoField('dev-form-barcode')" class="shrink-0 rounded-2xl bg-brand-600 px-4 text-sm font-bold text-white active:scale-95">📷 สแกน</button>
          </div>
          ${p ? `
          <label class="flex items-center gap-2 rounded-2xl bg-stone-50 px-4 py-3 ring-1 ring-stone-200">
            <input id="dev-form-nodate-edit" type="checkbox" ${!p.expiryDate ? 'checked' : ''} onchange="toggleNoDateMode('dev-form-date-edit-wrap','dev-form-nodate-edit')" class="h-4 w-4 accent-brand-600" />
            <span class="text-xs font-bold text-stone-600">📋 ยังไม่มีของ — ไม่ต้องใส่วันหมดอายุตอนนี้</span>
          </label>
          <div id="dev-form-date-edit-wrap" class="${!p.expiryDate ? 'hidden' : ''}">
            <p class="mb-1 text-[11px] text-stone-500">พิมพ์วันที่เอง เช่น 22/02/69</p>
            ${dateTextInputHTML(p.expiryDate || '', 'w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm', 'id="dev-form-date"')}
          </div>` : `
          <label class="flex items-center gap-2 rounded-2xl bg-stone-50 px-4 py-3 ring-1 ring-stone-200">
            <input id="dev-form-nodate" type="checkbox" onchange="toggleNoDateMode('dev-form-dates-wrap','dev-form-nodate','dev-form-dup-warning','dev-product-form-submit-btn')" class="h-4 w-4 accent-brand-600" />
            <span class="text-xs font-bold text-stone-600">📋 ยังไม่มีของ — บันทึกชื่อ/บาร์โค้ด/รูปไว้ก่อน ไม่ต้องใส่วันหมดอายุตอนนี้</span>
          </label>
          <div id="dev-form-dates-wrap">
            <p class="mb-1 text-[11px] text-stone-500">พิมพ์วันที่เอง เช่น 22/02/69 (พ.ศ) หรือ 22/02/2026 (ค.ศ)</p>
            <div id="dev-form-dates" class="space-y-2">
              <div class="flex gap-2 date-row">
                ${dateTextInputHTML('', 'flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm')}
              </div>
            </div>
            <button type="button" onclick="addLotDateRow('dev-form-dates')" class="mt-2 w-full rounded-xl bg-stone-50 py-2 text-xs font-bold text-stone-500 ring-1 ring-stone-200 active:scale-95">+ เพิ่มอีกวันหมดอายุ (บาร์โค้ดเดียวกัน)</button>
          </div>
          <div id="dev-form-dup-warning"></div>`}
          <label class="block cursor-pointer rounded-2xl bg-stone-50 p-6 text-center ring-1 ring-stone-200">
            <div id="dev-form-img-preview" class="text-xs text-stone-400">📸 รูปสินค้า</div>
            <input id="dev-form-img" type="file" accept="image/*" capture="environment" class="hidden" />
          </label>
          <button type="submit" id="dev-product-form-submit-btn" class="w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-lg">บันทึกสินค้า</button>
        </form>
      </div>
    </div>
  `);

  let img = p ? p.imageUrl : '';
  if (img) document.getElementById('dev-form-img-preview').innerHTML = `<img src="${img}" class="h-20 w-full object-cover rounded-lg" />`;

  if (!p) {
    const runDevDupCheck = liveCheckDateDuplicates(
      'dev-form-dates', 'dev-form-dup-warning',
      () => document.getElementById('dev-form-barcode').value.trim(),
      () => '',
      () => document.getElementById('dev-form-name').value.trim(),
      null, 'dev-product-form-submit-btn'
    );
    document.getElementById('dev-form-barcode').addEventListener('input', runDevDupCheck);
    document.getElementById('dev-form-name').addEventListener('input', runDevDupCheck);
  }

  document.getElementById('dev-form-img').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) {
      img = await compressImageFile(file);
      document.getElementById('dev-form-img-preview').innerHTML = `<img src="${img}" class="h-20 w-full object-cover rounded-lg" />`;
    }
  });

  document.getElementById('dev-product-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('dev-form-name').value.trim();
    const bc = document.getElementById('dev-form-barcode').value.trim();
    
    let saveOk = false;
    if (p) {
      const noDateModeEdit = document.getElementById('dev-form-nodate-edit')?.checked;
      let date = null;
      if (!noDateModeEdit) {
        const iso = parseDateInputTH(document.getElementById('dev-form-date').value);
        if (iso === null) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
        if (!iso) return showAlertModal('กรุณากรอกวันหมดอายุ (หรือติ๊ก "ยังไม่มีของ")');
        date = iso;
      }
      if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');
      const uploadedImg = await uploadImageToStorage(img, 'products');
      const idx = products.findIndex(x => x.id === productId);
      const backup = products[idx];
      products[idx] = { ...products[idx], name, barcode: bc, expiryDate: date, imageUrl: uploadedImg };
      saveOk = await saveProducts([products[idx]]);
      if (!saveOk) products[idx] = backup;
    } else {
      const noDateMode = document.getElementById('dev-form-nodate')?.checked;
      let dates = [];
      if (!noDateMode) {
        const r = readLotDates('dev-form-dates');
        if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
        dates = r.dates;
        if (!name || dates.length === 0) return showAlertModal('กรุณากรอกชื่อและวันหมดอายุอย่างน้อย 1 รายการ (หรือติ๊ก "ยังไม่มีของ" ถ้ายังไม่มีวันหมดอายุตอนนี้)');
        if (bc && blockIfHardDuplicate(bc, '', name, dates)) return;
      } else {
        if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');
      }
      const uploadedImg = await uploadImageToStorage(img, 'products');
      const newItems = [];
      const datesToSave = noDateMode ? [null] : dates;
      datesToSave.forEach(date => {
        const newItem = {
          id: genId(), barcode: bc, name,
          imageUrl: uploadedImg, expiryDate: date,
          addedDate: new Date().toISOString(), addedBy: state.staffCode
        };
        products.push(newItem);
        newItems.push(newItem);
      });
      saveOk = await saveProducts(newItems);
      if (!saveOk) products = products.filter(x => !newItems.includes(x));
    }
    
    if (!saveOk) {
      renderPage();
      return showAlertModal('บันทึกขึ้น Supabase ไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
    }
    
    closeModal();
    showToast('✅ บันทึกสินค้าสำเร็จ');
    renderPage();
  });
}

function toggleNoDateMode(wrapId, checkboxId, warnAreaId, submitBtnId) {
  const wrap = document.getElementById(wrapId);
  const checked = document.getElementById(checkboxId).checked;
  if (wrap) {
    wrap.classList.toggle('hidden', checked);
    wrap.querySelectorAll('.lot-date-input').forEach(inp => { inp.required = !checked; });
  }
  if (checked) {
    if (warnAreaId) { const w = document.getElementById(warnAreaId); if (w) w.innerHTML = ''; }
    if (submitBtnId) { const b = document.getElementById(submitBtnId); if (b) { b.disabled = false; b.classList.remove('opacity-50'); } }
  }
}

function addLotDateRow(containerId) {
  const container = document.getElementById(containerId);

function handlePluSearch() {

  const allActive = products.filter(p => !p.removed && p.plu);

  const partial = allActive.filter(p => String(p.plu) !== plu && String(p.plu).includes(plu));

  showPluSearchResults(plu, matches);
}

function handleManualPluInput(value) {
  const plu = value.trim();
  renderManualPluSuggestions(plu);

  const candidates = plu ? products.filter(p => p.plu && p.plu === plu) : [];
  const exact = candidates.find(p => !p.removed) || candidates.find(p => p.imageUrl) || candidates[0] || null;
  if (exact) {
    selectManualMatch(exact.id);
  } else if (window.__manualMatched) {
    window.__manualMatched = null;
    renderManualAddBody();
  }
}
function renderManualPluSuggestions(query) {
  const box = document.getElementById('manual-plu-suggestions');
  if (!box) return;
  const q = query.trim();
  if (!q) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  const seen = new Set();
  const matches = [];
  for (const p of products) {
    if (!p.plu) continue;
    if (p.plu === q) continue; // ตรงเป๊ะแล้วไม่ต้องโชว์ใน dropdown ซ้ำ (มันเลือกให้อัตโนมัติแล้ว)
    if (p.plu.includes(q) && !seen.has(p.plu)) { seen.add(p.plu); matches.push(p); }
    if (matches.length >= 6) break;
  }
  if (matches.length === 0) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  box.classList.remove('hidden');
  box.innerHTML = matches.map(p => `<div onmousedown="selectManualMatch(${p.id})">PLU ${escapeHtml(p.plu)} <span style="opacity:.5">· ${escapeHtml(p.name)}</span></div>`).join('');
}

// จับคู่ชื่อสินค้าแบบ "คล้ายกัน" ไม่ใช่แค่ตรงเป๊ะ — กันปัญหาแต่ละคนพิมพ์ชื่อไม่เหมือนกัน (สลับคำ/เว้นวรรคไม่ตรง/พิมพ์ผิดนิดหน่อย)
// ใช้วิธีเทียบ "คู่ตัวอักษรติดกัน" (bigram) แล้วดูว่าซ้อนทับกันมากแค่ไหน ไม่ต้องพึ่งการตัดคำภาษาไทย (ซึ่งไม่มีเว้นวรรคระหว่างคำอยู่แล้ว)
function normalizeForMatch(s) { return (s || '').toLowerCase().replace(/\s+/g, ''); }
function bigramsOf(s) {
  const grams = new Set();
  for (let i = 0; i < s.length - 1; i++) grams.add(s.slice(i, i + 2));
  if (grams.size === 0 && s.length > 0) grams.add(s); // สั้นเกิน 2 ตัวอักษร ใช้ทั้งคำแทน
  return grams;
}
function bigramSimilarity(a, b) {
  const ga = bigramsOf(a), gb = bigramsOf(b);
  if (ga.size === 0 || gb.size === 0) return 0;
  let common = 0;
  for (const g of ga) if (gb.has(g)) common++;
  return (2 * common) / (ga.size + gb.size);
}
function handleManualNameInput(value) {
  renderManualNameSuggestions(value);
  const exact = products.find(p => !p.removed && p.name.toLowerCase() === value.trim().toLowerCase());
  window.__manualMatched = exact || null;
  const pluInput = document.getElementById('manual-plu-input');
  if (pluInput && exact) pluInput.value = exact.plu || '';
  renderManualAddBody();
}

function renderManualNameSuggestions(query) {
  const box = document.getElementById('manual-name-suggestions');
  const qRaw = query.trim();
  if (!qRaw) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  const q = normalizeForMatch(qRaw);
  const seen = new Set();
  const scored = [];
  for (const p of products) {
    if (!p.name) continue;
    const key = p.name.toLowerCase();
    if (seen.has(key)) continue;
    const norm = normalizeForMatch(p.name);
    // ตรง/เป็นส่วนหนึ่งของกันและกัน ให้คะแนนเต็มก่อน ไม่ตรงเป๊ะค่อยเทียบความคล้าย (bigram)
    const score = (norm.includes(q) || q.includes(norm)) ? 1 : bigramSimilarity(q, norm);
    if (score >= 0.28) { seen.add(key); scored.push({ p, score }); }
  }
  scored.sort((a, b) => b.score - a.score);
  const matches = scored.slice(0, 6).map(x => x.p);
  if (matches.length === 0) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  box.classList.remove('hidden');
  box.innerHTML = matches.map(p => `<div onmousedown="selectManualMatch(${p.id})">${escapeHtml(p.name)}${p.plu ? ` <span style="opacity:.5">· PLU ${escapeHtml(p.plu)}</span>` : ''}</div>`).join('');
}

async function submitManualAdd(e) {
  e.preventDefault();
  const matched = window.__manualMatched;
  const name = document.getElementById('manual-name-input').value.trim();
  const pluVal = document.getElementById('manual-plu-input').value.trim();
  if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');

  const submitBtn = e.target.querySelector('button[type="submit"]');
  const setBusy = () => {
    if (!submitBtn) return;
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-70');
    submitBtn.textContent = 'กำลังบันทึก... โปรดรอสักครู่';
  };

  if (matched) {
    const r = readLotDates('manual-add-dates');
    if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
    const dates = r.dates;
    if (dates.length === 0) return showAlertModal('กรุณาใส่วันหมดอายุอย่างน้อย 1 รายการ');
    if (isDev()) {
      if (blockIfHardDuplicate(matched.barcode, matched.plu || pluVal, matched.name, dates)) return;
      setBusy();
      const newItemsM = [];
      dates.forEach(date => {
        const ni = { id: genId(), barcode: matched.barcode || '', plu: matched.plu || pluVal, name: matched.name, category: matched.category || '', imageUrl: matched.imageUrl, expiryDate: date, branch: targetBranchForNewLot(matched.branch), addedDate: new Date().toISOString(), addedBy: state.staffCode || '-' };
        products.push(ni);
        newItemsM.push(ni);
      });
      await saveProductsOrWarn(newItemsM);
      closeModal(); showToast(`✅ เพิ่ม ${dates.length} ล็อตใหม่แล้ว`); addGamificationPoint('addLot'); renderPage(); refreshScanResult();
    } else {
      if (blockIfHardDuplicate(matched.barcode, matched.plu || pluVal, matched.name, dates)) return;
      setBusy();
      const newId1 = genId();
      const newPendingItem1 = { id: newId1, barcode: matched.barcode || '', plu: matched.plu || pluVal, name: matched.name, expiryDate: dates[0], expiryDates: dates, imageUrl: matched.imageUrl, expiryPhoto: '', submittedAt: new Date().toISOString(), submittedBy: state.staffCode };
      const ok1 = await upsertPendingRow(newPendingItem1);
      if (!ok1) {
        return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
      }
      pendingSubmissions.push(newPendingItem1);
      closeModal(); showToast(`✅ ส่งคำขอ ${dates.length} ล็อตเรียบร้อยแล้ว · #${newId1}`); renderPage(); refreshScanResult();
    }
  } else {
    const prodImg = window.__manualProdImg;
    const noDateMode = document.getElementById('manual-nodate')?.checked;
    let dates = [];
    if (!noDateMode) {
      const r = readLotDates('manual-add-dates');
      if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
      dates = r.dates;
      if (dates.length === 0) return showAlertModal('กรุณาใส่วันหมดอายุอย่างน้อย 1 รายการ (หรือติ๊ก "ยังไม่มีของ")');
    }
    if (isDev()) {
      setBusy();
      const uploadedImg = await uploadImageToStorage(prodImg, 'products');
      const datesToSave = noDateMode ? [null] : dates;
      const newItemsU = [];
      datesToSave.forEach(date => {
        const ni = { id: genId(), barcode: '', plu: pluVal, name, imageUrl: uploadedImg, expiryDate: date, branch: targetBranchForNewLot(), addedDate: new Date().toISOString(), addedBy: state.staffCode || '-' };
        products.push(ni);
        newItemsU.push(ni);
      });
      await saveProductsOrWarn(newItemsU);
      closeModal(); showToast('✅ บันทึกสินค้าสำเร็จ'); renderPage();
    } else {
      if (!prodImg) return showAlertModal('กรุณาถ่ายรูปสินค้าค่ะ (แตะที่กล่อง 📸 รูปสินค้า ด้านบน)');
      setBusy();
      const uploadedProd = await uploadImageToStorage(prodImg, 'products');
      const newId2 = genId();
      const newPendingItem2 = { id: newId2, barcode: '', plu: pluVal, name, expiryDate: dates[0] || null, expiryDates: dates, imageUrl: uploadedProd, expiryPhoto: '', submittedAt: new Date().toISOString(), submittedBy: state.staffCode };
      const ok2 = await upsertPendingRow(newPendingItem2);
      if (!ok2) {
        return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
      }
      pendingSubmissions.push(newPendingItem2);
      triggerHaptic(15);
      closeModal(); renderPage();
    }
  }
}

async function markRemovedConfirm(id) {
  const idx = products.findIndex(x => x.id === id);
  if (idx === -1) return;
  const p = products[idx];
  // คำนวณ daysLeft เพื่อเช็คโบนัสเก็บออกก่อน 1 วัน
  let daysLeft = null;
  try{
    const computed = (typeof withComputed === 'function') ? withComputed(p) : p;
    daysLeft = (computed && typeof computed.daysLeft === 'number') ? computed.daysLeft : null;
  }catch(e){ daysLeft = null; }
  // แก้ไขตามคำขอ: ไม่ต้องขออนุมัติแล้ว ให้เก็บออกทันทีทุกคน
  products[idx] = { ...p, removed: true, removedDate: new Date().toISOString(), removedBy: state.staffCode || '-' };
  const ok = await saveProductsOrWarn([products[idx]]);
  if (ok) {
    triggerHaptic(12);
    if(daysLeft !== null && daysLeft >= 1){
      showToast(`🏆 เก็บออกก่อน ${daysLeft} วัน +15 แต้ม +1 ⭐`);
    }else{
      showToast(`📦 เก็บ "${truncateName(p.name)}" ออกจากชั้นแล้ว`);
    }
    renderPage();
    refreshScanResult();
    // เพิ่มแต้มความขยันเมื่อเก็บออก + โบนัสก่อน 1 วัน
    addGamificationPoint('remove', {daysLeft});
  }
}

// AI ตรวจสอบ: อนุมัติคำขอเก็บออก -> เก็บออกจริง
async function approveRemoval(pendingId) {
  const req = pendingSubmissions.find(p => p.id === pendingId);
  if (!req || !req.removeTargetId) return;
  const idx = products.findIndex(p => p.id === req.removeTargetId);
  if (idx === -1) {
    showAlertModal('ไม่พบสินค้าต้นทางในระบบแล้ว (อาจถูกลบ/เก็บออกไปก่อน) — กรุณาปฏิเสธคำขอนี้');
    return;
  }
  const backup = products[idx];
  products[idx] = { ...backup, removed: true, removedDate: new Date().toISOString(), removedBy: req.submittedBy || '-' };
  const ok = await saveProducts([products[idx]]);
  if (!ok) { products[idx] = backup; renderPage(); return showAlertModal('บันทึกไม่สำเร็จค่ะ ลองใหม่อีกครั้ง' + (lastDbError ? '\n\n(สาเหตุ: ' + lastDbError + ')' : '')); }
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== pendingId);
  await deletePendingById(pendingId);
  triggerHaptic(20);
  renderPage();
  showToast('✅ อนุมัติเก็บออกจากชั้นแล้ว');
}

// พนักงาน/แอดมิน: ส่งคำขอลบให้ AI ตรวจสอบอนุมัติ
async function requestDeleteLot(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  if (pendingSubmissions.some(x => x.deleteTargetId === id)) {
    return showToast('⏳ มีคำขอลบของรายการนี้รออนุมัติอยู่แล้ว');
  }
  const req = {
    id: genId(), barcode: p.barcode || '', plu: p.plu || '', name: p.name,
    expiryDate: p.expiryDate, expiryDates: [], imageUrl: p.imageUrl, expiryPhoto: '',
    submittedAt: new Date().toISOString(), submittedBy: state.staffCode, deleteTargetId: id,
  };
  const ok = await upsertPendingRow(req);
  if (!ok) return showAlertModal('ส่งคำขอลบไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
  pendingSubmissions.push(req);
  triggerHaptic(12);
  renderPage();
}

// AI ตรวจสอบ: อนุมัติคำขอลบ -> ลบถาวร
async function approveDelete(pendingId) {
  const req = pendingSubmissions.find(p => p.id === pendingId);
  if (!req || !req.deleteTargetId) return;
  if (products.some(p => p.id === req.deleteTargetId)) {
    const ok = await deleteProductById(req.deleteTargetId);
    if (!ok) return showAlertModal('ลบไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
    products = products.filter(p => p.id !== req.deleteTargetId);
  }
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== pendingId);
  await deletePendingById(pendingId);
  triggerHaptic(20);
  renderPage();
  showToast('✅ อนุมัติลบถาวรแล้ว');
}

function computeStats() {
  const active = products.map(withComputed).filter(p => !p.removed && !hasPendingRemoval(p.id) && isVisibleBranch(p));

    expired: active.filter(p => p.status === 'expired').length,
    urgent: active.filter(p => p.status === 'urgent').length,
    safe: active.filter(p => p.status === 'safe').length
  };
}

async function compressImageFile(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        if (width > 800) { height *= 800 / width; width = 800; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function setupImageZoom() {
  const img = document.getElementById('zoom-img');
  if (!img) return;
  let scale = 1, tx = 0, ty = 0;
  let startDist = 0, startScale = 1, startX = 0, startY = 0, startTx = 0, startTy = 0;
  let lastTap = 0, mode = null;
  const apply = () => { img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; };
  const dist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
  img.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      mode = 'pinch'; startDist = dist(e.touches); startScale = scale;
    } else if (e.touches.length === 1) {
      const now = Date.now();
      if (now - lastTap < 300) { // double tap
        e.preventDefault();
        scale = scale > 1 ? 1 : 2.5; tx = 0; ty = 0; apply();
      }
      lastTap = now;
      if (scale > 1) { mode = 'pan'; startX = e.touches[0].clientX; startY = e.touches[0].clientY; startTx = tx; startTy = ty; }
    }
  }, { passive: false });
  img.addEventListener('touchmove', (e) => {
    if (mode === 'pinch' && e.touches.length === 2) {
      e.preventDefault();
      scale = Math.min(6, Math.max(1, startScale * dist(e.touches) / (startDist || 1)));
      apply();
    } else if (mode === 'pan' && e.touches.length === 1 && scale > 1) {
      e.preventDefault();
      tx = startTx + (e.touches[0].clientX - startX);
      ty = startTy + (e.touches[0].clientY - startY);
      apply();
    }
  }, { passive: false });
  img.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
      if (scale <= 1) { scale = 1; tx = 0; ty = 0; apply(); }
      mode = null;
    }
  });
  // เผื่อใช้บนคอม: เลื่อนเมาส์ wheel เพื่อซูม
  img.addEventListener('wheel', (e) => {
    e.preventDefault();
    scale = Math.min(6, Math.max(1, scale - e.deltaY * 0.002));
    if (scale <= 1) { tx = 0; ty = 0; }
    apply();
  }, { passive: false });
}

let audioCtx = null;
function ensureAudioUnlocked() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  } catch {}

function playBeep(type = 'success') {
  try {
    ensureAudioUnlocked();
    const ctx = audioCtx;
    if(!ctx) return;
    const now = ctx.currentTime;
    // FIX: เสียงดังขึ้น 3 เท่า ใช้ square wave + gain สูง + compressor เบาๆ กันแตก
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.95;
    // เพิ่ม DynamicsCompressor ให้เสียงพุ่งในห้องเย็นที่มีเสียงดัง
    try{
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -24; comp.knee.value=30; comp.ratio.value=12; comp.attack.value=0.003; comp.release.value=0.25;
      masterGain.connect(comp); comp.connect(ctx.destination);
    }catch{ masterGain.connect(ctx.destination); }
    const tone = (freq, start, dur, vol = 0.9, wave='square') => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = wave;
      osc.frequency.value = freq;
      // Attack เร็ว Decay ช้า ให้ดังชัด
      gain.gain.setValueAtTime(0.0001, now+start);
      gain.gain.linearRampToValueAtTime(vol, now+start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now+start+dur);
      osc.connect(gain); gain.connect(masterGain);
      osc.start(now+start); osc.stop(now+start+dur+0.05);
    };
    if (type === 'success') {
      // ปี๊บสั้น 2 ครั้งดังๆ แบบเครื่องสแกน 7-11
      tone(1200, 0, 0.18, 0.95, 'square');
      tone(1800, 0.12, 0.18, 0.9, 'square');
    } else if (type === 'batch') {
      // โหมดยกถาด ดังยาวกว่า
      tone(1000, 0, 0.22, 1.0, 'square');
      tone(1500, 0.15, 0.28, 0.95, 'square');
    } else if (type === 'notfound') {
      tone(600, 0, 0.15, 0.85, 'sawtooth'); tone(350, 0.18, 0.3, 0.85, 'sawtooth');
    } else if (type === 'error') {
      tone(220, 0, 0.4, 0.9, 'sawtooth');
    }
    // สั่นเสริมด้วยถ้ามี
    try{ if(type==='success' && navigator.vibrate) navigator.vibrate(60); if(type==='batch' && navigator.vibrate) navigator.vibrate([60,40,80]); }catch{}
  } catch {}
}

let realtimeChannel = null;
let syncDebounceTimer = null;

function scheduleBackgroundSync() {
  if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(backgroundSync, 500);
}

async function backgroundSync() {
  try {
    if (typeof _isSavingProducts !== 'undefined' && _isSavingProducts) return;
    const cloudProducts = await fetchProductsFromCloud();
    const cloudIds = new Set(cloudProducts.map(p=>p.id));
    const recentLocal = products.filter(p => {
      if (cloudIds.has(p.id)) return false;
      if (typeof p.id === 'string' && p.id.startsWith('catalog-')) return false;
      try { const age = Date.now() - new Date(p.addedDate||0).getTime(); return age < 5*60*1000; } catch { return true; }
    });
    products = [...cloudProducts, ...recentLocal];
    try{ localStorage.setItem('p3_products_cache_v1', JSON.stringify(products.slice(0,800))); }catch(e){}
    // โหลดส่วนอื่นแบบขนานเพื่อลดเวลารอ
    const results = await Promise.allSettled([
      fetchPendingFromCloud().then(d=>pendingSubmissions=d),
      fetchAdminCredsFromCloud().then(d=>adminCreds=d),
      fetchUsers(),
      fetchActivity(),
      fetchBranchAdmins(),
      fetchBranchWhitelist(),
      fetchBranchSettings(),
      fetchFeedback()
    ]);
    try{ checkSelfStillApproved(); }catch(e){}
    try{ URGENT_WINDOW_DAYS = adminCreds.urgencyDays || URGENT_WINDOW_DAYS; }catch(e){}
    state.realtimeStatus.products = 'connected';
    try{ if(typeof refreshInlineTop3==='function') refreshInlineTop3(); }catch(e){}
  } catch (err) {
    console.error('background sync failed:', err);
  } finally {
    try{ renderPage(); }catch(e){}
  }
}

function setupRealtimeSync() {
  if (!sb || realtimeChannel) return;
  realtimeChannel = sb.channel('rimping-realtime-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: PRODUCTS_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: PENDING_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: ADMIN_CREDS_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: SETTINGS_TABLE }, () => handleForceLogoutRealtime())
    .on('postgres_changes', { event: '*', schema: 'public', table: USERS_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: ACTIVITY_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: BRANCH_ADMINS_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: WHITELIST_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: BRANCH_SETTINGS_TABLE }, () => scheduleBackgroundSync())

    .on('postgres_changes', { event: '*', schema: 'public', table: FEEDBACK_TABLE }, () => scheduleBackgroundSync())

      renderPage();
    });
}

let isCheckingForUpdate = false;
async function checkForAppUpdate() {
  if (isCheckingForUpdate) return;
  isCheckingForUpdate = true;
  try {
    const url = window.location.href.split('#')[0].split('?')[0];
    const res = await fetch(url + '?_freshcheck=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      const freshHtml = await res.text();
      const match = freshHtml.match(/APP_BUILD_ID\s*=\s*'([^']+)'/);
      if (match && match[1] && match[1] !== APP_BUILD_ID) {
        showToast('🔄 พบเวอร์ชันใหม่ กำลังอัปเดตให้อัตโนมัติ...');
        setTimeout(() => window.location.reload(), 900);
      }
    }
  } catch (e) { }
  isCheckingForUpdate = false;
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkForAppUpdate(); });
setInterval(checkForAppUpdate, 5 * 60 * 1000);

// ==================== Init ====================
function applyDeepLink() {
  const hash = (window.location.hash || '').replace('#', '').toLowerCase().trim();
  if (!hash) return;
  const map = {
    'scan': 'scanner', 'scanner': 'scanner',
    'add': 'scanner',
    'home': 'dashboard', 'dashboard': 'dashboard', 'expiry': 'dashboard',
    'calendar': 'calendar', 'cal': 'calendar',
    'review': 'admin', 'admin': 'admin', 'check': 'admin',
    'help': 'help',
  };
  const target = map[hash];
  if (!target) return;
  if (target === 'help') { setTimeout(() => { if (typeof showHelpGuide === 'function') showHelpGuide(); }, 300); return; }
  state.tab = target;
}

(async function init() {
  try { state.darkMode = localStorage.getItem(DARK_MODE_KEY) === '1'; } catch {}
  applyDarkMode();

  // === FAST PATH: โหลดแคชทันทีเพื่อโชว์หน้าแรกไวที่สุด ===
  const PRODUCTS_CACHE_KEY='p3_products_cache_v1';
  try{
    const cached = localStorage.getItem(PRODUCTS_CACHE_KEY);
    if(cached){
      const arr = JSON.parse(cached);
      if(Array.isArray(arr) && arr.length>0){
        // แปลงกลับเป็น product object แบบย่อ (ถ้าเคยเซฟไว้)
        products = arr;
      }
    }
  }catch(e){}

  // Optimistic login จาก localStorage เพื่อ render ได้ทันที ไม่ต้องรอเน็ต
  const savedEmp = getSavedEmpCode();
  let shouldValidateSession = false;
  if (savedEmp && isSessionValidToday()) {
    state.staffCode = getSavedStaffCode() || String(savedEmp);
    state.staffEmpCode = String(savedEmp);
    try{ state.userBranch = getSavedBranch() || DEFAULT_BRANCH; }catch(e){ state.userBranch = DEFAULT_BRANCH; }
    state.entered = true;
    shouldValidateSession = true;
  } else {
    state.entered = false;
  }

  if (getSavedAdminRemember()) {
    state.isAdminSession = true;
    const savedAdminBranch = getSavedAdminBranch();
    if (savedAdminBranch) {
      state.isBranchAdminSession = true;
      state.adminBranch = savedAdminBranch;
    }
  }

  // Render ทันทีจากแคช - ผู้ใช้เห็นหน้า Dashboard ภายใน <300ms แทนที่จะรอ Supabase
  try{ renderPage(); }catch(e){}
  // ซ่อน splash เร็ว
  const splashEarly = document.getElementById('splash-screen');
  if(splashEarly){
    setTimeout(()=>{ splashEarly.classList.add('splash-hide'); setTimeout(()=>splashEarly.remove(), 450); }, 250);
  }

  // === BACKGROUND SYNC: ทำงานเบื้องหลัง ไม่บล็อก UI ===
  (async ()=>{
    // 1) LIFF แบบมี timeout ไม่ให้ค้าง (เดิม await initLiff() ทำให้ช้า)
    try{
      const liffPromise = (typeof initLiff==='function') ? initLiff() : Promise.resolve();
      await Promise.race([liffPromise, new Promise(r=>setTimeout(r,1200))]);
    }catch(e){}

    // ปุ่มสแกนจาก Rich Menu: เปิดสแกนเนอร์ LINE แล้วส่งผลเข้าแชต
    try{
      if (new URLSearchParams(location.search).get('go') === 'linescan') {
        await runLiffScanAndSend();
        return;
      }
    }catch(e){}

    // 2) เช็ค force logout
    try {
      const forceLogoutAt = await fetchForceLogoutAt();
      if (forceLogoutAt && forceLogoutAt !== getForceLogoutAck()) {
        setForceLogoutAck(forceLogoutAt);
        clearSavedStaffCode();
        saveAdminRemember(false);
        state.staffCode = '';
        state.entered = false;
        renderPage();
        return;
      }
    } catch (e) {}

    // 3) Validate session จริงจาก Cloud (ถ้าเคย optimistic login ไว้)
    if(shouldValidateSession){
      try{
        await fetchUsers();
        const u = findUser(savedEmp);
        if (u && u.status === 'approved') {
          state.staffCode = u.nickname || getSavedStaffCode() || savedEmp;
          state.staffEmpCode = String(savedEmp);
          state.userBranch = u.branch || DEFAULT_BRANCH;
          state.entered = true;
          touchUserActive(savedEmp);
          logActivity('login');
        } else if (u && u.status === 'pending') {
          state.entered = false;
        } else if (!u) {
          // ถ้าไม่เจอ user ในระบบ อาจถูกลบแล้ว - ให้ออก
          // แต่ไม่ล้างทันที เผื่อออฟไลน์ - แค่ไม่ validate
        }
      }catch(e){ /* ออฟไลน์ ปล่อยให้ใช้แคชต่อได้ */ }
    }

    // 4) โหลดข้อมูลล่าสุดจาก Cloud (หนักสุด) - ทำหลัง render แล้ว
    try {
      state.realtimeStatus.products = 'connecting';
      // ไม่ render ซ้ำบ่อยตอนโหลด
      const cloudProducts = await fetchProductsFromCloud();
      if(Array.isArray(cloudProducts)){
        // merge กับ local ที่เพิ่งสร้างแต่ยังไม่ขึ้น cloud
        if (typeof _isSavingProducts !== 'undefined' && _isSavingProducts) {
          const cloudIds = new Set(cloudProducts.map(p=>p.id));
          const keepLocal = products.filter(p => !cloudIds.has(p.id));
          products = [...cloudProducts, ...keepLocal];
        } else {
          products = cloudProducts;
        }
        // เซฟแคชไว้สำหรับเปิดครั้งหน้าให้ไว
        try{ localStorage.setItem(PRODUCTS_CACHE_KEY, JSON.stringify(products.slice(0,800))); }catch(e){}
      }
      // โหลดส่วนอื่นแบบขนาน ไม่ต้องรอลำดับ
      const tasks = [];
      tasks.push(fetchPendingFromCloud().then(d=>{ pendingSubmissions=d; }).catch(()=>{}));
      if(!shouldValidateSession) tasks.push(fetchUsers().catch(()=>{}));
      tasks.push(fetchActivity().catch(()=>{}));
      tasks.push(fetchBranchAdmins().catch(()=>{}));
      tasks.push(fetchBranchWhitelist().catch(()=>{}));
      tasks.push(fetchBranchSettings().catch(()=>{}));
      tasks.push(fetchFeedback().catch(()=>{}));
      await Promise.allSettled(tasks);
      state.realtimeStatus.products = 'connected';
    } catch (e) {
      console.error('Background sync failed', e);
      state.realtimeStatus.products = 'error';
    }

    // 5) เช็คสถานะสมัคร
    if (!state.entered) {
      try{
        const pendingCode = getPendingRegCode();
        if (pendingCode) {
          const u = findUser(pendingCode);
          if (u && u.status === 'approved' && u.password) {
            state.myRegStatus = { code: pendingCode, password: u.password, nickname: u.nickname, approved: true };
          } else if (u && u.status === 'pending') {
            state.myRegStatus = { code: pendingCode, pending: true };
          } else if (u && u.status === 'rejected') {
            clearPendingRegCode();
          }
        }
      }catch(e){}
    }

    try{ setupRealtimeSync(); }catch(e){}
    if (state.entered) try{ applyDeepLink(); }catch(e){}
    try{ renderPage(); }catch(e){}
    try{ checkForAppUpdate(); }catch(e){}
    try{ applyEntryRoute(); }catch(e){}
    try{ if(typeof refreshInlineTop3==='function') refreshInlineTop3(); }catch(e){}
  })();

  // อุ่นเครื่องระบบค้นหาด้วยรูปภาพ - เลื่อนไปไกลขึ้นและทำเฉพาะเมื่อมีเน็ตดี ไม่บล็อกเปิดแอป
  // เดิม 4 วิ -> ใหม่ 12 วิ และจะไม่โหลดถ้าผู้ใช้ยังไม่ได้ไปหน้า Scanner
  setTimeout(() => {
    try{
      if(state.tab==='scanner' && typeof prewarmVisualSearch === 'function') prewarmVisualSearch();
    }catch(e){}
  }, 12000);
}
(async()=>{ try{ await init(); }catch(e){ console.error(e); try{ renderPage(); }catch(_){} const s=document.getElementById('splash-screen'); if(s){ s.classList.add('splash-hide'); setTimeout(()=>s.remove(),400);} } })();


// เปิดตรงหน้าตามพารามิเตอร์ ?go= (ใช้กับปุ่ม Rich Menu ในไลน์)
function applyEntryRoute() {
  try {
    const go = new URLSearchParams(location.search).get('go');
    if (!go || !state.entered) return;
    switch (go) {
      case 'scan': state.tab = 'scanner'; renderPage(); break;
      case 'add': state.tab = 'scanner'; renderPage(); setTimeout(() => { if (typeof openManualAddByName === 'function') openManualAddByName(); }, 200); break;
      case 'check':
      case 'home': state.tab = 'dashboard'; renderPage(); break;
      case 'calendar': state.tab = 'calendar'; renderPage(); break;
      case 'admin': state.tab = 'admin'; renderPage(); break;
      case 'guide': state.tab = 'dashboard'; renderPage(); setTimeout(() => { if (typeof showHelpGuide === 'function') showHelpGuide(); }, 200); break;
      default: break;
    }
  } catch (e) {}
}
