// ==================== FIX: เพิ่ม timeout ให้ Supabase queries ====================
async function fetchAllRowsPaginatedWithTimeout(table, selectCols, orderCol, ascending, nullsFirst) {
  const PAGE_SIZE = 1000;
  let all = [];
  let from = 0;
  while (true) {
    let query = sb.from(table).select(selectCols);
    if (orderCol) query = query.order(orderCol, { ascending, nullsFirst });
    query = query.range(from, from + PAGE_SIZE - 1);
    
    // ✅ FIX: เพิ่ม timeout ให้ query ไม่ค้างนาน
    const queryPromise = query;
    const timeoutPromise = new Promise((_, reject) => 
      setTimeout(() => reject(new Error('Query timeout')), SUPABASE_QUERY_TIMEOUT_MS)
    );
    
    try {
      const { data, error } = await Promise.race([queryPromise, timeoutPromise]);
      if (error) throw error;
      if (!data || data.length === 0) break;
      all = all.concat(data);
      if (data.length < PAGE_SIZE) break;
      from += PAGE_SIZE;
    } catch (e) {
      // ถ้า timeout หรือ error ให้ return ที่มีจนถึงตอนนี้
      console.warn('Query timeout/error:', e);
      break;
    }
  }
  return all;
}

function findUser(code) { return null; }
function touchUserActive(code) {}
function logActivity(action) {}
function fetchUsers() { return Promise.resolve(); }
function fetchActivity() { return Promise.resolve(); }
function fetchBranchAdmins() { return Promise.resolve(); }
function fetchBranchWhitelist() { return Promise.resolve(); }
function fetchBranchSettings() { return Promise.resolve(); }
function fetchFeedback() { return Promise.resolve(); }
function fetchForceLogoutAt() { return Promise.resolve(null); }
function setupRealtimeSync() {}
function applyDeepLink() {}
function checkForAppUpdate() {}
function applyEntryRoute() {}
function refreshInlineTop3() {}
async function initLiff() { return false; }

// ==================== Main initialization ====================
(async function init() {
  try { state.darkMode = localStorage.getItem(DARK_MODE_KEY) === '1'; } catch {}
  applyDarkMode();

  // === FAST PATH: โหลดแคชทันทีเพื่อโชว์หน้าแรกไวที่สุด ===
  const PRODUCTS_CACHE_KEY = 'p3_products_cache_v1';
  try {
    const cached = localStorage.getItem(PRODUCTS_CACHE_KEY);
    if (cached) {
      const arr = JSON.parse(cached);
      if (Array.isArray(arr) && arr.length > 0) {
        products = arr;
      }
    }
  } catch (e) {}

  // Optimistic login จาก localStorage เพื่อ render ได้ทันที ไม่ต้องรอเน็ต
  const savedEmp = getSavedEmpCode();
  let shouldValidateSession = false;
  if (savedEmp && isSessionValidToday()) {
    state.staffCode = getSavedStaffCode() || String(savedEmp);
    state.staffEmpCode = String(savedEmp);
    try { state.userBranch = getSavedBranch() || DEFAULT_BRANCH; } catch (e) { state.userBranch = DEFAULT_BRANCH; }
    state.entered = true;
    shouldValidateSession = true;
  } else {
    state.entered = false;
  }

  if (getSavedAdminRemember()) {
    state.isAdminSession = true;
    const savedAdminBranch = getSavedAdminBranch();
    if (savedAdminBranch) {
      state.isBranchAdminSession = true;
      state.adminBranch = savedAdminBranch;
    }
  }

  // Render ทันทีจากแคช - ผู้ใช้เห็นหน้า Dashboard ภายใน <300ms แทนที่จะรอ Supabase
  try { renderPage(); } catch (e) {}
  
  // ซ่อน splash เร็ว
  const splashEarly = document.getElementById('splash-screen');
  if (splashEarly) {
    setTimeout(() => { splashEarly.classList.add('splash-hide'); setTimeout(() => splashEarly.remove(), 450); }, 200);
  }

  // === BACKGROUND SYNC: ทำงานเบื้องหลัง ไม่บล็อก UI ===
  (async () => {
    // 1) LIFF แบบมี timeout ไม่ให้ค้าง (✅ ลดจาก 1200ms เป็น 800ms)
    try {
      const liffPromise = (typeof initLiff === 'function') ? initLiff() : Promise.resolve();
      await Promise.race([liffPromise, new Promise(r => setTimeout(r, LIFF_TIMEOUT_MS))]);
    } catch (e) {}

    // ปุ่มสแกนจาก Rich Menu: เปิดสแกนเนอร์ LINE แล้วส่งผลเข้าแชต
    try {
      if (new URLSearchParams(location.search).get('go') === 'linescan') {
        // await runLiffScanAndSend();
        return;
      }
    } catch (e) {}

    // 2) เช็ค force logout
    try {
      const forceLogoutAt = await fetchForceLogoutAt();
      if (forceLogoutAt && forceLogoutAt !== getForceLogoutAck()) {
        setForceLogoutAck(forceLogoutAt);
        clearSavedStaffCode();
        saveAdminRemember(false);
        state.staffCode = '';
        state.entered = false;
        renderPage();
        return;
      }
    } catch (e) {}

    // 3) Validate session จริงจาก Cloud (ถ้าเคย optimistic login ไว้)
    if (shouldValidateSession) {
      try {
        await fetchUsers();
        const u = findUser(savedEmp);
        if (u && u.status === 'approved') {
          state.staffCode = u.nickname || getSavedStaffCode() || savedEmp;
          state.staffEmpCode = String(savedEmp);
          state.userBranch = u.branch || DEFAULT_BRANCH;
          state.entered = true;
          touchUserActive(savedEmp);
          logActivity('login');
        } else if (u && u.status === 'pending') {
          state.entered = false;
        }
      } catch (e) { /* ออฟไลน์ ปล่อยให้ใช้แคชต่อได้ */ }
    }

    // 4) โหลดข้อมูลล่าสุดจาก Cloud (✅ ลด concurrency และเพิ่ม timeout)
    try {
      state.realtimeStatus.products = 'connecting';
      const cloudProducts = await fetchProductsFromCloud();
      if (Array.isArray(cloudProducts)) {
        if (typeof _isSavingProducts !== 'undefined' && _isSavingProducts) {
          const cloudIds = new Set(cloudProducts.map(p => p.id));
          const keepLocal = products.filter(p => !cloudIds.has(p.id));
          products = [...cloudProducts, ...keepLocal];
        } else {
          products = cloudProducts;
        }
        try { localStorage.setItem(PRODUCTS_CACHE_KEY, JSON.stringify(products.slice(0, 800))); } catch (e) {}
      }
      
      // โหลดส่วนอื่นแบบขนาน ✅ ลด concurrency เป็น 2 tasks พร้อมกัน
      const tasks = [];
      tasks.push(fetchPendingFromCloud().then(d => { pendingSubmissions = d; }).catch(() => {}));
      if (!shouldValidateSession) tasks.push(fetchUsers().catch(() => {}));
      
      // รอให้ 2 tasks แรกเสร็จ แล้วค่อยเริ่มอันถัดไป
      if (tasks.length > 0) await Promise.allSettled(tasks.slice(0, INITIAL_LOAD_CONCURRENCY));
      
      // โหลดอันที่เหลือแบบช้าลง
      const remainingTasks = [];
      remainingTasks.push(fetchActivity().catch(() => {}));
      remainingTasks.push(fetchBranchAdmins().catch(() => {}));
      remainingTasks.push(fetchBranchWhitelist().catch(() => {}));
      remainingTasks.push(fetchBranchSettings().catch(() => {}));
      remainingTasks.push(fetchFeedback().catch(() => {}));
      if (remainingTasks.length > 0) await Promise.allSettled(remainingTasks);
      
      state.realtimeStatus.products = 'connected';
    } catch (e) {
      console.error('Background sync failed', e);
      state.realtimeStatus.products = 'error';
    }

    // 5) เช็คสถานะสมัคร
    if (!state.entered) {
      try {
        const pendingCode = getPendingRegCode();
        if (pendingCode) {
          const u = findUser(pendingCode);
          if (u && u.status === 'approved' && u.password) {
            state.myRegStatus = { code: pendingCode, password: u.password, nickname: u.nickname, approved: true };
          } else if (u && u.status === 'pending') {
            state.myRegStatus = { code: pendingCode, pending: true };
          } else if (u && u.status === 'rejected') {
            clearPendingRegCode();
          }
        }
      } catch (e) {}
    }

    try { setupRealtimeSync(); } catch (e) {}
    if (state.entered) try { applyDeepLink(); } catch (e) {}
    try { renderPage(); } catch (e) {}
    try { checkForAppUpdate(); } catch (e) {}
    try { applyEntryRoute(); } catch (e) {}
    try { if (typeof refreshInlineTop3 === 'function') refreshInlineTop3(); } catch (e) {}
  })();

  // อุ่นเครื่องระบบค้นหาด้วยรูปภาพ - เลื่อนไปไกลขึ้นและทำเฉพาะเมื่อมีเน็ตดี ไม่บล็อกเปิดแอป
  setTimeout(() => {
    try {
      if (state.tab === 'scanner' && typeof prewarmVisualSearch === 'function') prewarmVisualSearch();
    } catch (e) {}
  }, 12000);
})();

// ==================== Error handler ====================
(async () => {
  try {
    await init();
  } catch (e) {
    console.error(e);
    try { renderPage(); } catch (_) {}
    const s = document.getElementById('splash-screen');
    if (s) {
      s.classList.add('splash-hide');
      setTimeout(() => s.remove(), 400);
    }
  }
})();

</script>
</body>
</html>
