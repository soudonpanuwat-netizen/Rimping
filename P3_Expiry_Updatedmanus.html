          brand: {

            400: '#4a9c6c', 500: '#2d7d4f', 600: '#1f6b3f', 700: '#155235',

          },
        },
        fontFamily: { sans: ['"Noto Sans Thai"', '"Inter"', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
      },
    },
  };
</script>
<style>
  body { -webkit-tap-highlight-color: transparent; background-color: #f8f7f5; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .fx-fade-up { animation: fadeUp 0.3s ease-out; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .autocomplete-items { position: absolute; border-radius: 1rem; border: 1px solid #e5e7eb; background: #fff; z-index: 99; top: 100%; left: 0; right: 0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-top: 4px; max-height: 200px; overflow-y: auto; }
  .autocomplete-items div { padding: 12px 16px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f3f4f6; }

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode/html5-qrcode.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="font-sans text-stone-800">

<div id="app" class="mx-auto max-w-md min-h-screen pb-24"></div>

<script>
// ==================== CONFIG & STATE ====================
const SUPABASE_URL = 'https://YOUR_PROJECT_URL.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
const PRODUCTS_TABLE = 'expiry_products';
const PENDING_TABLE = 'expiry_pending_submissions';
const IMAGES_BUCKET = 'product-images';
const URGENT_WINDOW_DAYS = 7;

let sb = null;
try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) { console.error("Supabase init error", e); }

const state = {
  tab: 'dashboard', // 'dashboard', 'scanner', 'calendar', 'admin'
  search: '',
  filter: 'all',
  staffCode: localStorage.getItem('p3_staff_code') || '',
  isAdminSession: false,
  isDevSession: false,
  products: [],
  pendingSubmissions: [],
  cal: { month: new Date().getMonth() + 1, year: new Date().getFullYear() },
  scanner: { lastCode: null, lastTime: 0 }
};

// ==================== HELPERS ====================
function formatThaiDate(dateStr) {
  if (!dateStr) return 'ยังไม่มีวันหมดอายุ';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
}

function parseThaiDate(input) {
  // รองรับ dd/mm/yy หรือ dd/mm/yyyy (พ.ศ. หรือ ค.ศ.)
  const parts = input.split(/[\/\-.]/);
  if (parts.length !== 3) return null;
  let d = parseInt(parts[0], 10);
  let m = parseInt(parts[1], 10);
  let y = parseInt(parts[2], 10);
  
  if (y < 100) y += (y > 60 ? 2500 : 2000); // เดาว่าเป็น พ.ศ. ถ้า > 60
  if (y > 2400) y -= 543; // แปลง พ.ศ. เป็น ค.ศ.
  
  const date = new Date(y, m - 1, d);
  return (date.getFullYear() === y && date.getMonth() === m - 1 && date.getDate() === d) ? date.toISOString().split('T')[0] : null;
}

function escapeHtml(str) {
  const p = document.createElement('p');
  p.textContent = str;
  return p.innerHTML;
}

// ==================== CORE UI ====================
function renderPage() {
  const app = document.getElementById('app');
  if (!state.staffCode) { renderLogin(); return; }
  
  let content = '';
  switch(state.tab) {
    case 'dashboard': content = dashboardHTML(); break;
    case 'scanner': content = scannerHTML(); break;
    case 'calendar': content = calendarHTML(); break;
    case 'admin': content = adminHTML(); break;
  }
  
  app.innerHTML = `
    <div class="px-4 pt-6 pb-4">${content}</div>
    <nav class="fixed bottom-0 left-0 right-0 z-40 mx-auto max-w-md border-t border-stone-100 bg-white/80 px-6 py-3 backdrop-blur-lg">
      <div class="flex items-center justify-between">
        ${navItemHTML('dashboard', 'รายการ', '📋')}
        ${navItemHTML('scanner', 'สแกน', '📷')}
        ${navItemHTML('calendar', 'ปฏิทิน', '🗓️')}
        ${navItemHTML('admin', 'จัดการ', '⚙️')}
      </div>
    </nav>
  `;
  if (state.tab === 'scanner') initScanner();
}

function navItemHTML(id, label, icon) {
  const active = state.tab === id;
  return `
    <button onclick="switchTab('${id}')" class="flex flex-col items-center gap-1">
      <span class="text-xl ${active ? '' : 'grayscale opacity-50'}">${icon}</span>
      <span class="text-[10px] font-bold ${active ? 'text-brand-600' : 'text-stone-400'}">${label}</span>
    </button>
  `;
}

function switchTab(id) {
  if (state.tab === 'scanner' && id !== 'scanner') stopScanner();
  state.tab = id;
  renderPage();
}

// ==================== DASHBOARD ====================
function dashboardHTML() {
  const filtered = state.products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(state.search.toLowerCase()) || (p.barcode && p.barcode.includes(state.search));
    if (!matchSearch) return false;
    if (state.filter === 'all') return true;
    if (state.filter === 'nodate') return !p.expiryDate;
    // Add more filters if needed
    return true;
  });

  return `
    <div class="space-y-4">
      <header class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">P3 Expiry</h1>
        <button onclick="openManualAdd()" class="rounded-full bg-brand-600 px-4 py-2 text-sm font-bold text-white shadow-lg">+ เพิ่มสินค้า</button>
      </header>
      <div class="relative">
        <input type="text" placeholder="ค้นหาชื่อหรือบาร์โค้ด..." value="${state.search}" oninput="state.search=this.value; renderPage()" class="w-full rounded-2xl border-none bg-white px-4 py-3 text-sm ring-1 ring-stone-200 focus:ring-2 focus:ring-brand-500" />
      </div>
      <div class="space-y-3">
        ${filtered.length ? filtered.map(p => productCardHTML(p)).join('') : '<p class="text-center py-10 text-stone-400">ไม่พบข้อมูล</p>'}
      </div>
    </div>
  `;
}

function productCardHTML(p) {
  const noDate = !p.expiryDate;
  return `
    <div class="flex items-center gap-3 rounded-2xl bg-white p-3 shadow-sm ring-1 ring-stone-100">
      <div class="h-14 w-14 shrink-0 overflow-hidden rounded-xl bg-stone-50">
        ${p.imageUrl ? `<img src="${p.imageUrl}" class="h-full w-full object-cover" />` : '<div class="flex h-full w-full items-center justify-center text-xl">📦</div>'}
      </div>
      <div class="min-w-0 flex-1">
        <h3 class="truncate text-sm font-bold">${escapeHtml(p.name)}</h3>
        <p class="text-[11px] text-stone-400">${p.barcode || 'ไม่มีบาร์โค้ด'}</p>
        <div class="mt-1 flex items-center gap-1.5">
          <span class="text-[11px] font-bold ${noDate ? 'text-amber-500' : 'text-stone-500'}">
            ${noDate ? '⚠️ ยังไม่ใส่วันหมดอายุ' : `📅 ${formatThaiDate(p.expiryDate)}`}
          </span>
          ${noDate ? '<span class="text-amber-500">✔️</span>' : ''}
        </div>
      </div>
    </div>
  `;
}

// ==================== SCANNER ====================
let html5QrCode = null;
function scannerHTML() {
  return `
    <div class="space-y-4">
      <h2 class="text-xl font-bold text-center">สแกนบาร์โค้ด</h2>
      <div id="reader" class="overflow-hidden rounded-3xl bg-black aspect-square"></div>
      <div id="scan-result" class="mt-4"></div>
      <p class="text-center text-xs text-stone-400">สแกนเพื่อดูข้อมูลหรือเพิ่มล็อตใหม่ทันที</p>
    </div>
  `;
}

function initScanner() {
  html5QrCode = new Html5Qrcode("reader");
  const config = { fps: 10, qrbox: { width: 250, height: 250 } };
  html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => html5QrCode.clear()).catch(err => console.error(err));
  }
}

function onScanSuccess(decodedText) {
  const now = Date.now();
  if (state.scanner.lastCode === decodedText && now - state.scanner.lastTime < 2000) return;
  state.scanner.lastCode = decodedText;
  state.scanner.lastTime = now;
  
  handleScannedBarcode(decodedText);
}

function handleScannedBarcode(barcode) {
  const match = state.products.find(p => p.barcode === barcode);
  const resEl = document.getElementById('scan-result');
  
  if (match) {
    resEl.innerHTML = `
      <div class="rounded-3xl bg-white p-4 shadow-xl ring-1 ring-stone-200 fx-fade-up">
        <div class="flex items-center gap-3">
          <div class="h-16 w-16 overflow-hidden rounded-xl bg-stone-50">
            ${match.imageUrl ? `<img src="${match.imageUrl}" class="h-full w-full object-cover" />` : '📦'}
          </div>
          <div class="flex-1 min-w-0">
            <h4 class="font-bold truncate">${escapeHtml(match.name)}</h4>
            <p class="text-xs text-stone-400">${barcode}</p>
          </div>
        </div>
        <button onclick="openQuickAddLot('${barcode}')" class="mt-4 w-full rounded-2xl bg-brand-600 py-3 font-bold text-white">+ เพิ่มล็อตใหม่</button>
      </div>
    `;
  } else {
    resEl.innerHTML = `
      <div class="rounded-3xl bg-white p-4 shadow-xl ring-1 ring-stone-200 fx-fade-up text-center">
        <p class="text-sm font-bold text-stone-600">ไม่พบบาร์โค้ด: ${barcode}</p>
        <button onclick="openManualAdd('${barcode}')" class="mt-3 w-full rounded-2xl bg-stone-100 py-3 font-bold text-stone-600">เพิ่มเป็นสินค้าใหม่</button>
      </div>
    `;
  }
}

// ==================== MANUAL ADD & MULTI-LOT ====================
function openManualAdd(prefillBarcode = '') {
  const modal = document.createElement('div');
  modal.id = 'modal-root';
  modal.className = 'fixed inset-0 z-[100] flex items-end justify-center bg-black/40 p-4 sm:items-center';
  modal.innerHTML = `
    <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl fx-fade-up overflow-y-auto max-h-[90vh]">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold">เพิ่มสินค้า/ล็อต</h3>
        <button onclick="closeModal()" class="text-stone-400 text-2xl">&times;</button>
      </div>
      <form id="manual-form" class="space-y-4">
        <div>
          <label class="text-xs font-bold text-stone-400">ชื่อสินค้า</label>
          <input id="form-name" type="text" required class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
        </div>
        <div>
          <label class="text-xs font-bold text-stone-400">บาร์โค้ด</label>
          <input id="form-barcode" type="text" value="${prefillBarcode}" class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
        </div>
        <div id="lot-container" class="space-y-3">
          <div class="lot-row flex gap-2 items-end">
            <div class="flex-1">
              <label class="text-xs font-bold text-stone-400">วันหมดอายุ (เช่น 22/02/69)</label>
              <input type="text" placeholder="วว/ดด/ปป" class="lot-date-input w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
            </div>
            <button type="button" onclick="this.parentElement.remove()" class="p-3 text-red-400">🗑️</button>
          </div>
        </div>
        <button type="button" onclick="addLotRow()" class="w-full rounded-xl bg-stone-50 py-2 text-xs font-bold text-stone-500 ring-1 ring-stone-200">+ เพิ่มล็อตเพิ่ม</button>
        <button type="submit" class="w-full rounded-2xl bg-brand-600 py-4 font-bold text-white shadow-lg">บันทึกข้อมูล</button>
      </form>
    </div>
  `;
  document.body.appendChild(modal);
  
  document.getElementById('manual-form').onsubmit = async (e) => {
    e.preventDefault();
    const name = document.getElementById('form-name').value.trim();
    const barcode = document.getElementById('form-barcode').value.trim();
    const dateInputs = Array.from(document.querySelectorAll('.lot-date-input'));
    
    const items = [];
    dateInputs.forEach(input => {
      const val = input.value.trim();
      const expiryDate = val ? parseThaiDate(val) : null;
      items.push({ name, barcode, expiryDate, addedDate: new Date().toISOString(), addedBy: state.staffCode });
    });
    
    if (items.length === 0) items.push({ name, barcode, expiryDate: null, addedDate: new Date().toISOString(), addedBy: state.staffCode });
    
    const ok = await saveToSupabase(items);
    if (ok) {
      state.products.push(...items);
      closeModal();
      renderPage();
      alert('บันทึกสำเร็จ!');
    }
  };
}

function addLotRow() {
  const container = document.getElementById('lot-container');
  const div = document.createElement('div');
  div.className = 'lot-row flex gap-2 items-end';
  div.innerHTML = `
    <div class="flex-1">
      <input type="text" placeholder="วว/ดด/ปป" class="lot-date-input w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
    </div>
    <button type="button" onclick="this.parentElement.remove()" class="p-3 text-red-400">🗑️</button>
  `;
  container.appendChild(div);
}

function closeModal() {
  const modal = document.getElementById('modal-root');
  if (modal) modal.remove();
}

async function saveToSupabase(items) {
  if (!sb) return true; // Mock success if no Supabase
  try {
    const { error } = await sb.from(PRODUCTS_TABLE).insert(items);
    if (error) throw error;
    return true;
  } catch (e) {
    console.error("Save failed", e);
    alert("บันทึกไม่สำเร็จ: " + e.message);
    return false;
  }
}

// ==================== INIT ====================
async function init() {
  if (sb) {
    const { data } = await sb.from(PRODUCTS_TABLE).select('*');
    if (data) state.products = data.map(p => ({ ...p, expiryDate: p.expiry_date }));
  }
  renderPage();
}

function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="flex min-h-screen flex-col items-center justify-center p-6 text-center">
      <h1 class="text-3xl font-bold text-brand-600">P3 Expiry</h1>
      <p class="mt-2 text-stone-400">เข้าสู่ระบบเพื่อเริ่มใช้งาน</p>
      <input id="login-code" type="text" placeholder="ชื่อพนักงาน" class="mt-8 w-full rounded-2xl border-none bg-white px-6 py-4 text-center text-lg font-bold shadow-sm ring-1 ring-stone-200" />
      <button onclick="login()" class="mt-4 w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-xl">ตกลง</button>
    </div>
  `;
}

function login() {
  const code = document.getElementById('login-code').value.trim();
  if (code) {
    state.staffCode = code;
    localStorage.setItem('p3_staff_code', code);
    init();
  }
}

init();
</script>
</body>
</html>
