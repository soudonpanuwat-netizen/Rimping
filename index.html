function productToRow(p) {

    removed_by: p.removedBy || '',
    removed_image_url: p.removedImageUrl || '',

  };
}
function rowToPending(row) {
  let editTargetId = null;
  let removeTargetId = null;
  let deleteTargetId = null;
  let submittedBy = row.submitted_by || '';
  const m = submittedBy.match(/^EDIT#(\d+)#([\s\S]*)$/);
  if (m) { editTargetId = parseInt(m[1], 10); submittedBy = m[2]; }
  const mr = submittedBy.match(/^REMOVE#(\d+)#([\s\S]*)$/);
  if (mr) { removeTargetId = parseInt(mr[1], 10); submittedBy = mr[2]; }
  const md = submittedBy.match(/^DELETE#(\d+)#([\s\S]*)$/);
  if (md) { deleteTargetId = parseInt(md[1], 10); submittedBy = md[2]; }
  return {
    id: row.id,
    barcode: row.barcode || '',
    plu: row.plu || '',
    name: row.name || '',
    expiryDate: row.expiry_date || '',
    expiryDates: row.expiry_dates ? row.expiry_dates.split(',').filter(Boolean) : [],
    imageUrl: row.image_url || '',
    expiryPhoto: row.expiry_photo || '',
    submittedAt: row.submitted_at || '',
    submittedBy: submittedBy,
    editTargetId: editTargetId,
    removeTargetId: removeTargetId,
    deleteTargetId: deleteTargetId,
  };
}
function pendingToRow(p) {
  let submittedBy = p.submittedBy || '';
  if (p.editTargetId) submittedBy = `EDIT#${p.editTargetId}#${submittedBy}`;
  else if (p.removeTargetId) submittedBy = `REMOVE#${p.removeTargetId}#${submittedBy}`;
  else if (p.deleteTargetId) submittedBy = `DELETE#${p.deleteTargetId}#${submittedBy}`;
  return {
    id: p.id,
    barcode: p.barcode || '',
    plu: p.plu || '',
    name: p.name || '',
    expiry_date: p.expiryDate || null,
    expiry_dates: (p.expiryDates && p.expiryDates.length > 0 ? p.expiryDates : [p.expiryDate]).filter(Boolean).join(','),
    image_url: p.imageUrl || '',
    expiry_photo: p.expiryPhoto || '',
    submitted_at: p.submittedAt || new Date().toISOString(),
    submitted_by: submittedBy,
  };
}

async function uploadImageToStorage(dataUrl, prefix) {
  if (!dataUrl || !dataUrl.startsWith('data:')) return dataUrl || '';
  if (!sb) return dataUrl;
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const path = `${prefix}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
    const { error: uploadError } = await sb.storage.from(IMAGES_BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });
    if (uploadError) { console.error('uploadImageToStorage failed:', uploadError); return dataUrl; }
    const { data } = sb.storage.from(IMAGES_BUCKET).getPublicUrl(path);
    return data.publicUrl;
  } catch (err) {
    console.error('uploadImageToStorage failed:', err);
    return dataUrl;
  }
}

function getStatus(expiryDateStr) {
  if (!expiryDateStr) return 'nodate';
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  if (!expiryDateStr) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function compareByDaysLeft(a, b) {
  if (a.daysLeft === null && b.daysLeft === null) return 0;
  if (a.daysLeft === null) return 1;
  if (b.daysLeft === null) return -1;
  return a.daysLeft - b.daysLeft;
}
function relativeDaysText(daysLeft) {
  if (daysLeft === null || daysLeft === undefined) return '';
  if (daysLeft === 0) return 'หมดอายุวันนี้';
  if (daysLeft > 0) return `เหลือ ${daysLeft} วัน`;
  return `เลยมา ${Math.abs(daysLeft)} วัน`;
}

// มีคำขอเก็บออก/ลบ ของสินค้านี้ค้างอยู่ไหม (ถ้ามี ให้ซ่อนจากหน้าหลัก/ปฏิทิน รอผู้พัฒนาอนุมัติ)
function hasPendingRemoval(id) {
  return pendingSubmissions.some(x => x.removeTargetId === id || x.deleteTargetId === id);
}

// สร้าง id ใหม่แบบไม่ชนกันข้ามเครื่อง (เดิมใช้ max(id)+1 -> 2 เครื่องเพิ่มพร้อมกันได้ id เดียวกัน -> ทับกัน -> สินค้าหาย)
function genId() {

}

// ==================== วันที่แบบพิมพ์เอง (รับทั้ง พ.ศ และ ค.ศ เช่น 22/02/69) ====================
// คืนค่า ISO 'YYYY-MM-DD' ถ้าแปลงได้ / คืน '' ถ้าว่าง / คืน null ถ้ารูปแบบผิด
function parseDateInputTH(str) {
  if (!str) return '';
  const s = String(str).trim();
  if (!s) return '';
  const m = s.match(/^(\d{1,2})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{2,4})$/);
  if (!m) return null;
  let day = parseInt(m[1], 10);
  let month = parseInt(m[2], 10);
  let year = parseInt(m[3], 10);
  if (month < 1 || month > 12 || day < 1 || day > 31) return null;
  const nowCe = new Date().getFullYear();
  if (m[3].length <= 2) {
    // ปี 2 หลัก: ลองทั้งแบบ พ.ศ (25xx) และ ค.ศ (20xx) เลือกอันที่อยู่ในช่วงสมเหตุสมผล
    const beCe = 2500 + year - 543;   // ตีความเป็น พ.ศ 25xx
    const ceCe = 2000 + year;         // ตีความเป็น ค.ศ 20xx
    const inWindow = (y) => y >= nowCe - 1 && y <= nowCe + 5;
    if (inWindow(beCe)) year = beCe;
    else if (inWindow(ceCe)) year = ceCe;
    else year = beCe; // เผื่อกรณีนอกช่วง ใช้ พ.ศ เป็นค่าเริ่มต้น
  } else {
    // ปี 4 หลัก: ถ้ามากกว่า 2400 ถือเป็น พ.ศ
    if (year > 2400) year = year - 543;
  }
  const mm = String(month).padStart(2, '0');
  const dd = String(day).padStart(2, '0');
  const iso = `${year}-${mm}-${dd}`;
  // ตรวจว่าวันที่มีจริง (กัน 31/02)
  const test = new Date(iso + 'T00:00:00');
  if (test.getFullYear() !== year || (test.getMonth() + 1) !== month || test.getDate() !== day) return null;
  return iso;
}
// ISO -> 'DD/MM/YY' (ปี พ.ศ 2 หลัก) สำหรับเติมในช่องพิมพ์
function formatDateInputTH(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return '';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const beYY = String((d.getFullYear() + 543) % 100).padStart(2, '0');
  return `${dd}/${mm}/${beYY}`;
}
// ใส่ "/" อัตโนมัติระหว่างพิมพ์ (วว/ดด/ปป) ให้ง่ายขึ้น
function autoSlashDate(el) {
  let d = el.value.replace(/\D/g, '').slice(0, 8);
  let out = d;
  if (d.length > 4) out = d.slice(0, 2) + '/' + d.slice(2, 4) + '/' + d.slice(4);
  else if (d.length > 2) out = d.slice(0, 2) + '/' + d.slice(2);
  el.value = out;
}
// สร้าง HTML ช่องกรอกวันที่แบบพิมพ์เอง (class lot-date-input ใช้ร่วมกับระบบเดิม)
function dateTextInputHTML(value = '', extraClass = '', extraAttrs = '') {
  const v = value ? escapeHtml(formatDateInputTH(value)) : '';
  return `<input type="text" inputmode="numeric" placeholder="วว/ดด/ปป (พ.ศ)" value="${v}" oninput="autoSlashDate(this)" ${extraAttrs} class="lot-date-input ${extraClass}" />`;
}
// อ่านค่าวันที่ทั้งหมดจาก container (แปลงเป็น ISO, ข้ามช่องว่าง). คืน {dates, hasError}
function readLotDates(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return { dates: [], hasError: false };
  const inputs = Array.from(container.querySelectorAll('.lot-date-input'));
  const dates = [];
  let hasError = false;
  inputs.forEach(inp => {
    const raw = inp.value.trim();
    if (!raw) return;
    const iso = parseDateInputTH(raw);
    if (iso === null) { hasError = true; inp.classList.add('ring-2', 'ring-red-400'); }
    else { inp.classList.remove('ring-2', 'ring-red-400'); if (iso) dates.push(iso); }
  });
  return { dates, hasError };
}

function detectBarcodeFormat(value) {
  const v = String(value).trim();
  if (/^\d{13}$/.test(v)) return 'EAN13';
  if (/^\d{12}$/.test(v)) return 'UPC';
  if (/^\d{8}$/.test(v)) return 'EAN8';
  return 'CODE128';
}

function renderBarcodeSVGs() {
  if (typeof JsBarcode === 'undefined') return;
  document.querySelectorAll('svg[id^="barcode-svg-"]').forEach(svg => {
    const value = svg.getAttribute('data-value');
    if (!value || svg.getAttribute('data-rendered') === '1') return;
    const fmt = detectBarcodeFormat(value);
    try {
      JsBarcode(svg, value, {
        format: fmt,
        width: 2,
        height: 56,
        displayValue: true,
        fontSize: 13,
        margin: 4,
        background: '#ffffff',
        lineColor: '#0a2a1c',
      });
      svg.setAttribute('data-rendered', '1');
    } catch (e) {
      try {
        JsBarcode(svg, value, { format: 'CODE128', width: 2, height: 56, displayValue: true, fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c' });
        svg.setAttribute('data-rendered', '1');
      } catch (e2) {
        svg.outerHTML = `<p class="text-center text-[11px] text-stone-400">บาร์โค้ด ${value}</p>`;
      }
    }
  });
}

function formatThaiDateTime(isoString) {

}

// ==================== ค้นหาด้วยรูปภาพ (อัปเกรด: เร็วขึ้น + แม่นขึ้น) ====================
// อัปเกรด v35:
//  - ใช้ MobileNet v2 alpha 1.0 (แม่น) แต่ย่อรูปเป็น 224px ก่อน infer -> ถอดรหัส/ประมวลผลเร็วขึ้นมาก
//  - คำนวณ embedding แบบขนานมากขึ้น (6 พร้อมกัน) และแคชลง Supabase (ครั้งต่อไปแทบจะทันที)
//  - pre-warm: หลังโหลดโมเดลครั้งแรก แอบคำนวณ embedding ที่ยังขาดในเบื้องหลัง เวลาค้นจริงจะไวขึ้น
const VS_CONCURRENCY = 6;
const VS_INPUT_SIZE = 224;

function loadVisualSearchModel() {
  if (window.__mobilenetModel) return Promise.resolve(window.__mobilenetModel);
  if (window.__mobilenetLoadingPromise) return window.__mobilenetLoadingPromise;
  window.__mobilenetLoadingPromise = new Promise((resolve, reject) => {
    const tfScript = document.createElement('script');
    tfScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js';
    tfScript.onload = () => {
      const mnScript = document.createElement('script');
      mnScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js';
      mnScript.onload = async () => {
        try {
          try { if (window.tf && tf.setBackend) { await tf.setBackend('webgl'); await tf.ready(); } } catch (e) {}
          const model = await mobilenet.load({ version: 2, alpha: 1.0 });
          window.__mobilenetModel = model;
          resolve(model);
        } catch (e) { reject(e); }
      };
      mnScript.onerror = () => reject(new Error('โหลดโมเดลไม่สำเร็จ'));
      document.head.appendChild(mnScript);
    };
    tfScript.onerror = () => reject(new Error('โหลด TensorFlow.js ไม่สำเร็จ'));
    document.head.appendChild(tfScript);
  });
  return window.__mobilenetLoadingPromise;
}

function loadImageElement(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('โหลดรูปไม่สำเร็จ'));
    img.src = src;
  });
}

// ครอปสี่เหลี่ยมจัตุรัสกลางภาพ แล้วย่อเป็น 224px (โฟกัสตัวสินค้าตรงกลาง ลดพื้นหลัง/มือ/ชั้นวางรบกวน)
function downscaleToCanvas(imgEl) {
  const c = document.createElement('canvas');
  c.width = VS_INPUT_SIZE; c.height = VS_INPUT_SIZE;
  const iw = imgEl.naturalWidth || imgEl.width;
  const ih = imgEl.naturalHeight || imgEl.height;
  const side = Math.min(iw, ih);
  const sx = (iw - side) / 2;
  const sy = (ih - side) / 2;
  c.getContext('2d').drawImage(imgEl, sx, sy, side, side, 0, 0, VS_INPUT_SIZE, VS_INPUT_SIZE);
  return c;
}

async function computeImageEmbedding(imgEl) {
  const model = await loadVisualSearchModel();
  const canvas = downscaleToCanvas(imgEl);
  const t = model.infer(canvas, true);
  const data = await t.data();
  t.dispose();
  return Array.from(data);
}

function cosineSimilarity(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-8);
}

// คำนวณ embedding ที่ยังขาด (ใช้ร่วมกันทั้งตอนค้นจริงและตอน pre-warm)
async function ensureEmbeddingsFor(candidates, onProgress) {
  const urlToEmbedding = new Map();
  candidates.forEach(p => {
    if (p.imageEmbedding && p.imageEmbedding.length && !urlToEmbedding.has(p.imageUrl)) {
      urlToEmbedding.set(p.imageUrl, p.imageEmbedding);
    }
  });
  const urlsNeeding = [...new Set(candidates.filter(p => !urlToEmbedding.has(p.imageUrl)).map(p => p.imageUrl))];
  let done = 0;
  for (let i = 0; i < urlsNeeding.length; i += VS_CONCURRENCY) {
    if (state.ocrCancelled) break;
    const batch = urlsNeeding.slice(i, i + VS_CONCURRENCY);
    if (onProgress) onProgress(done, urlsNeeding.length);
    await Promise.all(batch.map(async (url) => {
      try {
        const img = await loadImageElement(url);
        const emb = await computeImageEmbedding(img);
        urlToEmbedding.set(url, emb);
      } catch (e) {}
    }));
    done += batch.length;
  }
  // แปะ embedding กลับให้ทุกล็อตที่ใช้รูปร่วมกัน + เก็บที่ต้องบันทึกแคช
  const embeddedItems = [];
  candidates.forEach(p => {
    if (!p.imageEmbedding || !p.imageEmbedding.length) {
      const emb = urlToEmbedding.get(p.imageUrl);
      if (emb) { p.imageEmbedding = emb; embeddedItems.push(p); }
    }
  });
  if (embeddedItems.length > 0) saveProductsOrWarn(embeddedItems);
  return urlToEmbedding;
}

// pre-warm เบื้องหลัง (ไม่บล็อก UI) เรียกหลังโหลดข้อมูลเสร็จ
let vsPrewarmDone = false;
async function prewarmVisualSearch() {
  if (vsPrewarmDone) return;
  vsPrewarmDone = true;
  try {
    const candidates = products.filter(p => !p.removed && p.imageUrl && (!p.imageEmbedding || !p.imageEmbedding.length));
    if (candidates.length === 0) return;
    await loadVisualSearchModel();
    state.ocrCancelled = false;
    await ensureEmbeddingsFor(candidates, null);
  } catch (e) { vsPrewarmDone = false; /* ลองใหม่รอบหน้าได้ */ }
}

        <p class="mt-1 text-xs text-stone-400">ครั้งแรกอาจใช้เวลาสักครู่ ครั้งต่อไปจะเร็วขึ้นมาก</p>

async function handleVisualSearchFileSelected(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  state.ocrCancelled = false;
  showVisualSearchProgress('🔎 กำลังเตรียมระบบจำรูปภาพ...');
  try {
    await loadVisualSearchModel();
    if (state.ocrCancelled) return;
    showVisualSearchProgress('📸 กำลังวิเคราะห์รูปที่ถ่าย...');
    const fileUrl = URL.createObjectURL(file);
    const capturedImg = await loadImageElement(fileUrl);
    const queryEmbedding = await computeImageEmbedding(capturedImg);
    URL.revokeObjectURL(fileUrl);
    if (state.ocrCancelled) return;

    const candidates = products.filter(p => !p.removed && p.imageUrl);
    await ensureEmbeddingsFor(candidates, (done, total) => {
      if (total > 0) showVisualSearchProgress(`🔎 กำลังวิเคราะห์รูปภาพ... (${done}/${total} รูป)`);
    });
    if (state.ocrCancelled) return;

    const scored = candidates
      .filter(p => p.imageEmbedding && p.imageEmbedding.length)
      .map(p => ({ product: p, score: cosineSimilarity(queryEmbedding, p.imageEmbedding) }));
    scored.sort((a, b) => b.score - a.score);
    const top = scored.slice(0, 5).filter(s => s.score > 0.08);
    closeOcrOverlay();
    showVisualSearchResults(top);
  } catch (err) {
    console.error('Visual search error:', err);
    if (state.ocrCancelled) return;
    closeOcrOverlay();
    showAlertModal('ค้นหาด้วยรูปภาพไม่สำเร็จ ลองใหม่ หรือตรวจสอบอินเทอร์เน็ต (โหลดโมเดลครั้งแรกต้องใช้เน็ต)');
  }
}

    <path d="M9 9V6.5a3 3 0 0 1 6 0V9" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9.5 13v3.2M12 13v3.2M14.5 13v3.2" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

}

function statusBadgeHTML(status) {
  const labels = { expired: 'หมดอายุ', urgent: 'เร่งด่วน', safe: 'ปลอดภัย', nodate: '📋 ยังไม่มีของ' };
  const colors = { expired: 'bg-red-100 text-red-700', urgent: 'bg-amber-100 text-amber-700', safe: 'bg-brand-100 text-brand-700', nodate: 'bg-stone-200 text-stone-600' };
  return `<span class="shrink-0 whitespace-nowrap inline-flex items-center rounded-full ${colors[status]} px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider">${labels[status]}</span>`;
}

function onlineStatusBadgeHTML() {
  const isOnline = state.realtimeStatus.products === 'connected';
  return `<div class="flex items-center gap-1.5 rounded-full bg-white px-2.5 py-1 text-[10px] font-bold shadow-sm ring-1 ring-stone-200">
    <span class="h-1.5 w-1.5 rounded-full ${isOnline ? 'bg-green-500 animate-pulse' : 'bg-red-500'}"></span>

}

function statCardHTML(label, count, colorClass, isActive, onClick) {
  return `
    <button onclick="${onClick}" class="flex-1 rounded-2xl p-3 text-left shadow-card transition-all active:scale-95 ${colorClass} ${isActive ? 'ring-2 ring-offset-2' : 'ring-1'}">

function productCardHTML(p, { showActions = false, showRemoveAction = false, showMeta = false } = {}) {
  const isExpired = p.status === 'expired';
  const cardClass = isExpired
    ? 'bg-red-50/70 ring-1 ring-red-200'
    : 'bg-white ring-1 ring-brand-100/50';
  const nameClass = isExpired ? 'text-red-800' : 'text-stone-800';
  return `
    <div onclick="viewProductDetail(${p.id})" class="flex items-center gap-3 overflow-hidden rounded-2xl ${cardClass} p-3 shadow-card active:scale-[0.98] transition-transform">
      <div class="h-14 w-14 shrink-0 overflow-hidden rounded-xl bg-stone-100">
        ${p.imageUrl ? `<img src="${p.imageUrl}" class="h-full w-full object-cover" />` : `<div class="flex h-full w-full items-center justify-center text-2xl">📦</div>`}
      </div>
      <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
          <p class="min-w-0 flex-1 truncate text-sm font-semibold ${nameClass}">${escapeHtml(truncateName(p.name))}</p>
          ${statusBadgeHTML(p.status)}
        </div>
        <p class="mt-0.5 truncate text-xs ${isExpired ? 'text-red-400' : 'text-stone-400'}">${p.barcode ? escapeHtml(p.barcode) : (p.plu ? `PLU ${escapeHtml(p.plu)}` : 'ไม่มีบาร์โค้ด')}</p>
        <p class="mt-1 text-xs ${isExpired ? 'font-bold text-red-600' : 'text-stone-500'}">${p.expiryDate ? `หมดอายุ ${formatThaiDate(p.expiryDate)} <span class="${isExpired ? 'text-red-500' : 'text-stone-400'}">· ${relativeDaysText(p.daysLeft)}</span>` : '📋 บันทึกไว้ก่อน รอเพิ่มวันหมดอายุ'}</p>
        ${showMeta ? `<p class="mt-1 truncate text-[11px] text-stone-400">👤 ${escapeHtml(p.addedBy || '-')} · ${p.addedDate ? new Date(p.addedDate).toLocaleString('th-TH') : '-'}</p>` : ''}
      </div>
      ${showActions ? `
        <div class="flex shrink-0 flex-col gap-1.5" onclick="event.stopPropagation()">
          <button onclick="openProductForm(${p.id})" class="rounded-full bg-brand-50 p-1.5 text-brand-700 active:scale-95" aria-label="แก้ไข">✏️</button>
        </div>` : ''}
      ${showRemoveAction && p.status !== 'nodate' ? `
        <button onclick="event.stopPropagation(); markRemovedConfirm(${p.id})" class="shrink-0 flex h-11 w-11 items-center justify-center rounded-full ${isExpired ? 'bg-red-100 text-red-700' : 'bg-stone-100 text-stone-600'} text-lg active:scale-95" aria-label="เก็บออกจากชั้น">📦</button>` : ''}
    </div>`;
}

// ==================== App Navigation ====================
function renderPage() {
  const app = document.getElementById('app');
  if (!state.entered) {
    app.innerHTML = welcomeHTML();
    return;
  }
  if (html5QrCode) stopScanner();
  
  let content = '';
  switch (state.tab) {
    case 'dashboard': content = dashboardHTML(); break;
    case 'scanner': content = scannerHTML(); break;
    case 'calendar': content = calendarHTML(); break;
    case 'admin': content = adminHTML(); break;
  }
  const tabChanged = state.__lastRenderedTab !== state.tab;
  state.__lastRenderedTab = state.tab;
  
  app.innerHTML = `
    <div class="mx-auto min-h-screen max-w-md pt-6 px-4" style="padding-bottom: calc(7rem + env(safe-area-inset-bottom, 0px))">
      <div class="${tabChanged ? 'fx-tab-in' : ''}">${content}</div>
      <nav class="fixed bottom-0 left-0 right-0 z-40 flex justify-center" style="padding-bottom: env(safe-area-inset-bottom, 0px)">
        <div class="mb-4 flex w-[90%] max-w-sm items-center justify-around rounded-3xl bg-white/85 p-2 shadow-nav ring-1 ring-brand-100/50 backdrop-blur-xl">
          ${NAV_ITEMS.map((item) => `
            <button onclick="switchTab('${item.id}')" class="relative flex flex-col items-center gap-1 px-3 py-2 transition-all ${state.tab === item.id ? 'scale-110 text-brand-600' : 'text-stone-400 opacity-70'}">
              <span class="text-xl">${item.emoji}</span>
              ${item.id === 'admin' && isAdmin() && pendingSubmissions.length > 0 ? `<span class="absolute -top-0.5 right-1 flex h-4 min-w-[16px] items-center justify-center rounded-full bg-red-500 px-1 text-[9px] font-bold text-white">${pendingSubmissions.length}</span>` : ''}
              <span class="text-[10px] font-bold uppercase tracking-wider">${item.label}</span>
            </button>`).join('')}
        </div>
      </nav>
    </div>`;

  if (state.tab === 'scanner') scheduleScannerRestart(0);
  if (state.tab === 'admin' && isAdmin()) {
    const pendingList = document.getElementById('admin-pending-list');
    if (pendingList) {
      pendingList.innerHTML = adminPendingListHTML();
      pendingSubmissions.forEach(item => {
        if (item.editTargetId) return;
        const runCheck = liveCheckDateDuplicates(
          `pending-dates-${item.id}`, `pending-dup-warning-${item.id}`,
          () => document.getElementById(`pending-barcode-${item.id}`)?.value.trim() || '',
          () => document.getElementById(`pending-plu-${item.id}`)?.value.trim() || '',
          () => document.getElementById(`pending-name-${item.id}`)?.value.trim() || '',
          null, `pending-approve-btn-${item.id}`
        );
        const nameEl = document.getElementById(`pending-name-${item.id}`);
        const bcEl = document.getElementById(`pending-barcode-${item.id}`);
        const pluEl = document.getElementById(`pending-plu-${item.id}`);
        if (nameEl) nameEl.addEventListener('input', runCheck);
        if (bcEl) bcEl.addEventListener('input', runCheck);
        if (pluEl) pluEl.addEventListener('input', runCheck);
      });
    }
    const removedList = document.getElementById('admin-removed-list');
    if (removedList) removedList.innerHTML = adminRemovedListHTML();
    const deleteReqList = document.getElementById('admin-delete-list');
    if (deleteReqList) deleteReqList.innerHTML = renderDeleteRequestsHTML();
    const productList = document.getElementById('admin-product-list');
    if (productList) productList.innerHTML = adminProductListHTML();
    const trendChart = document.getElementById('admin-trend-chart');
    if (trendChart) trendChart.innerHTML = removedTrendHTML();
    const topRemoved = document.getElementById('admin-top-removed');
    if (topRemoved) topRemoved.innerHTML = topRemovedProductsHTML();
  }
  renderBarcodeSVGs();
}

let scannerStopPromise = null;

function isValidBarcodeChecksum(code) {
  if (!/^\d+$/.test(code)) return true;
  if (![8, 12, 13, 14].includes(code.length)) return true;
  const digits = code.split('').map(Number);
  const checkDigit = digits.pop();
  let sum = 0;
  digits.reverse().forEach((d, i) => { sum += (i % 2 === 0) ? d * 3 : d * 1; });
  const calculated = (10 - (sum % 10)) % 10;
  return calculated === checkDigit;
}

let scannerRestartTimer = null;
function scheduleScannerRestart(delay = 0) {
  if (state.tab !== 'scanner') return;
  if (scannerRestartTimer) clearTimeout(scannerRestartTimer);
  scannerRestartTimer = setTimeout(() => {
    scannerRestartTimer = null;
    if (state.tab === 'scanner') initScanner();
  }, delay);
}

async function initScanner() {
  if (!window.Html5Qrcode) return;
  if (window.__scannerStarting) return;
  window.__scannerStarting = true;

  const manualForm = document.getElementById('manual-form');
  if (manualForm) manualForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = document.getElementById('manual-input').value.trim();
    if (val) handleScannedBarcode(val);
  });

  try {
    if (scannerStopPromise) { await scannerStopPromise; scannerStopPromise = null; }
    if (html5QrCode) return;

    html5QrCode = new Html5Qrcode('qr-reader');
    await html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => {
        if (!isValidBarcodeChecksum(decodedText)) return;

        const now = Date.now();
        if (state.scanner.pendingCode === decodedText) {
          state.scanner.pendingCount++;
        } else {
          state.scanner.pendingCode = decodedText;
          state.scanner.pendingCount = 1;
        }
        if (state.scanner.pendingCount < 3) return;

        if (state.scanner.lastCode === decodedText && now - state.scanner.lastTime < 2500) return;
        state.scanner.lastCode = decodedText;
        state.scanner.lastTime = now;
        state.scanner.pendingCode = null;
        state.scanner.pendingCount = 0;
        handleScannedBarcode(decodedText);
      },
      () => {}
    );
    const status = document.getElementById('camera-status');
    if (status) status.remove();
    const frame = document.getElementById('camera-frame');
    if (frame) frame.classList.remove('hidden');
  } catch (err) {
    console.error(err);
    const status = document.getElementById('camera-status');
    if (status) status.textContent = 'ไม่สามารถเข้าถึงกล้องได้';
  } finally {
    window.__scannerStarting = false;
  }
}

async function handleScanImageFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const tempDivId = 'qr-file-scan-temp';
    let tempDiv = document.getElementById(tempDivId);
    if (!tempDiv) {
      tempDiv = document.createElement('div');
      tempDiv.id = tempDivId;
      tempDiv.style.display = 'none';
      document.body.appendChild(tempDiv);
    }
    const fileScanner = new Html5Qrcode(tempDivId);
    const decodedText = await fileScanner.scanFile(file, false);
    try { fileScanner.clear(); } catch {}
    if (!isValidBarcodeChecksum(decodedText)) {
      playBeep('error'); triggerHaptic(30);
      showToast('❌ บาร์โค้ดในรูปไม่ชัดหรืออ่านผิด ลองถ่ายใหม่');
      event.target.value = '';
      return;
    }
    handleScannedBarcode(decodedText);
  } catch (err) {
    console.error(err);
    playBeep('error'); triggerHaptic(30);
    showToast('❌ ไม่พบบาร์โค้ดในรูปภาพนี้');
  }
  event.target.value = '';
}

function stopScanner() {
  if (html5QrCode) {
    const scanner = html5QrCode;
    html5QrCode = null;
    scannerStopPromise = scanner.stop().catch(() => {}).finally(() => { try { scanner.clear(); } catch {} });
    return scannerStopPromise;
  }
  return scannerStopPromise || Promise.resolve();
}

let fieldScanner = null;
function scanBarcodeIntoField(targetInputId) {
  ensureAlertOverlayRoot().innerHTML = `
    <div class="fixed inset-0 z-[230] flex items-center justify-center bg-black/80 p-4" onclick="if(event.target===this) closeFieldScanner()">
      <div class="w-full max-w-sm rounded-3xl bg-white p-5 shadow-2xl">
        <h3 class="mb-3 text-center text-sm font-bold text-stone-800">📷 เล็งกล้องไปที่บาร์โค้ด</h3>
        <div id="field-scanner-box" class="overflow-hidden rounded-2xl bg-black" style="aspect-ratio:4/3"></div>
        <button onclick="closeFieldScanner()" class="mt-4 w-full rounded-2xl bg-stone-100 py-3 text-sm font-bold text-stone-600 active:scale-95">ยกเลิก</button>
      </div>
    </div>`;
  let lastVal = null, sameCount = 0;
  setTimeout(() => {
    fieldScanner = new Html5Qrcode('field-scanner-box');
    fieldScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 140 } },
      (decodedText) => {
        if (!isValidBarcodeChecksum(decodedText)) return;
        if (decodedText === lastVal) { sameCount++; } else { lastVal = decodedText; sameCount = 1; }
        if (sameCount < 2) return;
        const input = document.getElementById(targetInputId);
        if (input) {
          input.value = decodedText;
          input.dispatchEvent(new Event('input', { bubbles: true }));
        }
        triggerHaptic(20);
        showToast(`✅ สแกนบาร์โค้ดได้: ${decodedText}`);
        closeFieldScanner();
      },
      () => {}
    ).catch(() => {
      const box = document.getElementById('field-scanner-box');
      if (box) box.innerHTML = '<p class="flex h-full items-center justify-center p-4 text-center text-xs text-white">เปิดกล้องไม่ได้ กรุณาอนุญาตให้ใช้กล้อง แล้วลองใหม่</p>';
    });
  }, 100);
}
function closeFieldScanner() {
  if (fieldScanner) {
    const s = fieldScanner; fieldScanner = null;
    s.stop().catch(() => {}).finally(() => { try { s.clear(); } catch {} });
  }
  closeAlertOverlay();
}

async function submitScanLot(barcode) {
  const catalogList = products.filter(p => p.barcode === barcode);
  const info = catalogList.find(p => p.imageUrl && p.name) || catalogList[catalogList.length - 1];
  if (!info) return;
  const { dates, hasError } = readLotDates('scan-lot-dates');
  if (hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
  if (dates.length === 0) return showAlertModal('กรุณาใส่วันหมดอายุอย่างน้อย 1 รายการ');
  if (blockIfHardDuplicate(barcode, info.plu || '', info.name, dates)) return;

  const btn = document.getElementById('scan-lot-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังบันทึก...'; btn.classList.add('opacity-70'); }

  if (isDev()) {
    const newItems = [];
    dates.forEach(date => {
      const ni = {
        id: genId(), barcode: barcode || '', plu: info.plu || '', name: info.name,
        category: info.category || '', imageUrl: info.imageUrl, expiryDate: date,
        addedDate: new Date().toISOString(), addedBy: state.staffCode || '-'
      };
      products.push(ni);
      newItems.push(ni);
    });
    const ok = await saveProductsOrWarn(newItems);
    if (!ok) {
      products = products.filter(x => !newItems.includes(x));
      if (btn) { btn.disabled = false; btn.textContent = '✅ บันทึกล็อตใหม่'; btn.classList.remove('opacity-70'); }
      return;
    }
    showToast(`✅ เพิ่ม ${dates.length} ล็อตใหม่แล้ว`);
    triggerHaptic(20);
    const r = document.getElementById('scan-result');
    if (r) r.innerHTML = `<div class="rounded-2xl bg-brand-50 p-4 text-center ring-1 ring-brand-200 fx-fade-up"><p class="text-sm font-bold text-brand-700">✅ เพิ่ม ${dates.length} ล็อตใหม่เข้าระบบแล้ว</p><p class="mt-1 text-xs text-stone-500">สแกนชิ้นต่อไปได้เลย</p></div>`;
  } else {
    const newId = genId();
    const newPending = {
      id: newId, barcode: barcode || '', plu: info.plu || '', name: info.name,
      expiryDate: dates[0], expiryDates: dates,
      imageUrl: info.imageUrl, expiryPhoto: '',
      submittedAt: new Date().toISOString(), submittedBy: state.staffCode
    };
    const ok = await upsertPendingRow(newPending);
    if (!ok) {
      if (btn) { btn.disabled = false; btn.textContent = '✅ ส่งให้ AI ตรวจสอบ'; btn.classList.remove('opacity-70'); }
      return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
    }
    pendingSubmissions.push(newPending);
    showToast(`✅ ส่งคำขอ ${dates.length} ล็อตแล้ว`);
    triggerHaptic(20);
    const r = document.getElementById('scan-result');
    if (r) r.innerHTML = `<div class="rounded-2xl bg-brand-50 p-4 text-center ring-1 ring-brand-200 fx-fade-up"><p class="text-sm font-bold text-brand-700">✅ ส่งคำขอ ${dates.length} ล็อตให้ AI ตรวจสอบแล้ว</p><p class="mt-1 text-xs text-stone-500">สแกนชิ้นต่อไปได้เลย</p></div>`;
  }
}

  state.cal.selected = null;
  renderPage();

function editRequestCardHTML(item) {

    </div>`;

  const changed = (a, b) => (a || '') !== (b || '');
  const rowDiff = (label, oldV, newV) => {
    const isChanged = changed(oldV, newV);
    return `
      <div class="rounded-lg ${isChanged ? 'bg-amber-50 ring-1 ring-amber-200' : 'bg-stone-50'} px-2.5 py-1.5">
        <p class="text-[10px] font-bold uppercase tracking-wider text-stone-400">${label}</p>

          <p class="text-xs text-stone-400 line-through">${escapeHtml(oldV || '(ว่าง)')}</p>
          <p class="text-sm font-bold text-amber-700">${escapeHtml(newV || '(ว่าง)')}</p>` : `
          <p class="text-sm font-bold text-stone-600">${escapeHtml(oldV || '(ว่าง)')}</p>`}
      </div>`;
  };
  const imageChanged = changed(target.imageUrl, item.imageUrl);
  return `
    <div class="rounded-2xl bg-white p-3 shadow-card ring-1 ring-amber-200 space-y-3">
      <div class="flex items-center justify-between rounded-lg bg-amber-50 px-2.5 py-1.5">
        <span class="text-[11px] font-bold text-amber-700">✏️ คำขอแก้ไขข้อมูล</span>
        ${item.submittedBy ? `<span class="text-[11px] font-bold text-amber-500">โดย ${escapeHtml(item.submittedBy)}</span>` : ''}
      </div>
      <p class="text-[11px] text-stone-400">🕐 ${formatThaiDateTime(item.submittedAt)}</p>
      ${imageChanged ? `
      <div class="flex gap-3">
        <div class="flex-1">
          <p class="mb-1 text-center text-[10px] font-bold text-stone-400">รูปเดิม</p>

        <div class="flex-1">

          ${item.imageUrl ? `<img src="${item.imageUrl}" onclick="showFullImage('${item.imageUrl}')" class="h-28 w-full rounded-xl object-cover ring-2 ring-amber-300" />` : `<div class="flex h-28 w-full items-center justify-center rounded-xl bg-stone-50 text-2xl">📦</div>`}
        </div>
      </div>` : ''}
      ${rowDiff('ชื่อสินค้า', target.name, item.name)}
      ${rowDiff('บาร์โค้ด', target.barcode, item.barcode)}
      ${rowDiff('PLU', target.plu, item.plu)}

        <button onclick="rejectPending(${item.id})" class="flex-1 rounded-lg bg-stone-100 py-2 text-xs font-bold text-stone-600">❌ ปฏิเสธ</button>

function removedTrendHTML() {
  const days = 7;
  const today = new Date();
  const buckets = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    buckets.push({ key, label: `${d.getDate()}/${d.getMonth() + 1}`, count: 0 });
  }
  const byKey = Object.fromEntries(buckets.map(b => [b.key, b]));
  products.forEach(p => {
    if (!p.removed || !p.removedDate) return;
    const key = p.removedDate.slice(0, 10);
    if (byKey[key]) byKey[key].count++;
  });
  const max = Math.max(1, ...buckets.map(b => b.count));
  const total = buckets.reduce((s, b) => s + b.count, 0);
  return `
    <p class="mb-3 text-xs font-black uppercase tracking-widest text-stone-400">แนวโน้มเก็บออกจากชั้น (7 วันล่าสุด) — รวม ${total} รายการ</p>
    <div class="flex items-end justify-between gap-1.5" style="height:90px">
      ${buckets.map(b => `
        <div class="flex flex-1 flex-col items-center justify-end gap-1" style="height:100%">
          <span class="text-[10px] font-bold text-stone-400">${b.count > 0 ? b.count : ''}</span>
          <div class="w-full rounded-md bg-amber-400" style="height:${Math.max(4, (b.count / max) * 56)}px"></div>
          <span class="text-[9px] text-stone-400">${b.label}</span>
        </div>`).join('')}
    </div>`;
}

function topRemovedProductsHTML() {
  const counts = {};
  products.forEach(p => {
    if (!p.removed) return;
    const key = p.name.trim();
    if (!counts[key]) counts[key] = { name: p.name, count: 0, imageUrl: p.imageUrl };
    counts[key].count++;
  });
  const top = Object.values(counts).sort((a, b) => b.count - a.count).slice(0, 5);
  if (top.length === 0) return `<p class="py-4 text-center text-xs text-stone-400 italic">ยังไม่มีประวัติเก็บออก</p>`;
  const max = Math.max(...top.map(t => t.count));
  return `
    <p class="mb-3 text-xs font-black uppercase tracking-widest text-stone-400">⚠️ เก็บออกบ่อยที่สุด (Top 5 ตลอดกาล)</p>
    <div class="space-y-2.5">
      ${top.map(t => `
        <div class="flex items-center gap-2.5">
          <div class="h-8 w-8 shrink-0 overflow-hidden rounded-lg bg-stone-100">
            ${t.imageUrl ? `<img src="${t.imageUrl}" class="h-full w-full object-cover" />` : `<div class="flex h-full w-full items-center justify-center text-sm">📦</div>`}
          </div>
          <div class="min-w-0 flex-1">
            <p class="truncate text-xs font-bold text-stone-700">${escapeHtml(truncateName(t.name))}</p>
            <div class="mt-1 h-1.5 w-full rounded-full bg-stone-100">
              <div class="h-1.5 rounded-full bg-red-400" style="width:${Math.max(6, (t.count / max) * 100)}%"></div>
            </div>
          </div>
          <span class="shrink-0 text-xs font-black text-red-500">${t.count}</span>
        </div>`).join('')}
    </div>
    <p class="mt-3 text-[11px] text-stone-400">💡 ถ้าเก็บออกซ้ำบ่อย ลองพิจารณาสั่งสินค้านี้ลดลง</p>`;
}

function blockIfHardDuplicate(barcode, plu, name, dates) {
  const uniqueDates = new Set(dates);
  if (uniqueDates.size !== dates.length) {
    showAlertModal('พบวันหมดอายุซ้ำกันเองในรายการที่กรอกค่ะ กรุณาตรวจสอบและลบวันที่ซ้ำออกก่อนบันทึก/ส่งคำขอ');
    return true;
  }
  for (const date of dates) {
    const dup = findDuplicateProduct(barcode, plu, name, date, null);
    if (dup) {
      showAlertModal(`รายการนี้มีอยู่ในระบบแล้วค่ะ — "${truncateName(dup.name)}" บาร์โค้ด/PLU/ชื่อเดียวกัน และวันหมดอายุ ${formatThaiDate(date)} ตรงกันเป๊ะ กรุณาตรวจสอบวันหมดอายุที่กรอกอีกครั้ง ก่อนส่งคำขอ เพื่อป้องกันข้อมูลซ้ำซ้อนในระบบนะคะ`);
      return true;
    }
  }
  return false;
}

function findDuplicateProduct(barcode, plu, name, expiryDate, excludeId) {
  return products.find(p => {
    if (p.removed || p.id === excludeId || p.expiryDate !== expiryDate) return false;
    if (barcode && p.barcode === barcode) return true;
    if (plu && p.plu === plu) return true;
    if (!barcode && !plu && !p.barcode && !p.plu && name && p.name.trim().toLowerCase() === name.trim().toLowerCase()) return true;
    return false;
  });
}

// เช็คซ้ำ + ตรวจรูปแบบวันที่ที่พิมพ์เอง (real-time)
function liveCheckDateDuplicates(containerId, warnAreaId, getBarcode, getPlu, getName, getExcludeId, submitBtnId) {
  const container = document.getElementById(containerId);
  const warnArea = document.getElementById(warnAreaId);
  if (!container) return;
  const run = () => {
    const inputs = Array.from(container.querySelectorAll('.lot-date-input'));
    const dates = [];
    let msg = '';
    let formatError = false;
    inputs.forEach(inp => {
      const raw = inp.value.trim();
      if (!raw) { inp.classList.remove('ring-2', 'ring-red-400'); return; }
      const iso = parseDateInputTH(raw);
      if (iso === null) { formatError = true; inp.classList.add('ring-2', 'ring-red-400'); }
      else { inp.classList.remove('ring-2', 'ring-red-400'); if (iso) dates.push(iso); }
    });
    if (formatError) {
      msg = '⚠️ รูปแบบวันที่ไม่ถูกต้อง พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69';
    } else if (new Set(dates).size !== dates.length) {
      msg = '⚠️ มีวันหมดอายุซ้ำกันเองในรายการนี้ กรุณาตรวจสอบ';
    } else {
      const barcode = getBarcode ? getBarcode() : '';
      const plu = getPlu ? getPlu() : '';
      const name = getName ? getName() : '';
      const excludeId = getExcludeId ? getExcludeId() : null;
      for (const d of dates) {
        const dup = findDuplicateProduct(barcode, plu, name, d, excludeId);
        if (dup) { msg = `⚠️ "${truncateName(dup.name)}" วันหมดอายุ ${formatThaiDate(d)} มีอยู่ในระบบแล้ว — ถ้าเป็นล็อตใหม่ กรุณาเปลี่ยนวันหมดอายุให้ต่างจากนี้`; break; }
      }
    }
    if (warnArea) warnArea.innerHTML = msg ? `<p class="mt-1 text-xs font-bold text-red-500">${escapeHtml(msg)}</p>` : '';
    const btn = submitBtnId ? document.getElementById(submitBtnId) : null;
    if (btn) btn.disabled = !!msg;
    if (btn) btn.classList.toggle('opacity-50', !!msg);
  };
  container.addEventListener('input', run);
  container.addEventListener('change', run);
  run();
  return run;
}

async function restoreProduct(id) {
  const idx = products.findIndex(x => x.id === id);

  const p = products[idx];
  products[idx] = { ...p, removed: false, removedDate: null, removedBy: '', removedImageUrl: '', removedReason: '' };
  await saveProductsOrWarn([products[idx]]);
  triggerHaptic(12);
  showToast(`↩️ กู้คืน "${truncateName(p.name)}" แล้ว`);
  renderPage();
}

function exportProductsCSV() {
  const active = products.map(withComputed).filter(p => !p.removed);
  const header = ['ชื่อสินค้า', 'บาร์โค้ด', 'วันหมดอายุ', 'สถานะ', 'เพิ่มโดย', 'วันที่เพิ่ม'];
  const rows = active.map(p => [
    p.name, p.barcode, formatThaiDate(p.expiryDate),
    STATUS_LABEL_TH[p.status], p.addedBy || '-', p.addedDate ? new Date(p.addedDate).toLocaleDateString('th-TH') : '-'
  ]);
  const csv = '\ufeff' + [header, ...rows].map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `p3-expiry-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('📊 ดาวน์โหลดไฟล์ Excel แล้ว');
}

async function approvePending(id) {
  const item = pendingSubmissions.find(p => p.id === id);
  if (!item) return;
  
  const name = document.getElementById(`pending-name-${id}`).value.trim();
  const barcode = document.getElementById(`pending-barcode-${id}`).value.trim();
  const plu = document.getElementById(`pending-plu-${id}`).value.trim();
  const { dates, hasError } = readLotDates(`pending-dates-${id}`);
  
  if (hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
  if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');
  // อนุญาตให้อนุมัติแบบ "ยังไม่มีวันหมดอายุ" ได้ ถ้าไม่ใส่วันเลย
  const datesToSave = dates.length > 0 ? dates : [null];
  if (dates.length > 0 && blockIfHardDuplicate(barcode, plu, name, dates)) return;
  
  const newItems = [];
  datesToSave.forEach(expiryDate => {
    const newItem = {
      id: genId(), barcode, plu, name,
      imageUrl: item.imageUrl,
      expiryDate, addedDate: new Date().toISOString(),
      addedBy: item.submittedBy || state.staffCode
    };
    products.push(newItem);
    newItems.push(newItem);
  });
  
  const ok = await saveProducts(newItems);
  if (!ok) {
    products = products.filter(p => !newItems.includes(p));
    renderPage();
    showAlertModal('บันทึกสินค้าเข้าสู่ระบบไม่สำเร็จค่ะ\n\nคำขอนี้ยังอยู่ใน "คำขอรอตรวจสอบ" เหมือนเดิม ไม่หายไปไหน กรุณาตรวจสอบอินเทอร์เน็ต แล้วลองกดอนุมัติใหม่อีกครั้ง');
    return;
  }
  
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== id);
  const pendingSaveOk = await deletePendingById(id);
  renderPage();
  if (pendingSaveOk) {
    showToast(`✅ อนุมัติสินค้าเข้าสู่ระบบแล้ว (${datesToSave.length} ล็อต)`);
  } else {
    showAlertModal('สินค้าเข้าระบบแล้ว แต่ลบออกจาก "คำขอรอตรวจสอบ" ไม่สำเร็จ\n\nอาจเห็นรายการนี้ซ้ำอยู่ในคำขอรอตรวจสอบ กดรีเฟรชแล้วลองปฏิเสธรายการที่ซ้ำออกได้เลยค่ะ');
  }
}

async function executeApproveAllPending() {
  const btn = document.getElementById('approve-all-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังอนุมัติทั้งหมด... โปรดรอสักครู่'; btn.classList.add('opacity-70'); }

  const itemsSnapshot = [...pendingSubmissions];
  const allNewItems = [];
  const approvedPendingIds = [];
  const skippedNames = [];

  for (const item of itemsSnapshot) {
    const id = item.id;
    if (item.editTargetId) continue;
    if (item.removeTargetId) continue;
    if (item.deleteTargetId) continue;
    const nameEl = document.getElementById(`pending-name-${id}`);
    const datesContainer = document.getElementById(`pending-dates-${id}`);
    if (!nameEl || !datesContainer) { skippedNames.push(item.name || '(ไม่มีชื่อ)'); continue; }

    const name = nameEl.value.trim();
    const barcodeEl = document.getElementById(`pending-barcode-${id}`);
    const pluEl = document.getElementById(`pending-plu-${id}`);
    const barcode = barcodeEl ? barcodeEl.value.trim() : '';
    const plu = pluEl ? pluEl.value.trim() : '';
    const { dates, hasError } = readLotDates(`pending-dates-${id}`);

    if (hasError) { skippedNames.push(`${name || '(ไม่มีชื่อ)'} — วันที่ผิดรูปแบบ`); continue; }
    if (!name) { skippedNames.push(`(ไม่มีชื่อ) — ข้อมูลไม่ครบ`); continue; }
    if (new Set(dates).size !== dates.length) { skippedNames.push(`${name} — วันหมดอายุซ้ำกันเอง`); continue; }
    const datesToSave = dates.length > 0 ? dates : [null];

    let hasDup = false;
    for (const date of dates) {
      const dupExisting = findDuplicateProduct(barcode, plu, name, date, null);
      const dupInBatch = allNewItems.find(ni => date === ni.expiryDate && (
        (barcode && ni.barcode === barcode) || (plu && ni.plu === plu) ||
        (!barcode && !plu && !ni.barcode && !ni.plu && ni.name.toLowerCase() === name.toLowerCase())
      ));
      if (dupExisting || dupInBatch) { hasDup = true; break; }
    }
    if (hasDup) { skippedNames.push(`${name} — ซ้ำกับของเดิมในระบบ`); continue; }

    datesToSave.forEach(expiryDate => {
      const newItem = {
        id: genId(), barcode, plu, name,
        imageUrl: item.imageUrl,
        expiryDate, addedDate: new Date().toISOString(),
        addedBy: item.submittedBy || state.staffCode
      };
      products.push(newItem);
      allNewItems.push(newItem);
    });
    approvedPendingIds.push(id);
  }

  if (allNewItems.length === 0) {
    if (btn) { btn.disabled = false; btn.textContent = `✅ อนุมัติทั้งหมด (${pendingSubmissions.length} รายการ)`; btn.classList.remove('opacity-70'); }
    return showAlertModal(`อนุมัติไม่ได้เลยสักรายการค่ะ ทุกรายการมีปัญหา:\n\n${skippedNames.join('\n')}`);
  }

  const ok = await saveProducts(allNewItems);
  if (!ok) {
    products = products.filter(p => !allNewItems.includes(p));
    renderPage();
    return showAlertModal('บันทึกสินค้าเข้าสู่ระบบไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
  }

  pendingSubmissions = pendingSubmissions.filter(p => !approvedPendingIds.includes(p.id));
  const delOk = await deletePendingByIds(approvedPendingIds);
  renderPage();

  let msg = `✅ อนุมัติสำเร็จ ${approvedPendingIds.length} รายการ (${allNewItems.length} ล็อต)`;
  if (skippedNames.length > 0) msg += ` — ข้าม ${skippedNames.length} รายการ`;
  showToast(msg);

  if (skippedNames.length > 0) {
    showAlertModal(`ข้ามไป ${skippedNames.length} รายการ เพราะข้อมูลไม่ครบ/ซ้ำกับของเดิม:\n\n${skippedNames.join('\n')}\n\nไปแก้ไขแล้วกดอนุมัติทีละรายการที่เหลือได้เลยค่ะ`);
  } else if (!delOk) {
    showAlertModal('สินค้าเข้าระบบครบแล้ว แต่ลบออกจาก "คำขอรอตรวจสอบ" บางรายการไม่สำเร็จ ลองรีเฟรชแล้วปฏิเสธรายการที่ซ้ำออกได้เลยค่ะ');
  }
}

async function approveEditRequest(pendingId) {
  const req = pendingSubmissions.find(p => p.id === pendingId);
  if (!req || !req.editTargetId) return;
  const idx = products.findIndex(p => p.id === req.editTargetId);
  if (idx === -1) {
    showAlertModal('ไม่พบสินค้าต้นทางในระบบแล้ว (อาจถูกแก้ไขหรือลบไปก่อนหน้า) — กรุณาปฏิเสธคำขอนี้');
    return;
  }
  if (req.barcode) {
    const clash = products.find(p => p.id !== req.editTargetId && !p.removed && p.barcode === req.barcode);
    if (clash) {
      showAlertModal(`บาร์โค้ด ${req.barcode} นี้มีสินค้าอื่นใช้อยู่แล้ว ("${truncateName(clash.name)}") กรุณาตรวจสอบก่อนอนุมัติ`);
      return;
    }
  }
  const backup = products[idx];
  products[idx] = { ...backup, name: req.name, barcode: req.barcode, plu: req.plu, imageUrl: req.imageUrl, imageEmbedding: null };
  const ok = await saveProducts([products[idx]]);
  if (!ok) {
    products[idx] = backup;
    renderPage();
    return showAlertModal('อัปเดตข้อมูลไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
  }
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== pendingId);
  await deletePendingById(pendingId);
  triggerHaptic(20);
  renderPage();
  showToast('✅ อนุมัติการแก้ไขแล้ว ข้อมูลสินค้าอัปเดตเรียบร้อย');
}

async function rejectPending(id) {
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== id);
  const ok = await deletePendingById(id);
  renderPage();
  if (ok) showToast('🗑️ ปฏิเสธคำขอแล้ว');
  else showAlertModal('ปฏิเสธคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
}

function openModal(html) {
  stopScanner();
  const root = document.getElementById('modal-root');
  root.innerHTML = html;
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
  if (state.tab === 'scanner') scheduleScannerRestart(300);
}

function openSubmissionForm(barcode) {
  const existing = products.find(p => p.barcode === barcode);
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 class="text-xl font-bold text-stone-800">ส่งคำขอให้ AI ตรวจสอบ</h3>
        <form id="submission-form" class="mt-4 space-y-4">
          ${nameFieldWithOcrHTML('sub-name', 'ชื่อสินค้า *', existing ? escapeHtml(existing.name) : '')}
          <input id="sub-barcode" placeholder="บาร์โค้ด" value="${barcode}" class="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm" oninput="updateLiveBarcode('sub-barcode','sub-barcode-preview')" />
          <div id="sub-barcode-preview"></div>
          <label class="flex items-center gap-2 rounded-2xl bg-stone-50 px-4 py-3 ring-1 ring-stone-200">
            <input id="sub-nodate" type="checkbox" onchange="toggleNoDateMode('sub-dates-wrap','sub-nodate','sub-dup-warning','submission-form-submit-btn')" class="h-4 w-4 accent-brand-600" />
            <span class="text-xs font-bold text-stone-600">📋 ยังไม่ใส่วันที่ — บันทึกชื่อ/รูปไว้ก่อน (ใส่วันหมดอายุภายหลัง)</span>
          </label>
          <div id="sub-dates-wrap">
            <p class="mb-1 text-[11px] text-stone-500">พิมพ์วันที่เอง เช่น 22/02/69 (พ.ศ) หรือ 22/02/2026 (ค.ศ)</p>
            <div id="sub-dates" class="space-y-2">
              <div class="flex gap-2 date-row">
                ${dateTextInputHTML('', 'min-w-0 flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm')}
              </div>
            </div>
            <button type="button" onclick="addLotDateRow('sub-dates')" class="mt-2 w-full rounded-2xl border border-stone-200 bg-white py-3 text-xs font-bold text-stone-500 active:scale-95">+ เพิ่มอีกวันหมดอายุ (สินค้าหลายล็อต)</button>
          </div>
          <div id="sub-dup-warning"></div>
          <div class="flex gap-3">
            <label class="flex-1 cursor-pointer rounded-2xl bg-stone-50 p-4 text-center ring-1 ring-stone-200">
              <div id="sub-img-prod-preview" class="text-xs font-bold text-red-500">📸 รูปสินค้า *</div>
              <input id="sub-img-prod" type="file" accept="image/*" capture="environment" class="hidden" />
            </label>
            <label class="flex-1 cursor-pointer rounded-2xl bg-stone-50 p-4 text-center ring-1 ring-stone-200">
              <div id="sub-img-exp-preview" class="text-xs text-stone-400">📸 รูปภาพเพิ่มเติม (ไม่บังคับ)</div>
              <input id="sub-img-exp" type="file" accept="image/*" capture="environment" class="hidden" />
            </label>
          </div>
          <button type="submit" id="submission-form-submit-btn" class="w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-lg">ส่งคำขอ</button>
        </form>
      </div>
    </div>
  `);
  
  let prodImg = existing ? existing.imageUrl : '';
  let expImg = '';
  if (existing) document.getElementById('sub-img-prod-preview').innerHTML = `<img src="${existing.imageUrl}" class="h-12 w-full object-cover rounded-lg" />`;

  const runSubDupCheck = liveCheckDateDuplicates(
    'sub-dates', 'sub-dup-warning',
    () => document.getElementById('sub-barcode').value.trim(),
    () => '',
    () => document.getElementById('sub-name').value.trim(),
    null, 'submission-form-submit-btn'
  );
  document.getElementById('sub-barcode').addEventListener('input', runSubDupCheck);
  document.getElementById('sub-name').addEventListener('input', runSubDupCheck);
  updateLiveBarcode('sub-barcode', 'sub-barcode-preview');

  document.getElementById('sub-img-prod').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) {
      prodImg = await compressImageFile(file);
      document.getElementById('sub-img-prod-preview').innerHTML = `<img src="${prodImg}" class="h-12 w-full object-cover rounded-lg" />`;
    }
  });
  document.getElementById('sub-img-exp').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) {
      expImg = await compressImageFile(file);
      document.getElementById('sub-img-exp-preview').innerHTML = `<img src="${expImg}" class="h-12 w-full object-cover rounded-lg" />`;
    }
  });

  document.getElementById('submission-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('sub-name').value.trim();
    const bc = document.getElementById('sub-barcode').value.trim();
    const noDateMode = document.getElementById('sub-nodate')?.checked;
    let dates = [];
    if (!noDateMode) {
      const r = readLotDates('sub-dates');
      if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
      dates = r.dates;
      if (dates.length === 0) return alert('กรุณากรอกวันหมดอายุอย่างน้อย 1 รายการ (หรือติ๊ก "ยังไม่ใส่วันที่")');
    }
    if (!name || !prodImg) return alert('กรุณากรอกชื่อสินค้า และถ่ายรูปสินค้าให้ครบถ้วน');
    
    if (bc && dates.length > 0 && blockIfHardDuplicate(bc, '', name, dates)) return;
    
    const submitBtn = document.getElementById('submission-form-submit-btn');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'กำลังส่งคำขอ... โปรดรอสักครู่'; submitBtn.classList.add('opacity-70'); }
    
    const uploadedProd = await uploadImageToStorage(prodImg, 'products');
    const uploadedExp = await uploadImageToStorage(expImg, 'expiry-photos');
    
    const newPendingId = genId();
    const newPendingItem = {
      id: newPendingId, barcode: bc, name, expiryDate: dates[0] || null, expiryDates: dates,
      imageUrl: uploadedProd, expiryPhoto: uploadedExp,
      submittedAt: new Date().toISOString(), submittedBy: state.staffCode
    };
    
    const ok = await upsertPendingRow(newPendingItem);
    if (!ok) {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'ส่งคำขอ'; submitBtn.classList.remove('opacity-70'); }
      return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองกดส่งคำขอใหม่อีกครั้ง' + (lastDbError ? '\n\n(สาเหตุ: ' + lastDbError + ')' : ''));
    }
    pendingSubmissions.push(newPendingItem);
    closeModal();
    showToast(noDateMode ? '✅ ส่งคำขอแล้ว (ยังไม่ใส่วันหมดอายุ)' : `✅ ส่งคำขอ ${dates.length} ล็อตเรียบร้อยแล้ว`);
    renderPage();
  });
}

function openProductForm(productId = null, prefillBarcode = '') {

        <form id="dev-product-form" class="mt-4 space-y-4">
          ${nameFieldWithOcrHTML('dev-form-name', 'ชื่อสินค้า *', p ? escapeHtml(p.name) : '')}
          <div class="flex gap-2">
            <input id="dev-form-barcode" placeholder="บาร์โค้ด" value="${p ? escapeHtml(p.barcode) : prefillBarcode}" class="min-w-0 flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm" />
            <button type="button" onclick="scanBarcodeIntoField('dev-form-barcode')" class="shrink-0 rounded-2xl bg-brand-600 px-4 text-sm font-bold text-white active:scale-95">📷 สแกน</button>
          </div>
          ${p ? `
          <label class="flex items-center gap-2 rounded-2xl bg-stone-50 px-4 py-3 ring-1 ring-stone-200">
            <input id="dev-form-nodate-edit" type="checkbox" ${!p.expiryDate ? 'checked' : ''} onchange="toggleNoDateMode('dev-form-date-edit-wrap','dev-form-nodate-edit')" class="h-4 w-4 accent-brand-600" />
            <span class="text-xs font-bold text-stone-600">📋 ยังไม่มีของ — ไม่ต้องใส่วันหมดอายุตอนนี้</span>
          </label>
          <div id="dev-form-date-edit-wrap" class="${!p.expiryDate ? 'hidden' : ''}">
            <p class="mb-1 text-[11px] text-stone-500">พิมพ์วันที่เอง เช่น 22/02/69</p>
            ${dateTextInputHTML(p.expiryDate || '', 'w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm', 'id="dev-form-date"')}
          </div>` : `
          <label class="flex items-center gap-2 rounded-2xl bg-stone-50 px-4 py-3 ring-1 ring-stone-200">
            <input id="dev-form-nodate" type="checkbox" onchange="toggleNoDateMode('dev-form-dates-wrap','dev-form-nodate','dev-form-dup-warning','dev-product-form-submit-btn')" class="h-4 w-4 accent-brand-600" />
            <span class="text-xs font-bold text-stone-600">📋 ยังไม่มีของ — บันทึกชื่อ/บาร์โค้ด/รูปไว้ก่อน ไม่ต้องใส่วันหมดอายุตอนนี้</span>
          </label>
          <div id="dev-form-dates-wrap">
            <p class="mb-1 text-[11px] text-stone-500">พิมพ์วันที่เอง เช่น 22/02/69 (พ.ศ) หรือ 22/02/2026 (ค.ศ)</p>
            <div id="dev-form-dates" class="space-y-2">
              <div class="flex gap-2 date-row">
                ${dateTextInputHTML('', 'flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm')}
              </div>
            </div>
            <button type="button" onclick="addLotDateRow('dev-form-dates')" class="mt-2 w-full rounded-xl bg-stone-50 py-2 text-xs font-bold text-stone-500 ring-1 ring-stone-200 active:scale-95">+ เพิ่มอีกวันหมดอายุ (บาร์โค้ดเดียวกัน)</button>
          </div>
          <div id="dev-form-dup-warning"></div>`}
          <label class="block cursor-pointer rounded-2xl bg-stone-50 p-6 text-center ring-1 ring-stone-200">
            <div id="dev-form-img-preview" class="text-xs text-stone-400">📸 รูปสินค้า</div>
            <input id="dev-form-img" type="file" accept="image/*" capture="environment" class="hidden" />
          </label>
          <button type="submit" id="dev-product-form-submit-btn" class="w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-lg">บันทึกสินค้า</button>
        </form>
      </div>
    </div>
  `);

  let img = p ? p.imageUrl : '';
  if (img) document.getElementById('dev-form-img-preview').innerHTML = `<img src="${img}" class="h-20 w-full object-cover rounded-lg" />`;

  if (!p) {
    const runDevDupCheck = liveCheckDateDuplicates(
      'dev-form-dates', 'dev-form-dup-warning',
      () => document.getElementById('dev-form-barcode').value.trim(),
      () => '',
      () => document.getElementById('dev-form-name').value.trim(),
      null, 'dev-product-form-submit-btn'
    );
    document.getElementById('dev-form-barcode').addEventListener('input', runDevDupCheck);
    document.getElementById('dev-form-name').addEventListener('input', runDevDupCheck);
  }

  document.getElementById('dev-form-img').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file) {
      img = await compressImageFile(file);
      document.getElementById('dev-form-img-preview').innerHTML = `<img src="${img}" class="h-20 w-full object-cover rounded-lg" />`;
    }
  });

  document.getElementById('dev-product-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('dev-form-name').value.trim();
    const bc = document.getElementById('dev-form-barcode').value.trim();
    
    let saveOk = false;
    if (p) {
      const noDateModeEdit = document.getElementById('dev-form-nodate-edit')?.checked;
      let date = null;
      if (!noDateModeEdit) {
        const iso = parseDateInputTH(document.getElementById('dev-form-date').value);
        if (iso === null) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
        if (!iso) return alert('กรุณากรอกวันหมดอายุ (หรือติ๊ก "ยังไม่มีของ")');
        date = iso;
      }
      if (!name) return alert('กรุณากรอกชื่อสินค้า');
      const uploadedImg = await uploadImageToStorage(img, 'products');
      const idx = products.findIndex(x => x.id === productId);
      const backup = products[idx];
      products[idx] = { ...products[idx], name, barcode: bc, expiryDate: date, imageUrl: uploadedImg };
      saveOk = await saveProducts([products[idx]]);
      if (!saveOk) products[idx] = backup;
    } else {
      const noDateMode = document.getElementById('dev-form-nodate')?.checked;
      let dates = [];
      if (!noDateMode) {
        const r = readLotDates('dev-form-dates');
        if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
        dates = r.dates;
        if (!name || dates.length === 0) return alert('กรุณากรอกชื่อและวันหมดอายุอย่างน้อย 1 รายการ (หรือติ๊ก "ยังไม่มีของ" ถ้ายังไม่มีวันหมดอายุตอนนี้)');
        if (bc && blockIfHardDuplicate(bc, '', name, dates)) return;
      } else {
        if (!name) return alert('กรุณากรอกชื่อสินค้า');
      }
      const uploadedImg = await uploadImageToStorage(img, 'products');
      const newItems = [];
      const datesToSave = noDateMode ? [null] : dates;
      datesToSave.forEach(date => {
        const newItem = {
          id: genId(), barcode: bc, name,
          imageUrl: uploadedImg, expiryDate: date,
          addedDate: new Date().toISOString(), addedBy: state.staffCode
        };
        products.push(newItem);
        newItems.push(newItem);
      });
      saveOk = await saveProducts(newItems);
      if (!saveOk) products = products.filter(x => !newItems.includes(x));
    }
    
    if (!saveOk) {
      renderPage();
      return showAlertModal('บันทึกขึ้น Supabase ไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
    }
    
    closeModal();
    showToast('✅ บันทึกสินค้าสำเร็จ');
    renderPage();
  });
}

function toggleNoDateMode(wrapId, checkboxId, warnAreaId, submitBtnId) {
  const wrap = document.getElementById(wrapId);
  const checked = document.getElementById(checkboxId).checked;
  if (wrap) {
    wrap.classList.toggle('hidden', checked);
    wrap.querySelectorAll('.lot-date-input').forEach(inp => { inp.required = !checked; });
  }
  if (checked) {
    if (warnAreaId) { const w = document.getElementById(warnAreaId); if (w) w.innerHTML = ''; }
    if (submitBtnId) { const b = document.getElementById(submitBtnId); if (b) { b.disabled = false; b.classList.remove('opacity-50'); } }
  }
}

function addLotDateRow(containerId) {
  const container = document.getElementById(containerId);
  const row = document.createElement('div');
  row.className = 'flex gap-2 date-row';
  row.innerHTML = `${dateTextInputHTML('', 'flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm font-bold')}<button type="button" onclick="this.closest('.date-row').remove()" class="rounded-xl bg-red-50 px-3 text-sm font-bold text-red-500 active:scale-95">✕</button>`;
  container.appendChild(row);
}

function openQuickAddLot(barcode) {
  const existing = products.find(p => p.barcode === barcode);
  if (!existing) return openProductForm(null, barcode);
  renderQuickAddLotModal(existing);
}

function openQuickAddLotById(id) {
  const existing = products.find(p => p.id === id);
  if (!existing) return;
  renderQuickAddLotModal(existing);
}

function renderQuickAddLotModal(existing) {
  const idLabel = existing.barcode ? escapeHtml(existing.barcode) : (existing.plu ? `PLU ${escapeHtml(existing.plu)}` : 'ไม่มีบาร์โค้ด');
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
        <div class="flex items-center gap-3 rounded-2xl bg-stone-50 p-3 ring-1 ring-stone-100">
          <div class="h-16 w-16 shrink-0 overflow-hidden rounded-xl bg-stone-100">
            ${existing.imageUrl ? `<img src="${existing.imageUrl}" class="h-full w-full object-cover" />` : `<div class="flex h-full w-full items-center justify-center text-2xl">📦</div>`}
          </div>
          <div class="min-w-0 flex-1">
            <h3 class="truncate text-base font-bold text-stone-800">${escapeHtml(existing.name)}</h3>
            <p class="truncate text-xs text-stone-400">${idLabel}</p>
          </div>
        </div>
        <p class="mt-4 mb-1 text-xs font-bold text-stone-400 uppercase tracking-wider">เพิ่มล็อตใหม่ — ใส่แค่วันหมดอายุ (เพิ่มได้หลายวันที่)</p>
        <p class="mb-2 text-[11px] text-stone-500">พิมพ์วันที่เอง เช่น 22/02/69 (พ.ศ) หรือ 22/02/2026 (ค.ศ)</p>
        ${existing.barcode ? barcodeBlockHTML(existing.barcode, 'quicklot-' + existing.id) : ''}
        <form id="quick-lot-form" class="space-y-3">
          ${isDev() ? `
          <label class="flex items-center gap-2 rounded-2xl bg-stone-50 px-4 py-3 ring-1 ring-stone-200">
            <input id="quicklot-nodate" type="checkbox" onchange="toggleNoDateMode('quick-lot-dates-wrap','quicklot-nodate','quick-lot-dup-warning','quick-lot-submit-btn')" class="h-4 w-4 accent-brand-600" />
            <span class="text-xs font-bold text-stone-600">📋 ยังไม่มีของ — บันทึกไว้ก่อน ไม่ต้องใส่วันหมดอายุ</span>
          </label>` : ''}
          <div id="quick-lot-dates-wrap">
            <div id="quick-lot-dates" class="space-y-2">
              <div class="flex gap-2 date-row">
                ${dateTextInputHTML('', 'flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm font-bold')}
              </div>
            </div>
            <button type="button" onclick="addLotDateRow('quick-lot-dates')" class="mt-2 w-full rounded-xl bg-stone-50 py-2.5 text-xs font-bold text-stone-500 ring-1 ring-stone-200 active:scale-95">+ เพิ่มอีกล็อต/วันที่</button>
          </div>
          <div id="quick-lot-dup-warning"></div>
          <button type="submit" id="quick-lot-submit-btn" class="w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-lg active:scale-[0.98]">บันทึกล็อตใหม่</button>
        </form>
      </div>
    </div>
  `);
  renderBarcodeSVGs();
  liveCheckDateDuplicates(
    'quick-lot-dates', 'quick-lot-dup-warning',
    () => existing.barcode || '', () => existing.plu || '', () => existing.name,
    null, 'quick-lot-submit-btn'
  );
  document.getElementById('quick-lot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const noDateMode = document.getElementById('quicklot-nodate')?.checked;
    let dates = [];
    if (!noDateMode) {
      const r = readLotDates('quick-lot-dates');
      if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
      dates = r.dates;
      if (dates.length === 0) return showAlertModal('กรุณาใส่วันหมดอายุอย่างน้อย 1 รายการ (หรือติ๊ก "ยังไม่มีของ")');
      if (blockIfHardDuplicate(existing.barcode, existing.plu, existing.name, dates)) return;
    }
    const newItems = [];
    const datesToSave = noDateMode ? [null] : dates;
    datesToSave.forEach(date => {
      const newItem = {
        id: genId(), barcode: existing.barcode || '', plu: existing.plu || '', name: existing.name, category: existing.category || '',
        imageUrl: existing.imageUrl, expiryDate: date,
        addedDate: new Date().toISOString(), addedBy: state.staffCode || '-'
      };
      products.push(newItem);
      newItems.push(newItem);
    });
    const ok = await saveProductsOrWarn(newItems);
    if (!ok) { products = products.filter(x => !newItems.includes(x)); renderPage(); return; }
    closeModal();
    showToast(noDateMode ? '✅ บันทึกไว้ก่อน (ยังไม่มีวันหมดอายุ)' : `✅ เพิ่ม ${dates.length} ล็อตใหม่แล้ว`);
    renderPage();
  });
}

function openEditRequestForm(productId) {
  const p = products.find(x => x.id === productId);
  if (!p) return;
  window.__editReqImg = '';
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">

function handleManualPluInput(value) {
  const plu = value.trim();
  const match = plu ? products.find(p => !p.removed && p.plu && p.plu === plu) : null;
  if (match) {
    selectManualMatch(match.id);
  } else if (window.__manualMatched) {
    window.__manualMatched = null;
    renderManualAddBody();
  }
}

function handleManualNameInput(value) {
  renderManualNameSuggestions(value);
  const exact = products.find(p => !p.removed && p.name.toLowerCase() === value.trim().toLowerCase());
  window.__manualMatched = exact || null;
  const pluInput = document.getElementById('manual-plu-input');
  if (pluInput && exact) pluInput.value = exact.plu || '';
  renderManualAddBody();
}

function renderManualNameSuggestions(query) {
  const box = document.getElementById('manual-name-suggestions');
  const q = query.trim().toLowerCase();
  if (!q) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  const seen = new Set();
  const matches = [];
  for (const p of products) {
    if (p.removed || !p.name) continue;
    const key = p.name.toLowerCase();
    if (key.includes(q) && !seen.has(key)) { seen.add(key); matches.push(p); }
    if (matches.length >= 6) break;
  }
  if (matches.length === 0) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  box.classList.remove('hidden');
  box.innerHTML = matches.map(p => `<div onmousedown="selectManualMatch(${p.id})">${escapeHtml(p.name)}${p.plu ? ` <span style="opacity:.5">· PLU ${escapeHtml(p.plu)}</span>` : ''}</div>`).join('');
}

function selectManualMatch(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  window.__manualMatched = p;
  document.getElementById('manual-name-input').value = p.name;
  const pluInput = document.getElementById('manual-plu-input');
  if (pluInput) pluInput.value = p.plu || '';
  const box = document.getElementById('manual-name-suggestions');
  box.classList.add('hidden'); box.innerHTML = '';
  renderManualAddBody();
}

async function submitManualAdd(e) {
  e.preventDefault();
  const matched = window.__manualMatched;
  const name = document.getElementById('manual-name-input').value.trim();
  const pluVal = document.getElementById('manual-plu-input').value.trim();
  if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');

  const submitBtn = e.target.querySelector('button[type="submit"]');
  const setBusy = () => {
    if (!submitBtn) return;
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-70');
    submitBtn.textContent = 'กำลังบันทึก... โปรดรอสักครู่';
  };

  if (matched) {
    const r = readLotDates('manual-add-dates');
    if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
    const dates = r.dates;
    if (dates.length === 0) return showAlertModal('กรุณาใส่วันหมดอายุอย่างน้อย 1 รายการ');
    if (isDev()) {
      if (blockIfHardDuplicate(matched.barcode, matched.plu || pluVal, matched.name, dates)) return;
      setBusy();
      const newItemsM = [];
      dates.forEach(date => {
        const ni = { id: genId(), barcode: matched.barcode || '', plu: matched.plu || pluVal, name: matched.name, category: matched.category || '', imageUrl: matched.imageUrl, expiryDate: date, addedDate: new Date().toISOString(), addedBy: state.staffCode || '-' };
        products.push(ni);
        newItemsM.push(ni);
      });
      await saveProductsOrWarn(newItemsM);
      closeModal(); showToast(`✅ เพิ่ม ${dates.length} ล็อตใหม่แล้ว`); renderPage();
    } else {
      const expImg = window.__manualExpImg;
      if (blockIfHardDuplicate(matched.barcode, matched.plu || pluVal, matched.name, dates)) return;
      setBusy();
      const uploadedExp = expImg ? await uploadImageToStorage(expImg, 'expiry-photos') : '';
      const newId1 = genId();
      const newPendingItem1 = { id: newId1, barcode: matched.barcode || '', plu: matched.plu || pluVal, name: matched.name, expiryDate: dates[0], expiryDates: dates, imageUrl: matched.imageUrl, expiryPhoto: uploadedExp, submittedAt: new Date().toISOString(), submittedBy: state.staffCode };
      const ok1 = await upsertPendingRow(newPendingItem1);
      if (!ok1) {
        return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
      }
      pendingSubmissions.push(newPendingItem1);
      closeModal(); showToast(`✅ ส่งคำขอ ${dates.length} ล็อตเรียบร้อยแล้ว`); renderPage();
    }
  } else {
    const prodImg = window.__manualProdImg;
    const noDateMode = document.getElementById('manual-nodate')?.checked;
    let dates = [];
    if (!noDateMode) {
      const r = readLotDates('manual-add-dates');
      if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
      dates = r.dates;
      if (dates.length === 0) return showAlertModal('กรุณาใส่วันหมดอายุอย่างน้อย 1 รายการ (หรือติ๊ก "ยังไม่มีของ")');
    }
    if (isDev()) {
      setBusy();
      const uploadedImg = await uploadImageToStorage(prodImg, 'products');
      const datesToSave = noDateMode ? [null] : dates;
      const newItemsU = [];
      datesToSave.forEach(date => {
        const ni = { id: genId(), barcode: '', plu: pluVal, name, imageUrl: uploadedImg, expiryDate: date, addedDate: new Date().toISOString(), addedBy: state.staffCode || '-' };
        products.push(ni);
        newItemsU.push(ni);
      });
      await saveProductsOrWarn(newItemsU);
      closeModal(); showToast('✅ บันทึกสินค้าสำเร็จ'); renderPage();
    } else {
      const expImg = window.__manualExpImg;
      if (!prodImg) return showAlertModal('กรุณาถ่ายรูปสินค้า');
      setBusy();
      const uploadedProd = await uploadImageToStorage(prodImg, 'products');
      const uploadedExp = expImg ? await uploadImageToStorage(expImg, 'expiry-photos') : '';
      const newId2 = genId();
      const newPendingItem2 = { id: newId2, barcode: '', plu: pluVal, name, expiryDate: dates[0] || null, expiryDates: dates, imageUrl: uploadedProd, expiryPhoto: uploadedExp, submittedAt: new Date().toISOString(), submittedBy: state.staffCode };
      const ok2 = await upsertPendingRow(newPendingItem2);
      if (!ok2) {
        return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
      }
      pendingSubmissions.push(newPendingItem2);
      closeModal(); showToast(`✅ ส่งคำขอ ${dates.length} ล็อตเรียบร้อยแล้ว`); renderPage();
    }
  }
}

async function markRemovedConfirm(id) {
  const idx = products.findIndex(x => x.id === id);
  if (idx === -1) return;
  const p = products[idx];
  // เก็บออกทันที — หายจากหน้าหลักเลย ผู้พัฒนาดูย้อนหลัง/กู้คืนได้ที่ "ประวัติเก็บออกจากชั้น"
  products[idx] = {
    ...p,
    removed: true,
    removedDate: new Date().toISOString(),
    removedBy: state.staffCode || '-',
  };
  await saveProductsOrWarn([products[idx]]);
  triggerHaptic(12);
  showToast(`📦 เก็บ "${truncateName(p.name)}" ออกจากชั้นแล้ว`);
  renderPage();
}

// ===== ลบล็อตถาวร (ต้องผ่านผู้พัฒนาอนุมัติเท่านั้น) =====
// พนักงาน/แอดมิน: ส่งคำขอลบให้ผู้พัฒนาอนุมัติ
async function requestDeleteLot(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  if (pendingSubmissions.some(x => x.deleteTargetId === id)) {
    return showToast('⏳ มีคำขอลบของรายการนี้รออนุมัติอยู่แล้ว');
  }
  const req = {
    id: genId(), barcode: p.barcode || '', plu: p.plu || '', name: p.name,
    expiryDate: p.expiryDate, expiryDates: [], imageUrl: p.imageUrl, expiryPhoto: '',
    submittedAt: new Date().toISOString(), submittedBy: state.staffCode, deleteTargetId: id,
  };
  const ok = await upsertPendingRow(req);

function computeStats() {

    urgent: active.filter(p => p.status === 'urgent').length,
    safe: active.filter(p => p.status === 'safe').length
  };
}

async function compressImageFile(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        if (width > 800) { height *= 800 / width; width = 800; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function setupImageZoom() {
  const img = document.getElementById('zoom-img');
  if (!img) return;
  let scale = 1, tx = 0, ty = 0;
  let startDist = 0, startScale = 1, startX = 0, startY = 0, startTx = 0, startTy = 0;
  let lastTap = 0, mode = null;
  const apply = () => { img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; };
  const dist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
  img.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      mode = 'pinch'; startDist = dist(e.touches); startScale = scale;
    } else if (e.touches.length === 1) {
      const now = Date.now();
      if (now - lastTap < 300) { // double tap
        e.preventDefault();
        scale = scale > 1 ? 1 : 2.5; tx = 0; ty = 0; apply();
      }
      lastTap = now;
      if (scale > 1) { mode = 'pan'; startX = e.touches[0].clientX; startY = e.touches[0].clientY; startTx = tx; startTy = ty; }
    }
  }, { passive: false });
  img.addEventListener('touchmove', (e) => {
    if (mode === 'pinch' && e.touches.length === 2) {
      e.preventDefault();
      scale = Math.min(6, Math.max(1, startScale * dist(e.touches) / (startDist || 1)));
      apply();
    } else if (mode === 'pan' && e.touches.length === 1 && scale > 1) {
      e.preventDefault();
      tx = startTx + (e.touches[0].clientX - startX);
      ty = startTy + (e.touches[0].clientY - startY);
      apply();
    }
  }, { passive: false });
  img.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
      if (scale <= 1) { scale = 1; tx = 0; ty = 0; apply(); }
      mode = null;
    }
  });
  // เผื่อใช้บนคอม: เลื่อนเมาส์ wheel เพื่อซูม
  img.addEventListener('wheel', (e) => {
    e.preventDefault();
    scale = Math.min(6, Math.max(1, scale - e.deltaY * 0.002));
    if (scale <= 1) { tx = 0; ty = 0; }
    apply();
  }, { passive: false });
}

let audioCtx = null;
function playBeep(type = 'success') {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtx;
    const now = ctx.currentTime;
    const tone = (freq, start, dur, vol = 0.25) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, now + start);
      gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now + start); osc.stop(now + start + dur);
    };
    if (type === 'success') {
      tone(880, 0, 0.12);
    } else if (type === 'notfound') {
      tone(440, 0, 0.1); tone(330, 0.13, 0.16);
    } else if (type === 'error') {
      tone(220, 0, 0.25, 0.3);
    }
  } catch {}
}

function cleanupOrphanRemovalRequests() {
  const orphans = pendingSubmissions.filter(x => x.removeTargetId);
  if (orphans.length === 0) return;
  pendingSubmissions = pendingSubmissions.filter(x => !x.removeTargetId);
  try { deletePendingByIds(orphans.map(x => x.id)); } catch (e) {}
}

async function refreshFromCloud() {
  try {
    state.realtimeStatus.products = 'connecting'; renderPage();
    products = await fetchProductsFromCloud();
    pendingSubmissions = await fetchPendingFromCloud();
    cleanupOrphanRemovalRequests();
    adminCreds = await fetchAdminCredsFromCloud();
    URGENT_WINDOW_DAYS = adminCreds.urgencyDays || URGENT_WINDOW_DAYS;
    state.realtimeStatus.products = 'connected';
    showToast('✅ อัปเดตข้อมูลล่าสุดแล้ว');
  } catch (err) {
    state.realtimeStatus.products = 'error';
    showToast('❌ รีเฟรชไม่สำเร็จ');
  } finally {
    renderPage();
  }
}

// ==================== Realtime sync ====================
let realtimeChannel = null;
let syncDebounceTimer = null;

function scheduleBackgroundSync() {
  if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(backgroundSync, 500);
}

async function backgroundSync() {
  try {
    products = await fetchProductsFromCloud();
    pendingSubmissions = await fetchPendingFromCloud();
    cleanupOrphanRemovalRequests();
    adminCreds = await fetchAdminCredsFromCloud();
    URGENT_WINDOW_DAYS = adminCreds.urgencyDays || URGENT_WINDOW_DAYS;
    state.realtimeStatus.products = 'connected';
  } catch (err) {
    console.error('background sync failed:', err);
  } finally {
    renderPage();
  }
}

function setupRealtimeSync() {
  if (!sb || realtimeChannel) return;
  realtimeChannel = sb.channel('rimping-realtime-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: PRODUCTS_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: PENDING_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: ADMIN_CREDS_TABLE }, () => scheduleBackgroundSync())
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') state.realtimeStatus.products = 'connected';
      else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') state.realtimeStatus.products = 'error';
      renderPage();
    });
}

let isCheckingForUpdate = false;
async function checkForAppUpdate() {
  if (isCheckingForUpdate) return;
  isCheckingForUpdate = true;
  try {
    const url = window.location.href.split('#')[0].split('?')[0];
    const res = await fetch(url + '?_freshcheck=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      const freshHtml = await res.text();
      const match = freshHtml.match(/APP_BUILD_ID\s*=\s*'([^']+)'/);
      if (match && match[1] && match[1] !== APP_BUILD_ID) {
        showToast('🔄 พบเวอร์ชันใหม่ กำลังอัปเดตให้อัตโนมัติ...');
        setTimeout(() => window.location.reload(), 900);
      }
    }
  } catch (e) { }
  isCheckingForUpdate = false;
}

setInterval(checkForAppUpdate, 5 * 60 * 1000);

})();
