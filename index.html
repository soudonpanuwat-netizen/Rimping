<script>
'use strict';

// ==================== Constants ====================
const ADMIN_ID = '63042';
const ADMIN_PIN = '0898';
const URGENT_WINDOW_DAYS = 7;
const STORAGE_KEY = 'rimping_products_v1';
const PENDING_KEY = 'rimping_pending_v1';
const ADMIN_USERS_KEY = 'rimping_admins_v1';
const CATALOG_KEY = 'rimping_catalog_v1';

// ==================== Supabase ====================
const SUPABASE_URL = 'https://ndipoaxxbqwxafgvgmlu.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HAHfwDUD3x68d-w7JQYbFw_WhVfvBta';

const sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

async function cloudGet(key) {
  if (!sb) return null;
  try {
    const { data, error } = await sb.from('app_storage').select('value').eq('key', key).maybeSingle();
    if (error || !data) return null;
    return data.value;
  } catch { return null; }
}

async function cloudSet(key, value) {
  if (!sb) return;
  try {
    await sb.from('app_storage').upsert({ key, value, updated_at: new Date().toISOString() });
  } catch {}
}

async function cloudAppendItem(key, item) {
  if (!sb) return;
  try {
    await sb.rpc('array_append_item', { p_key: key, p_item: item });
  } catch {}
}

async function cloudRemoveItem(key, id) {
  if (!sb) return;
  try {
    await sb.rpc('array_remove_item', { p_key: key, p_id: id });
  } catch {}
}

async function cloudUpdateItem(key, id, item) {
  if (!sb) return;
  try {
    await sb.rpc('array_update_item', { p_key: key, p_id: id, p_item: item });
  } catch {}
}

let realtimeChannel = null;
function setupRealtimeSync() {
  if (!sb || realtimeChannel) return;
  realtimeChannel = sb.channel('app_storage_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_storage' }, (payload) => {
      const row = payload.new;
      if (!row) return;
      if (row.key === 'products') {
        products = row.value || [];
        safeStorageSet(STORAGE_KEY, JSON.stringify(products));
      } else if (row.key === 'pending') {
        pendingSubmissions = row.value || [];
        safeStorageSet(PENDING_KEY, JSON.stringify(pendingSubmissions));
      } else if (row.key === 'admins') {
        adminUsers = row.value || defaultAdminUsers();
        safeStorageSet(ADMIN_USERS_KEY, JSON.stringify(adminUsers));
      } else if (row.key === 'catalog') {
        catalog = row.value || [];
        safeStorageSet(CATALOG_KEY, JSON.stringify(catalog));
      }
      if (state.entered) render();
    })
    .subscribe();
}

const STATUS_LABEL_TH = { expired: 'หมดอายุแล้ว', urgent: 'เร่งด่วน', safe: 'ปลอดภัย' };
const STATUS_COLOR = { expired: '#dc2626', urgent: '#d97706', safe: '#059669' };
const WEEKDAYS_TH = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
const MONTHS_TH = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

const NAV_ITEMS = [
  { id: 'dashboard', label: 'หน้าแรก', emoji: '🏠' },
  { id: 'scanner', label: 'สแกน', emoji: '📷' },
  { id: 'calendar', label: 'ปฏิทิน', emoji: '🗓️' },
  { id: 'admin', label: 'แอดมิน', emoji: '🛠️' },
];

const FILTER_CHIPS = [
  { id: 'all', label: 'ทั้งหมด' },
  { id: 'expired', label: '🔴 หมดอายุแล้ว' },
  { id: 'urgent', label: '🟡 เร่งด่วน' },
  { id: 'safe', label: '🟢 ปลอดภัย' },
];

// ==================== State ====================
const state = {
  entered: false,
  isAdminSession: false,
  tab: 'dashboard',
  search: '',
  filter: 'all',
  cal: { year: new Date().getFullYear(), month: new Date().getMonth() + 1, selected: null },
  scanner: { scannedCode: null, showHistory: true },
  admin: { showApprovals: true, showAdminMgmt: false },
  adminName: '',
};

let html5QrCode = null;
let products = [];
let pendingSubmissions = [];
let adminUsers = [];
let catalog = [];

// ==================== Storage ====================
let storageAvailable = true;
const memoryStore = {};

function safeStorageGet(key) {
  try { return localStorage.getItem(key); } catch { storageAvailable = false; return key in memoryStore ? memoryStore[key] : null; }
}
function safeStorageSet(key, value) {
  try { localStorage.setItem(key, value); } catch { storageAvailable = false; memoryStore[key] = value; }
}

function loadProducts() {
  const raw = safeStorageGet(STORAGE_KEY);
  try { return raw ? JSON.parse(raw) : []; } catch { return []; }
}
function saveProducts(list) { safeStorageSet(STORAGE_KEY, JSON.stringify(list)); }

function isAdmin() { return state.isAdminSession === true; }
function setAdmin(value) {
  state.isAdminSession = !!value;
  if (!value) state.adminName = '';
}

function generateLocalId() { return Date.now() * 1000 + Math.floor(Math.random() * 1000); }

function loadPending() {
  const raw = safeStorageGet(PENDING_KEY);
  try { return raw ? JSON.parse(raw) : []; } catch { return []; }
}
function savePending(list) { safeStorageSet(PENDING_KEY, JSON.stringify(list)); }

function defaultAdminUsers() { return [{ id: 'owner', loginId: ADMIN_ID, pin: ADMIN_PIN, name: 'แอดมินหลัก', isOwner: true }]; }
function loadAdminUsers() {
  const raw = safeStorageGet(ADMIN_USERS_KEY);
  try {
    const parsed = raw ? JSON.parse(raw) : null;
    return (parsed && parsed.length) ? parsed : defaultAdminUsers();
  } catch { return defaultAdminUsers(); }
}
function saveAdminUsers(list) { safeStorageSet(ADMIN_USERS_KEY, JSON.stringify(list)); }
function findAdminUser(loginId, pin) { return adminUsers.find((a) => a.loginId === loginId && a.pin === pin) || null; }

function loadCatalog() {
  const raw = safeStorageGet(CATALOG_KEY);
  try { return raw ? JSON.parse(raw) : []; } catch { return []; }
}
function saveCatalog(list) { safeStorageSet(CATALOG_KEY, JSON.stringify(list)); }

function findCatalogByBarcode(barcode) { return catalog.find((c) => c.barcode === barcode) || null; }
function addCatalogEntry(entry) {
  if (!entry.barcode) return;
  const existing = findCatalogByBarcode(entry.barcode);
  if (existing) {
    existing.name = entry.name || existing.name;
    existing.category = entry.category || existing.category;
    existing.imageUrl = entry.imageUrl || existing.imageUrl;
    existing.updatedAt = new Date().toISOString();
    cloudUpdateItem('catalog', existing.barcode, existing);
  } else {
    const newEntry = { ...entry, createdAt: new Date().toISOString() };
    catalog.push(newEntry);
    cloudAppendItem('catalog', newEntry);
  }
  saveCatalog(catalog);
}

async function bootstrapData() {
  products = loadProducts();
  pendingSubmissions = loadPending();
  adminUsers = loadAdminUsers();
  catalog = loadCatalog();

  if (sb) {
    const [cProducts, cPending, cAdmins, cCatalog] = await Promise.all([
      cloudGet('products'), cloudGet('pending'), cloudGet('admins'), cloudGet('catalog')
    ]);
    if (cProducts !== null) { products = cProducts; saveProducts(products); }
    if (cPending !== null) { pendingSubmissions = cPending; savePending(pendingSubmissions); }
    if (cAdmins !== null) { adminUsers = cAdmins; saveAdminUsers(adminUsers); }
    if (cCatalog !== null) { catalog = cCatalog; saveCatalog(catalog); }
  }
}

// ==================== Helpers ====================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function formatThaiDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return `${d.getDate()} ${MONTHS_TH[d.getMonth()]} ${d.getFullYear() + 543}`;
}

function withComputed(p) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const exp = new Date(p.expiryDate);
  exp.setHours(0, 0, 0, 0);
  const diffTime = exp - today;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  let status = 'safe';
  if (diffDays < 0) status = 'expired';
  else if (diffDays <= URGENT_WINDOW_DAYS) status = 'urgent';
  return { ...p, daysLeft: diffDays, status };
}

function computeStats() {
  const list = products.map(withComputed);
  return {
    expired: list.filter((p) => p.status === 'expired').length,
    urgent: list.filter((p) => p.status === 'urgent').length,
    safe: list.filter((p) => p.status === 'safe').length,
  };
}

async function compressImageFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (e) => {
      const img = new Image();
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        const max = 600;
        if (width > height && width > max) { height *= max / width; width = max; }
        else if (height > max) { width *= max / height; height = max; }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = reject;
    };
    reader.onerror = reject;
  });
}

// ==================== UI Components ====================
function basketIconSVG(size, color, stroke) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z"/><path d="M9 9V6.5a3 3 0 0 1 6 0V9"/><path d="M9.5 13v3.2"/><path d="M12 13v3.2"/><path d="M14.5 13v3.2"/></svg>`;
}

function freshnessRingSVG(daysLeft, status, size) {
  const c = size / 2, stroke = size / 10, radius = (size - stroke) / 2, circumference = 2 * Math.PI * radius;
  let color = '#059669', progress = 1;
  if (status === 'expired') { color = '#dc2626'; progress = 1; }
  else if (status === 'urgent') { color = '#d97706'; progress = Math.max(0, daysLeft) / URGENT_WINDOW_DAYS; }
  else { progress = 1; }
  const dashOffset = circumference * (1 - progress);
  return `
    <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
      <svg width="${size}" height="${size}" class="-rotate-90">
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="#e3efe7" stroke-width="${stroke}" fill="none" />
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round" style="transition: stroke-dashoffset .4s ease;" />
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-xl font-extrabold leading-none" style="color:${color}">${status === 'expired' ? '!' : daysLeft}</span>
        ${status !== 'expired' ? '<span class="text-[10px] font-semibold text-stone-500">วัน</span>' : ''}
      </div>
    </div>`;
}

function productThumbHTML(p, size = 64) {
  if (p.imageUrl) {
    const badgeText = p.status === 'expired' ? 'หมดอายุ' : `${p.daysLeft} วัน`;
    return `
      <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
        <img src="${p.imageUrl}" class="h-full w-full rounded-2xl object-cover ring-1 ring-brand-100" />
        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-full border-2 border-white px-2 py-0.5 text-[10px] font-extrabold text-white shadow-sm" style="background-color:${STATUS_COLOR[p.status]}">${badgeText}</span>
      </div>`;
  }
  return freshnessRingSVG(p.daysLeft, p.status, size);
}

function productCardHTML(p, opts = {}) {
  const showActions = !!opts.showActions;
  return `
    <div class="flex items-center gap-3 rounded-2xl bg-white p-3 shadow-card ring-1 ring-brand-100/60">
      ${productThumbHTML(p)}
      <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
          <p class="truncate text-sm font-semibold text-stone-800">${escapeHtml(p.name)}</p>
          <span class="rounded-full px-2.5 py-0.5 text-xs font-semibold ${p.status === 'expired' ? 'bg-red-50 text-red-600 ring-1 ring-red-200' : p.status === 'urgent' ? 'bg-amber-50 text-amber-600 ring-1 ring-amber-200' : 'bg-brand-50 text-brand-700 ring-1 ring-brand-200'}">${STATUS_LABEL_TH[p.status]}</span>
        </div>
        <p class="mt-0.5 truncate text-xs text-stone-400">${p.category ? escapeHtml(p.category) + ' · ' : ''}${escapeHtml(p.barcode)}</p>
        <p class="mt-1 text-xs text-stone-500">หมดอายุ ${formatThaiDate(p.expiryDate)}</p>
      </div>
      ${showActions ? `
        <div class="flex shrink-0 flex-col gap-1.5">
          <button onclick="openProductForm(${p.id})" class="rounded-full bg-brand-50 p-1.5 text-brand-700 active:scale-95">✏️</button>
          <button onclick="confirmDeleteProduct(${p.id})" class="rounded-full bg-red-50 p-1.5 text-red-600 active:scale-95">🗑️</button>
        </div>` : ''}
    </div>`;
}

function bottomNavHTML() {
  const stats = computeStats();
  return `
    <nav id="bottom-nav" class="fixed inset-x-0 bottom-0 z-20 border-t border-brand-100 bg-white/95 backdrop-blur-sm">
      <div class="mx-auto flex max-w-md items-stretch justify-between px-2" style="padding-bottom: env(safe-area-inset-bottom);">
        ${NAV_ITEMS.map((item) => {
          const isActive = state.tab === item.id;
          let badge = '';
          if (item.id === 'scanner' && stats.urgent > 0) badge = `<span class="absolute -right-2 -top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-amber-500 px-1 text-[10px] font-bold text-white">${stats.urgent > 9 ? '9+' : stats.urgent}</span>`;
          if (item.id === 'admin' && isAdmin() && pendingSubmissions.length > 0) badge = `<span class="absolute -right-2 -top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-sky-500 px-1 text-[10px] font-bold text-white">${pendingSubmissions.length > 9 ? '9+' : pendingSubmissions.length}</span>`;
          return `
            <button onclick="setTab('${item.id}')" class="relative flex flex-1 flex-col items-center gap-1 py-2.5 text-xs font-medium transition-colors ${isActive ? 'text-brand-600' : 'text-stone-400'}">
              <span class="relative text-[20px] leading-none">${item.emoji}${badge}</span>
              ${item.label}
            </button>`;
        }).join('')}
      </div>
    </nav>`;
}

// ==================== Modal Helpers ====================

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
function refreshCurrentTabData() {
  const nav = document.querySelector('#bottom-nav');
  if (nav) nav.outerHTML = bottomNavHTML();
  renderPage();
}

// ==================== Pages ====================
function landingHTML() {
  return `
    <div class="relative min-h-screen bg-gradient-to-br from-brand-800 via-brand-700 to-brand-900 flex flex-col items-center justify-center px-6 text-center">
      <div class="relative z-10 flex flex-col items-center">
        <div class="flex h-24 w-24 items-center justify-center rounded-3xl bg-white shadow-2xl">${basketIconSVG(48, '#047857', 2)}</div>
        <h1 class="mt-6 text-2xl font-bold text-white">Rimping Expiry Tracker</h1>
        <p class="mt-2 max-w-xs text-sm text-brand-100">ระบบติดตามวันหมดอายุสินค้า สำหรับพนักงาน Rimping Supermarket</p>
        <button onclick="enterApp()" class="mt-8 inline-flex items-center justify-center rounded-full bg-brand-500 px-6 py-2.5 text-sm font-semibold text-white shadow-lg active:scale-95">เข้าใช้งาน</button>
        <button onclick="landingAdminLogin()" class="mt-5 inline-flex items-center justify-center rounded-full bg-white/10 px-6 py-2.5 text-sm font-semibold text-white backdrop-blur-sm ring-1 ring-white/30 active:scale-95">เข้าสู่ระบบแอดมิน</button>
      </div>
    </div>`;
}

function enterApp() { state.entered = true; state.tab = 'dashboard'; render(); }
function landingAdminLogin() { openAdminLogin(() => { state.entered = true; state.tab = 'admin'; render(); }); }

function render() {
  const app = document.getElementById('app');
  if (!state.entered) { app.innerHTML = landingHTML(); return; }
  app.innerHTML = `
    <div class="min-h-screen bg-brand-50 pb-24 font-sans text-stone-800">
      <main class="mx-auto max-w-md px-4 pt-6" id="main"></main>
    </div>
    ${bottomNavHTML()}
  `;
  renderPage();
}

function renderPage() {
  const main = document.getElementById('main');
  if (state.tab === 'dashboard') { main.innerHTML = dashboardHTML(); initDashboard(); }
  if (state.tab === 'scanner') { main.innerHTML = scannerHTML(); initScanner(); }
  if (state.tab === 'calendar') { main.innerHTML = calendarHTML(); }
  if (state.tab === 'admin') {
    if (!isAdmin()) { setTab('dashboard'); return; }
    main.innerHTML = adminHTML();
  }
}

function setTab(tab) {
  if (state.tab === 'scanner' && tab !== 'scanner') stopScanner();
  if (tab === 'admin') {
    openAdminLogin(() => { state.tab = 'admin'; render(); });
    return;
  }
  state.tab = tab;
  render();
}

// ==================== Dashboard ====================
function dashboardHTML() {
  const stats = computeStats();
  return `
    <div class="space-y-4">
      <header class="flex items-center gap-2">
        <span class="flex items-center justify-center rounded-xl bg-brand-700 p-2">${basketIconSVG(20, '#ffffff', 2)}</span>
        <div><h1 class="text-lg font-bold text-stone-800">Rimping Expiry Tracker</h1><p class="text-xs text-stone-400">ตรวจสอบวันหมดอายุสินค้า</p></div>
      </header>
      <div class="grid grid-cols-3 gap-2">
        <button onclick="setFilter('expired')" class="flex flex-col items-start gap-1 rounded-2xl p-3 ring-1 ${state.filter === 'expired' ? 'bg-red-100 ring-red-400' : 'bg-red-50 ring-red-200 text-red-600'}">
          <span class="text-2xl font-bold">${stats.expired}</span><span class="text-xs font-medium opacity-80">หมดอายุ</span>
        </button>
        <button onclick="setFilter('urgent')" class="flex flex-col items-start gap-1 rounded-2xl p-3 ring-1 ${state.filter === 'urgent' ? 'bg-amber-100 ring-amber-400' : 'bg-amber-50 ring-amber-200 text-amber-600'}">
          <span class="text-2xl font-bold">${stats.urgent}</span><span class="text-xs font-medium opacity-80">เร่งด่วน</span>
        </button>
        <button onclick="setFilter('safe')" class="flex flex-col items-start gap-1 rounded-2xl p-3 ring-1 ${state.filter === 'safe' ? 'bg-brand-100 ring-brand-400' : 'bg-brand-50 ring-brand-200 text-brand-700'}">
          <span class="text-2xl font-bold">${stats.safe}</span><span class="text-xs font-medium opacity-80">ปลอดภัย</span>
        </button>
      </div>
      <div class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400">🔍</span>
        <input id="search-input" placeholder="ค้นหาชื่อหรือบาร์โค้ด..." class="w-full rounded-xl border border-stone-200 bg-white py-2.5 pl-9 pr-3 text-sm outline-none focus:ring-2 focus:ring-brand-100" />
      </div>
      <div id="product-list" class="space-y-2.5">${productListHTML()}</div>
    </div>`;
}

function initDashboard() {
  const input = document.getElementById('search-input');
  input.value = state.search;
  input.addEventListener('input', (e) => {
    state.search = e.target.value;
    document.getElementById('product-list').innerHTML = productListHTML();
  });
}

function setFilter(f) { state.filter = state.filter === f ? 'all' : f; renderPage(); }

function productListHTML() {
  const search = state.search.toLowerCase();
  let list = products.map(withComputed);
  if (search) list = list.filter(p => p.name.toLowerCase().includes(search) || p.barcode.toLowerCase().includes(search));
  if (state.filter !== 'all') list = list.filter(p => p.status === state.filter);
  list.sort((a, b) => a.expiryDate.localeCompare(b.expiryDate));
  if (list.length === 0) return `<div class="py-10 text-center text-stone-400">ไม่พบสินค้า</div>`;
  return list.map(p => productCardHTML(p, { showActions: isAdmin() })).join('');
}

// ==================== Scanner ====================
function scannerHTML() {
  return `
    <div class="space-y-4">
      <div id="qr-reader" class="overflow-hidden rounded-3xl bg-black shadow-2xl aspect-square"></div>
      <div id="scan-result" class="space-y-3">
        <div class="rounded-2xl bg-white p-6 text-center shadow-card ring-1 ring-brand-100/60">
          <p class="text-sm font-medium text-stone-500">พร้อมสแกนบาร์โค้ด</p>
          <p class="mt-1 text-xs text-stone-400">วางบาร์โค้ดให้อยู่ในกรอบ</p>
        </div>
      </div>
      <button onclick="openNearExpiryModal('')" class="w-full rounded-xl bg-sky-600 py-3 text-sm font-semibold text-white shadow-lg active:scale-95">➕ เพิ่มสินค้าใหม่ (ไม่มีบาร์โค้ด)</button>
    </div>`;
}

function initScanner() {
  html5QrCode = new Html5Qrcode("qr-reader");
  html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, (code) => {
    state.scanner.scannedCode = code;
    handleScanResult(code);
  }).catch(() => {
    document.getElementById('qr-reader').innerHTML = `<div class="flex h-full items-center justify-center p-6 text-center text-white"><p class="text-sm">ไม่สามารถเข้าถึงกล้องได้</p></div>`;
  });
}

function stopScanner() { if (html5QrCode) { html5QrCode.stop().catch(() => {}); html5QrCode = null; } }

function handleScanResult(code) {
  const resultEl = document.getElementById('scan-result');
  const matches = products.map(withComputed).filter(p => p.barcode === code);
  const cat = findCatalogByBarcode(code);

  if (matches.length === 0) {
    if (cat) {
      resultEl.innerHTML = `
        <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
          <div class="flex items-center gap-3">
            ${cat.imageUrl ? `<img src="${cat.imageUrl}" class="h-14 w-14 rounded-lg object-cover" />` : `<div class="h-14 w-14 bg-stone-100 rounded-lg flex items-center justify-center">📦</div>`}
            <div class="min-w-0">
              <p class="truncate text-sm font-semibold text-stone-700">${escapeHtml(cat.name)}</p>
              <p class="text-[11px] text-stone-400">บาร์โค้ด: ${escapeHtml(code)}</p>
            </div>
          </div>
          <button onclick="openNearExpiryModal('${code}')" class="mt-4 w-full rounded-lg bg-sky-600 py-2.5 text-xs font-semibold text-white active:scale-95">📅 ใส่วันหมดอายุ</button>
        </div>`;
    } else {
      resultEl.innerHTML = `
        <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
          <p class="text-xs text-stone-500">บาร์โค้ด: ${escapeHtml(code)}</p>
          <p class="mt-2 text-sm font-medium text-stone-800">ยังไม่มีสินค้านี้ในระบบ</p>
          <button onclick="openNearExpiryModal('${code}')" class="mt-3 w-full rounded-lg bg-sky-600 py-2.5 text-xs font-semibold text-white active:scale-95">⚠️ เพิ่มสินค้าใหม่</button>
        </div>`;
    }
  } else {
    resultEl.innerHTML = `
      <div class="space-y-2">
        <p class="text-xs font-medium text-stone-500">พบ ${matches.length} รายการในระบบ:</p>
        ${matches.map(p => productCardHTML(p, { showActions: isAdmin() })).join('')}
        <button onclick="openNearExpiryModal('${code}')" class="w-full rounded-lg bg-sky-600 py-2.5 text-xs font-semibold text-white active:scale-95">แจ้งเพิ่มล็อตใหม่ (วันหมดอายุอื่น)</button>
      </div>`;
  }
}

// ==================== Admin Page ====================
function adminHTML() {
  const stats = computeStats();
  return `
    <div class="space-y-4">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">🛠️</span>
        <div><h1 class="text-lg font-bold text-stone-800">แอดมิน</h1><p class="text-xs text-stone-400">${state.adminName}</p></div>
      </header>
      <div class="overflow-hidden rounded-2xl bg-white shadow-card ring-1 ring-brand-100/60">
        <div class="p-4 border-b border-stone-100 flex items-center justify-between">
          <h2 class="text-sm font-bold">คำขออนุมัติ (${pendingSubmissions.length})</h2>
          <button onclick="refreshCurrentTabData()" class="text-xs text-brand-600">รีเฟรช</button>
        </div>
        <div class="p-3 space-y-2">
          ${pendingSubmissions.length === 0 ? `<p class="py-4 text-center text-xs text-stone-400">ไม่มีคำขอค้างอยู่</p>` : pendingSubmissions.map(s => `
            <div class="rounded-xl bg-stone-50 p-3 ring-1 ring-stone-100">
              <div class="flex gap-3">
                ${s.productPhoto ? `<img src="${s.productPhoto}" class="h-16 w-16 rounded-lg object-cover" />` : `<div class="h-16 w-16 bg-stone-200 rounded-lg"></div>`}
                <div class="min-w-0 flex-1">
                  <p class="text-sm font-bold truncate">${escapeHtml(s.name)}</p>
                  <p class="text-[11px] text-stone-500">บาร์โค้ด: ${escapeHtml(s.barcode || 'ไม่มี')}</p>
                  <p class="text-[11px] text-red-600 font-bold">หมดอายุ: ${formatThaiDate(s.expiryDate)}</p>
                </div>
              </div>
              <div class="mt-3 flex gap-2">
                <button onclick="approveSubmission(${s.id})" class="flex-1 rounded-lg bg-brand-600 py-2 text-xs font-bold text-white">อนุมัติ</button>
                <button onclick="rejectSubmission(${s.id})" class="flex-1 rounded-lg bg-red-50 py-2 text-xs font-bold text-red-600">ปฏิเสธ</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <button onclick="openProductForm()" class="rounded-xl bg-brand-600 py-3 text-xs font-bold text-white">➕ เพิ่มสินค้า (Direct)</button>
        <button onclick="setAdmin(false); setTab('dashboard');" class="rounded-xl bg-red-50 py-3 text-xs font-bold text-red-600">🚪 ออกจากระบบ</button>
      </div>
      <div class="space-y-2.5">${products.map(p => productCardHTML(withComputed(p), { showActions: true })).join('')}</div>
    </div>`;
}

async function approveSubmission(id) {
  const s = pendingSubmissions.find(x => x.id === id);
  if (!s) return;
  const newProduct = {
    id: generateLocalId(),
    barcode: s.barcode,
    name: s.name,
    category: s.category,
    expiryDate: s.expiryDate,
    notes: s.notes,
    imageUrl: s.productPhoto || '',
    addedDate: new Date().toISOString()
  };
  products.push(newProduct);
  pendingSubmissions = pendingSubmissions.filter(x => x.id !== id);
  saveProducts(products);
  savePending(pendingSubmissions);
  await Promise.all([cloudAppendItem('products', newProduct), cloudRemoveItem('pending', id)]);
  refreshCurrentTabData();
}

async function rejectSubmission(id) {
  if (!confirm('ยืนยันการปฏิเสธคำขอนี้?')) return;
  pendingSubmissions = pendingSubmissions.filter(x => x.id !== id);
  savePending(pendingSubmissions);
  await cloudRemoveItem('pending', id);
  refreshCurrentTabData();
}

// ==================== Forms ====================
function openNearExpiryModal(barcode) {
  const cat = findCatalogByBarcode(barcode);
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl max-h-[90vh] overflow-y-auto">
        <h2 class="text-lg font-bold text-stone-800">${cat ? 'แจ้งสินค้าใกล้หมดอายุ' : 'เพิ่มสินค้าใหม่'}</h2>
        <form id="near-expiry-form" class="mt-4 space-y-3">
          <input type="hidden" id="ne-barcode" value="${escapeHtml(barcode)}" />
          ${!cat ? `
            <div>
              <label class="mb-1 block text-xs font-medium text-stone-500">ชื่อสินค้า *</label>
              <input id="ne-name" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-100" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-medium text-stone-500">รูปสินค้า (หน้าสินค้า) *</label>
              <input id="ne-photo1" type="file" accept="image/*" capture="environment" required class="w-full text-xs" />
            </div>
          ` : `
            <div class="flex items-center gap-3 p-2 bg-stone-50 rounded-xl">
              ${cat.imageUrl ? `<img src="${cat.imageUrl}" class="h-12 w-12 rounded-lg object-cover" />` : ''}
              <p class="text-sm font-bold">${escapeHtml(cat.name)}</p>
            </div>
          `}
          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">รูปถ่ายวันหมดอายุ (ไม่บังคับ)</label>
            <input id="ne-photo2" type="file" accept="image/*" capture="environment" class="w-full text-xs" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">วันหมดอายุ *</label>
            <input id="ne-expiry" required type="date" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none" />
          </div>
          <p id="ne-error" class="hidden text-xs font-medium text-red-600"></p>
          <button type="submit" class="w-full rounded-xl bg-sky-600 py-2.5 text-sm font-semibold text-white active:scale-95">ส่งข้อมูล</button>
        </form>
      </div>
    </div>
  `);

  document.getElementById('near-expiry-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const err = document.getElementById('ne-error');
    
    if (!isAdmin() && pendingSubmissions.some(s => s.barcode === barcode && barcode !== '')) {
      err.textContent = 'สินค้านี้มีคำขอที่รอตรวจสอบอยู่แล้ว ไม่สามารถส่งซ้ำได้';
      err.classList.remove('hidden');
      return;
    }

    btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
    try {
      let name = cat ? cat.name : document.getElementById('ne-name').value;
      let photo1 = cat ? cat.imageUrl : await compressImageFile(document.getElementById('ne-photo1').files[0]);
      let photo2 = document.getElementById('ne-photo2').files[0] ? await compressImageFile(document.getElementById('ne-photo2').files[0]) : '';
      let expiry = document.getElementById('ne-expiry').value;

      if (!cat && barcode) addCatalogEntry({ barcode, name, imageUrl: photo1 });

      if (isAdmin()) {
        const p = { id: generateLocalId(), barcode, name, expiryDate: expiry, imageUrl: photo1, addedDate: new Date().toISOString() };
        products.push(p); saveProducts(products); await cloudAppendItem('products', p);
      } else {
        const s = { id: generateLocalId(), barcode, name, expiryDate: expiry, productPhoto: photo1, expiryPhoto: photo2, submittedAt: new Date().toISOString() };
        pendingSubmissions.push(s); savePending(pendingSubmissions); await cloudAppendItem('pending', s);
      }
      closeModal(); refreshCurrentTabData();
    } catch (e) {
      err.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่'; err.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'ส่งข้อมูล';
    }
  });
}

function openAdminLogin(onSuccess) {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
        <h2 class="text-lg font-bold">เข้าสู่ระบบแอดมิน</h2>
        <form id="admin-login-form" class="mt-4 space-y-4">
          <input id="admin-id" placeholder="รหัสพนักงาน" required class="w-full rounded-xl border p-3 outline-none focus:ring-2 focus:ring-brand-100" />
          <input id="admin-pin" type="password" placeholder="PIN" required class="w-full rounded-xl border p-3 outline-none focus:ring-2 focus:ring-brand-100" />
          <p id="admin-error" class="hidden text-xs text-red-600"></p>
          <button type="submit" class="w-full rounded-xl bg-brand-600 py-3 font-bold text-white">ตกลง</button>
        </form>
      </div>
    </div>
  `);
  document.getElementById('admin-login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const match = findAdminUser(document.getElementById('admin-id').value, document.getElementById('admin-pin').value);
    if (match) { setAdmin(true); state.adminName = match.name; closeModal(); if (onSuccess) onSuccess(); }
    else { const err = document.getElementById('admin-error'); err.textContent = 'รหัสหรือ PIN ไม่ถูกต้อง'; err.classList.remove('hidden'); }
  });
}

// ==================== Calendar ====================
function calendarHTML() {
  const { year, month } = state.cal;
  const days = [];
  const first = new Date(year, month - 1, 1);
  const last = new Date(year, month, 0);
  const start = new Date(first); start.setDate(start.getDate() - first.getDay());
  for (let i = 0; i < 42; i++) { const d = new Date(start); d.setDate(d.getDate() + i); days.push(d); }

  return `
    <div class="space-y-4">
      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
        <div class="flex items-center justify-between mb-4">
          <button onclick="state.cal.month--; if(state.cal.month<1){state.cal.month=12;state.cal.year--;} renderPage();" class="p-2">◀</button>
          <h2 class="font-bold">${MONTHS_TH[month-1]} ${year+543}</h2>
          <button onclick="state.cal.month++; if(state.cal.month>12){state.cal.month=1;state.cal.year++;} renderPage();" class="p-2">▶</button>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center">
          ${WEEKDAYS_TH.map(w => `<div class="text-[10px] font-bold text-stone-400">${w}</div>`).join('')}
          ${days.map(d => {
            const dateStr = d.toISOString().slice(0, 10);
            const count = products.filter(p => p.expiryDate === dateStr).length;
            const isCurr = d.getMonth() === month - 1;
            return `<div class="aspect-square flex flex-col items-center justify-center rounded-lg text-xs ${isCurr ? 'text-stone-800' : 'text-stone-300'} ${count > 0 ? 'bg-red-50 ring-1 ring-red-200' : ''}">${d.getDate()}${count > 0 ? `<span class="text-[8px] font-bold text-red-600">${count}</span>` : ''}</div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
}
