<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#1F6B3F"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>P3 Expiry</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
:root{--g:#1f6b3f;--gd:#155235;--gm:#2d7d4f;--gl:#eef6f0;--amb:#d97706;--red:#dc2626;--txt:#1c2b22;--sub:#6b8a77;}
html,body{overscroll-behavior-y:none;}
body{background:var(--gl);background-image:radial-gradient(circle at 12% -8%,rgba(45,125,79,.10) 0%,transparent 45%);background-attachment:fixed;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:'Noto Sans Thai',ui-sans-serif,system-ui,sans-serif;}
#qr-reader video{border-radius:1rem;object-fit:cover;width:100%!important;height:100%!important;}
.no-scrollbar::-webkit-scrollbar{display:none;}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
@keyframes blink-red{0%,100%{box-shadow:none;}50%{box-shadow:0 0 0 3px rgba(220,38,38,.30);}}
.blink-expired{animation:blink-red 1.4s ease-in-out infinite;}
#splash-screen{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#2d7d4f,#0a2a1c);}
#splash-screen.hide{animation:splashFade .4s ease forwards;pointer-events:none;}
@keyframes splashFade{from{opacity:1}to{opacity:0}}
@keyframes fadeUpIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(8px)}}
.fx-up{animation:fadeUpIn .28s ease-out both;}
.fx-ti{animation:toastIn .25s ease-out both;}
.fx-to{animation:toastOut .25s ease-in both;}
@keyframes scanLine{0%,100%{top:20%}50%{top:75%}}
.scan-line{animation:scanLine 1.4s ease-in-out infinite;}
html.dark body{background:#0f1812;background-image:none;}
html.dark .bg-white{background:#1c2920!important;}
html.dark .text-stone-800{color:#eef3ef!important;}
html.dark .text-stone-600{color:#bdcdc2!important;}
html.dark .text-stone-400{color:#74897b!important;}
html.dark .border-stone-200{border-color:#2c3c2f!important;}
html.dark .ring-stone-200{--tw-ring-color:#2c3c2f!important;}
html.dark .bg-stone-50{background:#18241c!important;}
html.dark .bg-stone-100{background:#233122!important;}
.chat-in{background:white;border-radius:16px 16px 16px 4px;}
.chat-out{background:var(--g);color:white;border-radius:16px 16px 4px 16px;}
</style>
</head>

let audioCtx=null;
function playBeep(type){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const ctx=audioCtx,now=ctx.currentTime;
    const tone=(freq,start,dur,vol=.25)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(vol,now+start);g.gain.exponentialRampToValueAtTime(.001,now+start+dur);o.connect(g);g.connect(ctx.destination);o.start(now+start);o.stop(now+start+dur);};
    if(type==='found'){tone(880,0,.12);}
    else if(type==='notfound'){tone(440,0,.1);tone(330,.13,.16);}
    else{tone(220,0,.3,.3);}
  }catch(e){}

}

// ===== IMAGE =====
async function compressImg(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>800){h*=800/w;w=800;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',.75));};img.src=e.target.result;};
    r.readAsDataURL(file);
  });
}
async function uploadImg(dataUrl,prefix){
  if(!dataUrl||!dataUrl.startsWith('data:')||!sb)return dataUrl||'';
  try{const res=await fetch(dataUrl);const blob=await res.blob();const path=`${prefix}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.jpg`;const{error:e}=await sb.storage.from(IMAGES_BUCKET).upload(path,blob,{contentType:'image/jpeg',upsert:true});if(e)return dataUrl;return sb.storage.from(IMAGES_BUCKET).getPublicUrl(path).data.publicUrl;}catch{return dataUrl;}

function rToP(r){return{id:r.id,barcode:r.barcode||'',plu:r.plu||'',name:r.name||'',imageUrl:r.image_url||'',expiryDate:r.expiry_date||'',addedDate:r.added_date||'',addedBy:r.added_by||'',removed:!!r.removed,removedDate:r.removed_date||null,removedBy:r.removed_by||'',removedReason:r.removed_reason||''};}
function rToPnd(r){let eTId=null,sub=r.submitted_by||'';const m=sub.match(/^EDIT#(\d+)#([\s\S]*)$/);if(m){eTId=parseInt(m[1]);sub=m[2];}return{id:r.id,barcode:r.barcode||'',plu:r.plu||'',name:r.name||'',expiryDate:r.expiry_date||'',expiryDates:r.expiry_dates?r.expiry_dates.split(',').filter(Boolean):[],imageUrl:r.image_url||'',expiryPhoto:r.expiry_photo||'',submittedAt:r.submitted_at||'',submittedBy:sub,editTargetId:eTId};}

async function fetchAll(){
  if(!sb)return;
  try{
    const[pr,pe,mc,cc,ac]=await Promise.all([
      sb.from(PRODUCTS_TABLE).select('*').order('expiry_date',{ascending:true,nullsFirst:false}),
      sb.from(PENDING_TABLE).select('*').order('submitted_at',{ascending:false}),
      sb.from(MEMBERS_TABLE).select('*'),
      sb.from(CHAT_TABLE).select('*').order('created_at',{ascending:true}).limit(100),
      sb.from(ADMIN_CREDS_TABLE).select('*').eq('id',1).maybeSingle(),
    ]);
    if(pr.data)products=pr.data.map(rToP);
    if(pe.data)pending=pe.data.map(rToPnd);
    if(mc.data){members=mc.data;leaderboard=[...mc.data].sort((a,b)=>(b.points||0)-(a.points||0));}
    if(cc.data)chats=cc.data;
    if(ac.data&&ac.data.admin_id){adminCreds={id:ac.data.admin_id,pin:ac.data.pin,urgencyDays:ac.data.urgency_days||7,devId:ac.data.dev_id||DEV_ID,devPw:ac.data.dev_password||DEV_PW};URGENT_DAYS=adminCreds.urgencyDays;}
    S.realtimeOk=true;
  }catch(e){console.error('fetchAll',e);}
}

async function saveProd(p){
  if(!sb)return false;
  const row={id:p.id,barcode:p.barcode||'',plu:p.plu||'',name:p.name||'',image_url:p.imageUrl||'',expiry_date:p.expiryDate||null,added_date:p.addedDate||new Date().toISOString(),added_by:p.addedBy||'',removed:!!p.removed,removed_date:p.removedDate||null,removed_by:p.removedBy||'',removed_reason:p.removedReason||''};
  const{error}=await sb.from(PRODUCTS_TABLE).upsert([row],{onConflict:'id'});
  return!error;
}
async function delPending(id){if(sb)await sb.from(PENDING_TABLE).delete().eq('id',id);}
async function upsertPending(item){
  if(!sb)return false;
  let sub=item.submittedBy||'';
  if(item.editTargetId)sub=`EDIT#${item.editTargetId}#${sub}`;
  const row={id:item.id,barcode:item.barcode||'',plu:item.plu||'',name:item.name||'',expiry_date:item.expiryDate||null,expiry_dates:(item.expiryDates||[]).filter(Boolean).join(','),image_url:item.imageUrl||'',expiry_photo:item.expiryPhoto||'',submitted_at:item.submittedAt||new Date().toISOString(),submitted_by:sub};
  const{error}=await sb.from(PENDING_TABLE).upsert([row],{onConflict:'id'});
  return!error;
}
async function registerUser(data){
  if(!sb)return{ok:false,msg:'ไม่พบ Supabase'};
  const{error}=await sb.from(MEMBERS_TABLE).insert([{name:data.name,nickname:data.nickname,employee_id:data.empId,branch:data.branch,dept:data.dept,line_id:data.lineId,status:'pending',points:0,role:'staff',created_at:new Date().toISOString()}]);
  if(error)return{ok:false,msg:error.message};
  return{ok:true};
}

// ===== BARCODE CHECKSUM =====
function validBC(code){
  if(!/^\d+$/.test(code))return true;
  if(code.length===8)return true; // Thai internal barcodes exempt from EAN-8
  if(![12,13,14].includes(code.length))return true;
  const d=code.split('').map(Number);const chk=d.pop();let sum=0;
  d.reverse().forEach((x,i)=>{sum+=(i%2===0)?x*3:x;});
  return(10-(sum%10))%10===chk;
}

function renderScanner(){

async function initScanner(){
  if(!window.Html5Qrcode||window.__scStart)return;window.__scStart=true;
  try{
    if(scannerStopPr){await scannerStopPr;scannerStopPr=null;}
    if(html5QrCode)return;
    html5QrCode=new Html5Qrcode('qr-reader');
    await html5QrCode.start({facingMode:'environment'},{fps:10,qrbox:{width:240,height:150}},code=>{
      if(!validBC(code))return;
      const now=Date.now();
      if(S.scanner.pCode===code)S.scanner.pCount++;else{S.scanner.pCode=code;S.scanner.pCount=1;}
      if(S.scanner.pCount<3)return;
      if(S.scanner.lastCode===code&&now-S.scanner.lastTime<2500)return;
      S.scanner.lastCode=code;S.scanner.lastTime=now;S.scanner.pCode=null;S.scanner.pCount=0;
      handleScanRes(code);
    },()=>{});
    const s=document.getElementById('cam-st');if(s)s.remove();
    const f=document.getElementById('cam-fr');if(f)f.classList.remove('hidden');
    const l=document.getElementById('cam-ln');if(l)l.classList.remove('hidden');
    const mf=document.getElementById('mbc');if(mf)mf.addEventListener('submit',e=>{e.preventDefault();const v=document.getElementById('mbc-i')?.value.trim();if(v)handleScanRes(v);});
  }catch(e){const s=document.getElementById('cam-st');if(s)s.textContent='ไม่สามารถเปิดกล้องได้';}
  finally{window.__scStart=false;}
}
function stopScanner(){if(html5QrCode){const sc=html5QrCode;html5QrCode=null;scannerStopPr=sc.stop().catch(()=>{}).finally(()=>{try{sc.clear();}catch{}});return scannerStopPr;}return scannerStopPr||Promise.resolve();}
async function handleImgScan(e){
  const file=e.target.files[0];if(!file)return;e.target.value='';
  try{let td=document.getElementById('_ts');if(!td){td=document.createElement('div');td.id='_ts';td.style.display='none';document.body.appendChild(td);}const fs=new Html5Qrcode('_ts');const code=await fs.scanFile(file,false);try{fs.clear();}catch{}if(!validBC(code)){playBeep('error');vib(30);toast('❌ บาร์โค้ดในรูปอ่านไม่ได้');return;}handleScanRes(code);}
  catch{playBeep('error');vib(30);toast('❌ ไม่พบบาร์โค้ดในรูปนี้');}
}
function handleScanRes(bc){

    el.innerHTML=`<div class="space-y-2 fx-up"><p class="text-[9px] font-black text-stone-400 uppercase">พบสินค้า (${active.length} รายการ)</p>${active.map(p=>{const ie=p.status==='expired';return`<div onclick="viewProd(${p.id})" class="flex items-center gap-3 rounded-2xl p-3 shadow-sm active:scale-[.98] ${ie?'blink-expired bg-red-50 ring-1 ring-red-200':'bg-white ring-1 ring-stone-100'}"><div class="h-11 w-11 shrink-0 rounded-xl bg-stone-100 overflow-hidden flex items-center justify-center">${p.imageUrl?`<img src="${p.imageUrl}" class="h-full w-full object-cover"/>`:'<span class="text-lg">📦</span>'}</div><div class="min-w-0 flex-1"><p class="truncate text-sm font-bold ${ie?'text-red-800':'text-stone-800'}">${esc(trunc(p.name))}</p><p class="text-[10px] ${ie?'text-red-500':'text-stone-400'}">${p.expiryDate?fmtDate(p.expiryDate)+' · '+daysText(p.days):'📋 ยังไม่มีของ'}</p></div><span class="shrink-0 rounded-full px-2 py-0.5 text-[8px] font-bold ${ie?'bg-red-100 text-red-700':p.status==='urgent'?'bg-amber-100 text-amber-700':'bg-green-100 text-green-700'}">${ie?'หมดอายุ':p.status==='urgent'?'เร่งด่วน':'ปลอดภัย'}</span></div>`;}).join('')}<button onclick="openQuickLot('${ea(bc)}')" class="w-full rounded-2xl py-3 text-sm font-black ring-1 ring-green-200 active:scale-95" style="background:#eef6f0;color:#1f6b3f">${S.isDev?'➕ เพิ่มล็อตใหม่':'➕ ส่งคำขอเพิ่มล็อตใหม่'}</button></div>`;
  }else if(removed.length>0){
    const ref=removed[0];playBeep('found');vib([10,30]);toast(`📦 เคยมีในระบบ: ${trunc(ref.name,20)}`);
    el.innerHTML=`<div class="space-y-2 fx-up"><div class="rounded-2xl p-3 ring-1 ring-amber-200" style="background:#fffbeb"><div class="flex items-center gap-2.5"><div class="h-11 w-11 shrink-0 rounded-xl overflow-hidden bg-amber-100 flex items-center justify-center">${ref.imageUrl?`<img src="${ref.imageUrl}" class="h-full w-full object-cover"/>`:'<span class="text-lg">📦</span>'}</div><div class="min-w-0 flex-1"><p class="truncate text-sm font-bold text-amber-900">${esc(trunc(ref.name))}</p><p class="text-[10px] text-amber-600">${esc(bc)}</p><p class="text-[9px] text-amber-600 mt-0.5">เก็บออก ${ref.removedDate?fmtDT(ref.removedDate):'-'} ${ref.removedBy?'โดย '+esc(ref.removedBy):''}</p></div><span class="shrink-0 rounded-full px-2 py-0.5 text-[9px] font-bold" style="background:#fde68a;color:#78350f">📦 เคยมี</span></div></div><button onclick="openQuickLot('${ea(bc)}',${ref.id})" class="w-full rounded-2xl py-3.5 text-sm font-black text-white shadow-lg active:scale-[.98]" style="background:#1f6b3f">➕ ${S.isDev?'เพิ่มล็อตใหม่ทันที':'ส่งคำขอเพิ่มล็อตใหม่'}</button></div>`;
  }else{
    playBeep('notfound');vib([10,40,10]);toast(`❓ ไม่พบบาร์โค้ดนี้ในระบบ`);
    el.innerHTML=`<div class="flex items-center gap-3 rounded-2xl bg-white p-3.5 shadow-sm ring-1 ring-stone-200 fx-up"><span class="text-2xl">❓</span><div class="min-w-0 flex-1"><p class="text-xs font-bold text-stone-700">ไม่พบ: ${esc(bc)}</p><p class="text-[10px] text-stone-400">ยังไม่มีในระบบ</p></div><button onclick="${S.isDev?`openProdForm(null,'${ea(bc)}')`:`openSubForm('${ea(bc)}')`}" class="shrink-0 rounded-xl px-3.5 py-2.5 text-[11px] font-black text-white shadow-md active:scale-95" style="background:#1f6b3f">${S.isDev?'+ เพิ่ม':'ส่ง AI'}</button></div>`;

async function doAva(act){

async function handlePP(e){

async function sendChat(){

}

async function approvePending(id){
  const item=pending.find(p=>p.id===id);if(!item)return;
  const name=document.getElementById(`pn-${id}`)?.value.trim()||item.name;
  const barcode=document.getElementById(`pb-${id}`)?.value.trim()||item.barcode;
  const plu=document.getElementById(`pp-${id}`)?.value.trim()||item.plu;
  const dates=Array.from(document.querySelectorAll(`#pdates-${id} .lot-date`)).map(i=>i.value).filter(Boolean);
  if(!name||!dates.length){toast('กรุณากรอกชื่อและวันหมดอายุ');return;}
  let nextId=products.length>0?Math.max(...products.map(p=>p.id))+1:1;
  let saved=0;
  for(const d of dates){
    const p={id:nextId++,barcode,plu:plu||'',name,imageUrl:item.imageUrl,expiryDate:d,addedDate:new Date().toISOString(),addedBy:item.submittedBy||''};
    const ok=await saveProd(p);if(ok){products.push(p);saved++;}
  }
  if(saved>0){await delPending(id);pending=pending.filter(p=>p.id!==id);render();toast(`✅ อนุมัติ ${dates.length} ล็อตแล้ว`);}
  else toast('❌ บันทึกไม่สำเร็จ');
}
async function rejectPending(id){
  await delPending(id);pending=pending.filter(p=>p.id!==id);render();toast('🗑️ ปฏิเสธแล้ว');
}
async function approveAll(){
  let count=0;
  for(const item of [...pending]){
    const name=document.getElementById(`pn-${item.id}`)?.value.trim()||item.name;
    const barcode=document.getElementById(`pb-${item.id}`)?.value.trim()||item.barcode;
    const plu=document.getElementById(`pp-${item.id}`)?.value.trim()||item.plu;
    const dates=Array.from(document.querySelectorAll(`#pdates-${item.id} .lot-date`)).map(i=>i.value).filter(Boolean);
    if(!name||!dates.length)continue;
    let nextId=products.length>0?Math.max(...products.map(p=>p.id))+1:1;
    for(const d of dates){const p={id:nextId++,barcode,plu:plu||'',name,imageUrl:item.imageUrl,expiryDate:d,addedDate:new Date().toISOString(),addedBy:item.submittedBy||''};const ok=await saveProd(p);if(ok){products.push(p);count++;}}
    await delPending(item.id);pending=pending.filter(p=>p.id!==item.id);
  }
  render();toast(`✅ อนุมัติ ${count} รายการแล้ว`);
}

}

function exportCSV(){
  const active=products.filter(p=>!p.removed).map(wc);
  const rows=[['ชื่อสินค้า','บาร์โค้ด','วันหมดอายุ','สถานะ','เพิ่มโดย'],...active.map(p=>[p.name,p.barcode,fmtDate(p.expiryDate),p.status==='expired'?'หมดอายุ':p.status==='urgent'?'เร่งด่วน':'ปลอดภัย',p.addedBy||'-'])];
  const csv='\ufeff'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=`p3-${new Date().toISOString().slice(0,10)}.csv`;document.body.appendChild(a);a.click();a.remove();
  toast('📊 ดาวน์โหลดแล้ว');
}
async function sendLine(){
  try{const res=await fetch(`${SB_URL}/functions/v1/notify-line`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SB_KEY}`}});if(res.ok)toast('✅ ส่งแจ้งเตือน LINE แล้ว');else toast('❌ ส่ง LINE ไม่สำเร็จ');}catch{toast('❌ เชื่อมต่อไม่ได้');}
}

// ===== REALTIME + INIT =====
let rtCh=null,syncTm=null;
function setupRT(){
  if(!sb||rtCh)return;
  rtCh=sb.channel('p3-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:PRODUCTS_TBL},()=>schedSync())
    .on('postgres_changes',{event:'*',schema:'public',table:PENDING_TBL},()=>schedSync())
    .on('postgres_changes',{event:'*',schema:'public',table:MEMBERS_TBL},()=>schedSync())
    .on('postgres_changes',{event:'*',schema:'public',table:CHAT_TBL},()=>schedSync())
    .subscribe(s=>{S.realtimeOk=s==='SUBSCRIBED';if(S.authed)render();});
}
function schedSync(){if(syncTm)clearTimeout(syncTm);syncTm=setTimeout(async()=>{await fetchAll();if(S.authed)render();},600);}

let adminCreds={devId:DEV_ID,devPw:DEV_PW,urgencyDays:7};

(async function init(){
  try{S.darkMode=lsGet('p3_dk')==='1';document.documentElement.classList.toggle('dark',S.darkMode);}catch{}
  try{const saved=lsGet('p3_u');if(saved){S.user=JSON.parse(saved);S.isAdmin=S.user.role==='admin';S.isDev=S.user.role==='dev';S.authed=true;}}catch{}
  try{await fetchAll();}catch(e){console.error(e);}
  setupRT();render();
  const splash=document.getElementById('splash-screen');
  if(splash){splash.classList.add('hide');setTimeout(()=>splash.remove(),450);}
})();
