<!DOCTYPE html>

<title>Rimping Supermarket — ระบบตรวจสอบวันหมดอายุ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{\n    --g900:#143821;\n    --g700:#1E7A42;\n    --g600:#268C4C;\n    --g500:#3FA968;\n    --g100:#E6F4EA;\n    --bg:#F4F8F5;\n    --card:#FFFFFF;\n    --ink:#20281F;\n    --ink-soft:#62705F;\n    --border:#DCE8DF;\n    --amber:#DE8F2A;\n    --amber-bg:#FBF0DD;\n    --red:#D6453F;\n    --red-bg:#FBE6E5;\n    --ok-bg:#E9F6EE;\n    --radius:14px;\n    --shadow:0 2px 10px rgba(20,56,33,0.08);\n  }\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{\n    font-family:'Sarabun',sans-serif;\n    background:var(--bg);\n    color:var(--ink);\n    height:100vh;\n    overflow:hidden;\n  }\n  h1,h2,h3,.font-display{font-family:'Kanit',sans-serif;}\n  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}\n  input,select{font-family:inherit;}\n  #app{\n    display:flex;\n    flex-direction:column;\n    height:100vh;\n    max-width:480px;\n    margin:0 auto; \n    background:var(--bg);\n    position:relative;\n    box-shadow:0 0 30px rgba(0,0,0,0.08);\n  }\n\n  /* ---------- HEADER ---------- */\n  .topbar{\n    background:linear-gradient(135deg,var(--g900),var(--g700));\n    color:#fff;\n    padding:14px 16px;\n    display:flex;\n    align-items:center;\n    justify-content:space-between;\n    flex-shrink:0;\n  }\n  .brand{display:flex;align-items:center;gap:10px;}\n  .brand-text{display:flex;flex-direction:column;line-height:1.25;}\n  .brand-name{font-family:'Kanit';font-weight:700;font-size:16px;letter-spacing:0.2px;}\n  .brand-sub{font-size:11.5px;color:#CFE9D8;font-weight:500;}\n  .admin-btn{\n    display:flex;align-items:center;gap:6px;\n    background:rgba(255,255,255,0.12);\n    padding:7px 12px;\n    border-radius:20px;\n    font-size:12.5px;\n    font-weight:600; \n    transition:background .15s;\n  }\n  .admin-btn.unlocked{background:#fff;color:var(--g700);}\n  .admin-btn:active{transform:scale(0.97);}\n\n  /* ---------- MAIN VIEW ---------- */\n  .view-root{\n    flex:1;\n    overflow-y:auto;\n    padding:16px 16px 90px;\n    -webkit-overflow-scrolling:touch;\n  }\n  .view-root::-webkit-scrollbar{display:none;}\n\n  /* ---------- TAB BAR ---------- */\n  .tabbar{\n    position:absolute;\n    bottom:0;left:0;right:0;\n    display:flex;\n    background:#fff;\n    border-top:1px solid var(--border);\n    padding:6px 4px calc(6px + env(safe-area-inset-bottom));\n    z-index:20;\n  }\n  .tab-btn{\n    flex:1;\n    display:flex;flex-direction:column;align-items:center;gap:3px;\n    padding:6px 0;\n    color:var(--ink-soft);\n    font-size:11px;\n    font-weight:600;\n    border-radius:10px;\n  }\n  .tab-btn.active{color:var(--g700);}\n  .tab-btn svg{width:22px;height:22px;}\n\n  /* ---------- CARDS / GENERIC ---------- */\n  .section-title{\n    font-family:'Kanit';font-weight:600;font-size:15px;\n    margin:0 0 10px;color:var(--g900);\n    display:flex;align-items:center;justify-content:space-between;\n  }\n  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}\n  .stat-card{\n    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);\n    padding:14px;box-shadow:var(--shadow);\n  }\n  .stat-num{font-family:'Kanit';font-weight:700;font-size:26px;}\n  .stat-label{font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:2px;}\n  .stat-card.red .stat-num{color:var(--red);}\n  .stat-card.amber .stat-num{color:var(--amber);}\n  .stat-card.green .stat-num{color:var(--g700);}\n\n  .lot-item, .product-item{\n    background:var(--card);\n    border:1px solid var(--border);\n    border-radius:var(--radius);\n    padding:12px; \n    display:flex;\n    gap:12px;\n    align-items:center;\n    margin-bottom:10px;\n    box-shadow:var(--shadow);\n  }\n  .thumb{\n    width:48px;height:48px;border-radius:10px;\n    background:var(--g100);\n    display:flex;align-items:center;justify-content:center;\n    overflow:hidden;flex-shrink:0;\n  }\n  .thumb img{width:100%;height:100%;object-fit:cover;}\n  .thumb svg{width:24px;height:24px;color:var(--g600);}\n  .item-info{flex:1;min-width:0;}\n  .item-name{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n  .item-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}\n  .badge{\n    font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;\n    flex-shrink:0;white-space:nowrap;\n  }\n  .badge.red{background:var(--red-bg);color:var(--red);}\n  .badge.amber{background:var(--amber-bg);color:var(--amber);}\n  .badge.ok{background:var(--ok-bg);color:var(--g700);}\n\n  .empty-state{\n    text-align:center;padding:50px 20px;color:var(--ink-soft);\n  }\n  .empty-state svg{width:60px;height:60px;color:var(--g500);opacity:0.5;margin-bottom:12px;}\n  .empty-state p{font-size:13.5px;margin:4px 0;}\n\n  /* ---------- SCAN VIEW ---------- */\n  .scan-camera-wrap{\n    background:#0d1f14;border-radius:var(--radius);overflow:hidden;\n    position:relative;margin-bottom:14px;height:280px;\n    display:flex;align-items:center;justify-content:center;\n  }\n  #scanner-view{\n    position:absolute !important;inset:0 !important;width:100% !important;height:100% !important;display:block !important;\n    border-radius:var(--radius) !important;\n  }\n  #scanner-view video{\n    position:absolute !important;top:0 !important;left:0 !important;\n    width:100% !important;height:100% !important;object-fit:cover !important;\n    border-radius:var(--radius) !important;\n  }\n  .scan-camera-wrap .preview-bg{\n    position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0.45;\n  }\n  .scan-placeholder{\n    position:relative;z-index:2;color:#9FC7AC;font-size:13.5px;font-weight:600;\n    text-align:center;padding:20px;line-height:1.6;\n  }\n  .scan-placeholder .scan-emoji{font-size:30px;display:block;margin-bottom:6px;}\n  \n  /* Torch Button CSS */\n  .torch-btn-overlay{\n    position:absolute;top:12px;right:12px;z-index:10;\n    background:rgba(0,0,0,0.6);color:#fff;width:40px;height:40px;\n    border-radius:50%;display:flex;align-items:center;justify-content:center;\n    box-shadow:0 2px 8px rgba(0,0,0,0.3);\n  }\n  .torch-btn-overlay.active{background:var(--amber);}\n\n  /* Multi-scan Toggle Banner */\n  .multi-scan-banner{\n    background:var(--card);border:1px solid var(--border);border-radius:12px;\n    padding:12px;margin-bottom:14px;display:flex;align-items:center;justify-content:between;\n  }\n  .toggle-container{display:flex;align-items:center;gap:10px;justify-content:space-between;width:100%;}\n  .toggle-label-wrap{display:flex;flex-direction:column;}\n  .toggle-title{font-size:13.5px;font-weight:700;color:var(--g900);}\n  .toggle-desc{font-size:11px;color:var(--ink-soft);}\n  .switch {\n    position:relative;display:inline-block;width:46px;height:24px;flex-shrink:0;\n  }\n  .switch input {opacity:0;width:0;height:0;}\n  .slider {\n    position:absolute;cursor:pointer;inset:0;background-color:#ccc;transition:.3s;border-radius:24px;\n  }\n  .slider:before {\n    position:absolute;content:\"\";height:18px;width:18px;left:3px;bottom:3px;background-color:white;transition:.3s;border-radius:50%;\n  }\n  input:checked + .slider {background-color:var(--g700);}\n  input:checked + .slider:before {transform:translateX(22px);}\n\n  .scan-counter-card{\n    background:var(--g100);border:1px solid var(--g500);border-radius:10px;\n    padding:10px;margin-bottom:14px;text-align:center;font-size:13px;font-weight:700;color:var(--g900);\n  }\n\n  .btn{\n    display:flex;align-items:center;justify-content:center;gap:8px;\n    width:100%;padding:13px;border-radius:12px;\n    font-weight:700;font-size:14.5px;font-family:'Kanit';\n  }\n  .btn-primary{background:var(--g700);color:#fff;}\n  .btn-primary:active{background:var(--g900);}\n  .btn-outline{background:#fff;color:var(--g700);border:1.5px solid var(--g700);}\n  .btn-danger{background:var(--red-bg);color:var(--red);}\n  .btn-secondary{background:var(--g100);color:var(--g900);}\n  .btn-sm{padding:9px 14px;font-size:13px;width:auto;}\n  .btn-row{display:flex;gap:8px;}\n  .btn-row .btn{flex:1;}\n\n  .manual-entry{\n    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);\n    padding:14px;margin-bottom:14px;\n  }\n  .field-label{font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;display:block;}\n  .text-input{\n    width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;\n    font-size:14px;background:#FAFCFA;\n  }\n  .text-input:focus{outline:none;border-color:var(--g500);}\n  .field-group{margin-bottom:13px;}\n\n  /* ---------- CALENDAR ---------- */\n  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}\n  .cal-month-label{font-family:'Kanit';font-weight:700;font-size:16px;color:var(--g900);}\n  .cal-nav-btn{\n    width:34px;height:34px;border-radius:50%;background:var(--g100);\n    display:flex;align-items:center;justify-content:center;color:var(--g700);\n  }\n  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}\n  .cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--ink-soft);padding-bottom:4px;}\n  .cal-cell{\n    aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;\n    align-items:center;justify-content:center;font-size:12.5px;font-weight:600;\n    background:var(--card);border:1px solid var(--border);position:relative;color:var(--ink);\n  }\n  .cal-cell.empty{background:transparent;border:none;}\n  .cal-cell.today{border:1.5px solid var(--g600);}\n  .cal-cell.selected{background:var(--g700);color:#fff;border-color:var(--g700);}\n  .cal-dot{width:6px;height:6px;border-radius:50%;margin-top:2px;background:var(--g500);}\n  .cal-cell.has-red .cal-dot{background:var(--red);}\n  .cal-cell.has-amber .cal-dot{background:var(--amber);}\n  .cal-cell.selected .cal-dot{background:#fff;}\n\n  /* ---------- SEARCH ---------- */\n  .search-wrap{position:relative;margin-bottom:14px;}\n  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--ink-soft);}\n  .search-wrap input{padding-left:38px;}\n\n  /* ---------- MODAL ---------- */\n  .modal-overlay{\n    position:absolute;inset:0;background:rgba(15,30,20,0.5);\n    display:flex;align-items:flex-end;justify-content:center;z-index:50;\n    animation:fadeIn .15s ease;\n  }\n  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}\n  .modal-sheet{\n    background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;\n    padding:18px 18px calc(20px + env(safe-area-inset-bottom));\n    max-height:88vh;overflow-y:auto;\n    animation:slideUp .2s ease;\n  }\n  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}\n  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 14px;}\n  .modal-title{font-family:'Kanit';font-weight:700;font-size:17px;margin:0 0 14px;color:var(--g900);}\n  .modal-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;color:var(--g700);}\n\n  .detail-image{width:100%;height:160px;border-radius:14px;background:var(--g100);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:14px;}\n  .detail-image img{width:100%;height:100%;object-fit:cover;}\n  .detail-image svg{width:50px;height:50px;color:var(--g500);opacity:0.5;}\n  .detail-barcode{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:2px;}\n\n  .lot-row{\n    display:flex;align-items:center;justify-content:space-between;\n    padding:10px 0;border-bottom:1px solid var(--border);\n  }\n  .lot-row:last-child{border-bottom:none;}\n  .lot-date{font-weight:700;font-size:14px;}\n  .lot-qty{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}\n  .lot-actions{display:flex;align-items:center;gap:8px;}\n  .icon-btn{width:30px;height:30px;border-radius:8px;background:var(--red-bg);color:var(--red);display:flex;align-items:center;justify-content:center;}\n  .icon-btn svg{width:15px;height:15px;}\n\n  .file-input-label{\n    display:flex;align-items:center;justify-content:center;gap:8px;\n    padding:13px;border:1.5px dashed var(--g500);border-radius:12px;\n    color:var(--g700);font-weight:600;font-size:13.5px;background:var(--g100);\n  }\n  .preview-img{width:100%;height:130px;border-radius:12px;object-fit:cover;margin-top:8px;}\n\n  .toast{\n    position:absolute;top:70px;left:50%;transform:translateX(-50%);\n    background:var(--g900);color:#fff;padding:10px 18px;border-radius:30px;\n    font-size:13px;font-weight:600;z-index:80;box-shadow:0 4px 14px rgba(0,0,0,0.2);\n    max-width:88%;text-align:center;\n  }\n  .err-text{color:var(--red);font-size:12.5px;font-weight:600;margin-top:6px;}\n  .pin-dots{display:flex;justify-content:center;gap:10px;margin:18px 0;}\n  .pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border);}\n  .pin-dot.filled{background:var(--g700);}\n  .footnote{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:18px;line-height:1.5;}\n\n  /* ---------- REMOVE LOT / REPORT ---------- */\n  .reason-chip-row{display:flex;gap:8px;}\n  .reason-chip{\n    flex:1;text-align:center;padding:10px 4px;border-radius:10px;\n    border:1.5px solid var(--border);font-size:13px;font-weight:700;\n    color:var(--ink-soft);background:#fff;\n  }\n  .reason-chip.selected{background:var(--g700);color:#fff;border-color:var(--g700);}\n  .lot-remove-btn{\n    font-size:11.5px;font-weight:700;padding:7px 11px;border-radius:8px;\n    background:var(--g100);color:var(--g700);white-space:nowrap;\n  }\n  .lot-remove-btn:active{background:var(--g500);color:#fff;}\n  .stat-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}\n  .stat-card-sm{\n    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);\n    padding:10px 6px;text-align:center;box-shadow:var(--shadow);\n  }\n  .stat-card-sm .stat-label{font-size:10.5px;margin-top:2px;}\n</style>\n</head>\n<body>\n<div id="app">\n  <header class="topbar">\n    <div class="brand">\n      <svg viewBox="0 0 48 48" width="34" height="34" fill="none">\n        <path d="M10 18h28l-3.2 19.5a3 3 0 0 1-3 2.5H16.2a3 3 0 0 1-3-2.5L10 18z" fill="#3FA968" stroke="#0F3A20" stroke-width="2"/>\n        <path d="M14 18c0-7.7 4.5-12 10-12s10 4.3 10 12" stroke="#0F3A20" stroke-width="2.2" fill="none" stroke-linecap="round"/>\n        <path d="M16 23v13M24 23v13M32 23v13" stroke="#0F3A20" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>\n      </svg>\n      <div class="brand-text">\n        <span class="brand-name">Rimping Supermarket</span>\n        <span class="brand-sub">ระบบตรวจสอบวันหมดอายุสินค้า</span>\n      </div>\n    </div>\n    <button id="admin-toggle" class="admin-btn">\n      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path id="lock-icon-path" d="M6 10V8a6 6 0 1 1 12 0v2M5 10h14a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-9a1 1 0 0 1 1-1z"/></svg>\n      <span id="admin-toggle-label">โหมดดูเท่านั้น</span>\n    </button>\n  </header>\n\n  <main id="view-root" class="view-root"></main>\n\n  <nav class="tabbar">\n    <button class="tab-btn" data-view="dashboard">\n      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>\n      หน้าหลัก\n    </button>\n    <button class="tab-btn" data-view="scan">\n      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V5a1 1 0 0 1 1-1h2M4 17v2a1 1 0 0 0 1 1h2M20 7V5a1 1 0 0 0-1-1h-2M20 17v2a1 1 0 0 1-1 1h-2M3 12h18"/></svg>\n      สแกน\n    </button>\n    <button class="tab-btn" data-view="calendar">\n      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>\n      ปฏิทิน\n    </button>\n    <button class="tab-btn" data-view="list">\n      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>\n      รายการ\n    </button>\n    <button class="tab-btn" data-view="report">\n      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>\n      รายงาน\n    </button>\n  </nav>\n\n  <div id="modal-root"></div>\n  <div id="toast-root"></div>\n</div>\n\n<script>\n(function(){\n  "use strict";\n  const ADMIN_CODE = "140840";\n  const STORAGE_KEY = "inventory:data";\n  const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];\n  const THAI_MONTHS_SHORT = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];\n  const THAI_DOW = ["อา","จ","อ","พ","พฤ","ศ","ส"];\n  const REASON_LABELS = { expired:"หมดอายุ", damaged:"ชำรุด", other:"อื่นๆ" };\n\n  let state = {\n    view: "dashboard",\n    adminUnlocked: false,\n    inventory: { products: {}, removedLog: [] },\n    loaded: false,\n    loadError: null,\n    calMonth: (()=>{ const d=new Date(); d.setDate(1); return d; })(),\n    reportMonth: (()=>{ const d=new Date(); d.setDate(1); return d; })(),\n    selectedDate: null,\n    search: "",\n    pinError: "",\n    pinValue: "",\n    scanStatus: "idle",        // idle | starting | active | unsupported | error (live camera)\n    scanPhotoStatus: "idle",   // idle | decoding (photo-snap fallback)\n    scanPhotoPreview: null,\n    modal: null,            // {type:'detail'|'pin'|'addProduct'|'addLot'|'editProduct', ...}\n    imageDraftDataUrl: null,\n    saving: false,\n    // ฟีเจอร์เพิ่มเติมสำหรับหน้าร้าน\n    continuousScan: false,\n    scannedSessionCount: 0,\n    torchActive: false\n  };\n\n  let html5QrCode = null;\n  let html5QrCodeFile = null;\n  let pollTimer = null;\n\n  // ---------- helpers ----------\n  function esc(s){\n    return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));\n  }\n  function todayMidnight(){ const d=new Date(); d.setHours(0,0,0,0); return d; }\n  function parseDateStr(str){\n    const [y,m,d] = str.split("-").map(Number);\n    return new Date(y, m-1, d);\n  }\n  function dateToStr(d){\n    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");\n    return `${y}-${m}-${day}`;\n  }\n  function daysRemaining(expiryStr){\n    return Math.round((parseDateStr(expiryStr) - todayMidnight())/86400000);\n  }\n  function statusOf(days){\n    if(days<0) return "red";\n    if(days<=7) return "amber";\n    return "ok";\n  }\n  function statusLabel(days){\n    if(days<0) return `หมดอายุแล้ว ${Math.abs(days)} วัน`;\n    if(days===0) return "หมดอายุวันนี้";\n    if(days<=7) return `ใกล้หมดอายุ (${days} วัน)`;\n    return `ปกติ (${days} วัน)`;\n  }\n  function thaiDateFromDate(d){\n    return `${d.getDate()} ${THAI_MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()+543}`;\n  }\n  function thaiDateShort(str){\n    return thaiDateFromDate(parseDateStr(str));\n  }\n  function buildIsoFromParts(day, month, yearRaw){\n    if(!Number.isFinite(day) || !Number.isFinite(month) || !Number.isFinite(yearRaw)) return null;\n    if(day<1 || day>31) return null;\n    if(month<1 || month>12) return null;\n    let ceYear;\n    if(yearRaw>=0 && yearRaw<100) ceYear = yearRaw + 1957;          // เช่น 69 -> พ.ศ.2569 -> ค.ศ.2026\n    else if(yearRaw>=2400 && yearRaw<=2700) ceYear = yearRaw - 543; // พ.ศ. แบบ 4 หลัก\n    else if(yearRaw>=1900 && yearRaw<=2200) ceYear = yearRaw;       // เผื่อพิมพ์ปี ค.ศ. เต็ม\n    else return null;\n    const d = new Date(ceYear, month-1, day);\n    if(d.getFullYear()!==ceYear || d.getMonth()!==month-1 || d.getDate()!==day) return null;\n    return `${ceYear}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;\n  }\n  function splitDayMonthDigits(prefix){\n    const L = prefix.length;\n    if(L===2) return [prefix.slice(0,1), prefix.slice(1,2)];\n    if(L===4) return [prefix.slice(0,2), prefix.slice(2,4)];\n    if(L===3){\n      const month2 = prefix.slice(1,3);\n      if(+month2>=1 && +month2<=12) return [prefix.slice(0,1), month2];\n      return [prefix.slice(0,2), prefix.slice(2,3)];\n    }\n    return null;\n  }\n  function parseCompactThaiDate(digits){\n    if(digits.length<4 || digits.length>6) return null;\n    const yearPart = digits.slice(-2);\n    const prefix = digits.slice(0, digits.length-2);\n    const split = splitDayMonthDigits(prefix);\n    if(!split) return null;\n    return buildIsoFromParts(parseInt(split[0],10), parseInt(split[1],10), parseInt(yearPart,10));\n  }\n  function parseThaiInputDate(raw){\n    if(!raw) return null;\n    const trimmed = raw.trim();\n    if(trimmed.includes("/")){\n      const parts = trimmed.split("/").map(s=>s.trim());\n      if(parts.length !== 3) return null;\n      return buildIsoFromParts(parseInt(parts[0],10), parseInt(parts[1],10), parseInt(parts[2],10));\n    }\n    if(/^\d+$/.test(trimmed)) return parseCompactThaiDate(trimmed);\n    return null;\n  }\n  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }\n  function showToast(msg, ms){\n    const root = document.getElementById("toast-root");\n    root.innerHTML = `<div class="toast">${esc(msg)}</div>`;\n    clearTimeout(root._t);\n    root._t = setTimeout(()=>{ root.innerHTML=""; }, ms||2200);\n  }\n\n  function allLotsFlat(){\n    const out=[];\n    const products = state.inventory.products||\n    {};\n    Object.keys(products).forEach(barcode=>{\n      const p = products[barcode];\n      (p.lots||[]).forEach(lot=>{\n        const days = daysRemaining(lot.expiry);\n        out.push({ barcode, name:p.name, zone:p.zone||"", image:p.image, lotId:lot.id, expiry:lot.expiry, qty:lot.qty, days, status:statusOf(days) });\n      });\n    });\n    out.sort((a,b)=>a.days-b.days);\n    return out;\n  }\n\n  // ---------- storage ----------\n  async function loadInventory(){\n    try{\n      const res = await window.storage.get(STORAGE_KEY, true);\n      state.inventory = res && res.value ? JSON.parse(res.value) : { products:{}, removedLog:[] };\n      state.loadError = null;\n    }catch(e){\n      state.inventory = { products:{}, removedLog:[] };\n      state.loadError = null;\n    }\n    if(!state.inventory.products) state.inventory.products = {};\n    if(!state.inventory.removedLog) state.inventory.removedLog = [];\n    state.loaded = true;\n  }\n  async function saveInventory(){\n    state.saving = true;\n    try{\n      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(state.inventory), true);\n      if(!result) throw new Error("save failed");\n      return true;\n    }catch(e){\n      showToast("บันทึกข้อมูลไม่สำเร็จ กรุณาลองใหม่ (ข้อมูลอาจมีขนาดใหญ่เกินไป)", 3200);\n      return false;\n    }finally{\n      state.saving = false;\n    }\n  }\n\n  // ---------- image compression ----------\n  function compressImageFile(file){\n    return new Promise((resolve,reject)=>{\n      const reader = new FileReader();\n      reader.onload = (e)=>{\n        const img = new Image();\n        img.onload = ()=>{\n          const maxW = 360;\n          const scale = Math.min(1, maxW/img.width);\n          const w = Math.round(img.width*scale), h = Math.round(img.height*scale);\n          const canvas = document.createElement("canvas");\n          canvas.width=w; canvas.height=h;\n          canvas.getContext("2d").drawImage(img,0,0,w,h);\n          resolve(canvas.toDataURL("image/jpeg",0.62));\n        };\n        img.onerror = reject;\n        img.src = e.target.result;\n      };\n      reader.onerror = reject;\n      reader.readAsDataURL(file);\n    });\n  }\n\n  // ---------- scanning: live camera with torch & continuous modes ----------\n  async function startScanner(){\n    if(html5QrCode) return;\n    state.scanStatus = "starting";\n    \n    if(typeof Html5Qrcode === "undefined"){\n      state.scanStatus = "unsupported";\n      renderView();\n      return;\n    }\n    try{\n      let scannerView = document.getElementById("scanner-view");\n      if(!scannerView){\n        state.scanStatus = "error";\n        renderView();\n        return;\n      }\n      \n      html5QrCode = new Html5Qrcode("scanner-view");\n      let formats = undefined;\n      if(typeof Html5QrcodeSupportedFormats !== "undefined"){\n        formats = [\n          Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,\n          Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,\n          Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39,\n          Html5QrcodeSupportedFormats.ITF, Html5QrcodeSupportedFormats.QR_CODE\n        ];\n      } \n      const config = { \n        fps: 12,\n        qrbox: { width: 240, height: 160 },\n        disableFlip: false,\n        rememberLastUsedCamera: true\n      };\n      if(formats) config.formatsToSupport = formats;\n      \n      await new Promise(resolve => requestAnimationFrame(resolve));\n      await new Promise(resolve => setTimeout(resolve, 150));\n      \n      const constraints = { facingMode: "environment" };\n      await html5QrCode.start(constraints, config, onScanSuccess, ()=>{});\n      state.scanStatus = "active";\n      state.torchActive = false;\n      \n      const placeholder = document.querySelector(".scan-placeholder");\n      if(placeholder) placeholder.style.display = "none";\n      renderTorchButtonUI();\n    }catch(e){\n      console.error(e);\n      html5QrCode = null;\n      state.scanStatus = "error";\n      renderView();\n    }\n  }\n\n  function renderTorchButtonUI(){\n    const frame = document.getElementById("scan-frame");\n    if(!frame || !html5QrCode) return;\n    // ลบปุ่มเก่าออกก่อนถ้ามี\n    const oldBtn = frame.querySelector(".torch-btn-overlay");\n    if(oldBtn) oldBtn.remove();\n\n    // ตรวจสอบว่ากล้องรองรับไฟแฟลชหรือไม่\n    setTimeout(()=>{\n      try{\n        const box = html5QrCode.getCameraCapabilities();\n        if(box && box.torchSupported){\n          const torchBtn = document.createElement("button");\n          torchBtn.className = "torch-btn-overlay";\n          torchBtn.setAttribute("data-action", "toggle-torch");\n          torchBtn.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;\n          frame.appendChild(torchBtn);\n        }\n      }catch(err){}\n    }, 500);\n  }\n\n  async function toggleTorch(){\n    if(!html5QrCode || state.scanStatus !== "active") return;\n    try{\n      state.torchActive = !state.torchActive;\n      await html5QrCode.applyVideoConstraints({\n        advanced: [{ torch: state.torchActive }]\n      });\n      const btn = document.querySelector(".torch-btn-overlay");\n      if(btn) btn.classList.toggle("active", state.torchActive);\n    } catch(err){\n      showToast("ไม่สามารถเปิดไฟแฟลชได้บนอุปกรณ์นี้");\n    }\n  }\n\n  async function stopScanner(){\n    if(html5QrCode){\n      try{ \n        await html5QrCode.stop(); \n        await html5QrCode.clear();\n      }catch(e){}\n      html5QrCode = null;\n    }\n    state.scanStatus = "idle";\n    state.torchActive = false;\n  }\n\n  function onScanSuccess(decodedText){\n    const barcode = String(decodedText).trim();\n    if(state.continuousScan){\n      // โหมดสแกนต่อเนื่อง: แสดงผลทันทีด้านบนโดยไม่ปิดกล้อง\n      state.scannedSessionCount++;\n      const product = state.inventory.products[barcode];\n      if(product){\n        showToast(`สแกนสำเร็จ (${state.scannedSessionCount}): ${product.name}`);\n      } else {\n        // เสียงแจ้งเตือนสั้นๆ (Beep Fallback เผื่อไม่มีเสียงในบางเบราว์เซอร์)\n        try{\n          const ctx = new (window.AudioContext || window.webkitAudioContext)();\n          const osc = ctx.createOscillator();\n          osc.type = "short"; osc.frequency.setValueAtTime(300, ctx.currentTime); \n          osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.08);\n        }catch(e){}\n        showToast(`ล็อตใหม่ (${state.scannedSessionCount}): ไม่พบข้อมูล รหัส ${barcode}`);\n      }\n      \n      const counterEl = document.getElementById("session-counter");\n      if(counterEl) counterEl.textContent = `จำนวนที่สแกนในรอบนี้: ${state.scannedSessionCount} รายการ (ล่าสุด: ${barcode})`;\n    } else {\n      // โหมดปกติ: ปิดกล้องเปิด Modal\n      stopScanner();\n      handleBarcodeInput(barcode);\n    }\n  }\n\n  // ---------- scanning: photo-snap fallback ----------\n  async function handleScanFile(file){\n    if(!file) return;\n    if(typeof Html5Qrcode === "undefined"){\n      showToast("ไม่สามารถโหลดระบบสแกนได้ กรุณากรอกด้วยตนเอง", 3000);\n      return;\n    }\n    await stopScanner();\n    state.scanPhotoStatus = "decoding";\n    state.scanPhotoPreview = URL.createObjectURL(file);\n    renderView();\n    try{\n      if(!html5QrCodeFile) html5QrCodeFile = new Html5Qrcode("scan-file-decoder");\n      const decodedText = await html5QrCodeFile.scanFile(file, false);\n      resetScanPhoto();\n      handleBarcodeInput(String(decodedText).trim());\n    }catch(err){\n      resetScanPhoto();\n      showToast("ไม่พบบาร์โค้ดในรูปภาพ ลองถ่ายใหม่อีกครั้งให้ชัดเจน", 3200);\n    }\n  }\n  function resetScanPhoto(){\n    if(state.scanPhotoPreview){ URL.revokeObjectURL(state.scanPhotoPreview); }\n    state.scanPhotoPreview = null;\n    state.scanPhotoStatus = "idle";\n    renderView();\n    if(state.view==="scan" && !state.modal && state.scanStatus==="idle"){ startScanner(); }\n  }\n\n  function handleBarcodeInput(barcode){\n    if(!barcode) return;\n    const product = state.inventory.products[barcode];\n    if(product){\n      openModal({ type:"detail", barcode });\n    } else if(state.adminUnlocked){\n      openModal({ type:"addProduct", barcode });\n    } else {\n      showToast("ไม่พบสินค้านี้ในระบบ กรุณาแจ้งแอดมินให้เพิ่มข้อมูล", 3000);\n    }\n    renderView();\n  }\n\n  // ---------- CSV Exporter ----------\n  function exportReportToCSV(){\n    const y = state.reportMonth.getFullYear(), m = state.reportMonth.getMonth();\n    const log = (state.inventory.removedLog||[]).filter(r=>{\n      const d = new Date(r.removedAt);\n      return d.getFullYear()===y && d.getMonth()===m;\n    });\n    \n    if(log.length === 0){\n      showToast("ไม่มีข้อมูลรายงานสำหรับส่งออกในเดือนนี้");\n      return;\n    }\n\n    let csvContent = "\uFEFF"; // ใส่ BOM เพื่อให้ Excel อ่านภาษาไทยได้สมบูรณ์\n    csvContent += "วันที่เอาออก,บาร์โค้ด,ชื่อสินค้า,วันหมดอายุของล็อต,จำนวนที่เก็บออก,สาเหตุที่เก็บออก\n";\n    \n    log.forEach(r => {\n      const d = new Date(r.removedAt);\n      const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;\n      const expDate = thaiDateShort(r.expiry);\n      const reason = REASON_LABELS[r.reason] || "อื่นๆ";\n      csvContent += `"${dateStr}","${r.barcode}","${r.productName.replace(/"/g, '""')}","${expDate}","${r.qty||1}","${reason}"\n`;\n    });\n    \n    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });\n    const link = document.createElement("a");\n    const url = URL.createObjectURL(blob);\n    link.setAttribute("href", url);\n    link.setAttribute("download", `Rimping_Expiry_Report_${THAI_MONTHS_SHORT[m]}_${y+543}.csv`);\n    link.style.visibility = "hidden";\n    document.body.appendChild(link);\n    link.click();\n    document.body.removeChild(link);\n  }\n\n  // ---------- modal ----------\n  async function openModal(m){\n    if(state.scanStatus==="active" || state.scanStatus==="starting"){ \n      await stopScanner();\n    }\n    state.modal = m; state.pinError=""; state.pinValue=""; state.imageDraftDataUrl=null; renderModal();\n  }\n  async function closeModal(){\n    state.modal = null;\n    renderModal();\n    if(state.view==="scan" && state.scanStatus==="idle"){\n      await new Promise(r => setTimeout(r, 100));\n      startScanner(); \n    }\n  }\n\n  function requireAdmin(action){\n    if(state.adminUnlocked){ action(); }\n    else { openModal({type:"pin", afterUnlock:action}); }\n  }\n\n  // ---------- render: shell ----------\n  function renderShell(){\n    document.getElementById("admin-toggle-label").textContent = state.adminUnlocked ? "แอดมิน (ปลดล็อกแล้ว)" : "โหมดดูเท่านั้น";\n    document.getElementById("admin-toggle").classList.toggle("unlocked", state.adminUnlocked);\n    document.querySelectorAll(".tab-btn").forEach(b=>{\n      b.classList.toggle("active", b.dataset.view===state.view);\n    });\n  }\n\n  function renderView(){\n    renderShell();\n    const root = document.getElementById("view-root");\n    \n    if(!state.loaded){ root.innerHTML = `<div class="empty-state"><p>กำลังโหลดข้อมูล...</p></div>`; return; }\n    \n    if(state.view==="dashboard") root.innerHTML = renderDashboard();\n    else if(state.view==="scan") root.innerHTML = renderScan();\n    else if(state.view==="calendar") root.innerHTML = renderCalendar();\n    else if(state.view==="list") root.innerHTML = renderList();\n    else if(state.view==="report") root.innerHTML = renderReport();\n    \n    if(state.view==="scan" && state.scanStatus==="idle" && state.scanPhotoStatus!=="decoding"){\n      setTimeout(() => startScanner(), 150);\n    }\n  }\n\n  // ---------- dashboard ----------\n  function renderDashboard(){\n    const lots = allLotsFlat();\n    const expired = lots.filter(l=>l.status==="red").length;\n    const urgent = lots.filter(l=>l.status==="amber").length;\n    const totalProducts = Object.keys(state.inventory.products).length;\n    const urgentList = lots.filter(l=>l.status!=="ok").slice(0,8);\n\n    let html = `\n      <div class="stat-grid">\n        <div class="stat-card red"><div class="stat-num">${expired}</div><div class="stat-label">หมดอายุแล้ว (ล็อต)</div></div>\n        <div class="stat-card amber"><div class="stat-num">${urgent}</div><div class="stat-label">ใกล้หมดอายุ ≤7 วัน</div></div>\n        <div class="stat-card green"><div class="stat-num">${totalProducts}</div><div class="stat-label">สินค้าทั้งหมด</div></div>\n        <div class="stat-card green"><div class="stat-num">${lots.length}</div><div class="stat-label">ล็อตทั้งหมด</div></div>\n      </div>\n      <div class="section-title">ต้องจัดการเร่งด่วน</div>\n    `;\n    if(urgentList.length===0){\n      html += `<div class="empty-state">\n        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>\n        <p>ยังไม่มีสินค้าใกล้หมดอายุ ดีมาก!</p>\n      </div>`;\n    } else {\n      urgentList.forEach(l=>{\n        html += lotRowCard(l);\n      });\n    }\n    return html;\n  }\n\n  function lotRowCard(l){\n    return `<div class="lot-item" data-action="open-detail" data-barcode="${esc(l.barcode)}">\n      <div class="thumb">${l.image ? `<img src="${l.image}">` : basketSvg()}</div>\n      <div class="item-info">\n        <div class="item-name">${esc(l.name)}</div>\n        <div class="item-sub">${thaiDateShort(l.expiry)}${l.qty?` · ${esc(l.qty)} หน่วย`:\"\"} ${l.zone ? `<span style='color:var(--g700); font-weight:bold;'>[📍${esc(l.zone)}]</span>` : ''}</div>\n      </div>\n      <div class="badge ${l.status}">${l.status==="ok"?"ปกติ":statusShort(l)}</div>\n    </div>`;\n  }\n  function statusShort(l){\n    if(l.status==="red") return l.days===0?"วันนี้":`เกิน ${Math.abs(l.days)} วัน`;\n    if(l.status==="amber") return `เหลือ ${l.days} วัน`;\n    return "ปกติ";\n  }\n  function basketSvg(){\n    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 9h16l-1.6 9.7a1.5 1.5 0 0 1-1.5 1.3H7.1a1.5 1.5 0 0 1-1.5-1.3L4 9z"/><path d="M7 9c0-3.9 2.2-6 5-6s5 2.1 5 6"/></svg>`;\n  }\n\n  // ---------- scan view ----------\n  function renderScan(){\n    let camBlock;\n    if(state.scanPhotoStatus==="decoding"){\n      camBlock = `<div class="scan-camera-wrap">\n        ${state.scanPhotoPreview?`<img class="preview-bg" src="${state.scanPhotoPreview}">`:\"\"}  \n        <div class="scan-placeholder"><span class="scan-emoji">🔎</span>กำลังอ่านบาร์โค้ดจากรูป...</div>\n      </div>`;\n    } else if(state.scanStatus==="unsupported"){\n      camBlock = `<div class="scan-camera-wrap"><div class="scan-placeholder">ไม่รองรับกล้องระบบเว็บสแกนสด<br>กรุณาใช้ปุ่มถ่ายรูปแทน</div></div>`;\n    } else if(state.scanStatus==="error"){\n      camBlock = `<div class="scan-camera-wrap"><div class="scan-placeholder">ไม่สามารถเปิดกล้องสแกนสดได้ (กรุณาอนุญาตสิทธิ์กล้อง)<br>หรือใช้ปุ่มถ่ายรูปแทน</div></div>\n      <button class="btn btn-outline" style="margin-bottom:14px" data-action="retry-scan">ลองเปิดกล้องใหม่อีกครั้ง</button>`;\n    } else {\n      camBlock = `<div class="scan-camera-wrap" id="scan-frame"><div id="scanner-view" style="width:100%;height:100%;"></div><div class="scan-placeholder" style="display:${state.scanStatus==="active"?"none":"flex"}">${state.scanStatus!=="active"?'กำลังเปิดกล้อง...':''}</div></div>`;\n    }\n    \n    const takePhotoBtn = `\n      <label class="btn btn-outline" style="margin-bottom:14px">\n        📷 ถ่ายรูปสแกนแทน (หากสแกนสดมีปัญหา)\n        <input type="file" accept="image/*" capture="environment" id="scan-photo-input" style="display:none">\n      </label>`;\n      \n    return `\n      <div class="multi-scan-banner">\n        <div class="toggle-container">\n          <div class="toggle-label-wrap">\n            <span class="toggle-title">โหมดสแกนรัวต่อเนื่อง (Multi-Scan)</span>\n            <span class="toggle-desc">ยิงบาร์โค้ดรัวสะสม โดยไม่ต้องเด้งหน้าจอขึ้นมาขัดจังหวะ</span>\n          </div>\n          <label class="switch">\n            <input type="checkbox" id="continuous-scan-toggle" ${state.continuousScan ? "checked" : ""}>\n            <span class="slider"></span>\n          </label>\n        </div>\n      </div>\n      ${state.continuousScan ? `<div class="scan-counter-card" id="session-counter">จำนวนที่สแกนในรอบนี้: ${state.scannedSessionCount} รายการ</div>` : ""}\n      ${camBlock}\n      ${takePhotoBtn}\n      <div class="manual-entry">\n        <span class="field-label">หรือกรอกบาร์โค้ดด้วยตนเอง</span>\n        <div class="btn-row">\n          <input type="text" inputmode="numeric" class="text-input" id="manual-barcode" placeholder="กรอกเลขบาร์โค้ด...">\n        </div>\n        <button class="btn btn-primary" style="margin-top:10px" data-action="manual-submit">ค้นหา / เพิ่มสินค้า</button>\n      </div>\n      <div id="scan-file-decoder" style="display:none"></div>\n    `;\n  }\n\n  // ---------- calendar ----------\n  function renderCalendar(){\n    const y = state.calMonth.getFullYear(), m = state.calMonth.getMonth();\n    const firstDow = new Date(y,m,1).getDay();\n    const daysInMonth = new Date(y,m+1,0).getDate();\n    const lots = allLotsFlat();\n    const byDate = {};\n    lots.forEach(l=>{ (byDate[l.expiry] = byDate[l.expiry]||[]).push(l); });\n\n    let cells = "";\n    for(let i=0;i<firstDow;i++) cells += `<div class="cal-cell empty"></div>`;\n    const todayStr = dateToStr(todayMidnight());\n    for(let d=1; d<=daysInMonth; d++){\n      const dateStr = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;\n      const dayLots = byDate[dateStr]||[];\n      let cls = "cal-cell";\n      if(dateStr===todayStr) cls+=" today";\n      if(state.selectedDate===dateStr) cls+=" selected";\n      if(dayLots.some(l=>l.status==="red")) cls+=" has-red";\n      else if(dayLots.some(l=>l.status==="amber")) cls+=" has-amber";\n      cells += `<div class="${cls}" data-action="select-date" data-date="${dateStr}">${d}${dayLots.length?'<div class="cal-dot"></div>':''}</div>`;\n    }\n\n    let listHtml = "";\n    if(state.selectedDate){\n      const dayLots = byDate[state.selectedDate]||[];\n      listHtml = `<div class="section-title">${thaiDateShort(state.selectedDate)}</div>`;\n      if(dayLots.length===0){\n        listHtml += `<div class="empty-state"><p>ไม่มีสินค้าหมดอายุวันนี้</p></div>`;\n      } else {\n        dayLots.forEach(l=>{ listHtml += lotRowCard(l); });\n      }\n    } else {\n      listHtml = `<div class="footnote">แตะวันที่มีจุดสีเพื่อดูรายการสินค้าที่หมดอายุในวันนั้น</div>`;\n    }\n\n    return `\n      <div class="cal-header">\n        <button class="cal-nav-btn" data-action="cal-prev">‹</button>\n        <div class="cal-month-label">${THAI_MONTHS[m]} ${y+543}</div>\n        <button class="cal-nav-btn" data-action="cal-next">›</button>\n      </div>\n      <div class="cal-grid">\n        ${THAI_DOW.map(d=>`<div class="cal-dow">${d}</div>`).join("")}\n        ${cells}\n      </div>\n      ${listHtml}\n    `;\n  }\n\n  // ---------- list ----------\n  function renderList(){\n    const products = state.inventory.products;\n    const q = state.search.trim().toLowerCase();\n    let entries = Object.keys(products).map(barcode=>{\n      const p = products[barcode];\n      const lots = (p.lots||[]).slice().sort((a,b)=>daysRemaining(a.expiry)-daysRemaining(b.expiry));\n      const nearest = lots[0];\n      return { barcode, name:p.name, zone:p.zone||"", image:p.image, lotCount:lots.length, nearest };\n    });\n    if(q){\n      entries = entries.filter(e=> e.name.toLowerCase().includes(q) || e.barcode.includes(q) || e.zone.toLowerCase().includes(q));\n    }\n    entries.sort((a,b)=>{\n      const da = a.nearest?daysRemaining(a.nearest.expiry):9999;\n      const db = b.nearest?daysRemaining(b.nearest.expiry):9999;\n      return da-db;\n    });\n\n    let html = `\n      <div class="search-wrap">\n        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>\n        <input type="text" class="text-input" id="search-input" placeholder="ค้นหาชื่อสินค้า, โซนพิกัด หรือบาร์โค้ด..." value="${esc(state.search)}">\n      </div>\n    `;\n    if(entries.length===0){\n      html += `<div class="empty-state"><p>ไม่พบสินค้าที่ตรงกับการค้นหา</p></div>`;\n    } else {\n      entries.forEach(e=>{\n        const days = e.nearest ? daysRemaining(e.nearest.expiry) : null;\n        const status = days!==null ? statusOf(days) : "ok";\n        html += `<div class="product-item" data-action="open-detail" data-barcode="${esc(e.barcode)}">\n          <div class="thumb">${e.image?`<img src="${e.image}">`:basketSvg()}</div>\n          <div class="item-info">\n            <div class="item-name">${esc(e.name)}</div>\n            <div class="item-sub">${e.barcode} · ${e.lotCount} ล็อต ${e.zone ? `<span style='color:var(--g700); font-weight:bold;'>[📍${esc(e.zone)}]</span>` : ''}${e.nearest?` · ใกล้สุด ${thaiDateShort(e.nearest.expiry)}`:\"\"}</div>\n          </div>\n          <div class="badge ${status}">${status==="ok"?"ปกติ":(status==="red"?"หมดอายุ":"ใกล้หมด")}</div>\n        </div>`;\n      });\n    }\n    return html;\n  }\n\n  // ---------- report (removed log & CSV export) ----------\n  function renderReport(){\n    const y = state.reportMonth.getFullYear(), m = state.reportMonth.getMonth();\n    const log = (state.inventory.removedLog||[]).filter(r=>{\n      const d = new Date(r.removedAt);\n      return d.getFullYear()===y && d.getMonth()===m;\n    }).sort((a,b)=> new Date(b.removedAt) - new Date(a.removedAt));\n\n    const totalCount = log.length;\n    const totalQty = log.reduce((s,r)=> s + (Number(r.qty)||0), 0);\n    const byReason = { expired:0, damaged:0, other:0 };\n    log.forEach(r=>{ byReason[r.reason] = (byReason[r.reason]||0) + 1; });\n\n    let listHtml = "";\n    if(log.length===0){\n      listHtml = `<div class="empty-state"><p>ยังไม่มีรายการเก็บออกในเดือนนี้</p></div>`;\n    } else {\n      log.forEach(r=>{\n        const d = new Date(r.removedAt);\n        listHtml += `<div class="lot-item">\n          <div class="thumb">${r.image?`<img src="${r.image}">`:basketSvg()}</div>\n          <div class="item-info">\n            <div class="item-name">${esc(r.productName)}</div>\n            <div class="item-sub">${thaiDateFromDate(d)} · ${REASON_LABELS[r.reason]||"อื่นๆ"}${r.qty?` · ${esc(r.qty)} หน่วย`:\"\"}</div>\n          </div>\n        </div>`;\n      });\n    }\n\n    return `\n      <div class="cal-header">\n        <button class="cal-nav-btn" data-action="report-prev">‹</button>\n        <div class="cal-month-label">${THAI_MONTHS[m]} ${y+543}</div>\n        <button class="cal-nav-btn" data-action="report-next">›</button>\n      </div>\n      <div class="stat-grid">\n        <div class="stat-card green"><div class="stat-num">${totalCount}</div><div class="stat-label">จำนวนครั้งที่เก็บออก</div></div>\n        <div class="stat-card amber"><div class="stat-num">${totalQty}</div><div class="stat-label">จำนวนหน่วยรวม</div></div>\n      </div>\n      <div class="stat-grid-3">\n        <div class="stat-card-sm"><div class="stat-num" style="font-size:18px">${byReason.expired||0}</div><div class="stat-label">หมดอายุ</div></div>\n        <div class="stat-card-sm"><div class="stat-num" style="font-size:18px">${byReason.damaged||0}</div><div class="stat-label">ชำรุด</div></div>\n        <div class="stat-card-sm"><div class="stat-num" style="font-size:18px">${byReason.other||0}</div><div class="stat-label">อื่นๆ</div></div>\n      </div>\n      <button class="btn btn-outline" style="margin-bottom:18px; font-size:13.5px;" data-action="export-csv">📥 ส่งออกรายงาน (CSV)</button>\n      <div class="section-title">รายการที่เก็บออกเดือนนี้</div>\n      ${listHtml}\n    `;\n  }\n\n  // ---------- modal views ----------\n  function renderModal(){\n    const root = document.getElementById("modal-root");\n    if(!state.modal){ root.innerHTML=\"\"; return; }\n    const m = state.modal;\n    let inner = \"\";\n    if(m.type===\"pin\") inner = modalPin();\n    else if(m.type===\"detail\") inner = modalDetail(m.barcode);\n    else if(m.type===\"addProduct\") inner = modalAddProduct(m.barcode);\n    else if(m.type===\"addLot\") inner = modalAddLot(m.barcode);\n    else if(m.type===\"editProduct\") inner = modalEditProduct(m.barcode);\n    else if(m.type===\"removeLot\") inner = modalRemoveLot(m.barcode, m.lotId);\n    root.innerHTML = `<div class="modal-overlay" data-action="overlay-close">\n      <div class="modal-sheet" data-stop="1">\n        <div class="modal-handle"></div>\n        <button class="modal-close" data-action="close-modal">✕</button>\n        ${inner}\n      </div>\n    </div>`;\n  }\n\n  function modalPin(){\n    const filled = state.pinValue.length;\n    return `\n      <h3 class="modal-title">ใส่รหัสแอดมิน</h3>\n      <p style="font-size:13px;color:var(--ink-soft);margin:-8px 0 4px;">เฉพาะแอดมินเท่านั้นที่สามารถเพิ่ม/แก้ไข/ลบสินค้าได้</p>\n      <div class="pin-dots">${[0,1,2,3,4,5].map(i=>`<div class="pin-dot ${i<filled?'filled':''}"></div>`).join("")}</div>\n      <input type="password" inputmode="numeric" maxlength="6" id="pin-input" class="text-input" style="text-align:center;font-size:20px;letter-spacing:6px;" placeholder="•••••" value="${esc(state.pinValue)}">\n      ${state.pinError?`<div class="err-text" style="text-align:center">${esc(state.pinError)}</div>`:\"\"}\n      <button class="btn btn-primary" style="margin-top:16px" data-action="pin-submit">ปลดล็อก</button>\n    `;\n  }\n\n  function modalDetail(barcode){\n    const p = state.inventory.products[barcode];\n    if(!p) return `<p>ไม่พบข้อมูลสินค้า</p>`;\n    const lots = (p.lots||[]).slice().sort((a,b)=>daysRemaining(a.expiry)-daysRemaining(b.expiry));\n    let lotsHtml = lots.map(l=>{\n      const days = daysRemaining(l.expiry);\n      const status = statusOf(days);\n      return `<div class="lot-row">\n        <div>\n          <div class="lot-date">${thaiDateShort(l.expiry)}</div>\n          <div class="lot-qty">${statusLabel(days)}${l.qty?` · ${esc(l.qty)} หน่วย`:\"\"}</div>\n        </div>\n        <div class="lot-actions">\n          <span class="badge ${status}">${status==="red"?"หมดอายุ":status==="amber"?"ใกล้หมด":"ปกติ"}</span>\n          ${state.adminUnlocked?`<button class="lot-remove-btn" data-action="open-remove-lot" data-barcode="${esc(barcode)}" data-lot="${esc(l.id)}">เก็บออก</button>`:\"\"}\n        </div>\n      </div>`;\n    }).join(\"\") || `<p style="font-size:13px;color:var(--ink-soft)">ยังไม่มีล็อตสินค้า</p>`;\n\n    return `\n      <div class="detail-image">${p.image?`<img src="${p.image}">`:basketSvg()}</div>\n      <h3 class="modal-title" style="margin-bottom:2px">${esc(p.name)}</h3>\n      <div class="detail-barcode">บาร์โค้ด: ${esc(barcode)} ${p.zone ? `· <span style='color:var(--g700); font-weight:bold;'>📍 พิกัดโซน: ${esc(p.zone)}</span>` : ''}</div>\n      <div class="section-title" style="margin-top:16px">รายการล็อต / วันหมดอายุ</div>\n      ${lotsHtml}\n      ${state.adminUnlocked?`\n        <div class="btn-row" style="margin-top:16px">\n          <button class="btn btn-primary" data-action="open-add-lot" data-barcode="${esc(barcode)}">+ เพิ่มล็อตใหม่</button>\n          <button class="btn btn-outline" data-action="open-edit-product" data-barcode="${esc(barcode)}">แก้ไข</button>\n        </div>\n        <button class="btn btn-danger" style="margin-top:8px" data-action="delete-product" data-barcode="${esc(barcode)}">ลบสินค้านี้ทั้งหมด</button>\n      `:\"\"}\n    `;\n  }\n\n  function modalAddProduct(barcode){\n    return `\n      <h3 class="modal-title">เพิ่มสินค้าใหม่</h3>\n      <div class="field-group">\n        <span class="field-label">บาร์โค้ด</span>\n        <input type="text" class="text-input" id="f-barcode" value="${esc(barcode||'')}" ${barcode?'readonly':''}>\n      </div>\n      <div class="field-group">\n        <span class="field-label">ชื่อสินค้า *</span>\n        <input type="text" class="text-input" id="f-name" placeholder="เช่น นมสดพาสเจอร์ไรส์ 1L">\n      </div>\n      <div class="field-group">\n        <span class="field-label">โซน / ชั้นวาง (พิกัดพิกัดสินค้า)</span>\n        <input type="text" class="text-input" id="f-zone" placeholder="เช่น ตู้แช่ 3, เชลฟ์ A4">\n      </div>\n      <div class="field-group">\n        <span class="field-label">รูปภาพสินค้า</span>\n        <label class="file-input-label">\n          📷 ถ่ายรูป / เลือกรูปภาพ\n          <input type="file" accept="image/*" capture="environment" id="f-image" style="display:none">\n        </label>\n        <img id="f-image-preview" class="preview-img" style="display:none">\n      </div>\n      <div class="field-group">\n        <span class="field-label">วันหมดอายุ (ล็อตแรก) *</span>\n        <input type="text" inputmode="numeric" class="text-input" id="f-expiry" placeholder="1/6/69 หรือ 11269">\n        <div id="f-expiry-hint" style="font-size:11.5px;color:var(--ink-soft);margin-top:6px;">พิมพ์เป็น วัน/เดือน/ปี พ.ศ. เช่น 1/6/69 หรือพิมพ์ติดกันก็ได้ เช่น 11269 (=1/12/69)</div>\n      </div>\n      <div class="field-group">\n        <span class="field-label">จำนวน (ไม่บังคับ)</span>\n        <input type="number" min="0" class="text-input" id="f-qty" placeholder="เช่น 24">\n      </div>\n      <div id="f-error" class="err-text"></div>\n      <button class="btn btn-primary" data-action="submit-add-product">บันทึกสินค้าใหม่</button>\n    `;\n  }\n\n  function modalAddLot(barcode){\n    const p = state.inventory.products[barcode];\n    return `\n      <h3 class="modal-title">เพิ่มล็อตใหม่</h3>\n      <p style="font-size:13px;color:var(--ink-soft);margin-top:-8px">${esc(p?p.name:'')}</p>\n      <div class="field-group">\n        <span class="field-label">วันหมดอายุ *</span>\n        <input type="text" inputmode="numeric" class="text-input" id="f-expiry" placeholder="1/6/69 หรือ 11269">\n        <div id="f-expiry-hint" style="font-size:11.5px;color:var(--ink-soft);margin-top:6px;">พิมพ์เป็น วัน/เดือน/ปี พ.ศ. เช่น 1/6/69 หรือพิมพ์ติดกันก็ได้ เช่น 11269 (=1/12/69)</div>\n      </div>\n      <div class="field-group">\n        <span class="field-label">จำนวน (ไม่บังคับ)</span>\n        <input type="number" min="0" class="text-input" id="f-qty" placeholder="เช่น 24">\n      </div>\n      <div id="f-error" class="err-text"></div>\n      <button class="btn btn-primary" data-action="submit-add-lot" data-barcode="${esc(barcode)}">บันทึกล็อตใหม่</button>\n    `;\n  }\n\n  function modalEditProduct(barcode){\n    const p = state.inventory.products[barcode];\n    return `\n      <h3 class="modal-title">แก้ไขสินค้า</h3>\n      <div class="field-group">\n        <span class="field-label">ชื่อสินค้า *</span>\n        <input type="text" class="text-input" id="f-name" value="${esc(p.name)}">\n      </div>\n      <div class="field-group">\n        <span class="field-label">โซน / ชั้นวาง</span>\n        <input type="text" class="text-input" id="f-zone" value="${esc(p.zone||'')}" placeholder="เช่น ตู้แช่ 3, เชลฟ์ A4">\n      </div>\n      <div class="field-group">\n        <span class="field-label">รูปภาพสินค้า</span>\n        <label class="file-input-label">📷 เปลี่ยนรูปภาพ\n          <input type="file" accept="image/*" capture="environment" id="f-image" style="display:none">\n        </label>\n        <img id="f-image-preview" class="preview-img" src="${p.image||''}" style="${p.image?'':'display:none'}">\n      </div>\n      <div id="f-error" class="err-text"></div>\n      <button class="btn btn-primary" data-action="submit-edit-product" data-barcode="${esc(barcode)}">บันทึกการแก้ไข</button>\n    `;\n  }\n\n  function modalRemoveLot(barcode, lotId){\n    const p = state.inventory.products[barcode];\n    const lot = p && (p.lots||[]).find(l=>l.id===lotId);\n    if(!lot) return `<p>ไม่พบล็อตนี้</p>`;\n    const reason = (state.modal && state.modal.reason) || "expired";\n    const qtyVal = (state.modal && state.modal.qtyDraft !== undefined) ? state.modal.qtyDraft : (lot.qty || "");\n    return `\n      <h3 class="modal-title">เก็บสินค้านี้ออกจากชั้น</h3>\n      <p style="font-size:13px;color:var(--ink-soft);margin-top:-8px">${esc(p.name)} · หมดอายุ ${thaiDateShort(lot.expiry)}</p>\n      <div class="field-group">\n        <span class="field-label">เหตุผลที่เก็บออก</span>\n        <div class="reason-chip-row">\n          <button class="reason-chip ${reason==='expired'?'selected':''}" data-action="select-reason" data-reason="expired">หมดอายุ</button>\n          <button class="reason-chip ${reason==='damaged'?'selected':''}" data-action="select-reason" data-reason="damaged">ชำรุด</button>\n          <button class="reason-chip ${reason==='other'?'selected':''}" data-action="select-reason" data-reason="other">อื่นๆ</button>\n        </div>\n      </div>\n      <div class="field-group">\n        <span class="field-label">จำนวนที่เก็บออก (ไม่บังคับ)</span>\n        <input type="number" min="0" class="text-input" id="f-remove-qty" value="${esc(qtyVal)}">\n      </div>\n      <div id="f-error" class="err-text"></div>\n      <button class="btn btn-danger" data-action="submit-remove-lot" data-barcode="${esc(barcode)}" data-lot="${esc(lotId)}">ยืนยันว่าเก็บออกแล้ว</button>\n    `;\n  }\n\n  // ---------- event handling ----------\n  document.addEventListener("click", async (e)=>{\n    const tab = e.target.closest(".tab-btn");\n    if(tab){\n      if(state.view==="scan" && tab.dataset.view!=="scan") {\n        stopScanner();\n      }\n      state.view = tab.dataset.view;\n      state.selectedDate = null;\n      if(state.view === "scan") state.scannedSessionCount = 0; // เคลียร์ยอดสะสมถ้ารีเฟรชเข้าแท็บใหม่\n      renderView();\n      return;\n    }\n    const adminToggle = e.target.closest("#admin-toggle");\n    if(adminToggle){\n      if(state.adminUnlocked){ state.adminUnlocked=false; renderShell(); showToast("ออกจากโหมดแอดมินแล้ว"); }\n      else { openModal({type:"pin"}); }\n      return;\n    }\n    const actionEl = e.target.closest("[data-action]");\n    if(!actionEl){\n      if(e.target.closest(".modal-overlay") && !e.target.closest(".modal-sheet")){ closeModal(); }\n      return;\n    }\n    const action = actionEl.dataset.action;\n\n    if(action==="close-modal" || action==="overlay-close"){ if(action==="overlay-close" && e.target.closest('.modal-sheet')) return; closeModal(); return; }\n    if(action==="open-detail"){ openModal({type:"detail", barcode:actionEl.dataset.barcode}); return; }\n    if(action==="open-add-lot"){ openModal({type:"addLot", barcode:actionEl.dataset.barcode}); return; }\n    if(action==="open-edit-product"){ openModal({type:"editProduct", barcode:actionEl.dataset.barcode}); return; }\n    if(action==="toggle-torch"){ toggleTorch(); return; }\n    if(action==="export-csv"){ exportReportToCSV(); return; }\n    if(action==="retry-scan"){\n      state.scanStatus="idle";\n      renderView();\n      setTimeout(() => startScanner(), 100);\n      return;\n    }\n\n    if(action==="cal-prev"){\n      state.calMonth.setMonth(state.calMonth.getMonth()-1);\n      state.selectedDate=null;\n      renderView();\n      return;\n    }\n    if(action==="cal-next"){\n      state.calMonth.setMonth(state.calMonth.getMonth()+1);\n      state.selectedDate=null;\n      renderView();\n      return;\n    }\n    if(action==="select-date"){\n      state.selectedDate = state.selectedDate===actionEl.dataset.date ? null : actionEl.dataset.date;\n      renderView();\n      return;\n    }\n    if(action==="report-prev"){\n      state.reportMonth.setMonth(state.reportMonth.getMonth()-1);\n      renderView();\n      return;\n    }\n    if(action==="report-next"){\n      state.reportMonth.setMonth(state.reportMonth.getMonth()+1);\n      renderView();\n      return;\n    }\n    if(action==="manual-submit"){\n      const val = document.getElementById("manual-barcode").value.trim();\n      if(val) handleBarcodeInput(val);\n      return;\n    }\n\n    if(action==="pin-submit"){\n      const val = document.getElementById("pin-input").value;\n      if(val === ADMIN_CODE){\n        state.adminUnlocked = true;\n        const after = state.modal.afterUnlock;\n        closeModal();\n        renderShell();\n        showToast("ปลดล็อกโหมดแอดมินสำเร็จ");\n        if(after) after();\n        renderView();\n      } else {\n        state.pinError = "รหัสไม่ถูกต้อง กรุณาลองใหม่";\n        state.pinValue = "";\n        renderModal();\n      }\n      return;\n    }\n\n    if(action==="open-remove-lot"){\n      openModal({type:"removeLot", barcode:actionEl.dataset.barcode, lotId:actionEl.dataset.lot, reason:"expired"});\n      return;\n    }\n    if(action==="select-reason"){\n      const qtyInput = document.getElementById("f-remove-qty");\n      if(qtyInput) state.modal.qtyDraft = qtyInput.value;\n      state.modal.reason = actionEl.dataset.reason;\n      renderModal();\n      return;\n    }\n    if(action==="submit-remove-lot"){\n      requireAdmin(async ()=>{\n        const barcode = actionEl.dataset.barcode, lotId = actionEl.dataset.lot;\n        const p = state.inventory.products[barcode];\n        const lot = p && p.lots.find(l=>l.id===lotId);\n        if(!lot) return;\n        const qtyInput = document.getElementById("f-remove-qty");\n        const qty = qtyInput ? qtyInput.value : (lot.qty||"");\n        const reason = (state.modal && state.modal.reason) || "expired";\n        if(!state.inventory.removedLog) state.inventory.removedLog = [];\n        const logEntry = {\n          id: uid(), barcode, productName: p.name, image: p.image,\n          expiry: lot.expiry, qty: qty||null, reason, removedAt: new Date().toISOString(), lotId\n        };\n        state.inventory.removedLog.push(logEntry);\n        p.lots = p.lots.filter(l=>l.id!==lotId);\n        const ok = await saveInventory();\n        if(ok){ showToast("บันทึกการเก็บออกแล้ว"); openModal({type:"detail", barcode}); renderView(); }\n        else {\n          state.inventory.removedLog = state.inventory.removedLog.filter(r=>r.id!==logEntry.id);\n          p.lots.push(lot);\n          showToast("บันทึกไม่สำเร็จ กรุณาลองใหม่", 3000);\n        }\n      });\n      return;\n    }\n\n    if(action==="delete-product"){\n      requireAdmin(async ()=>{\n        const barcode = actionEl.dataset.barcode;\n        if(!window.confirm("ลบสินค้านี้ทั้งหมดใช่หรือไม่? ไม่สามารถกู้คืนได้")) return;\n        const backup = state.inventory.products[barcode];\n        delete state.inventory.products[barcode];\n        const ok = await saveInventory();\n        if(ok){ showToast("ลบสินค้าแล้ว"); closeModal(); renderView(); }\n        else { state.inventory.products[barcode] = backup; showToast("ลบไม่สำเร็จ กรุณาลองใหม่", 3000); }\n      });\n      return;\n    }\n\n    if(action==="submit-add-product"){\n      const barcode = document.getElementById("f-barcode").value.trim();\n      const name = document.getElementById("f-name").value.trim();\n      const zone = document.getElementById("f-zone").value.trim();\n      const expiryRaw = document.getElementById("f-expiry").value.trim();\n      const qty = document.getElementById("f-qty").value;\n      const errEl = document.getElementById("f-error");\n      if(!barcode || !name || !expiryRaw){ errEl.textContent = "กรุณากรอกบาร์โค้ด ชื่อสินค้า และวันหมดอายุ"; return; }\n      const expiry = parseThaiInputDate(expiryRaw);\n      if(!expiry){ errEl.textContent = "รูปแบบวันหมดอายุไม่ถูกต้อง (วัน/เดือน/ปี เช่น 1/6/69)"; return; }\n      if(state.inventory.products[barcode]){ errEl.textContent = "บาร์โค้ดนี้มีสินค้าอยู่แล้ว"; return; }\n      state.inventory.products[barcode] = {\n        name, zone: zone || null,\n        image: state.imageDraftDataUrl || null,\n        lots: [{ id:uid(), expiry, qty: qty||null, addedAt: new Date().toISOString() }],\n        createdAt: new Date().toISOString()\n      };\n      const ok = await saveInventory();\n      if(ok){ showToast("เพิ่มสินค้าใหม่แล้ว"); closeModal(); renderView(); }\n      else { delete state.inventory.products[barcode]; if(errEl) errEl.textContent = "บันทึกไม่สำเร็จ กรุณาลองใหม่"; }\n      return;\n    }\n\n    if(action==="submit-add-lot"){\n      const barcode = actionEl.dataset.barcode;\n      const expiryRaw = document.getElementById("f-expiry").value.trim();\n      const qty = document.getElementById("f-qty").value;\n      const errEl = document.getElementById("f-error");\n      if(!expiryRaw){ errEl.textContent = "กรุณาพิมพ์วันหมดอายุ"; return; }\n      const expiry = parseThaiInputDate(expiryRaw);\n      if(!expiry){ errEl.textContent = "รูปแบบวันหมดอายุไม่ถูกต้อง (วัน/เดือน/ปี เช่น 1/6/69)"; return; }\n      const newLot = { id:uid(), expiry, qty: qty||null, addedAt: new Date().toISOString() };\n      state.inventory.products[barcode].lots.push(newLot);\n      const ok = await saveInventory();\n      if(ok){ showToast("เพิ่มล็อตใหม่แล้ว"); openModal({type:"detail", barcode}); renderView(); }\n      else {\n        state.inventory.products[barcode].lots = state.inventory.products[barcode].lots.filter(l=>l.id!==newLot.id);\n        if(errEl) errEl.textContent = "บันทึกไม่สำเร็จ กรุณาลองใหม่";\n      }\n      return;\n    }\n\n    if(action==="submit-edit-product"){\n      const barcode = actionEl.dataset.barcode;\n      const name = document.getElementById("f-name").value.trim();\n      const zone = document.getElementById("f-zone").value.trim();\n      const errEl = document.getElementById("f-error");\n      if(!name){ errEl.textContent = "กรุณากรอกชื่อสินค้า"; return; }\n      const p = state.inventory.products[barcode];\n      const prevName = p.name, prevImage = p.image, prevZone = p.zone;\n      p.name = name;\n      p.zone = zone || null;\n      if(state.imageDraftDataUrl) p.image = state.imageDraftDataUrl;\n      const ok = await saveInventory();\n      if(ok){ showToast("บันทึกการแก้ไขแล้ว"); openModal({type:"detail", barcode}); renderView(); }\n      else { p.name = prevName; p.image = prevImage; p.zone = prevZone; if(errEl) errEl.textContent = "บันทึกไม่สำเร็จ"; }\n      return;\n    }\n  });\n\n  document.addEventListener("change", async (e)=>{\n    if(e.target.id==="scan-photo-input"){\n      const file = e.target.files[0];\n      e.target.value = \"\";\n      if(file) await handleScanFile(file);\n      return;\n    }\n    if(e.target.id===\"continuous-scan-toggle\"){\n      state.continuousScan = e.target.checked;\n      state.scannedSessionCount = 0;\n      renderView();\n      return;\n    }\n    if(e.target.id===\"f-image\"){\n      const file = e.target.files[0];\n      if(!file) return;\n      try{\n        const dataUrl = await compressImageFile(file);\n        state.imageDraftDataUrl = dataUrl;\n        const preview = document.getElementById("f-image-preview");\n        if(preview){ preview.src = dataUrl; preview.style.display="block"; }\n      }catch(err){ showToast("ไม่สามารถอ่านรูปภาพได้"); }\n    }\n  });\n\n  document.addEventListener("input", (e)=>{\n    if(e.target.id===\"search-input\"){\n      state.search = e.target.value;\n      const root = document.getElementById("view-root");\n      root.innerHTML = renderList();\n      const inp = document.getElementById("search-input");\n      inp.focus();\n      inp.setSelectionRange(inp.value.length, inp.value.length);\n    }\n    if(e.target.id===\"f-expiry\"){\n      const hint = document.getElementById("f-expiry-hint");\n      if(hint){\n        const val = e.target.value.trim();\n        if(!val){\n          hint.textContent = "พิมพ์เป็น วัน/เดือน/ปี พ.ศ. เช่น 1/6/69 = 1 มิ.ย. 2569";\n          hint.style.color = "var(--ink-soft)";\n        } else {\n          const iso = parseThaiInputDate(val);\n          if(iso){ hint.textContent = "→ " + thaiDateShort(iso); hint.style.color = "var(--g700)"; }\n          else { hint.textContent = "รูปแบบวันที่ไม่ถูกต้อง พิมพ์เป็น วัน/เดือน/ปี เช่น 1/6/69"; hint.style.color = "var(--red)"; }\n        }\n      }\n    }\n    if(e.target.id===\"pin-input\"){\n      state.pinValue = e.target.value.slice(0,6);\n      state.pinError = \"\";\n      renderModal();\n      const pinEl = document.getElementById("pin-input");\n      if(pinEl){ pinEl.focus(); }\n      if(state.pinValue.length===6){\n        document.querySelector('[data-action=\"pin-submit\"]').click();\n      }\n    }\n  });\n\n  // ---------- polling update ----------\n  function startPolling(){\n    pollTimer = setInterval(async ()=>{\n      if(state.modal) return; \n      if(state.view===\"scan\") return;\n      await loadInventory();\n      renderView();\n    }, 20000);\n  }\n\n  async function init(){\n    await loadInventory();\n    renderView();\n    startPolling();\n  }\n  init();\n})();\n</script>\n</body>\n</html>\n```
