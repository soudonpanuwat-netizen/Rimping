<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimping Supermarket - Expiry Tracker v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@html5-qrcode/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center text-white text-xl">
                    <i class="fa-solid fa-basket-shopping"></i>
                </div>
                <div>
                    <h1 class="text-md font-bold text-gray-800">Rimping Supermarket</h1>
                    <p class="text-xs text-gray-500">ระบบตรวจสอบวันหมดอายุสินค้า</p>
                </div>
            </div>
            <button id="roleBtn" onclick="toggleRole()" class="text-xs bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full font-medium transition flex items-center gap-1.5">
                <i class="fa-solid fa-user"></i> <span id="roleText">โหมดดูเท่านั้น</span>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 content-section" id="homeSection">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 border border-gray-100">
            <h3 class="font-semibold text-gray-700 mb-3 text-sm flex items-center gap-2">
                <i class="fa-solid fa-chart-pie text-green-600"></i> สรุปสถานะสินค้าบนชั้นวาง
            </h3>
            <div class="grid grid-cols-3 gap-2 text-center text-xs">
                <div class="bg-red-50 p-3 rounded-xl border border-red-100">
                    <p class="text-red-600 font-bold text-lg" id="countExpired">0</p>
                    <p class="text-gray-500">หมดอายุแล้ว</p>
                </div>
                <div class="bg-amber-50 p-3 rounded-xl border border-amber-100">
                    <p class="text-amber-600 font-bold text-lg" id="countWarning">0</p>
                    <p class="text-gray-500">ใกล้หมดอายุ</p>
                </div>
                <div class="bg-green-50 p-3 rounded-xl border border-green-100">
                    <p class="text-green-600 font-bold text-lg" id="countSafe">0</p>
                    <p class="text-gray-500">สถานะปลอดภัย</p>
                </div>
            </div>
        </div>

        <div class="mb-4 relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
            <input type="text" id="searchInput" oninput="renderProducts()" class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="พิมพ์ค้นหา ชื่อสินค้า หรือ บาร์โค้ด (8/13 หลัก)...">
        </div>

        <h3 class="font-semibold text-gray-700 mb-2 text-sm flex items-center justify-between">
            <span class="flex items-center gap-1.5">
                <i class="fa-solid fa-clock-rotate-left text-orange-500"></i> 
                <span>ลำดับสินค้าใกล้หมดอายุ</span>
            </span>
            <span class="text-xs font-normal text-gray-400" id="totalItems">ทั้งหมด 0 รายการ</span>
        </h3>
        
        <div id="itemList" class="space-y-3">
            </div>
    </main>

    <main class="max-w-md mx-auto p-4 content-section hidden" id="scanSection">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="font-bold text-gray-800 mb-4 text-center text-lg">สแกนบาร์โค้ด / เพิ่มล็อตสินค้า</h2>
            
            <div id="reader" class="w-full rounded-xl overflow-hidden bg-gray-50 border border-dashed border-gray-300 mb-4"></div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">รหัสบาร์โค้ด (รองรับ 8 และ 13 หลัก)</label>
                    <div class="flex gap-2">
                        <input type="text" id="barcodeInput" class="w-full p-2.5 border rounded-xl text-sm font-mono" placeholder="ยิงบาร์โค้ด 8 หรือ 13 หลักที่นี่">
                        <button onclick="startScanner()" class="bg-green-600 text-white px-3 rounded-xl text-sm active:scale-95 transition"><i class="fa-solid fa-camera"></i></button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">ชื่อสินค้า</label>
                    <input type="text" id="nameInput" class="w-full p-2.5 border rounded-xl text-sm" placeholder="เช่น โยเกิร์ตรสธรรมชาติ">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">ลิงก์รูปภาพสินค้า (ระบุหรือไม่ก็ได้)</label>
                    <input type="text" id="imageInput" class="w-full p-2.5 border rounded-xl text-sm" placeholder="https://example.com/photo.png">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">วันหมดอายุสำหรับล็อตนี้</label>
                    <input type="date" id="expiryInput" class="w-full p-2.5 border rounded-xl text-sm">
                </div>
                <button onclick="saveProduct()" id="saveBtn" class="w-full bg-gray-400 text-white p-3 rounded-xl font-medium transition cursor-not-allowed text-sm" disabled>
                    <i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูล (เฉพาะแอดมิน)
                </button>
            </div>
        </div>
    </main>

    <main class="max-w-md mx-auto p-4 content-section hidden" id="calendarSection">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
            <h2 class="font-bold text-gray-800 mb-4 text-lg"><i class="fa-solid fa-calendar-days text-red-400"></i> ปฏิทินตรวจสอบวันหมดอายุ</h2>
            <input type="date" id="calendarFilter" onchange="filterByCalendar()" class="w-full p-3 border rounded-xl text-sm mb-4">
            <div id="calendarResults" class="space-y-2 text-left">
                <p class="text-center text-gray-400 text-sm py-4">กรุณาเลือกวันที่ต้องการตรวจเช็คสินค้าหมดอายุในล็อตนั้นๆ</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-2 shadow-lg z-50">
        <div class="max-w-md mx-auto grid grid-cols-3 text-center">
            <button onclick="switchTab('home')" id="tab-home" class="flex flex-col items-center gap-1 text-green-600">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-medium">หน้าหลัก</span>
            </button>
            <button onclick="switchTab('scan')" id="tab-scan" class="flex flex-col items-center gap-1 text-gray-400">
                <i class="fa-solid fa-barcode text-lg"></i>
                <span class="text-[10px] font-medium">เพิ่มสินค้า/สแกน</span>
            </button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="flex flex-col items-center gap-1 text-gray-400">
                <i class="fa-solid fa-calendar-days text-lg"></i>
                <span class="text-[10px] font-medium">ปฏิทิน</span>
            </button>
        </div>
    </nav>

    <script>
        // Mock ข้อมูลเริ่มต้นที่มีทั้งบาร์โค้ด 8 หลัก และ 13 หลัก พร้อมล็อตวันหมดอายุที่ต่างกันเพื่อทดสอบระบบเรียงลำดับ
        let products = [
            { id: 1, barcode: "8850123456789", name: "นมสดรสจืด 1L ล็อตแรก", expiry: "2026-06-21", img: "https://images.unsplash.com/photo-1550583724-b2692b85b150?w=150" },
            { id: 2, barcode: "8850123456789", name: "นมสดรสจืด 1L ล็อตใหม่", expiry: "2026-07-10", img: "https://images.unsplash.com/photo-1550583724-b2692b85b150?w=150" },
            { id: 3, barcode: "12345670", name: "เวเฟอร์ช็อกโกแลต (บาร์โค้ด 8 หลัก)", expiry: "2026-06-19", img: "https://images.unsplash.com/photo-1542838132-92c53300491e?w=150" },
            { id: 4, barcode: "8859999888777", name: "ขนมปังแผ่นโฮลวีต", expiry: "2026-06-25", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=150" }
        ];

        let isAdmin = false;
        let html5QrcodeScanner = null;

        function toggleRole() {
            if (!isAdmin) {
                let password = prompt("กรุณาใส่รหัสผ่านแอดมินเพื่อเข้าสู่โหมดแก้ไขข้อมูล:");
                if (password === "140840") {
                    isAdmin = true;
                    document.getElementById("roleText").innerText = "โหมดแอดมิน (แก้ไขได้)";
                    document.getElementById("roleBtn").className = "text-xs bg-green-100 text-green-700 px-3 py-1.5 rounded-full font-medium flex items-center gap-1.5";
                    if(document.getElementById("saveBtn")) {
                        document.getElementById("saveBtn").disabled = false;
                        document.getElementById("saveBtn").className = "w-full bg-green-600 text-white p-3 rounded-xl font-medium transition hover:bg-green-700 text-sm cursor-pointer";
                    }
                    alert("สิทธิ์แอดมินเปิดใช้งานแล้ว!");
                } else {
                    alert("รหัสผ่านไม่ถูกต้อง!");
                }
            } else {
                isAdmin = false;
                document.getElementById("roleText").innerText = "โหมดดูเท่านั้น";
                document.getElementById("roleBtn").className = "text-xs bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full font-medium flex items-center gap-1.5";
                if(document.getElementById("saveBtn")) {
                    document.getElementById("saveBtn").disabled = true;
                    document.getElementById("saveBtn").className = "w-full bg-gray-400 text-white p-3 rounded-xl font-medium transition cursor-not-allowed text-sm";
                }
            }
            renderProducts();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabName + 'Section').classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(el => el.className = "flex flex-col items-center gap-1 text-gray-400");
            document.getElementById('tab-' + tabName).className = "flex flex-col items-center gap-1 text-green-600";
            
            if (tabName !== 'scan' && html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
        }

        function startScanner() {
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 260, height: 160 } },
                (decodedText) => {
                    let cleanedBarcode = decodedText.trim();
                    document.getElementById("barcodeInput").value = cleanedBarcode;
                    
                    // ระบบ Auto-Fill ดึงข้อมูลเดิมมาเติมให้เมื่อตรวจพบบาร์โค้ดซ้ำ (ไม่ว่าจะเป็น 8 หรือ 13 หลัก)
                    let existing = products.find(p => p.barcode === cleanedBarcode);
                    if(existing) {
                        document.getElementById("nameInput").value = existing.name;
                        document.getElementById("imageInput").value = existing.img;
                    }
                    html5QrcodeScanner.clear();
                },
                (err) => { /* ค้นหาบาร์โค้ดต่อเนื่อง */ }
            ).catch(err => alert("เกิดข้อผิดพลาดในการเปิดกล้อง: " + err));
        }

        function saveProduct() {
            if(!isAdmin) return alert("เฉพาะแอดมินเท่านั้นที่เพิ่มข้อมูลได้");
            
            let barcode = document.getElementById("barcodeInput").value.trim();
            let name = document.getElementById("nameInput").value.trim();
            let img = document.getElementById("imageInput").value.trim() || "https://images.unsplash.com/photo-1542838132-92c53300491e?w=150";
            let expiry = document.getElementById("expiryInput").value;

            if(!barcode || !name || !expiry) return alert("กรุณากรอกข้อมูลสำคัญ (บาร์โค้ด, ชื่อสินค้า, วันหมดอายุ) ให้ครบถ้วน");
            
            // ตรวจสอบหลักของบาร์โค้ดให้รองรับตามสากล 8 และ 13 หลัก
            if(barcode.length !== 8 && barcode.length !== 13) {
                return alert("บาร์โค้ดไม่ถูกต้อง! ระบบรองรับเฉพาะบาร์โค้ดแบบ 8 หลัก และ 13 หลักเท่านั้น (ปัจจุบันยาว " + barcode.length + " หลัก)");
            }

            products.push({ id: Date.now(), barcode, name, expiry, img });
            alert("บันทึกสินค้ารายล็อตสำเร็จ!");
            
            // ล้างข้อมูลฟอร์ม
            document.getElementById("barcodeInput").value = "";
            document.getElementById("nameInput").value = "";
            document.getElementById("imageInput").value = "";
            document.getElementById("expiryInput").value = "";
            
            switchTab('home');
            renderProducts();
        }

        function deleteProduct(id) {
            if(!isAdmin) return alert("ไม่มีสิทธิ์เข้าถึงการลบ");
            if(confirm("คุณต้องการลบสินค้าล็อตนี้ใช่หรือไม่?")) {
                products = products.filter(p => p.id !== id);
                renderProducts();
            }
        }

        // ตัวคัดกรอง, จัดเรียงลำดับวันหมดอายุ และแสดงผล
        function renderProducts() {
            let container = document.getElementById("itemList");
            container.innerHTML = "";
            
            let searchText = document.getElementById("searchInput").value.toLowerCase().trim();
            let countExpired = 0; let countWarning = 0; let countSafe = 0;
            let today = new Date();
            today.setHours(0,0,0,0);

            // คัดกรองข้อมูลจากช่องค้นหา (กรองได้ทั้งจาก ชื่อสินค้า และ รหัสบาร์โค้ด)
            let filteredProducts = products.filter(p => {
                return p.name.toLowerCase().includes(searchText) || p.barcode.includes(searchText);
            });

            // 👑 KEY FEATURE: จัดเรียงข้อมูลให้ "วันหมดอายุใกล้เข้ามาที่สุด" อยู่ด้านบนสุดเสมอ
            filteredProducts.sort((a, b) => {
                return new Date(a.expiry) - new Date(b.expiry);
            });

            // คำนวณสรุปสถิติจำนวนรวมทั้งหมด (อ้างอิงจากข้อมูลตั้งต้นหลัก)
            products.forEach(p => {
                let expDate = new Date(p.expiry);
                expDate.setHours(0,0,0,0);
                let diff = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
                if (diff < 0) countExpired++;
                else if (diff <= 7) countWarning++;
                else countSafe++;
            });

            // พ่นโครงสร้างการแสดงผลที่คัดกรองและเรียงลำดับแล้วลงหน้าเว็บ
            if(filteredProducts.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 text-sm py-8">🔍 ไม่พบข้อมูลสินค้าที่ตรงกับคำค้นหาของคุณ</p>`;
            } else {
                filteredProducts.forEach(p => {
                    let expDate = new Date(p.expiry);
                    expDate.setHours(0,0,0,0);
                    let diffDays = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));

                    let statusColor = "bg-green-100 text-green-700 border-green-200";
                    let badgeText = `อีก ${diffDays} วัน`;

                    if (diffDays < 0) {
                        statusColor = "bg-red-100 text-red-700 border-red-200 font-bold animate-pulse";
                        badgeText = "หมดอายุแล้ว ❌";
                    } else if (diffDays <= 7) {
                        statusColor = "bg-amber-100 text-amber-700 border-amber-200";
                        badgeText = `ใกล้หมดอายุ (${diffDays} วัน) ⚠️`;
                    }

                    container.innerHTML += `
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex gap-3 items-center relative transition hover:border-gray-300">
                            <img src="${p.img}" class="w-14 h-14 object-cover rounded-lg bg-gray-50 flex-shrink-0">
                            <div class="flex-1 min-w-0">
                                <h4 class="font-medium text-gray-800 text-sm truncate">${p.name}</h4>
                                <p class="text-xs text-gray-400 font-mono truncate"><i class="fa-solid fa-barcode"></i> ${p.barcode}</p>
                                <p class="text-xs font-semibold mt-1 text-gray-600">EXP: ${p.expiry}</p>
                            </div>
                            <div class="text-right flex flex-col items-end gap-2">
                                <span class="text-[10px] px-2 py-0.5 rounded-full border ${statusColor}">${badgeText}</span>
                                ${isAdmin ? `<button onclick="deleteProduct(${p.id})" class="text-red-400 text-xs hover:text-red-600 p-1"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById("countExpired").innerText = countExpired;
            document.getElementById("countWarning").innerText = countWarning;
            document.getElementById("countSafe").innerText = countSafe;
            document.getElementById("totalItems").innerText = `ทั้งหมด ${filteredProducts.length} รายการ`;
        }

        function filterByCalendar() {
            let targetDate = document.getElementById("calendarFilter").value;
            let resultContainer = document.getElementById("calendarResults");
            resultContainer.innerHTML = "";

            if(!targetDate) return;

            let filtered = products.filter(p => p.expiry === targetDate);

            if(filtered.length === 0) {
                resultContainer.innerHTML = `<p class="text-center text-gray-400 text-sm py-4">🎉 ไม่มีสินค้ารายล็อตใดที่จะหมดอายุในวันที่นี้</p>`;
                return;
            }

            filtered.forEach(p => {
                resultContainer.innerHTML += `
                    <div class="p-2.5 bg-red-50 border border-red-100 rounded-xl text-xs flex justify-between items-center">
                        <div>
                            <span class="font-medium text-gray-800">${p.name}</span>
                            <p class="text-gray-400 text-[10px] font-mono">${p.barcode}</p>
                        </div>
                        <span class="text-red-600 font-bold">หมดอายุวันนี้</span>
                    </div>
                `;
            });
        }

        // รันคำสั่งเริ่มต้น
        renderProducts();
    </script>
</body>
</html>
