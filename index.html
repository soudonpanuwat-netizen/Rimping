<style>
  html, body { overscroll-behavior-y: none; }
  body {
    background-color: #eef6f0;
    background-image:
      radial-gradient(circle at 12% -8%, rgba(45,125,79,0.10) 0%, transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(31,107,63,0.08) 0%, transparent 40%);
    background-attachment: fixed;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  html { touch-action: manipulation; }
  #modal-root .overflow-y-auto { overscroll-behavior-y: contain; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  #qr-reader video { border-radius: 1rem; object-fit: cover; width: 100% !important; height: 100% !important; }

  #print-area { display: none; }
  #print-area table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #print-area th, #print-area td { border: 1px solid #ccc; padding: 4px 8px; text-align: left; }
  #print-area h2 { margin-bottom: 4px; font-size: 16px; }
  #print-area p { margin-bottom: 12px; color: #555; font-size: 12px; }

  @media print {
    #app, #modal-root { display: none !important; }
    #print-area { display: block !important; padding: 24px; }
  }
  
  .autocomplete-items {
    position: absolute;
    border: 1px solid #d4d4d4;
    border-bottom: none;
    border-top: none;
    z-index: 99;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 200px;
    overflow-y: auto;
    border-radius: 0 0 1rem 1rem;
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  }
  .autocomplete-items div {
    padding: 10px;
    cursor: pointer;
    background-color: #fff;
    border-bottom: 1px solid #d4d4d4;
  }
  .autocomplete-items div:hover {
    background-color: #e9e9e9;
  }
  .bg-brand-600 { box-shadow: 0 6px 18px -4px rgba(15,82,53,0.45), 0 2px 6px -1px rgba(15,82,53,0.25) !important; }
  .bg-brand-600:active { box-shadow: 0 2px 8px -2px rgba(15,82,53,0.35) !important; }
  html.dark .bg-brand-600 { box-shadow: 0 6px 20px -4px rgba(0,0,0,0.5) !important; }
  .autocomplete-active {
    background-color: #1f6b3f !important;
    color: #ffffff;
  }

  /* ---- Animations ---- */
  @keyframes fadeUpIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes fadeOutDown { from { opacity:1; transform: translateY(0); } to { opacity:0; transform: translateY(8px); } }
  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  @keyframes splashFade { from { opacity:1; } to { opacity:0; } }
  .fx-fade-up { animation: fadeUpIn 0.28s ease-out both; }
  .fx-tab-in { animation: fadeIn 0.22s ease-out both; }
  @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity:1; transform: translateX(-50%) translateY(0); } to { opacity:0; transform: translateX(-50%) translateY(8px); } }
  .fx-toast-in { animation: toastIn 0.25s ease-out both; }
  .fx-toast-out { animation: toastOut 0.25s ease-in both; }
  .skeleton-shimmer {
    background: linear-gradient(90deg, #e3ece6 25%, #f1f6f3 37%, #e3ece6 63%);
    background-size: 400px 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }

function rowToPending(row) {
  let editTargetId = null;
  // ใช้ prefix พิเศษใน submitted_by เพื่อระบุว่าเป็นคำขอแก้ไข โดยไม่ต้องเพิ่มคอลัมน์ใน Supabase
  // รูปแบบ: "EDIT#<targetProductId>#<ชื่อพนักงาน>"
  let submittedBy = row.submitted_by || '';
  const m = submittedBy.match(/^EDIT#(\d+)#([\s\S]*)$/);
  if (m) { editTargetId = parseInt(m[1], 10); submittedBy = m[2]; }
  return {
    id: row.id,
    barcode: row.barcode || '',
    plu: row.plu || '',
    name: row.name || '',
    expiryDate: row.expiry_date || '',
    expiryDates: row.expiry_dates ? row.expiry_dates.split(',').filter(Boolean) : [],
    imageUrl: row.image_url || '',
    expiryPhoto: row.expiry_photo || '',
    submittedAt: row.submitted_at || '',
    submittedBy: submittedBy,
    editTargetId: editTargetId,
  };
}
function pendingToRow(p) {
  let submittedBy = p.submittedBy || '';

    plu: p.plu || '',

    expiry_photo: p.expiryPhoto || '',
    submitted_at: p.submittedAt || new Date().toISOString(),
    submitted_by: submittedBy,
  };
}

async function uploadImageToStorage(dataUrl, prefix) {
  if (!dataUrl || !dataUrl.startsWith('data:')) return dataUrl || '';
  if (!sb) return dataUrl;
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const path = `${prefix}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
    const { error: uploadError } = await sb.storage.from(IMAGES_BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });
    if (uploadError) { console.error('uploadImageToStorage failed:', uploadError); return dataUrl; }
    const { data } = sb.storage.from(IMAGES_BUCKET).getPublicUrl(path);
    return data.publicUrl;
  } catch (err) {
    console.error('uploadImageToStorage failed:', err);
    return dataUrl;
  }
}

async function saveProducts(list) {

  try {

    //  ถูกลบหายไปโดยไม่ได้ตั้งใจตอนเครื่องนี้บันทึกรายการอื่นที่ไม่เกี่ยวข้องกันเลย — สาเหตุของ "สินค้าหายหลังสแกนซ้ำ")
    if (list.length > 0) {
      const rows = list.map(productToRow);
      const { error: upsertError } = await sb.from(PRODUCTS_TABLE).upsert(rows, { onConflict: 'id' });
      if (upsertError) throw upsertError;
    }
    return true;
  } catch (err) {
    console.error('saveProducts (Supabase) failed:', err);
    return false;
  }
}

let products = [];

// ==================== Domain helpers ====================
function getStatus(expiryDateStr) {
  if (!expiryDateStr) return 'nodate';
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  if (!expiryDateStr) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function compareByDaysLeft(a, b) {
  if (a.daysLeft === null && b.daysLeft === null) return 0;
  if (a.daysLeft === null) return 1;
  if (b.daysLeft === null) return -1;
  return a.daysLeft - b.daysLeft;
}
function relativeDaysText(daysLeft) {
  if (daysLeft === null || daysLeft === undefined) return '';
  if (daysLeft === 0) return 'หมดอายุวันนี้';
  if (daysLeft > 0) return `เหลือ ${daysLeft} วัน`;
  return `เลยมา ${Math.abs(daysLeft)} วัน`;
}
function barcodeBlockHTML(barcode, idSuffix) {
  if (!barcode) return '';
  const safeId = 'barcode-svg-' + idSuffix;
  return `
    <div class="mt-2 flex flex-col items-center rounded-2xl bg-white p-3 ring-1 ring-stone-100">
      <svg id="${safeId}" data-value="${escapeHtml(barcode)}" class="w-full" style="max-height:80px"></svg>
    </div>`;
}

function detectBarcodeFormat(value) {
  const v = String(value).trim();
  // EAN-13 (13 หลัก) / UPC-A (12 หลัก) / EAN-8 (8 หลัก) ต้องเป็นตัวเลขล้วน
  if (/^\d{13}$/.test(v)) return 'EAN13';
  if (/^\d{12}$/.test(v)) return 'UPC';
  if (/^\d{8}$/.test(v)) return 'EAN8';
  // อื่นๆ (มีตัวอักษร, หลักไม่ครบ) ใช้ CODE128 ที่รองรับได้ทุกแบบ
  return 'CODE128';
}

function renderBarcodeSVGs() {
  if (typeof JsBarcode === 'undefined') return;
  document.querySelectorAll('svg[id^="barcode-svg-"]').forEach(svg => {
    const value = svg.getAttribute('data-value');
    if (!value || svg.getAttribute('data-rendered') === '1') return;
    const fmt = detectBarcodeFormat(value);
    try {
      JsBarcode(svg, value, {
        format: fmt,
        width: 2,
        height: 56,
        displayValue: true,
        fontSize: 13,
        margin: 4,
        background: '#ffffff',
        lineColor: '#0a2a1c',
      });
      svg.setAttribute('data-rendered', '1');
    } catch (e) {
      // ถ้าเป็น EAN/UPC แล้ว checksum ไม่ผ่าน JsBarcode จะ error — ลองใหม่ด้วย CODE128 ที่ยืดหยุ่นกว่า
      try {
        JsBarcode(svg, value, { format: 'CODE128', width: 2, height: 56, displayValue: true, fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c' });
        svg.setAttribute('data-rendered', '1');
      } catch (e2) {
        svg.outerHTML = `<p class="text-center text-[11px] text-stone-400">บาร์โค้ด ${value}</p>`;
      }
    }
  });
}

function updateLiveBarcode(inputId, previewId) {
  const input = document.getElementById(inputId);
  const preview = document.getElementById(previewId);
  if (!input || !preview) return;
  const val = input.value.trim();
  if (!val) { preview.innerHTML = ''; return; }
  preview.innerHTML = `<div class="mt-2 flex flex-col items-center rounded-2xl bg-white p-3 ring-1 ring-stone-100"><svg id="live-barcode-${previewId}" class="w-full" style="max-height:80px"></svg></div>`;
  if (typeof JsBarcode !== 'undefined') {
    const fmt = detectBarcodeFormat(val);
    try {
      JsBarcode(`#live-barcode-${previewId}`, val, {
        format: fmt, width: 2, height: 56, displayValue: true,
        fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c',
      });
    } catch (e) {
      try {
        JsBarcode(`#live-barcode-${previewId}`, val, {
          format: 'CODE128', width: 2, height: 56, displayValue: true,
          fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c',
        });
      } catch (e2) {
        preview.innerHTML = `<p class="mt-2 text-center text-[11px] text-stone-400">บาร์โค้ดนี้สร้างภาพไม่ได้ (${escapeHtml(val)})</p>`;
      }
    }
  }
}

function formatThaiDateTime(isoString) {
  if (!isoString) return '';
  const d = new Date(isoString);
  const datePart = d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
  const timePart = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
  return `${datePart} · ${timePart} น.`;
}
function formatThaiDate(dateStr) {
  if (!dateStr) return 'ยังไม่มีวันหมดอายุ';
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
}
function escapeHtml(str) {
  const p = document.createElement('p');
  p.textContent = str;
  return p.innerHTML;
}

function truncateName(name, maxLen = 32) {
  if (!name) return '';
  return name.length > maxLen ? name.slice(0, maxLen).trim() + '…' : name;
}

}

function ensureOcrFileInput() {

// ==================== Visual Search (ค้นหาด้วยรูปภาพ) ====================
function loadVisualSearchModel() {
  if (window.__mobilenetModel) return Promise.resolve(window.__mobilenetModel);
  if (window.__mobilenetLoadingPromise) return window.__mobilenetLoadingPromise;
  window.__mobilenetLoadingPromise = new Promise((resolve, reject) => {
    const tfScript = document.createElement('script');
    tfScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js';
    tfScript.onload = () => {
      const mnScript = document.createElement('script');
      mnScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js';
      mnScript.onload = async () => {
        try {
          const model = await mobilenet.load({ version: 2, alpha: 1.0 });
          window.__mobilenetModel = model;
          resolve(model);
        } catch (e) { reject(e); }
      };
      mnScript.onerror = () => reject(new Error('โหลดโมเดลไม่สำเร็จ'));
      document.head.appendChild(mnScript);
    };
    tfScript.onerror = () => reject(new Error('โหลด TensorFlow.js ไม่สำเร็จ'));
    document.head.appendChild(tfScript);
  });
  return window.__mobilenetLoadingPromise;
}

function loadImageElement(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('โหลดรูปไม่สำเร็จ'));
    img.src = src;
  });
}

async function computeImageEmbedding(imgEl) {
  const model = await loadVisualSearchModel();
  const t = model.infer(imgEl, true);
  const data = await t.data();
  t.dispose();
  return Array.from(data);
}

function cosineSimilarity(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-8);
}

  stopScanner();

async function handleVisualSearchFileSelected(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  state.ocrCancelled = false;
  showVisualSearchProgress('🔎 กำลังโหลดระบบจำรูปภาพ...');
  try {
    await loadVisualSearchModel();
    if (state.ocrCancelled) return;
    showVisualSearchProgress('📸 กำลังวิเคราะห์รูปที่ถ่าย...');
    const fileUrl = URL.createObjectURL(file);
    const capturedImg = await loadImageElement(fileUrl);
    const queryEmbedding = await computeImageEmbedding(capturedImg);
    URL.revokeObjectURL(fileUrl);
    if (state.ocrCancelled) return;

    const candidates = products.filter(p => !p.removed && p.imageUrl);

    // เก็บ embedding ที่มีอยู่แล้วไว้ในแมพตาม imageUrl (กันคำนวณซ้ำ ถ้าหลายล็อตใช้รูปเดียวกัน)
    const urlToEmbedding = new Map();
    candidates.forEach(p => {
      if (p.imageEmbedding && p.imageEmbedding.length && !urlToEmbedding.has(p.imageUrl)) {
        urlToEmbedding.set(p.imageUrl, p.imageEmbedding);
      }
    });

    // หารูปที่ยังไม่เคยมี embedding เลย (นับครั้งเดียวต่อ 1 รูป ไม่ว่าจะมีกี่ล็อตใช้รูปนั้นอยู่)
    const urlsNeedingCompute = [...new Set(candidates.filter(p => !urlToEmbedding.has(p.imageUrl)).map(p => p.imageUrl))];

    // คำนวณแบบขนานทีละชุด (เร็วกว่าทีละรูปแบบเดิมหลายเท่า) แต่ไม่ขนานมากเกินไปกันเครื่องที่สเปกต่ำหน่วง
    const CONCURRENCY = 3;
    let doneCount = 0;
    for (let i = 0; i < urlsNeedingCompute.length; i += CONCURRENCY) {
      if (state.ocrCancelled) return;
      const batch = urlsNeedingCompute.slice(i, i + CONCURRENCY);
      showVisualSearchProgress(`🔎 กำลังวิเคราะห์รูปภาพ... (${doneCount}/${urlsNeedingCompute.length} รูป)`);
      await Promise.all(batch.map(async (url) => {
        try {
          const img = await loadImageElement(url);
          const emb = await computeImageEmbedding(img);
          urlToEmbedding.set(url, emb);
        } catch (e) { /* ข้ามรูปที่โหลดไม่ได้ ไปต่อตัวอื่น */ }
      }));
      doneCount += batch.length;
    }

    // แปะ embedding กลับให้ทุกล็อตที่ใช้รูปร่วมกัน + เก็บรายการที่ต้องบันทึกแคชใหม่
    const embeddedItems = [];
    candidates.forEach(p => {
      if (!p.imageEmbedding || !p.imageEmbedding.length) {
        const emb = urlToEmbedding.get(p.imageUrl);
        if (emb) { p.imageEmbedding = emb; embeddedItems.push(p); }
      }
    });
    if (embeddedItems.length > 0) saveProductsOrWarn(embeddedItems);

    const scored = candidates
      .filter(p => p.imageEmbedding && p.imageEmbedding.length)
      .map(p => ({ product: p, score: cosineSimilarity(queryEmbedding, p.imageEmbedding) }));

    scored.sort((a, b) => b.score - a.score);
    // แสดง 5 อันดับที่คล้ายที่สุดเสมอ (กรองแค่ตัวที่ไม่เกี่ยวข้องชัดเจนออกเท่านั้น เกณฑ์ต่ำมาก)
    // เพราะรูปที่ถ่ายจริงในร้าน (มุม/แสง/ระยะต่างจากรูปตอนบันทึกครั้งแรก) ทำให้คะแนนความคล้ายลดลงได้มาก
    // ถึงจะเป็นสินค้าตัวเดียวกันจริงก็ตาม จึงไม่ควรตั้งเกณฑ์สูง ให้ผู้ใช้ดูรูป+ชื่อแล้วตัดสินใจเองดีกว่า
    const top = scored.slice(0, 5).filter(s => s.score > 0.08);
    closeOcrOverlay();
    showVisualSearchResults(top);
  } catch (err) {
    console.error('Visual search error:', err);
    if (state.ocrCancelled) return;
    closeOcrOverlay();
    showAlertModal('ค้นหาด้วยรูปภาพไม่สำเร็จ ลองใหม่ หรือตรวจสอบอินเทอร์เน็ต (โหลดโมเดลครั้งแรกต้องใช้เน็ต)');
  }
}

// ==================== App Navigation ====================
function renderPage() {
  const app = document.getElementById('app');
  if (!state.entered) {
    app.innerHTML = welcomeHTML();
    return;
  }
  
  // ก่อนทำลาย DOM เดิม (app.innerHTML จะถูกเขียนทับด้านล่าง) ต้องปิดกล้องให้ถูกต้องก่อนเสมอ
  // ไม่งั้นถ้ามี <video> ของกล้องค้างอยู่ใน DOM เก่า จะถูกทำลายไปดื้อๆ โดยที่ตัวแปร html5QrCode ยังไม่ถูกล้าง
  // ทำให้ initScanner() รอบต่อไปคิดว่ากล้องเปิดอยู่แล้ว (เช็ค if (html5QrCode) return;) แล้วไม่เปิดกล้องใหม่ให้ - กล้องเลยค้างดับ
  // เคสนี้เกิดบ่อยตอน Realtime sync เด้ง renderPage() ซ้อนเข้ามาไม่กี่ร้อยมิลลิวินาทีหลังบันทึกข้อมูลสำเร็จ
  if (html5QrCode) stopScanner();
  
  let content = '';
  switch (state.tab) {
    case 'dashboard': content = dashboardHTML(); break;
    case 'scanner': content = scannerHTML(); break;
    case 'calendar': content = calendarHTML(); break;
    case 'admin': content = adminHTML(); break;

let scannerStopPromise = null;

// ตรวจสอบ check digit ตามมาตรฐานสากล (EAN-8, UPC-A, EAN-13, GTIN-14)
// ถ้าเป็นบาร์โค้ดตัวเลขล้วนที่ยาวตรงตามมาตรฐานแต่ checksum ไม่ผ่าน แปลว่าอ่านผิดแน่นอน ให้ปัดทิ้งทันที
function isValidBarcodeChecksum(code) {
  if (!/^\d+$/.test(code)) return true; // ไม่ใช่ตัวเลขล้วน (เช่น QR/Code128 ข้อความ) ข้ามการเช็ค
  if (![8, 12, 13, 14].includes(code.length)) return true; // ความยาวไม่ตรงมาตรฐาน GTIN ข้ามการเช็ค
  const digits = code.split('').map(Number);
  const checkDigit = digits.pop();
  let sum = 0;
  digits.reverse().forEach((d, i) => { sum += (i % 2 === 0) ? d * 3 : d * 1; });
  const calculated = (10 - (sum % 10)) % 10;
  return calculated === checkDigit;
}

// debounce การเปิดกล้องใหม่ กันยิงคำสั่ง initScanner ซ้อนกันจากหลายจุด (renderPage + closeModal) จนกล้องเปิดไม่ติด
let scannerRestartTimer = null;
function scheduleScannerRestart(delay = 0) {
  if (state.tab !== 'scanner') return;
  if (scannerRestartTimer) clearTimeout(scannerRestartTimer);
  scannerRestartTimer = setTimeout(() => {
    scannerRestartTimer = null;
    if (state.tab === 'scanner') initScanner();
  }, delay);
}

async function initScanner() {
  if (!window.Html5Qrcode) return;
  if (window.__scannerStarting) return;
  window.__scannerStarting = true;

  const manualForm = document.getElementById('manual-form');
  if (manualForm) manualForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = document.getElementById('manual-input').value.trim();
    if (val) handleScannedBarcode(val);
  });

  try {
    // รอให้กล้องเก่าปิดสนิทก่อนเสมอ กันเปิดกล้องใหม่ทับกล้องเก่าจนเครื่องค้าง (พบบ่อยบน Android)
    if (scannerStopPromise) { await scannerStopPromise; scannerStopPromise = null; }
    if (html5QrCode) return;

    html5QrCode = new Html5Qrcode('qr-reader');
    await html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => {
        // ด่านที่ 1: เช็ค checksum มาตรฐานสากลก่อน ถ้าเลขไม่ผ่านสูตรคำนวณ แปลว่าอ่านผิดแน่นอน ปัดทิ้งทันทีไม่ต้องนับ
        if (!isValidBarcodeChecksum(decodedText)) return;

        const now = Date.now();
        // ด่านที่ 2: ต้องอ่านได้ค่าเดียวกันติดกัน 3 ครั้งก่อนยืนยัน กันกล้องอ่านพลาด/บาร์โค้ดเพี้ยนจากเฟรมเดียว (เพิ่มความแม่นยำสำหรับระบบบริษัท)
        if (state.scanner.pendingCode === decodedText) {
          state.scanner.pendingCount++;
        } else {
          state.scanner.pendingCode = decodedText;
          state.scanner.pendingCount = 1;
        }
        if (state.scanner.pendingCount < 3) return;

        if (state.scanner.lastCode === decodedText && now - state.scanner.lastTime < 2500) return;
        state.scanner.lastCode = decodedText;
        state.scanner.lastTime = now;
        state.scanner.pendingCode = null;
        state.scanner.pendingCount = 0;
        handleScannedBarcode(decodedText);
      },
      () => {}
    );
    const status = document.getElementById('camera-status');
    if (status) status.remove();
    const frame = document.getElementById('camera-frame');
    if (frame) frame.classList.remove('hidden');
  } catch (err) {
    console.error(err);
    const status = document.getElementById('camera-status');
    if (status) status.textContent = 'ไม่สามารถเข้าถึงกล้องได้';
  } finally {
    window.__scannerStarting = false;
  }
}

async function handleScanImageFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const tempDivId = 'qr-file-scan-temp';
    let tempDiv = document.getElementById(tempDivId);
    if (!tempDiv) {
      tempDiv = document.createElement('div');
      tempDiv.id = tempDivId;
      tempDiv.style.display = 'none';
      document.body.appendChild(tempDiv);
    }
    const fileScanner = new Html5Qrcode(tempDivId);
    const decodedText = await fileScanner.scanFile(file, false);
    try { fileScanner.clear(); } catch {}
    if (!isValidBarcodeChecksum(decodedText)) {
      playBeep('error'); triggerHaptic(30);
      showToast('❌ บาร์โค้ดในรูปไม่ชัดหรืออ่านผิด ลองถ่ายใหม่');
      event.target.value = '';
      return;
    }
    handleScannedBarcode(decodedText);
  } catch (err) {
    console.error(err);
    playBeep('error'); triggerHaptic(30);
    showToast('❌ ไม่พบบาร์โค้ดในรูปภาพนี้');
  }
  event.target.value = '';
}

function stopScanner() {
  if (html5QrCode) {
    const scanner = html5QrCode;
    html5QrCode = null;
    scannerStopPromise = scanner.stop().catch(() => {}).finally(() => { try { scanner.clear(); } catch {} });
    return scannerStopPromise;
  }
  return scannerStopPromise || Promise.resolve();
}

let fieldScanner = null;
function scanBarcodeIntoField(targetInputId) {
  ensureAlertOverlayRoot().innerHTML = `
    <div class="fixed inset-0 z-[230] flex items-center justify-center bg-black/80 p-4" onclick="if(event.target===this) closeFieldScanner()">
      <div class="w-full max-w-sm rounded-3xl bg-white p-5 shadow-2xl">
        <h3 class="mb-3 text-center text-sm font-bold text-stone-800">📷 เล็งกล้องไปที่บาร์โค้ด</h3>
        <div id="field-scanner-box" class="overflow-hidden rounded-2xl bg-black" style="aspect-ratio:4/3"></div>
        <button onclick="closeFieldScanner()" class="mt-4 w-full rounded-2xl bg-stone-100 py-3 text-sm font-bold text-stone-600 active:scale-95">ยกเลิก</button>
      </div>
    </div>`;
  let lastVal = null, sameCount = 0;
  setTimeout(() => {
    fieldScanner = new Html5Qrcode('field-scanner-box');
    fieldScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 140 } },
      (decodedText) => {
        if (!isValidBarcodeChecksum(decodedText)) return;
        // ต้องอ่านค่าเดิมซ้ำ 2 ครั้งติดกันถึงจะยอมรับ กันอ่านเพี้ยน
        if (decodedText === lastVal) { sameCount++; } else { lastVal = decodedText; sameCount = 1; }
        if (sameCount < 2) return;
        const input = document.getElementById(targetInputId);
        if (input) {
          input.value = decodedText;
          input.dispatchEvent(new Event('input', { bubbles: true }));
        }
        triggerHaptic(20);
        showToast(`✅ สแกนบาร์โค้ดได้: ${decodedText}`);
        closeFieldScanner();
      },
      () => {}
    ).catch(() => {
      const box = document.getElementById('field-scanner-box');
      if (box) box.innerHTML = '<p class="flex h-full items-center justify-center p-4 text-center text-xs text-white">เปิดกล้องไม่ได้ กรุณาอนุญาตให้ใช้กล้อง แล้วลองใหม่</p>';
    });
  }, 100);
}
function closeFieldScanner() {
  if (fieldScanner) {
    const s = fieldScanner; fieldScanner = null;
    s.stop().catch(() => {}).finally(() => { try { s.clear(); } catch {} });
  }
  closeAlertOverlay();
}

function handleScannedBarcode(barcode) {
  const existing = products.map(withComputed).filter(p => p.barcode === barcode && !p.removed);
  const resEl = document.getElementById('scan-result');
  
  if (existing.length > 0) {
    playBeep('success'); triggerHaptic(12);
    showToast(`✅ พบสินค้า: ${existing[0].name}`);
    resEl.innerHTML = `
      <div class="space-y-3">
        <p class="text-xs font-bold text-stone-400 uppercase tracking-wider">พบสินค้าในระบบ (${existing.length} รายการ)</p>

    resEl.innerHTML = `

        <div class="shrink-0 text-2xl">❓</div>

        <button onclick="${isDev() ? `openProductForm(null, '${barcode}')` : `openSubmissionForm('${barcode}')`}" class="shrink-0 rounded-xl bg-brand-600 px-3.5 py-2.5 text-xs font-bold text-white shadow-lg active:scale-95">
          ${isDev() ? 'เพิ่มสินค้า' : 'ส่ง AI'}

}

// ==================== Calendar ====================
function calendarHTML() {
  const daysInMonth = new Date(state.cal.year, state.cal.month, 0).getDate();
  const firstDay = new Date(state.cal.year, state.cal.month - 1, 1).getDay();
  
  const events = products.map(withComputed).filter(p => !p.removed);
  const getDayEvents = (d) => {
    const dStr = `${state.cal.year}-${String(state.cal.month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    return events.filter(p => p.expiryDate === dStr);
  };

  return `
    <div class="space-y-5">
      <header class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="rounded-xl bg-gradient-to-br from-brand-600 to-brand-800 p-2 text-white text-lg shadow-sm ring-1 ring-white/10">🗓️</span>
          <h1 class="text-lg font-bold text-stone-800">ปฏิทินวันหมดอายุ</h1>
        </div>
        <div class="flex items-center gap-3 rounded-xl bg-white p-1 ring-1 ring-stone-200">
          <button onclick="changeMonth(-1)" class="p-1.5 text-stone-400 active:scale-90">◀</button>
          <span class="text-xs font-bold text-stone-700 min-w-[80px] text-center">${MONTHS_TH[state.cal.month - 1]} ${state.cal.year + 543}</span>
          <button onclick="changeMonth(1)" class="p-1.5 text-stone-400 active:scale-90">▶</button>
        </div>
      </header>

      <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-stone-200">
        <div class="grid grid-cols-7 mb-2">
          ${WEEKDAYS_TH.map(d => `<div class="text-center text-[10px] font-bold text-stone-400 uppercase">${d}</div>`).join('')}
        </div>
        <div class="grid grid-cols-7 gap-1">
          ${Array(firstDay).fill(0).map(() => `<div class="aspect-square"></div>`).join('')}
          ${Array(daysInMonth).fill(0).map((_, i) => {
            const d = i + 1;
            const dayEvents = getDayEvents(d);
            const isSelected = state.cal.selected === d;
            const hasExpired = dayEvents.some(p => p.status === 'expired');
            const hasUrgent = dayEvents.some(p => p.status === 'urgent');
            
            return `
              <button onclick="selectCalDate(${d})" class="relative flex aspect-square flex-col items-center justify-center rounded-xl transition-all ${isSelected ? 'bg-brand-600 text-white shadow-lg' : 'hover:bg-stone-50'}">
                <span class="text-sm font-bold">${d}</span>
                <div class="mt-0.5 flex gap-0.5">
                  ${hasExpired ? `<span class="h-1 w-1 rounded-full bg-red-500"></span>` : ''}
                  ${hasUrgent ? `<span class="h-1 w-1 rounded-full bg-amber-500"></span>` : ''}
                  ${dayEvents.length > 0 && !hasExpired && !hasUrgent ? `<span class="h-1 w-1 rounded-full bg-brand-400"></span>` : ''}
                </div>
              </button>`;
          }).join('')}
        </div>
      </div>

      <div id="calendar-detail" class="space-y-3">
        ${state.cal.selected ? calendarDetailHTML(getDayEvents(state.cal.selected)) : `<p class="py-8 text-center text-xs text-stone-400 italic">เลือกวันที่เพื่อดูรายการสินค้า</p>`}
      </div>
    </div>`;
}

function changeMonth(delta) {
  state.cal.month += delta;
  if (state.cal.month > 12) { state.cal.month = 1; state.cal.year++; }
  if (state.cal.month < 1) { state.cal.month = 12; state.cal.year--; }
  state.cal.selected = null;
  renderPage();
}

function selectCalDate(d) {
  state.cal.selected = d;
  renderPage();
}

function calendarDetailHTML(list) {
  if (list.length === 0) return `<p class="py-8 text-center text-xs text-stone-400 italic">ไม่มีสินค้าหมดอายุในวันนี้</p>`;
  return `
    <p class="text-xs font-bold text-stone-400 uppercase tracking-wider">รายการสินค้า (${list.length})</p>
    ${list.map(p => productCardHTML(p)).join('')}`;
}

        </form>
      </div>
    </div>
  `);
  document.getElementById('admin-login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const id = document.getElementById('admin-id').value.trim();
    const pin = document.getElementById('admin-pin').value.trim();
    if (id === adminCreds.id && pin === adminCreds.pin) {
      state.isAdminSession = true;

      renderPage();

      err.textContent = 'รหัสพนักงานหรือ PIN ไม่ถูกต้อง';
      err.classList.remove('hidden');

function removedTrendHTML() {
  const days = 7;
  const today = new Date();
  const buckets = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    buckets.push({ key, label: `${d.getDate()}/${d.getMonth() + 1}`, count: 0 });
  }
  const byKey = Object.fromEntries(buckets.map(b => [b.key, b]));
  products.forEach(p => {
    if (!p.removed || !p.removedDate) return;
    const key = p.removedDate.slice(0, 10);
    if (byKey[key]) byKey[key].count++;
  });
  const max = Math.max(1, ...buckets.map(b => b.count));
  const total = buckets.reduce((s, b) => s + b.count, 0);
  return `
    <p class="mb-3 text-xs font-black uppercase tracking-widest text-stone-400">แนวโน้มเก็บออกจากชั้น (7 วันล่าสุด) — รวม ${total} รายการ</p>
    <div class="flex items-end justify-between gap-1.5" style="height:90px">
      ${buckets.map(b => `
        <div class="flex flex-1 flex-col items-center justify-end gap-1" style="height:100%">
          <span class="text-[10px] font-bold text-stone-400">${b.count > 0 ? b.count : ''}</span>
          <div class="w-full rounded-md bg-amber-400" style="height:${Math.max(4, (b.count / max) * 56)}px"></div>
          <span class="text-[9px] text-stone-400">${b.label}</span>
        </div>`).join('')}
    </div>`;
}

function blockIfHardDuplicate(barcode, plu, name, dates) {
  const uniqueDates = new Set(dates);
  if (uniqueDates.size !== dates.length) {
    showAlertModal('พบวันหมดอายุซ้ำกันเองในรายการที่กรอกค่ะ กรุณาตรวจสอบและลบวันที่ซ้ำออกก่อนบันทึก/ส่งคำขอ');
    return true;
  }
  for (const date of dates) {
    const dup = findDuplicateProduct(barcode, plu, name, date, null);
    if (dup) {
      showAlertModal(`รายการนี้มีอยู่ในระบบแล้วค่ะ — "${truncateName(dup.name)}" บาร์โค้ด/PLU/ชื่อเดียวกัน และวันหมดอายุ ${formatThaiDate(date)} ตรงกันเป๊ะ กรุณาตรวจสอบวันหมดอายุที่กรอกอีกครั้ง ก่อนส่งคำขอ เพื่อป้องกันข้อมูลซ้ำซ้อนในระบบนะคะ`);
      return true;
    }
  }
  return false;
}

function findDuplicateProduct(barcode, plu, name, expiryDate, excludeId) {
  return products.find(p => {
    if (p.removed || p.id === excludeId || p.expiryDate !== expiryDate) return false;
    if (barcode && p.barcode === barcode) return true;
    if (plu && p.plu === plu) return true;
    // ไม่มีบาร์โค้ดและไม่มี PLU ทั้งคู่ (ทั้งของที่กำลังเช็คและของเดิม) ใช้ชื่อเทียบแทน
    if (!barcode && !plu && !p.barcode && !p.plu && name && p.name.trim().toLowerCase() === name.trim().toLowerCase()) return true;
    return false;
  });
}

// เช็คซ้ำแบบ real-time ทันทีตอนใส่/เปลี่ยนวันที่ ไม่ต้องรอถึงตอนกดบันทึก
// คืนค่า true ถ้าพบซ้ำ (และโชว์คำเตือนในกล่อง warnAreaId ให้ พร้อมปิดปุ่ม submit ไว้)
function liveCheckDateDuplicates(containerId, warnAreaId, getBarcode, getPlu, getName, getExcludeId, submitBtnId) {
  const container = document.getElementById(containerId);
  const warnArea = document.getElementById(warnAreaId);
  if (!container) return;
  const run = () => {
    const dates = Array.from(container.querySelectorAll('.lot-date-input')).map(i => i.value).filter(Boolean);
    let msg = '';
    if (new Set(dates).size !== dates.length) {
      msg = '⚠️ มีวันหมดอายุซ้ำกันเองในรายการนี้ กรุณาตรวจสอบ';
    } else {
      const barcode = getBarcode ? getBarcode() : '';
      const plu = getPlu ? getPlu() : '';
      const name = getName ? getName() : '';
      const excludeId = getExcludeId ? getExcludeId() : null;
      for (const d of dates) {
        const dup = findDuplicateProduct(barcode, plu, name, d, excludeId);
        if (dup) { msg = `⚠️ "${truncateName(dup.name)}" วันหมดอายุ ${formatThaiDate(d)} มีอยู่ในระบบแล้ว — ถ้าเป็นล็อตใหม่ กรุณาเปลี่ยนวันหมดอายุให้ต่างจากนี้`; break; }
      }
    }
    if (warnArea) warnArea.innerHTML = msg ? `<p class="mt-1 text-xs font-bold text-red-500">${escapeHtml(msg)}</p>` : '';
    const btn = submitBtnId ? document.getElementById(submitBtnId) : null;
    if (btn) btn.disabled = !!msg;
    if (btn) btn.classList.toggle('opacity-50', !!msg);
  };
  container.addEventListener('input', run);
  container.addEventListener('change', run);
  run();
  return run;
}

async function restoreProduct(id) {
  const idx = products.findIndex(x => x.id === id);
  if (idx === -1) return;
  const p = products[idx];
  products[idx] = { ...p, removed: false, removedDate: null, removedBy: '', removedImageUrl: '', removedReason: '' };
  await saveProductsOrWarn([products[idx]]);
  triggerHaptic(12);
  showToast(`↩️ กู้คืน "${truncateName(p.name)}" แล้ว`);
  renderPage();
}

async function sendLineNotificationNow() {
  const btn = document.getElementById('line-notify-btn');

  if (btn) { btn.disabled = true; btn.textContent = '⏳ กำลังส่ง...'; btn.classList.add('opacity-60'); }

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/notify-line`, {

      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      },
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok && data.success) {
      const count = (data.flagged != null) ? data.flagged : '-';
      if (result) result.innerHTML = `<div class="rounded-xl bg-green-100 px-3 py-2 text-xs font-bold text-green-700">✅ ส่งเข้า LINE สำเร็จ! (${count === 0 ? 'วันนี้ไม่มีของใกล้หมดอายุ' : count + ' รายการ'})</div>`;

function exportProductsCSV() {
  const active = products.map(withComputed).filter(p => !p.removed);
  const header = ['ชื่อสินค้า', 'บาร์โค้ด', 'วันหมดอายุ', 'สถานะ', 'เพิ่มโดย', 'วันที่เพิ่ม'];

    p.name, p.barcode, formatThaiDate(p.expiryDate),
    STATUS_LABEL_TH[p.status], p.addedBy || '-', p.addedDate ? new Date(p.addedDate).toLocaleDateString('th-TH') : '-'
  ]);
  const csv = '\ufeff' + [header, ...rows].map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `p3-expiry-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('📊 ดาวน์โหลดไฟล์ Excel แล้ว');
}

async function approvePending(id) {
  const item = pendingSubmissions.find(p => p.id === id);
  if (!item) return;
  
  const name = document.getElementById(`pending-name-${id}`).value.trim();
  const barcode = document.getElementById(`pending-barcode-${id}`).value.trim();
  const plu = document.getElementById(`pending-plu-${id}`).value.trim();
  const dates = Array.from(document.querySelectorAll(`#pending-dates-${id} .lot-date-input`)).map(i => i.value).filter(Boolean);
  
  if (!name || dates.length === 0) return showAlertModal('กรุณากรอกชื่อและวันหมดอายุอย่างน้อย 1 รายการ');
  
  if (blockIfHardDuplicate(barcode, plu, name, dates)) return;
  
  let nextId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
  const newItems = [];
  dates.forEach(expiryDate => {
    const newItem = {
      id: nextId++, barcode, plu, name,
      imageUrl: item.imageUrl,
      expiryDate, addedDate: new Date().toISOString(),
      addedBy: item.submittedBy || state.staffCode
    };
    products.push(newItem);
    newItems.push(newItem);
  });
  
  const ok = await saveProducts(newItems);
  if (!ok) {
    // บันทึกขึ้น Supabase ไม่สำเร็จจริง ย้อนการเพิ่มในเครื่องกลับ กันโชว์ข้อมูลหลอกที่ไม่มีอยู่จริงบนเซิร์ฟเวอร์
    products = products.filter(p => !newItems.includes(p));
    renderPage();
    showAlertModal('บันทึกสินค้าเข้าสู่ระบบไม่สำเร็จค่ะ\n\nคำขอนี้ยังอยู่ใน "คำขอรอตรวจสอบ" เหมือนเดิม ไม่หายไปไหน กรุณาตรวจสอบอินเทอร์เน็ต แล้วลองกดอนุมัติใหม่อีกครั้ง');
    return;
  }
  
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== id);
  const pendingSaveOk = await deletePendingById(id);
  renderPage();
  if (pendingSaveOk) {
    showToast(`✅ อนุมัติสินค้าเข้าสู่ระบบแล้ว (${dates.length} ล็อต)`);
  } else {
    showAlertModal('สินค้าเข้าระบบแล้ว แต่ลบออกจาก "คำขอรอตรวจสอบ" ไม่สำเร็จ\n\nอาจเห็นรายการนี้ซ้ำอยู่ในคำขอรอตรวจสอบ กดรีเฟรชแล้วลองปฏิเสธรายการที่ซ้ำออกได้เลยค่ะ');
  }
}

async function executeApproveAllPending() {
  const btn = document.getElementById('approve-all-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังอนุมัติทั้งหมด... โปรดรอสักครู่'; btn.classList.add('opacity-70'); }

  const itemsSnapshot = [...pendingSubmissions];
  const allNewItems = [];
  const approvedPendingIds = [];
  const skippedNames = [];
  let nextId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;

  for (const item of itemsSnapshot) {
    const id = item.id;
    if (item.editTargetId) continue; // ข้ามคำขอแก้ไข ต้องกดอนุมัติแยกทีละรายการ
    const nameEl = document.getElementById(`pending-name-${id}`);
    const datesContainer = document.getElementById(`pending-dates-${id}`);
    if (!nameEl || !datesContainer) { skippedNames.push(item.name || '(ไม่มีชื่อ)'); continue; }

    const name = nameEl.value.trim();
    const barcodeEl = document.getElementById(`pending-barcode-${id}`);
    const pluEl = document.getElementById(`pending-plu-${id}`);
    const barcode = barcodeEl ? barcodeEl.value.trim() : '';
    const plu = pluEl ? pluEl.value.trim() : '';
    const dates = Array.from(datesContainer.querySelectorAll('.lot-date-input')).map(i => i.value).filter(Boolean);

    if (!name || dates.length === 0) { skippedNames.push(`${name || '(ไม่มีชื่อ)'} — ข้อมูลไม่ครบ`); continue; }
    if (new Set(dates).size !== dates.length) { skippedNames.push(`${name} — วันหมดอายุซ้ำกันเอง`); continue; }

    let hasDup = false;
    for (const date of dates) {
      const dupExisting = findDuplicateProduct(barcode, plu, name, date, null);
      const dupInBatch = allNewItems.find(ni => date === ni.expiryDate && (
        (barcode && ni.barcode === barcode) || (plu && ni.plu === plu) ||
        (!barcode && !plu && !ni.barcode && !ni.plu && ni.name.toLowerCase() === name.toLowerCase())
      ));
      if (dupExisting || dupInBatch) { hasDup = true; break; }
    }
    if (hasDup) { skippedNames.push(`${name} — ซ้ำกับของเดิมในระบบ`); continue; }

    dates.forEach(expiryDate => {
      const newItem = {
        id: nextId++, barcode, plu, name,
        imageUrl: item.imageUrl,
        expiryDate, addedDate: new Date().toISOString(),
        addedBy: item.submittedBy || state.staffCode
      };
      products.push(newItem);
      allNewItems.push(newItem);
    });
    approvedPendingIds.push(id);
  }

  if (allNewItems.length === 0) {
    if (btn) { btn.disabled = false; btn.textContent = `✅ อนุมัติทั้งหมด (${pendingSubmissions.length} รายการ)`; btn.classList.remove('opacity-70'); }
    return showAlertModal(`อนุมัติไม่ได้เลยสักรายการค่ะ ทุกรายการมีปัญหา:\n\n${skippedNames.join('\n')}`);
  }

  const ok = await saveProducts(allNewItems);
  if (!ok) {
    products = products.filter(p => !allNewItems.includes(p));
    renderPage();
    return showAlertModal('บันทึกสินค้าเข้าสู่ระบบไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
  }

  pendingSubmissions = pendingSubmissions.filter(p => !approvedPendingIds.includes(p.id));
  const delOk = await deletePendingByIds(approvedPendingIds);
  renderPage();

  let msg = `✅ อนุมัติสำเร็จ ${approvedPendingIds.length} รายการ (${allNewItems.length} ล็อต)`;
  if (skippedNames.length > 0) msg += ` — ข้าม ${skippedNames.length} รายการ`;
  showToast(msg);

  if (skippedNames.length > 0) {
    showAlertModal(`ข้ามไป ${skippedNames.length} รายการ เพราะข้อมูลไม่ครบ/ซ้ำกับของเดิม:\n\n${skippedNames.join('\n')}\n\nไปแก้ไขแล้วกดอนุมัติทีละรายการที่เหลือได้เลยค่ะ`);
  } else if (!delOk) {
    showAlertModal('สินค้าเข้าระบบครบแล้ว แต่ลบออกจาก "คำขอรอตรวจสอบ" บางรายการไม่สำเร็จ ลองรีเฟรชแล้วปฏิเสธรายการที่ซ้ำออกได้เลยค่ะ');
  }
}

async function approveEditRequest(pendingId) {
  const req = pendingSubmissions.find(p => p.id === pendingId);
  if (!req || !req.editTargetId) return;
  const idx = products.findIndex(p => p.id === req.editTargetId);
  if (idx === -1) {
    showAlertModal('ไม่พบสินค้าต้นทางในระบบแล้ว (อาจถูกแก้ไขหรือลบไปก่อนหน้า) — กรุณาปฏิเสธคำขอนี้');
    return;
  }

  // เช็คว่าบาร์โค้ดใหม่ไปซ้ำกับสินค้าตัวอื่นไหม (กันบาร์โค้ดชนกัน)
  if (req.barcode) {
    const clash = products.find(p => p.id !== req.editTargetId && !p.removed && p.barcode === req.barcode);
    if (clash) {
      showAlertModal(`บาร์โค้ด ${req.barcode} นี้มีสินค้าอื่นใช้อยู่แล้ว ("${truncateName(clash.name)}") กรุณาตรวจสอบก่อนอนุมัติ`);
      return;
    }
  }

  const backup = products[idx];
  products[idx] = { ...backup, name: req.name, barcode: req.barcode, plu: req.plu, imageUrl: req.imageUrl, imageEmbedding: null };
  const ok = await saveProducts([products[idx]]);
  if (!ok) {
    products[idx] = backup;
    renderPage();
    return showAlertModal('อัปเดตข้อมูลไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
  }

  pendingSubmissions = pendingSubmissions.filter(p => p.id !== pendingId);
  await deletePendingById(pendingId);
  triggerHaptic(20);
  renderPage();
  showToast('✅ อนุมัติการแก้ไขแล้ว ข้อมูลสินค้าอัปเดตเรียบร้อย');
}

async function rejectPending(id) {
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== id);
  const ok = await deletePendingById(id);
  renderPage();
  if (ok) showToast('🗑️ ปฏิเสธคำขอแล้ว');
  else showAlertModal('ปฏิเสธคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
}

      const uploadedImg = await uploadImageToStorage(img, 'products');
      let nextId = products.length > 0 ? Math.max(...products.map(x => x.id)) + 1 : 1;

function toggleNoDateMode(wrapId, checkboxId, warnAreaId, submitBtnId) {
  const wrap = document.getElementById(wrapId);
  const checked = document.getElementById(checkboxId).checked;
  if (wrap) {
    wrap.classList.toggle('hidden', checked);
    wrap.querySelectorAll('input[type="date"]').forEach(inp => { inp.required = !checked; });
  }
  if (checked) {
    // สลับเป็นโหมดยังไม่มีของ ไม่มีวันที่ให้เช็คซ้ำแล้ว เคลียร์คำเตือน/ปลดล็อกปุ่มที่อาจค้างจากก่อนหน้า
    if (warnAreaId) { const w = document.getElementById(warnAreaId); if (w) w.innerHTML = ''; }
    if (submitBtnId) { const b = document.getElementById(submitBtnId); if (b) { b.disabled = false; b.classList.remove('opacity-50'); } }
  }
}

  container.appendChild(row);
}

function handleManualPluInput(value) {
  const plu = value.trim();
  const match = plu ? products.find(p => !p.removed && p.plu && p.plu === plu) : null;
  if (match) {
    selectManualMatch(match.id);
  } else if (window.__manualMatched) {
    window.__manualMatched = null;
    renderManualAddBody();
  }
}

function handleManualNameInput(value) {
  renderManualNameSuggestions(value);
  const exact = products.find(p => !p.removed && p.name.toLowerCase() === value.trim().toLowerCase());
  window.__manualMatched = exact || null;
  const pluInput = document.getElementById('manual-plu-input');
  if (pluInput && exact) pluInput.value = exact.plu || '';
  renderManualAddBody();
}

function renderManualNameSuggestions(query) {
  const box = document.getElementById('manual-name-suggestions');
  const q = query.trim().toLowerCase();
  if (!q) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  const seen = new Set();
  const matches = [];
  for (const p of products) {
    if (p.removed || !p.name) continue;
    const key = p.name.toLowerCase();
    if (key.includes(q) && !seen.has(key)) { seen.add(key); matches.push(p); }
    if (matches.length >= 6) break;
  }
  if (matches.length === 0) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  box.classList.remove('hidden');
  box.innerHTML = matches.map(p => `<div onmousedown="selectManualMatch(${p.id})">${escapeHtml(p.name)}${p.plu ? ` <span style="opacity:.5">· PLU ${escapeHtml(p.plu)}</span>` : ''}</div>`).join('');
}

function selectManualMatch(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  window.__manualMatched = p;
  document.getElementById('manual-name-input').value = p.name;
  const pluInput = document.getElementById('manual-plu-input');
  if (pluInput) pluInput.value = p.plu || '';
  const box = document.getElementById('manual-name-suggestions');
  box.classList.add('hidden'); box.innerHTML = '';
  renderManualAddBody();
}

async function submitManualAdd(e) {
  e.preventDefault();
  const matched = window.__manualMatched;
  const name = document.getElementById('manual-name-input').value.trim();
  const pluVal = document.getElementById('manual-plu-input').value.trim();
  if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');

  const submitBtn = e.target.querySelector('button[type="submit"]');
  const setBusy = () => {
    if (!submitBtn) return;
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-70');
    submitBtn.textContent = 'กำลังบันทึก... โปรดรอสักครู่';
  };

  if (matched) {
    const dates = Array.from(document.querySelectorAll('#manual-add-dates .lot-date-input')).map(i => i.value).filter(Boolean);
    if (dates.length === 0) return showAlertModal('กรุณาเลือกวันหมดอายุอย่างน้อย 1 รายการ');
    if (isDev()) {
      if (blockIfHardDuplicate(matched.barcode, matched.plu || pluVal, matched.name, dates)) return;
      setBusy();
      let nextId = products.length > 0 ? Math.max(...products.map(x => x.id)) + 1 : 1;
      const newItemsM = [];
      dates.forEach(date => {
        const ni = { id: nextId++, barcode: matched.barcode || '', plu: matched.plu || pluVal, name: matched.name, category: matched.category || '', imageUrl: matched.imageUrl, expiryDate: date, addedDate: new Date().toISOString(), addedBy: state.staffCode || '-' };
        products.push(ni);
        newItemsM.push(ni);
      });
      await saveProductsOrWarn(newItemsM);
      closeModal(); showToast(`✅ เพิ่ม ${dates.length} ล็อตใหม่แล้ว`); renderPage();
    } else {
      const expImg = window.__manualExpImg;
      if (blockIfHardDuplicate(matched.barcode, matched.plu || pluVal, matched.name, dates)) return;
      setBusy();
      const uploadedExp = expImg ? await uploadImageToStorage(expImg, 'expiry-photos') : '';
      const newId1 = Date.now();
      const newPendingItem1 = { id: newId1, barcode: matched.barcode || '', plu: matched.plu || pluVal, name: matched.name, expiryDate: dates[0], expiryDates: dates, imageUrl: matched.imageUrl, expiryPhoto: uploadedExp, submittedAt: new Date().toISOString(), submittedBy: state.staffCode };
      const ok1 = await upsertPendingRow(newPendingItem1);
      if (!ok1) {
        return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
      }
      pendingSubmissions.push(newPendingItem1);
      closeModal(); showToast(`✅ ส่งคำขอ ${dates.length} ล็อตเรียบร้อยแล้ว`); renderPage();
    }
  } else {
    const prodImg = window.__manualProdImg;
    const noDateMode = document.getElementById('manual-nodate')?.checked;
    let dates = [];
    if (!noDateMode) {
      dates = Array.from(document.querySelectorAll('#manual-add-dates .lot-date-input')).map(i => i.value).filter(Boolean);
      if (dates.length === 0) return showAlertModal('กรุณาเลือกวันหมดอายุอย่างน้อย 1 รายการ (หรือติ๊ก "ยังไม่มีของ")');
    }
    if (isDev()) {
      setBusy();
      const uploadedImg = await uploadImageToStorage(prodImg, 'products');
      let nextId = products.length > 0 ? Math.max(...products.map(x => x.id)) + 1 : 1;
      const datesToSave = noDateMode ? [null] : dates;
      const newItemsU = [];
      datesToSave.forEach(date => {
        const ni = { id: nextId++, barcode: '', plu: pluVal, name, imageUrl: uploadedImg, expiryDate: date, addedDate: new Date().toISOString(), addedBy: state.staffCode || '-' };
        products.push(ni);
        newItemsU.push(ni);
      });
      await saveProductsOrWarn(newItemsU);
      closeModal(); showToast('✅ บันทึกสินค้าสำเร็จ'); renderPage();
    } else {
      const expImg = window.__manualExpImg;
      if (!prodImg) return showAlertModal('กรุณาถ่ายรูปสินค้า');
      setBusy();
      const uploadedProd = await uploadImageToStorage(prodImg, 'products');
      const uploadedExp = expImg ? await uploadImageToStorage(expImg, 'expiry-photos') : '';
      const newId2 = Date.now();
      const newPendingItem2 = { id: newId2, barcode: '', plu: pluVal, name, expiryDate: dates[0], expiryDates: dates, imageUrl: uploadedProd, expiryPhoto: uploadedExp, submittedAt: new Date().toISOString(), submittedBy: state.staffCode };
      const ok2 = await upsertPendingRow(newPendingItem2);
      if (!ok2) {
        return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
      }
      pendingSubmissions.push(newPendingItem2);
      closeModal(); showToast(`✅ ส่งคำขอ ${dates.length} ล็อตเรียบร้อยแล้ว`); renderPage();
    }
  }
}

  };
}

async function compressImageFile(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        if (width > 800) { height *= 800 / width; width = 800; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

let audioCtx = null;
function playBeep(type = 'success') {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtx;
    const now = ctx.currentTime;
    const tone = (freq, start, dur, vol = 0.25) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, now + start);
      gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now + start); osc.stop(now + start + dur);
    };
    if (type === 'success') {
      tone(880, 0, 0.12);
    } else if (type === 'notfound') {
      tone(440, 0, 0.1); tone(330, 0.13, 0.16);
    } else if (type === 'error') {
      tone(220, 0, 0.25, 0.3);
    }
  } catch {}
}

async function refreshFromCloud() {
  try {
    state.realtimeStatus.products = 'connecting'; renderPage();
    products = await fetchProductsFromCloud();
    pendingSubmissions = await fetchPendingFromCloud();
    adminCreds = await fetchAdminCredsFromCloud();
    URGENT_WINDOW_DAYS = adminCreds.urgencyDays || URGENT_WINDOW_DAYS;
    state.realtimeStatus.products = 'connected';
    showToast('✅ อัปเดตข้อมูลล่าสุดแล้ว');
  } catch (err) {
    state.realtimeStatus.products = 'error';
    showToast('❌ รีเฟรชไม่สำเร็จ');
  } finally {
    renderPage();
  }
}

// ==================== Realtime sync (อัปเดตอัตโนมัติข้ามเครื่อง) ====================
let realtimeChannel = null;
let syncDebounceTimer = null;

function scheduleBackgroundSync() {
  if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(backgroundSync, 500);
}

async function backgroundSync() {
  try {
    products = await fetchProductsFromCloud();
    pendingSubmissions = await fetchPendingFromCloud();
    adminCreds = await fetchAdminCredsFromCloud();
    URGENT_WINDOW_DAYS = adminCreds.urgencyDays || URGENT_WINDOW_DAYS;
    state.realtimeStatus.products = 'connected';
  } catch (err) {
    console.error('background sync failed:', err);
  } finally {
    renderPage();
  }
}

function setupRealtimeSync() {
  if (!sb || realtimeChannel) return;
  realtimeChannel = sb.channel('rimping-realtime-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: PRODUCTS_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: PENDING_TABLE }, () => scheduleBackgroundSync())
    .on('postgres_changes', { event: '*', schema: 'public', table: ADMIN_CREDS_TABLE }, () => scheduleBackgroundSync())
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') state.realtimeStatus.products = 'connected';
      else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') state.realtimeStatus.products = 'error';
      renderPage();
    });
}

// ==================== ระบบเช็คอัปเดตอัตโนมัติ ====================
// เช็คว่าไฟล์บนเซิร์ฟเวอร์เป็นเวอร์ชันใหม่กว่าที่เครื่องนี้แคชไว้ไหม ถ้าใหม่กว่า รีโหลดให้ทันทีอัตโนมัติ
let isCheckingForUpdate = false;
async function checkForAppUpdate() {
  if (isCheckingForUpdate) return;
  isCheckingForUpdate = true;
  try {
    const url = window.location.href.split('#')[0].split('?')[0];
    const res = await fetch(url + '?_freshcheck=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      const freshHtml = await res.text();
      const match = freshHtml.match(/APP_BUILD_ID\s*=\s*'([^']+)'/);
      if (match && match[1] && match[1] !== APP_BUILD_ID) {
        showToast('🔄 พบเวอร์ชันใหม่ กำลังอัปเดตให้อัตโนมัติ...');
        setTimeout(() => window.location.reload(), 900);
      }
    }
  } catch (e) { /* ออฟไลน์หรือเน็ตมีปัญหา ข้ามไปก่อน ไม่ต้องแจ้ง error */ }
  isCheckingForUpdate = false;
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkForAppUpdate(); });
setInterval(checkForAppUpdate, 5 * 60 * 1000);

// ==================== Init ====================
function applyDeepLink() {
  // อ่านลิงก์พิเศษจาก URL (เช่น ...app/#scan) แล้วเด้งไปหน้าที่ตรงกัน
  const hash = (window.location.hash || '').replace('#', '').toLowerCase().trim();
  if (!hash) return;
  const map = {
    'scan': 'scanner', 'scanner': 'scanner',
    'add': 'scanner',           // เพิ่มสินค้า → เปิดหน้าสแกน (สแกนแล้วเพิ่มได้เลย)
    'home': 'dashboard', 'dashboard': 'dashboard', 'expiry': 'dashboard',
    'calendar': 'calendar', 'cal': 'calendar',
    'review': 'admin', 'admin': 'admin', 'check': 'admin',
    'help': 'help',             // คู่มือ → เปิด popup คู่มือ
  };
  const target = map[hash];
  if (!target) return;
  if (target === 'help') { setTimeout(() => { if (typeof showHelpGuide === 'function') showHelpGuide(); }, 300); return; }
  state.tab = target;
}

(async function init() {
  try { state.darkMode = localStorage.getItem(DARK_MODE_KEY) === '1'; } catch {}
  applyDarkMode();

  const savedStaff = getSavedStaffCode();
  if (savedStaff) {
    state.staffCode = savedStaff;
    state.entered = true; // เคยใส่ชื่อไว้แล้ว เข้าได้เลย ไม่ต้องล็อกอินซ้ำทุกครั้ง
  }
  
  try {
    await refreshFromCloud();
  } catch (e) {
    console.error('Initial fetch failed', e);
  }
  setupRealtimeSync();
  if (state.entered) applyDeepLink();
  renderPage();

  const splash = document.getElementById('splash-screen');
  if (splash) {
    splash.classList.add('splash-hide');
    setTimeout(() => splash.remove(), 450);
  }

  checkForAppUpdate();
})();
