<script>
'use strict';

const ADMIN_ID_DEFAULT = '63042';
const ADMIN_PIN_DEFAULT = '003577';
const DEV_ID = '63042';
const DEV_PASSWORD = '003577';
let URGENT_WINDOW_DAYS = 7;
const CRITICAL_WINDOW_DAYS = 1;
const WARNING_WINDOW_DAYS = 2;

const STATUS_LABEL_TH = { expired: 'หมดอายุแล้ว', urgent: 'เร่งด่วน', safe: 'ปลอดภัย', nodate: 'ยังไม่มีของ' };
const STATUS_COLOR = { expired: '#dc2626', urgent: '#d97706', safe: '#1f6b3f', nodate: '#78716c' };

const WEEKDAYS_TH = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
const MONTHS_TH = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

const NAV_ITEMS = [
  { id: 'dashboard', label: 'หน้าแรก', emoji: '🏠' },
  { id: 'scanner', label: 'สแกน', emoji: '📷' },
  { id: 'calendar', label: 'ปฏิทิน', emoji: '🗓️' },
  { id: 'admin', label: 'AI ตรวจสอบ', emoji: '🤖' },
];

const FILTER_CHIPS = [
  { id: 'all', label: 'ทั้งหมด' },
  { id: 'expired', label: '🔴 หมดอายุแล้ว' },
  { id: 'urgent', label: '🟡 เร่งด่วน' },
  { id: 'safe', label: '🟢 ปลอดภัย' },
];

const state = {
  entered: false,
  isAdminSession: false,
  isDevSession: false,
  isBranchAdminSession: false,
  adminBranch: '',
  tab: 'dashboard',
  search: '',
  filter: 'all',
  cal: { monthsCount: 6, selectedDate: null },
  scanner: { scannedCode: null, lastCode: null, lastTime: 0, pendingCode: null, pendingCount: 0 },
  staffCode: '',
  staffEmpCode: '',
  userBranch: '',
  viewBranch: 'all',
  realtimeStatus: { products: 'connecting', pending: 'connecting', admincreds: 'connecting' },
  darkMode: false,
};

const DARK_MODE_KEY = 'rimping_dark_mode_v1';
function toggleDarkMode() {
  state.darkMode = !state.darkMode;
  applyDarkMode();
  try { localStorage.setItem(DARK_MODE_KEY, state.darkMode ? '1' : '0'); } catch {}
  renderPage();
}
function applyDarkMode() {
  document.documentElement.classList.toggle('dark', state.darkMode);
}

const STAFF_CODE_KEY = 'rimping_staff_code_v1';
function getSavedStaffCode() {
  try { return localStorage.getItem(STAFF_CODE_KEY) || ''; } catch { return ''; }
}
function saveStaffCode(code) {
  try { localStorage.setItem(STAFF_CODE_KEY, code); } catch {}
}
function clearSavedStaffCode() {
  try { localStorage.removeItem(STAFF_CODE_KEY); } catch {}
}

// ===== โหมด AI ตรวจสอบ: บังคับให้ทุกเครื่องออกจากระบบ (เข้าใหม่ + ใส่ชื่อใหม่) =====
// ===== ระบบผู้ใช้งาน (สมัคร/อนุมัติ/บันทึกการใช้งาน) =====
const BRANCHES = ['สาขาแม่ริม', 'สาขามีโชค', 'สาขาโฮมโปร', 'สาขาเมต้ามอลล์', 'สาขาสันกำแพง', 'สาขากาดฝรั่ง', 'สาขาแอร์พอต', 'สาขานวรัฐ', 'สาขามะลิ'];
const DEFAULT_BRANCH = 'สาขามีโชค';
// สาขาที่กำลังดูอยู่: ผู้ใช้ทั่วไป=สาขาตัวเอง(ล็อกไว้) | แอดมินสาขา=ล็อกเฉพาะสาขาที่ได้รับแต่งตั้ง | แอดมินหลัก/ตัวจัดการเอไอ=เลือกดูได้ ('all'=ทุกสาขา)
function currentViewBranch() {
  if (isDev() || isGlobalAdmin()) return state.viewBranch || 'all';
  if (isBranchAdmin()) return state.adminBranch || DEFAULT_BRANCH;
  return state.userBranch || DEFAULT_BRANCH;
}
// สินค้า/คำขอ นี้อยู่ในสาขาที่กำลังดูอยู่ไหม (ของเก่าที่ยังไม่มีสาขา ถือเป็นมีโชค)
function isVisibleBranch(p) {
  const vb = currentViewBranch();
  if (vb === 'all') return true;
  const pb = p.branch || (isDev() ? DEFAULT_BRANCH : (state.userBranch || DEFAULT_BRANCH));
  return pb === vb;
}
const USERS_TABLE = 'expiry_users';
const ACTIVITY_TABLE = 'expiry_user_activity';
let appActivity = [];
const ONLINE_WINDOW_MS = 3 * 60 * 1000; // ถือว่าออนไลน์ถ้าใช้งานภายใน 3 นาที
function isUserOnline(u) {
  if (!u || !u.last_active_at) return false;
  return (Date.now() - new Date(u.last_active_at).getTime()) < ONLINE_WINDOW_MS;
}
async function fetchActivity() {
  if (!sb) return appActivity;
  try {
    const { data, error } = await sb.from(ACTIVITY_TABLE).select('*').order('created_at', { ascending: false }).limit(60);
    if (!error && data) appActivity = data;
  } catch (e) {}
  return appActivity;
}
async function logActivity(action) {
  if (!sb) return;
  try {
    await sb.from(ACTIVITY_TABLE).insert({
      employee_code: state.staffEmpCode || '', nickname: state.staffCode || '',
      branch: getSavedBranch() || '', action: action || 'ใช้งาน', created_at: new Date().toISOString(),
    });
  } catch (e) {}
}
const EMP_CODE_KEY = 'rimping_emp_code_v1';
const BRANCH_KEY = 'rimping_branch_v1';
const SESSION_DATE_KEY = 'rimping_session_date_v1';
let appUsers = [];
function getSavedEmpCode() { try { return localStorage.getItem(EMP_CODE_KEY) || ''; } catch { return ''; } }
function saveEmpCode(c) { try { localStorage.setItem(EMP_CODE_KEY, c || ''); } catch {} }
function clearSavedEmpCode() { try { localStorage.removeItem(EMP_CODE_KEY); } catch {} }
function getSavedBranch() { try { return localStorage.getItem(BRANCH_KEY) || ''; } catch { return ''; } }
function saveBranch(b) { try { localStorage.setItem(BRANCH_KEY, b || ''); } catch {} }
// วันที่ (โซนไทย) รูปแบบ YYYY-MM-DD ใช้เช็คว่า login ค้างเฉพาะวันนั้น
function todayBangkok() {
  const now = new Date();
  const bkk = new Date(now.getTime() + (now.getTimezoneOffset() + 420) * 60000);
  return `${bkk.getFullYear()}-${String(bkk.getMonth() + 1).padStart(2, '0')}-${String(bkk.getDate()).padStart(2, '0')}`;
}
function saveSessionDate() { try { localStorage.setItem(SESSION_DATE_KEY, todayBangkok()); } catch {} }
function getSessionDate() { try { return localStorage.getItem(SESSION_DATE_KEY) || ''; } catch { return ''; } }
function isSessionValidToday() { return getSessionDate() === todayBangkok(); }
async function fetchUsers() {
  if (!sb) return appUsers;
  try {
    const { data, error } = await sb.from(USERS_TABLE).select('*').order('created_at', { ascending: false });
    if (!error && data) appUsers = data;
  } catch (e) {}
  return appUsers;
}
function findUser(code) { return appUsers.find(u => String(u.employee_code) === String(code)); }
async function touchUserActive(code) {
  if (!sb || !code) return;
  try { await sb.from(USERS_TABLE).update({ last_active_at: new Date().toISOString() }).eq('employee_code', String(code)); } catch (e) {}
}
async function registerUser(code, nickname, branch) {
  if (!sb) return { ok: false, err: 'ไม่ได้เชื่อมต่อฐานข้อมูล' };
  try {
    const { error } = await sb.from(USERS_TABLE).insert({ employee_code: String(code), nickname: nickname, branch: branch || '', status: 'pending', created_at: new Date().toISOString() });
    if (error) return { ok: false, err: error.message };
    return { ok: true };
  } catch (e) { return { ok: false, err: String(e) }; }
}
async function setUserStatus(code, status) {
  if (!sb) return false;
  try {
    const patch = { status };
    if (status === 'approved') patch.approved_at = new Date().toISOString();
    const { error } = await sb.from(USERS_TABLE).update(patch).eq('employee_code', String(code));
    return !error;
  } catch (e) { return false; }
}

const SETTINGS_TABLE = 'expiry_settings';
const FORCE_LOGOUT_ACK_KEY = 'rimping_force_logout_ack_v1';
function getForceLogoutAck() {
  try { return localStorage.getItem(FORCE_LOGOUT_ACK_KEY) || ''; } catch { return ''; }
}
function setForceLogoutAck(v) {
  try { localStorage.setItem(FORCE_LOGOUT_ACK_KEY, v || ''); } catch {}
}
// อ่านเวลาที่AI ตรวจสอบสั่งให้ออกจากระบบล่าสุด (คืน '' ถ้าไม่มี/ตารางยังไม่ถูกสร้าง)
async function fetchForceLogoutAt() {
  if (!sb) return '';
  try {
    const { data, error } = await sb.from(SETTINGS_TABLE).select('value').eq('key', 'force_logout_at').maybeSingle();
    if (error) return '';
    return (data && data.value) ? String(data.value) : '';
  } catch (e) { return ''; }
}
// ล้าง session ในเครื่องนี้ (กลับไปหน้าใส่ชื่อ)

function rowToProduct(row) {
  return {
    branch: row.branch || DEFAULT_BRANCH,
    id: row.id,
    barcode: row.barcode || '',
    plu: row.plu || '',
    name: row.name || '',
    category: row.category || '',
    imageUrl: row.image_url || '',
    imageEmbedding: (() => { try { return row.image_embedding ? JSON.parse(row.image_embedding) : null; } catch { return null; } })(),
    expiryDate: row.expiry_date || '',
    notes: row.notes || '',
    addedDate: row.added_date || '',
    addedBy: row.added_by || '',
    removed: !!row.removed,
    removedDate: row.removed_date || null,
    removedBy: row.removed_by || '',
    removedImageUrl: row.removed_image_url || '',
    removedReason: row.removed_reason || '',
  };
}
function productToRow(p) {
  return {
    branch: p.branch || getSavedBranch() || DEFAULT_BRANCH,
    id: p.id,
    barcode: p.barcode || '',
    plu: p.plu || '',
    name: p.name || '',
    category: p.category || '',
    image_url: p.imageUrl || '',
    image_embedding: p.imageEmbedding ? JSON.stringify(p.imageEmbedding) : null,
    expiry_date: p.expiryDate || null,
    notes: p.notes || '',
    added_date: p.addedDate || new Date().toISOString(),
    added_by: p.addedBy || '',
    removed: !!p.removed,
    removed_date: p.removedDate || null,
    removed_by: p.removedBy || '',
    removed_image_url: p.removedImageUrl || '',
    removed_reason: p.removedReason || '',
  };
}
function rowToPending(row) {
  let editTargetId = null;
  let removeTargetId = null;
  let deleteTargetId = null;
  let submittedBy = row.submitted_by || '';
  const m = submittedBy.match(/^EDIT#(\d+)#([\s\S]*)$/);
  if (m) { editTargetId = parseInt(m[1], 10); submittedBy = m[2]; }
  const mr = submittedBy.match(/^REMOVE#(\d+)#([\s\S]*)$/);
  if (mr) { removeTargetId = parseInt(mr[1], 10); submittedBy = mr[2]; }
  const md = submittedBy.match(/^DELETE#(\d+)#([\s\S]*)$/);
  if (md) { deleteTargetId = parseInt(md[1], 10); submittedBy = md[2]; }
  return {
    id: row.id,
    branch: row.branch || DEFAULT_BRANCH,
    barcode: row.barcode || '',
    plu: row.plu || '',
    name: row.name || '',
    expiryDate: row.expiry_date || '',
    expiryDates: row.expiry_dates ? row.expiry_dates.split(',').filter(Boolean) : [],
    imageUrl: row.image_url || '',
    expiryPhoto: row.expiry_photo || '',
    submittedAt: row.submitted_at || '',
    submittedBy: submittedBy,
    editTargetId: editTargetId,
    removeTargetId: removeTargetId,
    deleteTargetId: deleteTargetId,
  };
}
function pendingToRow(p) {
  let submittedBy = p.submittedBy || '';
  if (p.editTargetId) submittedBy = `EDIT#${p.editTargetId}#${submittedBy}`;
  else if (p.removeTargetId) submittedBy = `REMOVE#${p.removeTargetId}#${submittedBy}`;
  else if (p.deleteTargetId) submittedBy = `DELETE#${p.deleteTargetId}#${submittedBy}`;
  return {
    id: p.id,
    branch: p.branch || getSavedBranch() || DEFAULT_BRANCH,
    barcode: p.barcode || '',
    plu: p.plu || '',
    name: p.name || '',
    expiry_date: p.expiryDate || null,
    expiry_dates: (p.expiryDates && p.expiryDates.length > 0 ? p.expiryDates : [p.expiryDate]).filter(Boolean).join(','),
    image_url: p.imageUrl || '',
    expiry_photo: p.expiryPhoto || '',
    submitted_at: p.submittedAt || new Date().toISOString(),
    submitted_by: submittedBy,
  };
}

async function uploadImageToStorage(dataUrl, prefix) {
  if (!dataUrl || !dataUrl.startsWith('data:')) return dataUrl || '';
  if (!sb) return dataUrl;
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const path = `${prefix}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
    const { error: uploadError } = await sb.storage.from(IMAGES_BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });
    if (uploadError) { console.error('uploadImageToStorage failed:', uploadError); return dataUrl; }
    const { data } = sb.storage.from(IMAGES_BUCKET).getPublicUrl(path);
    return data.publicUrl;
  } catch (err) {
    console.error('uploadImageToStorage failed:', err);
    return dataUrl;
  }
}

let lastDbError = '';

function getStatus(expiryDateStr) {
  if (!expiryDateStr) return 'nodate';
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  if (!expiryDateStr) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function compareByDaysLeft(a, b) {
  if (a.daysLeft === null && b.daysLeft === null) return 0;
  if (a.daysLeft === null) return 1;
  if (b.daysLeft === null) return -1;
  return a.daysLeft - b.daysLeft;
}
function relativeDaysText(daysLeft) {
  if (daysLeft === null || daysLeft === undefined) return '';
  if (daysLeft === 0) return 'หมดอายุวันนี้';
  if (daysLeft > 0) return `เหลือ ${daysLeft} วัน`;
  return `เลยมา ${Math.abs(daysLeft)} วัน`;
}
// ใกล้หมดอายุมาก (วันนี้/พรุ่งนี้) แต่ยังไม่หมดอายุ -> ใช้ไฮไลต์แดงเด่นเป็นพิเศษ
function isCriticalSoon(p) {
  return p.status !== 'expired' && p.status !== 'nodate' && p.daysLeft !== null && p.daysLeft <= CRITICAL_WINDOW_DAYS;
}
// เหลือ 2 วัน (ไม่เข้าเกณฑ์ด่วนมาก) -> ไฮไลต์เหลืองเด่นขึ้นจากเร่งด่วนปกติ
function isWarningSoon(p) {
  return p.status !== 'expired' && p.status !== 'nodate' && p.daysLeft !== null && p.daysLeft > CRITICAL_WINDOW_DAYS && p.daysLeft <= WARNING_WINDOW_DAYS;
}

// มีคำขอเก็บออก/ลบ ของสินค้านี้ค้างอยู่ไหม (ถ้ามี ให้ซ่อนจากหน้าหลัก/ปฏิทิน รอ AI ตรวจสอบอนุมัติ)
function hasPendingRemoval(id) {
  return pendingSubmissions.some(x => x.removeTargetId === id || x.deleteTargetId === id);
}

// สร้าง id ใหม่แบบไม่ชนกันข้ามเครื่อง และเล็กพอที่จะใส่คอลัมน์ id ได้ทุกชนิด (int4/int8)
// เดิมใช้ max(id)+1 -> 2 เครื่องเพิ่มพร้อมกันได้ id เดียวกัน -> ทับกัน -> สินค้าหาย
// เดิมอีกเวอร์ชันใช้ Date.now()*1000 (~1.75e15) -> ใหญ่เกินคอลัมน์ int4 -> บันทึกไม่ได้
function genId() {
  const existing = new Set([
    ...products.map(p => p.id),
    ...pendingSubmissions.map(p => p.id),
  ]);
  let id;
  let tries = 0;
  do {
    id = Math.floor(Math.random() * 2000000000) + 1; // 1..2e9 อยู่ในช่วง int4 (สูงสุด ~2.147e9)
    tries++;
  } while (existing.has(id) && tries < 50);
  return id;
}

// ==================== วันที่แบบพิมพ์เอง (รับทั้ง พ.ศ และ ค.ศ เช่น 22/02/69) ====================
// คืนค่า ISO 'YYYY-MM-DD' ถ้าแปลงได้ / คืน '' ถ้าว่าง / คืน null ถ้ารูปแบบผิด
function parseDateInputTH(str) {
  if (!str) return '';
  const s = String(str).trim();
  if (!s) return '';
  const m = s.match(/^(\d{1,2})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{2,4})$/);
  if (!m) return null;
  let day = parseInt(m[1], 10);
  let month = parseInt(m[2], 10);
  let year = parseInt(m[3], 10);
  if (month < 1 || month > 12 || day < 1 || day > 31) return null;
  const nowCe = new Date().getFullYear();
  if (m[3].length <= 2) {
    // ปี 2 หลัก: ลองทั้งแบบ พ.ศ (25xx) และ ค.ศ (20xx) เลือกอันที่อยู่ในช่วงสมเหตุสมผล
    const beCe = 2500 + year - 543;   // ตีความเป็น พ.ศ 25xx
    const ceCe = 2000 + year;         // ตีความเป็น ค.ศ 20xx
    const inWindow = (y) => y >= nowCe - 1 && y <= nowCe + 5;
    if (inWindow(beCe)) year = beCe;
    else if (inWindow(ceCe)) year = ceCe;
    else year = beCe; // เผื่อกรณีนอกช่วง ใช้ พ.ศ เป็นค่าเริ่มต้น
  } else {
    // ปี 4 หลัก: ถ้ามากกว่า 2400 ถือเป็น พ.ศ
    if (year > 2400) year = year - 543;
  }
  const mm = String(month).padStart(2, '0');
  const dd = String(day).padStart(2, '0');
  const iso = `${year}-${mm}-${dd}`;
  // ตรวจว่าวันที่มีจริง (กัน 31/02)
  const test = new Date(iso + 'T00:00:00');
  if (test.getFullYear() !== year || (test.getMonth() + 1) !== month || test.getDate() !== day) return null;
  return iso;
}
// ISO -> 'DD/MM/YY' (ปี พ.ศ 2 หลัก) สำหรับเติมในช่องพิมพ์
function formatDateInputTH(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return '';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const beYY = String((d.getFullYear() + 543) % 100).padStart(2, '0');
  return `${dd}/${mm}/${beYY}`;
}
// ใส่ "/" อัตโนมัติระหว่างพิมพ์ (วว/ดด/ปป) ให้ง่ายขึ้น
function autoSlashDate(el) {
  let d = el.value.replace(/\D/g, '').slice(0, 8);
  let out = d;
  if (d.length > 4) out = d.slice(0, 2) + '/' + d.slice(2, 4) + '/' + d.slice(4);
  else if (d.length > 2) out = d.slice(0, 2) + '/' + d.slice(2);
  el.value = out;
}
// สร้าง HTML ช่องกรอกวันที่แบบพิมพ์เอง (class lot-date-input ใช้ร่วมกับระบบเดิม)
function dateTextInputHTML(value = '', extraClass = '', extraAttrs = '') {
  const v = value ? escapeHtml(formatDateInputTH(value)) : '';
  return `<input type="text" inputmode="numeric" placeholder="วว/ดด/ปป (พ.ศ)" value="${v}" oninput="autoSlashDate(this)" ${extraAttrs} class="lot-date-input ${extraClass}" />`;
}
// อ่านค่าวันที่ทั้งหมดจาก container (แปลงเป็น ISO, ข้ามช่องว่าง). คืน {dates, hasError}
function readLotDates(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return { dates: [], hasError: false };
  const inputs = Array.from(container.querySelectorAll('.lot-date-input'));
  const dates = [];
  let hasError = false;
  inputs.forEach(inp => {
    const raw = inp.value.trim();
    if (!raw) return;
    const iso = parseDateInputTH(raw);
    if (iso === null) { hasError = true; inp.classList.add('ring-2', 'ring-red-400'); }
    else { inp.classList.remove('ring-2', 'ring-red-400'); if (iso) dates.push(iso); }
  });
  return { dates, hasError };
}

function barcodeBlockHTML(barcode, idSuffix) {
  if (!barcode) return '';
  const safeId = 'barcode-svg-' + idSuffix;
  return `
    <div class="mt-2 flex flex-col items-center rounded-2xl bg-white p-3 ring-1 ring-stone-100">
      <svg id="${safeId}" data-value="${escapeHtml(barcode)}" class="w-full" style="max-height:80px"></svg>
    </div>`;
}

function detectBarcodeFormat(value) {
  const v = String(value).trim();
  if (/^\d{13}$/.test(v)) return 'EAN13';
  if (/^\d{12}$/.test(v)) return 'UPC';
  if (/^\d{8}$/.test(v)) return 'EAN8';
  return 'CODE128';
}

function renderBarcodeSVGs() {
  if (typeof JsBarcode === 'undefined') return;
  document.querySelectorAll('svg[id^="barcode-svg-"]').forEach(svg => {
    const value = svg.getAttribute('data-value');
    if (!value || svg.getAttribute('data-rendered') === '1') return;
    const fmt = detectBarcodeFormat(value);
    try {
      JsBarcode(svg, value, {
        format: fmt,
        width: 2,
        height: 56,
        displayValue: true,
        fontSize: 13,
        margin: 4,
        background: '#ffffff',
        lineColor: '#0a2a1c',
      });
      svg.setAttribute('data-rendered', '1');
    } catch (e) {
      try {
        JsBarcode(svg, value, { format: 'CODE128', width: 2, height: 56, displayValue: true, fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c' });
        svg.setAttribute('data-rendered', '1');
      } catch (e2) {
        svg.outerHTML = `<p class="text-center text-[11px] text-stone-400">บาร์โค้ด ${value}</p>`;
      }
    }
  });
}

function updateLiveBarcode(inputId, previewId) {
  const input = document.getElementById(inputId);
  const preview = document.getElementById(previewId);
  if (!input || !preview) return;
  const val = input.value.trim();
  if (!val) { preview.innerHTML = ''; return; }
  preview.innerHTML = `<div class="mt-2 flex flex-col items-center rounded-2xl bg-white p-3 ring-1 ring-stone-100"><svg id="live-barcode-${previewId}" class="w-full" style="max-height:80px"></svg></div>`;
  if (typeof JsBarcode !== 'undefined') {
    const fmt = detectBarcodeFormat(val);
    try {
      JsBarcode(`#live-barcode-${previewId}`, val, {
        format: fmt, width: 2, height: 56, displayValue: true,
        fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c',
      });
    } catch (e) {
      try {
        JsBarcode(`#live-barcode-${previewId}`, val, {
          format: 'CODE128', width: 2, height: 56, displayValue: true,
          fontSize: 13, margin: 4, background: '#ffffff', lineColor: '#0a2a1c',
        });
      } catch (e2) {
        preview.innerHTML = `<p class="mt-2 text-center text-[11px] text-stone-400">บาร์โค้ดนี้สร้างภาพไม่ได้ (${escapeHtml(val)})</p>`;
      }
    }
  }
}

function formatThaiDateTime(isoString) {
  if (!isoString) return '';
  const d = new Date(isoString);
  const datePart = d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
  const timePart = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
  return `${datePart} · ${timePart} น.`;
}
function formatThaiDate(dateStr) {
  if (!dateStr) return 'ยังไม่มีวันหมดอายุ';
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
}
function escapeHtml(str) {
  const p = document.createElement('p');
  p.textContent = str;
  return p.innerHTML;
}

function truncateName(name, maxLen = 32) {
  if (!name) return '';
  return name.length > maxLen ? name.slice(0, maxLen).trim() + '…' : name;
}

// ==================== ค้นหาด้วยรูปภาพ (อัปเกรด: เร็วขึ้น + แม่นขึ้น) ====================
// อัปเกรด v35:
//  - ใช้ MobileNet v2 alpha 1.0 (แม่น) แต่ย่อรูปเป็น 224px ก่อน infer -> ถอดรหัส/ประมวลผลเร็วขึ้นมาก
//  - คำนวณ embedding แบบขนานมากขึ้น (6 พร้อมกัน) และแคชลง Supabase (ครั้งต่อไปแทบจะทันที)
//  - pre-warm: หลังโหลดโมเดลครั้งแรก แอบคำนวณ embedding ที่ยังขาดในเบื้องหลัง เวลาค้นจริงจะไวขึ้น
const VS_CONCURRENCY = 6;
const VS_INPUT_SIZE = 224;

function loadVisualSearchModel() {
  if (window.__mobilenetModel) return Promise.resolve(window.__mobilenetModel);
  if (window.__mobilenetLoadingPromise) return window.__mobilenetLoadingPromise;
  window.__mobilenetLoadingPromise = new Promise((resolve, reject) => {
    const tfScript = document.createElement('script');
    tfScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js';
    tfScript.onload = () => {
      const mnScript = document.createElement('script');
      mnScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js';
      mnScript.onload = async () => {
        try {
          try { if (window.tf && tf.setBackend) { await tf.setBackend('webgl'); await tf.ready(); } } catch (e) {}
          const model = await mobilenet.load({ version: 2, alpha: 1.0 });
          window.__mobilenetModel = model;
          resolve(model);
        } catch (e) { reject(e); }
      };
      mnScript.onerror = () => reject(new Error('โหลดโมเดลไม่สำเร็จ'));
      document.head.appendChild(mnScript);
    };
    tfScript.onerror = () => reject(new Error('โหลด TensorFlow.js ไม่สำเร็จ'));
    document.head.appendChild(tfScript);
  });
  return window.__mobilenetLoadingPromise;
}

function loadImageElement(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('โหลดรูปไม่สำเร็จ'));
    img.src = src;
  });
}

// ครอปสี่เหลี่ยมจัตุรัสกลางภาพ แล้วย่อเป็น 224px (โฟกัสตัวสินค้าตรงกลาง ลดพื้นหลัง/มือ/ชั้นวางรบกวน)
function downscaleToCanvas(imgEl) {
  const c = document.createElement('canvas');
  c.width = VS_INPUT_SIZE; c.height = VS_INPUT_SIZE;
  const iw = imgEl.naturalWidth || imgEl.width;
  const ih = imgEl.naturalHeight || imgEl.height;
  const side = Math.min(iw, ih);
  const sx = (iw - side) / 2;
  const sy = (ih - side) / 2;
  c.getContext('2d').drawImage(imgEl, sx, sy, side, side, 0, 0, VS_INPUT_SIZE, VS_INPUT_SIZE);
  return c;
}

async function computeImageEmbedding(imgEl) {
  const model = await loadVisualSearchModel();
  const canvas = downscaleToCanvas(imgEl);
  const t = model.infer(canvas, true);
  const data = await t.data();
  t.dispose();
  return Array.from(data);
}

function cosineSimilarity(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-8);
}

// คำนวณ embedding ที่ยังขาด (ใช้ร่วมกันทั้งตอนค้นจริงและตอน pre-warm)
async function ensureEmbeddingsFor(candidates, onProgress) {
  const urlToEmbedding = new Map();
  candidates.forEach(p => {
    if (p.imageEmbedding && p.imageEmbedding.length && !urlToEmbedding.has(p.imageUrl)) {
      urlToEmbedding.set(p.imageUrl, p.imageEmbedding);
    }
  });
  const urlsNeeding = [...new Set(candidates.filter(p => !urlToEmbedding.has(p.imageUrl)).map(p => p.imageUrl))];
  let done = 0;
  for (let i = 0; i < urlsNeeding.length; i += VS_CONCURRENCY) {
    if (state.ocrCancelled) break;
    const batch = urlsNeeding.slice(i, i + VS_CONCURRENCY);
    if (onProgress) onProgress(done, urlsNeeding.length);
    await Promise.all(batch.map(async (url) => {
      try {
        const img = await loadImageElement(url);
        const emb = await computeImageEmbedding(img);
        urlToEmbedding.set(url, emb);
      } catch (e) {}
    }));
    done += batch.length;
  }
  // แปะ embedding กลับให้ทุกล็อตที่ใช้รูปร่วมกัน + เก็บที่ต้องบันทึกแคช
  const embeddedItems = [];
  candidates.forEach(p => {
    if (!p.imageEmbedding || !p.imageEmbedding.length) {
      const emb = urlToEmbedding.get(p.imageUrl);
      if (emb) { p.imageEmbedding = emb; embeddedItems.push(p); }
    }
  });
  if (embeddedItems.length > 0) saveProductsOrWarn(embeddedItems);
  return urlToEmbedding;
}

// pre-warm เบื้องหลัง (ไม่บล็อก UI) เรียกหลังโหลดข้อมูลเสร็จ
let vsPrewarmDone = false;
async function prewarmVisualSearch() {
  if (vsPrewarmDone) return;
  vsPrewarmDone = true;
  try {
    const candidates = products.filter(p => !p.removed && p.imageUrl && (!p.imageEmbedding || !p.imageEmbedding.length));
    if (candidates.length === 0) return;
    await loadVisualSearchModel();
    state.ocrCancelled = false;
    await ensureEmbeddingsFor(candidates, null);
  } catch (e) { vsPrewarmDone = false; /* ลองใหม่รอบหน้าได้ */ }
}

function pickVisualSearchImage(useCamera) {
  closeOcrOverlay();
  stopScanner();
  const input = ensureVisualSearchFileInput();
  if (useCamera) input.setAttribute('capture', 'environment');
  else input.removeAttribute('capture');
  setTimeout(() => input.click(), 60);
}
function ensureVisualSearchFileInput() {
  let input = document.getElementById('visual-search-file-input');
  if (!input) {
    input = document.createElement('input');
    input.id = 'visual-search-file-input';
    input.type = 'file';
    input.accept = 'image/*';
    input.className = 'hidden';
    input.addEventListener('change', handleVisualSearchFileSelected);
    document.body.appendChild(input);
  }
  return input;
}

function showVisualSearchProgress(text) {
  ensureOcrOverlayRoot().innerHTML = `
    <div class="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 p-6">
      <div class="w-full max-w-xs rounded-3xl bg-white p-6 shadow-2xl text-center">
        <div class="mx-auto h-10 w-10 animate-spin rounded-full border-4 border-stone-200 border-t-brand-600"></div>
        <p id="visual-search-progress-text" class="mt-4 text-sm font-bold text-stone-700">${escapeHtml(text)}</p>
        <p class="mt-1 text-xs text-stone-400">ครั้งแรกอาจใช้เวลาสักครู่ ครั้งต่อไปจะเร็วขึ้นมาก</p>
        <button onclick="state.ocrCancelled=true; closeOcrOverlay();" class="mt-4 text-xs font-bold text-stone-400 underline">ยกเลิก</button>
      </div>
    </div>`;
}

async function handleVisualSearchFileSelected(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  state.ocrCancelled = false;
  showVisualSearchProgress('🔎 กำลังเตรียมระบบจำรูปภาพ...');
  try {
    await loadVisualSearchModel();
    if (state.ocrCancelled) return;
    showVisualSearchProgress('📸 กำลังวิเคราะห์รูปที่ถ่าย...');
    const fileUrl = URL.createObjectURL(file);
    const capturedImg = await loadImageElement(fileUrl);
    const queryEmbedding = await computeImageEmbedding(capturedImg);
    URL.revokeObjectURL(fileUrl);
    if (state.ocrCancelled) return;

    const candidates = products.filter(p => !p.removed && p.imageUrl);
    await ensureEmbeddingsFor(candidates, (done, total) => {
      if (total > 0) showVisualSearchProgress(`🔎 กำลังวิเคราะห์รูปภาพ... (${done}/${total} รูป)`);
    });
    if (state.ocrCancelled) return;

    const scored = candidates
      .filter(p => p.imageEmbedding && p.imageEmbedding.length)
      .map(p => ({ product: p, score: cosineSimilarity(queryEmbedding, p.imageEmbedding) }));
    scored.sort((a, b) => b.score - a.score);
    const top = scored.slice(0, 5).filter(s => s.score > 0.08);
    closeOcrOverlay();
    showVisualSearchResults(top);
  } catch (err) {
    console.error('Visual search error:', err);
    if (state.ocrCancelled) return;
    closeOcrOverlay();
    showAlertModal('ค้นหาด้วยรูปภาพไม่สำเร็จ ลองใหม่ หรือตรวจสอบอินเทอร์เน็ต (โหลดโมเดลครั้งแรกต้องใช้เน็ต)');
  }
}

  ensureOcrOverlayRoot().innerHTML = `

      <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl overflow-y-auto max-h-[85vh] fx-fade-up">
        <h3 class="text-lg font-bold text-stone-800">📷 สินค้าที่คล้ายกัน</h3>

    <path d="M9 9V6.5a3 3 0 0 1 6 0V9" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9.5 13v3.2M12 13v3.2M14.5 13v3.2" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function statusBadgeHTML(status) {
  const labels = { expired: 'หมดอายุ', urgent: 'เร่งด่วน', safe: 'ปลอดภัย', nodate: '📋 ยังไม่มีของ' };
  const colors = { expired: 'bg-red-100 text-red-700', urgent: 'bg-amber-100 text-amber-700', safe: 'bg-brand-100 text-brand-700', nodate: 'bg-stone-200 text-stone-600' };
  return `<span class="shrink-0 whitespace-nowrap inline-flex items-center rounded-full ${colors[status]} px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider">${labels[status]}</span>`;
}

function criticalBadgeHTML() {

function statCardHTML(label, count, colorClass, isActive, onClick) {

    <button onclick="${onClick}" class="flex-1 rounded-2xl p-3 text-left shadow-card transition-all active:scale-95 ${colorClass} ${isActive ? 'ring-2 ring-offset-2' : 'ring-1'}">

function productCardHTML(p, { showActions = false, showRemoveAction = false, showMeta = false } = {}) {
  const isExpired = p.status === 'expired';
  const isCritical = !isExpired && isCriticalSoon(p);
  const isWarning = !isExpired && !isCritical && isWarningSoon(p);
  const isAlert = isExpired || isCritical;
  const cardClass = isExpired
    ? 'bg-red-50/70 ring-1 ring-red-200'
    : isCritical
      ? 'bg-red-100 ring-2 ring-red-400'
      : isWarning
        ? 'bg-amber-100 ring-2 ring-amber-400'
        : 'bg-white ring-1 ring-brand-100/50';
  const nameClass = isAlert ? 'text-red-800' : isWarning ? 'text-amber-800' : 'text-stone-800';
  return `
    <div onclick="viewProductDetail(${p.id})" class="flex items-center gap-3 overflow-hidden rounded-2xl ${cardClass} p-3 shadow-card active:scale-[0.98] transition-transform">
      <div class="h-14 w-14 shrink-0 overflow-hidden rounded-xl bg-stone-100">
        ${p.imageUrl ? `<img src="${p.imageUrl}" class="h-full w-full object-cover" />` : `<div class="flex h-full w-full items-center justify-center text-2xl">📦</div>`}
      </div>
      <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
          <p class="min-w-0 flex-1 truncate text-sm font-semibold ${nameClass}">${escapeHtml(truncateName(p.name))}</p>
          ${isCritical ? criticalBadgeHTML() : statusBadgeHTML(p.status)}
        </div>
        <p class="mt-0.5 truncate text-xs ${isAlert ? 'text-red-400' : isWarning ? 'text-amber-500' : 'text-stone-400'}">${p.barcode ? escapeHtml(p.barcode) : (p.plu ? `PLU ${escapeHtml(p.plu)}` : 'ไม่มีบาร์โค้ด')}</p>
        <p class="mt-1 text-xs ${isAlert ? 'font-bold text-red-600' : isWarning ? 'font-bold text-amber-700' : 'text-stone-500'}">${p.expiryDate ? `หมดอายุ ${formatThaiDate(p.expiryDate)} <span class="${isAlert ? 'text-red-500' : isWarning ? 'text-amber-600' : 'text-stone-400'}">· ${relativeDaysText(p.daysLeft)}</span>` : '📋 บันทึกไว้ก่อน รอเพิ่มวันหมดอายุ'}</p>
        ${showMeta ? `<p class="mt-1 truncate text-[11px] text-stone-400">👤 ${escapeHtml(p.addedBy || '-')} · ${p.addedDate ? new Date(p.addedDate).toLocaleString('th-TH') : '-'}</p>` : ''}
      </div>
      ${showActions ? `
        <div class="flex shrink-0 flex-col gap-1.5" onclick="event.stopPropagation()">
          <button onclick="openProductForm(${p.id})" class="rounded-full bg-brand-50 p-1.5 text-brand-700 active:scale-95" aria-label="แก้ไข">✏️</button>
        </div>` : ''}
      ${showRemoveAction && p.status !== 'nodate' ? `
        <button onclick="event.stopPropagation(); markRemovedConfirm(${p.id})" class="shrink-0 flex h-11 w-11 items-center justify-center rounded-full ${isExpired ? 'bg-red-100 text-red-700' : 'bg-stone-100 text-stone-600'} text-lg active:scale-95" aria-label="เก็บออกจากชั้น">📦</button>` : ''}
    </div>`;
}

// ==================== App Navigation ====================
function renderPage() {
  const app = document.getElementById('app');
  if (!state.entered) {
    app.innerHTML = welcomeHTML();
    return;
  }
  if (html5QrCode) stopScanner();
  
  let content = '';
  switch (state.tab) {
    case 'dashboard': content = dashboardHTML(); break;
    case 'scanner': content = scannerHTML(); break;
    case 'calendar': content = calendarHTML(); break;
    case 'admin': content = adminHTML(); break;
  }
  const tabChanged = state.__lastRenderedTab !== state.tab;
  state.__lastRenderedTab = state.tab;
  
  app.innerHTML = `
    <div class="mx-auto flex min-h-screen max-w-md flex-col px-4 pt-6">
      <div class="flex-1 ${tabChanged ? 'fx-tab-in' : ''}" style="padding-bottom: 1.5rem">${content}</div>
      <nav class="sticky bottom-0 z-40 -mx-4 border-t border-stone-200/70 bg-white/95 backdrop-blur-lg" style="padding-bottom: env(safe-area-inset-bottom, 0px)">
        <div class="mx-auto flex max-w-md items-center justify-around px-2 py-1.5">
          ${NAV_ITEMS.map((item) => `
            <button onclick="switchTab('${item.id}')" class="relative flex flex-1 flex-col items-center gap-0.5 py-1.5 transition-colors ${state.tab === item.id ? 'text-brand-600' : 'text-stone-400'}">
              <span class="text-xl">${item.emoji}</span>
              ${item.id === 'admin' && isAdmin() && visiblePendingSubmissions().length > 0 ? `<span class="absolute top-0 right-[22%] flex h-4 min-w-[16px] items-center justify-center rounded-full bg-red-500 px-1 text-[9px] font-bold text-white">${visiblePendingSubmissions().length}</span>` : ''}
              <span class="text-[10px] font-bold uppercase tracking-wider">${item.label}</span>
            </button>`).join('')}
        </div>
      </nav>
    </div>`;

  if (state.tab === 'scanner') scheduleScannerRestart(0);
  if (state.tab === 'admin' && isAdmin()) {
    const pendingList = document.getElementById('admin-pending-list');
    if (pendingList) {
      pendingList.innerHTML = adminPendingListHTML();
      pendingSubmissions.forEach(item => {
        if (item.editTargetId) return;
        const runCheck = liveCheckDateDuplicates(
          `pending-dates-${item.id}`, `pending-dup-warning-${item.id}`,
          () => document.getElementById(`pending-barcode-${item.id}`)?.value.trim() || '',
          () => document.getElementById(`pending-plu-${item.id}`)?.value.trim() || '',
          () => document.getElementById(`pending-name-${item.id}`)?.value.trim() || '',
          null, `pending-approve-btn-${item.id}`
        );
        const nameEl = document.getElementById(`pending-name-${item.id}`);
        const bcEl = document.getElementById(`pending-barcode-${item.id}`);
        const pluEl = document.getElementById(`pending-plu-${item.id}`);
        if (nameEl) nameEl.addEventListener('input', runCheck);
        if (bcEl) bcEl.addEventListener('input', runCheck);
        if (pluEl) pluEl.addEventListener('input', runCheck);
      });
    }
    const removedList = document.getElementById('admin-removed-list');
    if (removedList) removedList.innerHTML = adminRemovedListHTML();
    const deleteReqList = document.getElementById('admin-delete-list');
    if (deleteReqList) deleteReqList.innerHTML = renderDeleteRequestsHTML();
    const removalReqList = document.getElementById('admin-removal-list');
    if (removalReqList) removalReqList.innerHTML = renderRemovalRequestsHTML();
    const usersList = document.getElementById('admin-users-list');
    if (usersList) usersList.innerHTML = renderUsersHTML();
    const activityList = document.getElementById('admin-activity-list');
    if (activityList) activityList.innerHTML = renderActivityHTML();
    const branchAdminsList = document.getElementById('admin-branchadmins-list');
    if (branchAdminsList) branchAdminsList.innerHTML = renderBranchAdminsHTML();
    const whitelistList = document.getElementById('admin-whitelist-list');
    if (whitelistList) whitelistList.innerHTML = renderWhitelistSectionHTML();
    const productList = document.getElementById('admin-product-list');
    if (productList) productList.innerHTML = adminProductListHTML();
    const trendChart = document.getElementById('admin-trend-chart');
    if (trendChart) trendChart.innerHTML = removedTrendHTML();
    const topRemoved = document.getElementById('admin-top-removed');
    if (topRemoved) topRemoved.innerHTML = topRemovedProductsHTML();
  }
  renderBarcodeSVGs();
}

// เริ่มต้นใช้งาน: เคยลงทะเบียนแล้ว -> ล็อกอินเร็ว (ใส่ชื่อ/รหัสอันเดียว) | ยังไม่เคย -> ลงทะเบียนเต็ม
function startUsing() {
  if (getSavedEmpCode()) openQuickLogin();
  else openStaffLogin();
}

function openQuickLogin() {
  const savedNick = getSavedStaffCode();
  const savedCode = getSavedEmpCode();
  const prefill = (savedNick || savedCode || '').replace(/"/g, '&quot;');
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">
        <h3 class="text-xl font-bold text-stone-800 text-center">เริ่มต้นใช้งาน</h3>
        <p class="mt-1 text-center text-xs text-stone-400">ใส่ชื่อเล่น หรือ รหัสพนักงานของคุณ</p>
        <form id="quick-login-form" class="mt-6 space-y-3">
          <input id="quick-login-input" type="text" value="${prefill}" placeholder="ชื่อเล่น หรือ รหัสพนักงาน" required class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 text-center text-lg font-bold outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-100" />
          <button type="submit" id="quick-login-btn" class="w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-lg active:scale-[0.98]">เข้าใช้งาน</button>
        </form>
        <button onclick="openStaffLogin()" class="mt-3 w-full text-center text-xs font-bold text-stone-400 underline">เปลี่ยนคนใช้ / ลงทะเบียนใหม่</button>
      </div>
    </div>
  `);
  document.getElementById('quick-login-form').addEventListener('submit', (e) => { e.preventDefault(); submitQuickLogin(); });
}

async function submitQuickLogin() {
  const val = (document.getElementById('quick-login-input')?.value || '').trim();
  if (!val) return;
  const btn = document.getElementById('quick-login-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...'; }
  await fetchUsers();
  const low = val.toLowerCase();
  const u = appUsers.find(x =>
    String(x.employee_code) === val ||
    (x.nickname && x.nickname.toLowerCase() === low)
  );
  if (btn) { btn.disabled = false; btn.textContent = 'เข้าใช้งาน'; }
  if (!u) return showAlertModal('ไม่พบข้อมูลของคุณค่ะ\nถ้ายังไม่ได้ลงทะเบียน กดปุ่ม "ลงทะเบียนใหม่" ด้านล่างนะคะ');
  if (u.status === 'pending') return showAlertModal('⏳ คำขอลงทะเบียนของคุณกำลังรอ AI ตรวจสอบอนุมัติค่ะ');
  if (u.status === 'rejected') return showAlertModal('❌ บัญชีนี้ถูกระงับการใช้งาน กรุณาติดต่อ AI ตรวจสอบค่ะ');
  // อนุมัติแล้ว -> เข้าเลย
  state.staffCode = u.nickname || String(u.employee_code);
  state.staffEmpCode = String(u.employee_code);
  state.userBranch = u.branch || DEFAULT_BRANCH;
  saveStaffCode(state.staffCode);
  saveEmpCode(String(u.employee_code));
  saveBranch(state.userBranch);
  saveSessionDate();
  state.entered = true;
  touchUserActive(u.employee_code);
  logActivity('login');
  applyDeepLink();
  closeModal();
  renderPage();
}

function openStaffLogin() {
  const savedCode = getSavedEmpCode();
  const savedNick = (typeof liffProfile !== 'undefined' && liffProfile && liffProfile.displayName) ? liffProfile.displayName : getSavedStaffCode();
  const savedBranch = getSavedBranch();
  const esc = (s) => (s || '').replace(/"/g, '&quot;');
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">

        <p class="mt-1 text-center text-xs text-stone-400">กรอกข้อมูลเพื่อลงทะเบียนเข้าใช้งาน<br/>ครั้งแรกต้องรอ AI ตรวจสอบอนุมัติก่อนถึงจะใช้ได้</p>

          <select id="reg-branch" required class="w-full appearance-none rounded-2xl border border-stone-200 bg-white px-4 py-3.5 text-center text-lg font-bold text-stone-700 outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-100">
            <option value="" disabled ${savedBranch ? '' : 'selected'}>— เลือกสาขา —</option>
            ${BRANCHES.map(b => `<option value="${b}" ${savedBranch === b ? 'selected' : ''}>${b}</option>`).join('')}
          </select>
          <button type="submit" id="reg-submit-btn" class="w-full rounded-2xl bg-brand-600 py-4 text-lg font-bold text-white shadow-lg active:scale-[0.98]">ลงทะเบียน</button>
        </form>
      </div>
    </div>
  `);
  document.getElementById('staff-login-form').addEventListener('submit', (e) => { e.preventDefault(); submitStaffRegistration(); });

async function submitStaffRegistration() {
  const code = (document.getElementById('reg-emp-code')?.value || '').trim();
  const nick = (document.getElementById('reg-nickname')?.value || '').trim();
  const branch = (document.getElementById('reg-branch')?.value || '').trim();
  if (!code || !nick || !branch) return showAlertModal('กรุณากรอกรหัสพนักงาน ชื่อเล่น และสาขาให้ครบค่ะ');
  const btn = document.getElementById('reg-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...'; }
  await fetchUsers();
  const u = findUser(code);
  if (u) {
    if (u.status === 'approved') {
      state.staffCode = u.nickname || nick;
      state.staffEmpCode = String(code);
      state.userBranch = u.branch || DEFAULT_BRANCH;
      saveStaffCode(state.staffCode);
      saveEmpCode(String(code));
      saveBranch(state.userBranch);
      saveSessionDate();
      state.entered = true;
      touchUserActive(code);
      logActivity('login');
      applyDeepLink();
      closeModal();
      renderPage();
      return;
    }
    if (btn) { btn.disabled = false; btn.textContent = 'ลงทะเบียน'; }
    if (u.status === 'pending') return showAlertModal('⏳ คำขอลงทะเบียนของคุณกำลังรอ AI ตรวจสอบอนุมัติค่ะ\nโปรดลองใหม่อีกครั้งหลังได้รับอนุมัติ');
    if (u.status === 'rejected') return showAlertModal('❌ บัญชีนี้ถูกปฏิเสธการเข้าใช้งาน กรุณาติดต่อ AI ตรวจสอบค่ะ');
  }
  await fetchBranchWhitelist();
  const wl = whitelistForBranch(branch);
  if (wl.length > 0 && !isCodeWhitelisted(branch, code)) {
    if (btn) { btn.disabled = false; btn.textContent = 'ลงทะเบียน'; }
    const phone = getBranchContactPhone(branch);
    return showAlertModal(`รหัสพนักงาน ${code} ไม่อยู่ในรายชื่อที่สาขา ${branch} อนุญาตให้สมัครค่ะ\n\nกรุณาติดต่อแอดมินสาขาเพื่อขอเพิ่มชื่อ${phone ? `\n📞 โทร ${phone}` : ''}`);
  }
  const res = await registerUser(code, nick, branch);
  if (btn) { btn.disabled = false; btn.textContent = 'ลงทะเบียน'; }
  if (!res.ok) return showAlertModal('ลงทะเบียนไม่สำเร็จค่ะ' + (res.err ? '\n\n(สาเหตุ: ' + res.err + ')\n\nถ้ายังไม่ได้สร้างตาราง expiry_users กรุณารัน SQL ก่อนนะคะ' : ''));
  saveBranch(branch);
  await fetchUsers();

function targetBranchForNewLot(fallbackBranch) {
  const vb = currentViewBranch();
  if (vb !== 'all') return vb;
  return fallbackBranch || getSavedBranch() || DEFAULT_BRANCH;

function getBranchDashboardProducts() {
  const own = products.map(withComputed).filter(p => !p.removed && !hasPendingRemoval(p.id) && isVisibleBranch(p));
  const vb = currentViewBranch();
  if (vb === 'all') return own;
  const ownKeys = new Set(
    own.map(p => (p.barcode ? `bc:${p.barcode}` : (p.plu ? `plu:${p.plu}` : null))).filter(Boolean)
  );
  const seen = new Map();
  products.forEach(p => {
    if (p.removed || p.expiryDate) return; // เอาแค่ยังไม่มีวันหมดอายุ (nodate)
    const key = p.barcode ? `bc:${p.barcode}` : (p.plu ? `plu:${p.plu}` : null);
    if (!key || ownKeys.has(key) || seen.has(key)) return;
    seen.set(key, p);
  });
  const otherBranchNodate = Array.from(seen.values()).map(p => withComputed({ ...p, branch: vb }));
  return [...own, ...otherBranchNodate];
}

let scannerStopPromise = null;

function isValidBarcodeChecksum(code) {
  if (!/^\d+$/.test(code)) return true;
  if (![8, 12, 13, 14].includes(code.length)) return true;
  const digits = code.split('').map(Number);
  const checkDigit = digits.pop();
  let sum = 0;
  digits.reverse().forEach((d, i) => { sum += (i % 2 === 0) ? d * 3 : d * 1; });
  const calculated = (10 - (sum % 10)) % 10;
  return calculated === checkDigit;
}

let scannerRestartTimer = null;
function scheduleScannerRestart(delay = 0) {
  if (state.tab !== 'scanner') return;
  if (scannerRestartTimer) clearTimeout(scannerRestartTimer);
  scannerRestartTimer = setTimeout(() => {
    scannerRestartTimer = null;
    if (state.tab === 'scanner') initScanner();
  }, delay);
}

async function initScanner() {
  if (!window.Html5Qrcode) return;
  if (window.__scannerStarting) return;
  window.__scannerStarting = true;

  const manualForm = document.getElementById('manual-form');
  if (manualForm) manualForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = document.getElementById('manual-input').value.trim();
    if (val) handleScannedBarcode(val);
  });

  try {
    if (scannerStopPromise) { await scannerStopPromise; scannerStopPromise = null; }
    if (html5QrCode) return;

    html5QrCode = new Html5Qrcode('qr-reader');
    await html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => {
        if (!isValidBarcodeChecksum(decodedText)) return;

        const now = Date.now();
        if (state.scanner.pendingCode === decodedText) {
          state.scanner.pendingCount++;
        } else {
          state.scanner.pendingCode = decodedText;
          state.scanner.pendingCount = 1;
        }
        if (state.scanner.pendingCount < 3) return;

        if (state.scanner.lastCode === decodedText && now - state.scanner.lastTime < 2500) return;
        state.scanner.lastCode = decodedText;
        state.scanner.lastTime = now;
        state.scanner.pendingCode = null;
        state.scanner.pendingCount = 0;
        handleScannedBarcode(decodedText);
      },
      () => {}
    );
    const status = document.getElementById('camera-status');
    if (status) status.remove();
    const frame = document.getElementById('camera-frame');
    if (frame) frame.classList.remove('hidden');
  } catch (err) {
    console.error(err);
    const status = document.getElementById('camera-status');
    if (status) status.textContent = 'ไม่สามารถเข้าถึงกล้องได้';
  } finally {
    window.__scannerStarting = false;
  }
}

async function handleScanImageFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const tempDivId = 'qr-file-scan-temp';
    let tempDiv = document.getElementById(tempDivId);
    if (!tempDiv) {
      tempDiv = document.createElement('div');
      tempDiv.id = tempDivId;
      tempDiv.style.display = 'none';
      document.body.appendChild(tempDiv);
    }
    const fileScanner = new Html5Qrcode(tempDivId);
    const decodedText = await fileScanner.scanFile(file, false);
    try { fileScanner.clear(); } catch {}
    if (!isValidBarcodeChecksum(decodedText)) {
      playBeep('error'); triggerHaptic(30);
      showToast('❌ บาร์โค้ดในรูปไม่ชัดหรืออ่านผิด ลองถ่ายใหม่');
      event.target.value = '';
      return;
    }
    handleScannedBarcode(decodedText);
  } catch (err) {
    console.error(err);
    playBeep('error'); triggerHaptic(30);
    showToast('❌ ไม่พบบาร์โค้ดในรูปภาพนี้');
  }
  event.target.value = '';
}

function stopScanner() {
  if (html5QrCode) {
    const scanner = html5QrCode;
    html5QrCode = null;
    scannerStopPromise = scanner.stop().catch(() => {}).finally(() => { try { scanner.clear(); } catch {} });
    return scannerStopPromise;
  }
  return scannerStopPromise || Promise.resolve();
}

let fieldScanner = null;
function scanBarcodeIntoField(targetInputId) {
  ensureAlertOverlayRoot().innerHTML = `
    <div class="fixed inset-0 z-[230] flex items-center justify-center bg-black/80 p-4" onclick="if(event.target===this) closeFieldScanner()">

      </div>
    </div>`;
  let lastVal = null, sameCount = 0;
  setTimeout(() => {
    fieldScanner = new Html5Qrcode('field-scanner-box');
    fieldScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 140 } },
      (decodedText) => {
        if (!isValidBarcodeChecksum(decodedText)) return;

          input.value = decodedText;
          input.dispatchEvent(new Event('input', { bubbles: true }));

        triggerHaptic(20);

    });
  }, 100);
}
function closeFieldScanner() {

// สแกนแล้วแสดงสินค้า + ฟอร์มเพิ่มวันหมดอายุในหน้าเดียว (ของหมดอายุ/เคยมีก็จำสินค้าได้)

    playBeep('success'); triggerHaptic(12);
    showToast(`✅ พบสินค้า: ${info.name}`);
    renderScanResultWithLotForm(info, activeLots, barcode);
  } else {
    playBeep('notfound'); triggerHaptic([10,40,10]);
    showToast(`❓ ไม่พบบาร์โค้ดนี้ในระบบ`);
    resEl.innerHTML = `

async function submitScanLot(barcode) {
  const catalogList = products.filter(p => p.barcode === barcode);
  const info = catalogList.find(p => p.imageUrl && p.name) || catalogList[catalogList.length - 1];
  if (!info) return;
  const { dates, hasError } = readLotDates('scan-lot-dates');
  if (hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
  if (dates.length === 0) return showAlertModal('กรุณาใส่วันหมดอายุอย่างน้อย 1 รายการ');
  if (blockIfHardDuplicate(barcode, info.plu || '', info.name, dates)) return;

  const btn = document.getElementById('scan-lot-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังบันทึก...'; btn.classList.add('opacity-70'); }

  if (isDev()) {
    const newItems = [];
    dates.forEach(date => {
      const ni = {
        id: genId(), barcode: barcode || '', plu: info.plu || '', name: info.name,
        category: info.category || '', imageUrl: info.imageUrl, expiryDate: date,
        branch: targetBranchForNewLot(info.branch),
        addedDate: new Date().toISOString(), addedBy: state.staffCode || '-'
      };
      products.push(ni);
      newItems.push(ni);
    });
    const ok = await saveProductsOrWarn(newItems);
    if (!ok) {
      products = products.filter(x => !newItems.includes(x));
      if (btn) { btn.disabled = false; btn.textContent = '✅ บันทึกล็อตใหม่'; btn.classList.remove('opacity-70'); }
      return;
    }
    showToast(`✅ เพิ่ม ${dates.length} ล็อตใหม่แล้ว`);
    triggerHaptic(20);
    const r = document.getElementById('scan-result');
    if (r) r.innerHTML = `<div class="rounded-2xl bg-brand-50 p-4 text-center ring-1 ring-brand-200 fx-fade-up"><p class="text-sm font-bold text-brand-700">✅ เพิ่ม ${dates.length} ล็อตใหม่เข้าระบบแล้ว</p><p class="mt-1 text-xs text-stone-500">สแกนชิ้นต่อไปได้เลย</p></div>`;
  } else {
    const newId = genId();
    const newPending = {
      id: newId, barcode: barcode || '', plu: info.plu || '', name: info.name,
      expiryDate: dates[0], expiryDates: dates,
      imageUrl: info.imageUrl, expiryPhoto: '',
      submittedAt: new Date().toISOString(), submittedBy: state.staffCode
    };
    const ok = await upsertPendingRow(newPending);
    if (!ok) {
      if (btn) { btn.disabled = false; btn.textContent = '✅ ส่งให้ AI ตรวจสอบ'; btn.classList.remove('opacity-70'); }
      return showAlertModal('ส่งคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
    }
    pendingSubmissions.push(newPending);
    showToast(`✅ ส่งคำขอ ${dates.length} ล็อตแล้ว · #${newId}`);
    triggerHaptic(20);
    const r = document.getElementById('scan-result');
    if (r) r.innerHTML = `<div class="rounded-2xl bg-brand-50 p-4 text-center ring-1 ring-brand-200 fx-fade-up"><p class="text-sm font-bold text-brand-700">✅ ส่งคำขอ ${dates.length} ล็อตให้ AI ตรวจสอบแล้ว</p><p class="mt-1 text-xs text-stone-500">สแกนชิ้นต่อไปได้เลย</p></div>`;
  }
}
// ==================== Calendar ====================
function calendarHTML() {
  const now = new Date();
  const startYear = now.getFullYear();
  const startMonth = now.getMonth() + 1;
  const monthsCount = state.cal.monthsCount || 6;

  const events = products.map(withComputed).filter(p => !p.removed && !hasPendingRemoval(p.id) && isVisibleBranch(p));
  const eventsByDate = {};
  events.forEach(p => {
    if (!p.expiryDate) return;
    (eventsByDate[p.expiryDate] = eventsByDate[p.expiryDate] || []).push(p);
  });

  let monthsHtml = '';
  let y = startYear, m = startMonth;
  for (let i = 0; i < monthsCount; i++) {
    monthsHtml += monthBlockHTML(y, m, eventsByDate);
    m++;
    if (m > 12) { m = 1; y++; }
  }

  return `
    <div class="space-y-5">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-gradient-to-br from-brand-600 to-brand-800 p-2 text-white text-lg shadow-sm ring-1 ring-white/10">🗓️</span>
        <h1 class="text-lg font-bold text-stone-800">ปฏิทินวันหมดอายุ</h1>
      </header>

      <div class="space-y-4">
        ${monthsHtml}
      </div>

      <button onclick="loadMoreCalendarMonths()" class="w-full rounded-2xl bg-white py-3 text-sm font-bold text-brand-600 shadow-sm ring-1 ring-stone-200 active:scale-95">
        โหลดเดือนเพิ่มเติม ▾
      </button>

      <div id="calendar-detail" class="space-y-3">
        ${state.cal.selectedDate ? calendarDetailHTML(eventsByDate[state.cal.selectedDate] || []) : `<p class="py-8 text-center text-xs text-stone-400 italic">เลือกวันที่เพื่อดูรายการสินค้า</p>`}
      </div>
    </div>`;
}

function monthBlockHTML(year, month, eventsByDate) {
  const daysInMonth = new Date(year, month, 0).getDate();
  const firstDay = new Date(year, month - 1, 1).getDay();
  return `
    <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-stone-200">
      <p class="mb-3 text-center text-sm font-black text-stone-700">${MONTHS_TH[month - 1]} ${year + 543}</p>
      <div class="grid grid-cols-7 mb-2">
        ${WEEKDAYS_TH.map(d => `<div class="text-center text-[10px] font-bold text-stone-400 uppercase">${d}</div>`).join('')}
      </div>
      <div class="grid grid-cols-7 gap-1">
        ${Array(firstDay).fill(0).map(() => `<div class="aspect-square"></div>`).join('')}
        ${Array(daysInMonth).fill(0).map((_, i) => {
          const d = i + 1;
          const dStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const dayEvents = eventsByDate[dStr] || [];
          const isSelected = state.cal.selectedDate === dStr;
          const hasExpired = dayEvents.some(p => p.status === 'expired');
          const hasCritical = dayEvents.some(p => !hasExpired && isCriticalSoon(p));
          const hasUrgent = dayEvents.some(p => p.status === 'urgent' && !isCriticalSoon(p));

          return `
            <button onclick="selectCalDateISO('${dStr}')" class="relative flex aspect-square flex-col items-center justify-center rounded-xl transition-all ${isSelected ? 'bg-brand-600 text-white shadow-lg' : 'hover:bg-stone-50'}">
              <span class="text-sm font-bold">${d}</span>
              <div class="mt-0.5 flex gap-0.5">
                ${hasExpired || hasCritical ? `<span class="h-1 w-1 rounded-full bg-red-500"></span>` : ''}
                ${hasUrgent ? `<span class="h-1 w-1 rounded-full bg-amber-500"></span>` : ''}
                ${dayEvents.length > 0 && !hasExpired && !hasCritical && !hasUrgent ? `<span class="h-1 w-1 rounded-full bg-brand-400"></span>` : ''}
              </div>
            </button>`;
        }).join('')}
      </div>
    </div>`;
}

function loadMoreCalendarMonths() {
  state.cal.monthsCount = (state.cal.monthsCount || 6) + 6;
  renderPage();
}

function selectCalDateISO(dateStr) {
  state.cal.selectedDate = dateStr;
  renderPage();
}

function calendarDetailHTML(list) {
  if (list.length === 0) return `<p class="py-8 text-center text-xs text-stone-400 italic">ไม่มีสินค้าหมดอายุในวันนี้</p>`;
  return `
    <p class="text-xs font-bold text-stone-400 uppercase tracking-wider">รายการสินค้า (${list.length})</p>
    ${list.map(p => productCardHTML(p)).join('')}`;
}

async function confirmForceLogoutEveryone() {
  closeAlertOverlay();
  if (!sb) return showAlertModal('ยังไม่ได้เชื่อมต่อฐานข้อมูลค่ะ');
  const stamp = new Date().toISOString();
  try {
    const { error } = await sb.from(SETTINGS_TABLE).upsert({ key: 'force_logout_at', value: stamp, updated_at: stamp }, { onConflict: 'key' });

  }
}

function editRequestCardHTML(item) {
  const target = products.find(p => p.id === item.editTargetId);
  if (!target) {
    return `
    <div class="rounded-2xl bg-white p-3 shadow-card ring-1 ring-amber-200 space-y-2">
      <p class="text-xs font-bold text-amber-600">✏️ คำขอแก้ไข (ไม่พบสินค้าต้นทางแล้ว)</p>
      <button onclick="rejectPending(${item.id})" class="w-full rounded-lg bg-stone-100 py-2 text-xs font-bold text-stone-600">❌ ปฏิเสธคำขอนี้</button>
    </div>`;
  }
  const changed = (a, b) => (a || '') !== (b || '');
  const rowDiff = (label, oldV, newV) => {

function relTime(iso) {
  if (!iso) return 'ยังไม่เคยใช้งาน';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'เมื่อสักครู่';
  if (m < 60) return `${m} นาทีที่แล้ว`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} ชม.ที่แล้ว`;
  const d = Math.floor(h / 24);
  if (d < 30) return `${d} วันที่แล้ว`;
  return formatThaiDate(iso.slice(0, 10));
}

// ===== คัดลอกสินค้าทั้งหมด (ชื่อ/รูป/บาร์โค้ด) ไปสาขาที่กำลังดูอยู่ — ไม่ใส่วันหมดอายุ (สถานะ "ยังไม่มีของ") =====
// ให้พนักงานสาขาใหม่สแกนแล้วเจอสินค้าที่มีอยู่แล้ว เติมแค่วันหมดอายุได้เลย ไม่ต้องส่งคำขอสินค้าใหม่ซ้ำ
function buildCatalogCopyList(targetBranch) {
  const seen = new Map(); // key(บาร์โค้ด/PLU) -> ตัวแทนสินค้า
  products.forEach(p => {
    if (p.removed) return;
    const key = p.barcode ? `bc:${p.barcode}` : (p.plu ? `plu:${p.plu}` : null);
    if (!key || seen.has(key)) return;
    seen.set(key, p);
  });
  const existingKeys = new Set(
    products
      .filter(p => !p.removed && (p.branch || DEFAULT_BRANCH) === targetBranch)
      .map(p => (p.barcode ? `bc:${p.barcode}` : (p.plu ? `plu:${p.plu}` : null)))
      .filter(Boolean)
  );
  const toCreate = [];
  seen.forEach((p, key) => {
    if (existingKeys.has(key)) return;
    toCreate.push({
      id: genId(), branch: targetBranch, barcode: p.barcode || '', plu: p.plu || '', name: p.name,
      category: p.category || '', imageUrl: p.imageUrl, expiryDate: null,
      addedDate: new Date().toISOString(), addedBy: state.staffCode || 'ระบบ',
    });
  });
  return toCreate;
}

function removedTrendHTML() {
  const days = 7;
  const today = new Date();
  const buckets = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    buckets.push({ key, label: `${d.getDate()}/${d.getMonth() + 1}`, count: 0 });
  }
  const byKey = Object.fromEntries(buckets.map(b => [b.key, b]));
  products.filter(p => isVisibleBranch(p)).forEach(p => {
    if (!p.removed || !p.removedDate) return;
    const key = p.removedDate.slice(0, 10);
    if (byKey[key]) byKey[key].count++;
  });
  const max = Math.max(1, ...buckets.map(b => b.count));
  const total = buckets.reduce((s, b) => s + b.count, 0);
  return `
    <p class="mb-3 text-xs font-black uppercase tracking-widest text-stone-400">แนวโน้มเก็บออกจากชั้น (7 วันล่าสุด) — รวม ${total} รายการ</p>
    <div class="flex items-end justify-between gap-1.5" style="height:90px">
      ${buckets.map(b => `
        <div class="flex flex-1 flex-col items-center justify-end gap-1" style="height:100%">
          <span class="text-[10px] font-bold text-stone-400">${b.count > 0 ? b.count : ''}</span>
          <div class="w-full rounded-md bg-amber-400" style="height:${Math.max(4, (b.count / max) * 56)}px"></div>
          <span class="text-[9px] text-stone-400">${b.label}</span>
        </div>`).join('')}
    </div>`;
}

function blockIfHardDuplicate(barcode, plu, name, dates) {
  const uniqueDates = new Set(dates);
  if (uniqueDates.size !== dates.length) {
    showAlertModal('พบวันหมดอายุซ้ำกันเองในรายการที่กรอกค่ะ กรุณาตรวจสอบและลบวันที่ซ้ำออกก่อนบันทึก/ส่งคำขอ');
    return true;
  }
  for (const date of dates) {
    const dup = findDuplicateProduct(barcode, plu, name, date, null);
    if (dup) {
      showDuplicateModal(dup, date);
      return true;
    }
  }
  return false;
}

function findDuplicateProduct(barcode, plu, name, expiryDate, excludeId) {
  return products.find(p => {
    if (p.removed || p.id === excludeId || p.expiryDate !== expiryDate) return false;
    if (barcode && p.barcode === barcode) return true;
    if (plu && p.plu === plu) return true;
    if (!barcode && !plu && !p.barcode && !p.plu && name && p.name.trim().toLowerCase() === name.trim().toLowerCase()) return true;
    return false;
  });
}

// เช็คซ้ำ + ตรวจรูปแบบวันที่ที่พิมพ์เอง (real-time)
function liveCheckDateDuplicates(containerId, warnAreaId, getBarcode, getPlu, getName, getExcludeId, submitBtnId) {
  const container = document.getElementById(containerId);
  const warnArea = document.getElementById(warnAreaId);
  if (!container) return;
  const run = () => {
    const inputs = Array.from(container.querySelectorAll('.lot-date-input'));
    const dates = [];
    let msg = '';
    let formatError = false;
    inputs.forEach(inp => {
      const raw = inp.value.trim();
      if (!raw) { inp.classList.remove('ring-2', 'ring-red-400'); return; }
      const iso = parseDateInputTH(raw);
      if (iso === null) { formatError = true; inp.classList.add('ring-2', 'ring-red-400'); }
      else { inp.classList.remove('ring-2', 'ring-red-400'); if (iso) dates.push(iso); }
    });
    if (formatError) {
      msg = '⚠️ รูปแบบวันที่ไม่ถูกต้อง พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69';
    } else if (new Set(dates).size !== dates.length) {
      msg = '⚠️ มีวันหมดอายุซ้ำกันเองในรายการนี้ กรุณาตรวจสอบ';
    }
    let dupProduct = null, dupDate = null;
    if (!formatError && new Set(dates).size === dates.length) {
      const barcode = getBarcode ? getBarcode() : '';
      const plu = getPlu ? getPlu() : '';
      const name = getName ? getName() : '';
      const excludeId = getExcludeId ? getExcludeId() : null;
      for (const d of dates) {
        const dup = findDuplicateProduct(barcode, plu, name, d, excludeId);
        if (dup) { dupProduct = dup; dupDate = d; break; }
      }
    }
    if (warnArea) {
      if (dupProduct) {
        const c = withComputed(dupProduct);
        warnArea.innerHTML = `
          <div class="mt-2 rounded-2xl bg-red-50 p-2.5 ring-1 ring-red-200 fx-fade-up">
            <p class="mb-1.5 text-xs font-black text-red-600">⛔ สินค้านี้มีในระบบแล้ว (วันหมดอายุตรงกัน)</p>
            <button type="button" onclick="viewProductDetail(${dupProduct.id})" class="flex w-full items-center gap-2.5 rounded-xl bg-white p-2 text-left ring-1 ring-red-100 active:scale-[0.98]">
              <div class="h-11 w-11 shrink-0 overflow-hidden rounded-lg bg-stone-100">${dupProduct.imageUrl ? `<img src="${dupProduct.imageUrl}" class="h-full w-full object-cover" />` : `<div class="flex h-full w-full items-center justify-center text-lg">📦</div>`}</div>
              <div class="min-w-0 flex-1">
                <p class="truncate text-xs font-bold text-stone-800">${escapeHtml(truncateName(dupProduct.name))}</p>
                <p class="text-[11px] font-bold" style="color:${STATUS_COLOR[c.status]}">หมดอายุ ${formatThaiDate(dupDate)} · ${relativeDaysText(c.daysLeft)}</p>
              </div>
              <span class="shrink-0 text-[11px] font-bold text-red-400">ดู ›</span>
            </button>
            <p class="mt-1.5 text-[11px] text-red-500">ถ้าเป็นล็อตใหม่จริง กรุณาเปลี่ยนวันหมดอายุให้ต่างจากนี้</p>
          </div>`;
        const key = String(dupProduct.id) + dupDate;
        if (warnArea.dataset.lastDup !== key) { try { triggerHaptic(25); } catch (e) {} warnArea.dataset.lastDup = key; }
      } else {
        warnArea.innerHTML = msg ? `<p class="mt-1 text-xs font-bold text-red-500">${escapeHtml(msg)}</p>` : '';
        warnArea.dataset.lastDup = '';
      }
    }
    const blocked = !!msg || !!dupProduct;
    const btn = submitBtnId ? document.getElementById(submitBtnId) : null;
    if (btn) btn.disabled = blocked;
    if (btn) btn.classList.toggle('opacity-50', blocked);
  };
  container.addEventListener('input', run);
  container.addEventListener('change', run);
  run();
  return run;
}

async function restoreProduct(id) {
  const idx = products.findIndex(x => x.id === id);
  if (idx === -1) return;
  const p = products[idx];
  products[idx] = { ...p, removed: false, removedDate: null, removedBy: '', removedImageUrl: '', removedReason: '' };
  await saveProductsOrWarn([products[idx]]);
  triggerHaptic(12);
  showToast(`↩️ กู้คืน "${truncateName(p.name)}" แล้ว`);
  renderPage();
}

async function sendLineNotificationNow() {
  const btn = document.getElementById('line-notify-btn');
  const result = document.getElementById('line-notify-result');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ กำลังส่ง...'; btn.classList.add('opacity-60'); }
  if (result) result.innerHTML = '';
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/notify-line`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      },
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok && data.success) {
      const count = (data.flagged != null) ? data.flagged : '-';
      if (result) result.innerHTML = `<div class="rounded-xl bg-green-100 px-3 py-2 text-xs font-bold text-green-700">✅ ส่งเข้า LINE สำเร็จ! (${count === 0 ? 'วันนี้ไม่มีของใกล้หมดอายุ' : count + ' รายการ'})</div>`;
      triggerHaptic(20);
    } else {
      const errMsg = data.error || `เกิดข้อผิดพลาด (${res.status})`;
      if (result) result.innerHTML = `<div class="rounded-xl bg-red-100 px-3 py-2 text-xs font-bold text-red-700">❌ ส่งไม่สำเร็จ: ${escapeHtml(String(errMsg)).slice(0, 200)}</div>`;
    }
  } catch (e) {
    if (result) result.innerHTML = `<div class="rounded-xl bg-red-100 px-3 py-2 text-xs font-bold text-red-700">❌ เชื่อมต่อไม่ได้: ${escapeHtml(String(e.message || e)).slice(0, 200)}</div>`;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📤 ส่งแจ้งเตือนเข้า LINE ตอนนี้'; btn.classList.remove('opacity-60'); }
  }
}

function exportProductsCSV() {
  const active = products.map(withComputed).filter(p => !p.removed && isVisibleBranch(p));
  const header = ['ชื่อสินค้า', 'บาร์โค้ด', 'วันหมดอายุ', 'สถานะ', 'เพิ่มโดย', 'วันที่เพิ่ม'];
  const rows = active.map(p => [
    p.name, p.barcode, formatThaiDate(p.expiryDate),
    STATUS_LABEL_TH[p.status], p.addedBy || '-', p.addedDate ? new Date(p.addedDate).toLocaleDateString('th-TH') : '-'
  ]);
  const csv = '\ufeff' + [header, ...rows].map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `p3-expiry-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('📊 ดาวน์โหลดไฟล์ Excel แล้ว');
}

async function approvePending(id) {
  const item = pendingSubmissions.find(p => p.id === id);
  if (!item) return;
  
  const name = document.getElementById(`pending-name-${id}`).value.trim();
  const barcode = document.getElementById(`pending-barcode-${id}`).value.trim();
  const plu = document.getElementById(`pending-plu-${id}`).value.trim();
  const { dates, hasError } = readLotDates(`pending-dates-${id}`);
  
  if (hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
  if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');
  // อนุญาตให้อนุมัติแบบ "ยังไม่มีวันหมดอายุ" ได้ ถ้าไม่ใส่วันเลย
  const datesToSave = dates.length > 0 ? dates : [null];
  if (dates.length > 0 && blockIfHardDuplicate(barcode, plu, name, dates)) return;
  
  const newItems = [];
  datesToSave.forEach(expiryDate => {
    const newItem = {
      id: genId(), barcode, plu, name,
      imageUrl: item.imageUrl,
      expiryDate, addedDate: new Date().toISOString(),
      addedBy: item.submittedBy || state.staffCode
    };
    products.push(newItem);
    newItems.push(newItem);
  });
  
  const ok = await saveProducts(newItems);
  if (!ok) {
    products = products.filter(p => !newItems.includes(p));
    renderPage();
    showAlertModal('บันทึกสินค้าเข้าสู่ระบบไม่สำเร็จค่ะ\n\nคำขอนี้ยังอยู่ใน "คำขอรอตรวจสอบ" เหมือนเดิม ไม่หายไปไหน กรุณาตรวจสอบอินเทอร์เน็ต แล้วลองกดอนุมัติใหม่อีกครั้ง' + (lastDbError ? '\n\n(สาเหตุ: ' + lastDbError + ')' : ''));
    return;
  }
  
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== id);
  const pendingSaveOk = await deletePendingById(id);
  renderPage();
  if (pendingSaveOk) {
    showToast(`✅ อนุมัติสินค้าเข้าสู่ระบบแล้ว (${datesToSave.length} ล็อต)`);
  } else {

async function executeApproveAllPending() {
  const btn = document.getElementById('approve-all-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังอนุมัติทั้งหมด... โปรดรอสักครู่'; btn.classList.add('opacity-70'); }

  const itemsSnapshot = [...visiblePendingSubmissions()];
  const allNewItems = [];
  const approvedPendingIds = [];
  const skippedNames = [];

  for (const item of itemsSnapshot) {
    const id = item.id;
    if (item.editTargetId) continue;
    if (item.removeTargetId) continue;
    if (item.deleteTargetId) continue;
    const nameEl = document.getElementById(`pending-name-${id}`);
    const datesContainer = document.getElementById(`pending-dates-${id}`);
    if (!nameEl || !datesContainer) { skippedNames.push(item.name || '(ไม่มีชื่อ)'); continue; }

    const name = nameEl.value.trim();
    const barcodeEl = document.getElementById(`pending-barcode-${id}`);
    const pluEl = document.getElementById(`pending-plu-${id}`);
    const barcode = barcodeEl ? barcodeEl.value.trim() : '';
    const plu = pluEl ? pluEl.value.trim() : '';
    const { dates, hasError } = readLotDates(`pending-dates-${id}`);

    if (hasError) { skippedNames.push(`${name || '(ไม่มีชื่อ)'} — วันที่ผิดรูปแบบ`); continue; }
    if (!name) { skippedNames.push(`(ไม่มีชื่อ) — ข้อมูลไม่ครบ`); continue; }
    if (new Set(dates).size !== dates.length) { skippedNames.push(`${name} — วันหมดอายุซ้ำกันเอง`); continue; }
    const datesToSave = dates.length > 0 ? dates : [null];

    let hasDup = false;
    for (const date of dates) {
      const dupExisting = findDuplicateProduct(barcode, plu, name, date, null);
      const dupInBatch = allNewItems.find(ni => date === ni.expiryDate && (
        (barcode && ni.barcode === barcode) || (plu && ni.plu === plu) ||
        (!barcode && !plu && !ni.barcode && !ni.plu && ni.name.toLowerCase() === name.toLowerCase())
      ));
      if (dupExisting || dupInBatch) { hasDup = true; break; }
    }
    if (hasDup) { skippedNames.push(`${name} — ซ้ำกับของเดิมในระบบ`); continue; }

    datesToSave.forEach(expiryDate => {
      const newItem = {
        id: genId(), barcode, plu, name,
        imageUrl: item.imageUrl,
        expiryDate, addedDate: new Date().toISOString(),
        addedBy: item.submittedBy || state.staffCode
      };
      products.push(newItem);
      allNewItems.push(newItem);
    });
    approvedPendingIds.push(id);
  }

  if (allNewItems.length === 0) {
    if (btn) { btn.disabled = false; btn.textContent = `✅ อนุมัติทั้งหมด (${visiblePendingSubmissions().length} รายการ)`; btn.classList.remove('opacity-70'); }
    return showAlertModal(`อนุมัติไม่ได้เลยสักรายการค่ะ ทุกรายการมีปัญหา:\n\n${skippedNames.join('\n')}`);
  }

  const ok = await saveProducts(allNewItems);
  if (!ok) {
    products = products.filter(p => !allNewItems.includes(p));
    renderPage();
    return showAlertModal('บันทึกสินค้าเข้าสู่ระบบไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
  }

  pendingSubmissions = pendingSubmissions.filter(p => !approvedPendingIds.includes(p.id));
  const delOk = await deletePendingByIds(approvedPendingIds);
  renderPage();

  let msg = `✅ อนุมัติสำเร็จ ${approvedPendingIds.length} รายการ (${allNewItems.length} ล็อต)`;
  if (skippedNames.length > 0) msg += ` — ข้าม ${skippedNames.length} รายการ`;
  showToast(msg);

  if (skippedNames.length > 0) {
    showAlertModal(`ข้ามไป ${skippedNames.length} รายการ เพราะข้อมูลไม่ครบ/ซ้ำกับของเดิม:\n\n${skippedNames.join('\n')}\n\nไปแก้ไขแล้วกดอนุมัติทีละรายการที่เหลือได้เลยค่ะ`);
  } else if (!delOk) {
    showAlertModal('สินค้าเข้าระบบครบแล้ว แต่ลบออกจาก "คำขอรอตรวจสอบ" บางรายการไม่สำเร็จ ลองรีเฟรชแล้วปฏิเสธรายการที่ซ้ำออกได้เลยค่ะ');
  }
}

async function approveEditRequest(pendingId) {
  const req = pendingSubmissions.find(p => p.id === pendingId);
  if (!req || !req.editTargetId) return;
  const idx = products.findIndex(p => p.id === req.editTargetId);
  if (idx === -1) {
    showAlertModal('ไม่พบสินค้าต้นทางในระบบแล้ว (อาจถูกแก้ไขหรือลบไปก่อนหน้า) — กรุณาปฏิเสธคำขอนี้');
    return;
  }
  if (req.barcode) {
    const clash = products.find(p => p.id !== req.editTargetId && !p.removed && p.barcode === req.barcode);
    if (clash) {
      showAlertModal(`บาร์โค้ด ${req.barcode} นี้มีสินค้าอื่นใช้อยู่แล้ว ("${truncateName(clash.name)}") กรุณาตรวจสอบก่อนอนุมัติ`);
      return;
    }
  }
  const backup = products[idx];
  products[idx] = { ...backup, name: req.name, barcode: req.barcode, plu: req.plu, imageUrl: req.imageUrl, imageEmbedding: null };
  const ok = await saveProducts([products[idx]]);
  if (!ok) {
    products[idx] = backup;
    renderPage();
    return showAlertModal('อัปเดตข้อมูลไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
  }
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== pendingId);
  await deletePendingById(pendingId);
  triggerHaptic(20);
  renderPage();
  showToast('✅ อนุมัติการแก้ไขแล้ว ข้อมูลสินค้าอัปเดตเรียบร้อย');
}

async function rejectPending(id) {
  pendingSubmissions = pendingSubmissions.filter(p => p.id !== id);
  const ok = await deletePendingById(id);
  renderPage();
  if (ok) showToast('🗑️ ปฏิเสธคำขอแล้ว');
  else showAlertModal('ปฏิเสธคำขอไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
}

      if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');
      const uploadedImg = await uploadImageToStorage(img, 'products');
      const idx = products.findIndex(x => x.id === productId);
      const backup = products[idx];
      products[idx] = { ...products[idx], name, barcode: bc, expiryDate: date, imageUrl: uploadedImg };
      saveOk = await saveProducts([products[idx]]);
      if (!saveOk) products[idx] = backup;
    } else {
      const noDateMode = document.getElementById('dev-form-nodate')?.checked;
      let dates = [];
      if (!noDateMode) {
        const r = readLotDates('dev-form-dates');
        if (r.hasError) return showAlertModal('รูปแบบวันที่ไม่ถูกต้องค่ะ พิมพ์เป็น วว/ดด/ปป เช่น 22/02/69');
        dates = r.dates;
        if (!name || dates.length === 0) return showAlertModal('กรุณากรอกชื่อและวันหมดอายุอย่างน้อย 1 รายการ (หรือติ๊ก "ยังไม่มีของ" ถ้ายังไม่มีวันหมดอายุตอนนี้)');
        if (bc && blockIfHardDuplicate(bc, '', name, dates)) return;
      } else {
        if (!name) return showAlertModal('กรุณากรอกชื่อสินค้า');
      }
      const uploadedImg = await uploadImageToStorage(img, 'products');
      const newItems = [];
      const datesToSave = noDateMode ? [null] : dates;
      datesToSave.forEach(date => {
        const newItem = {
          id: genId(), barcode: bc, name,
          imageUrl: uploadedImg, expiryDate: date,
          addedDate: new Date().toISOString(), addedBy: state.staffCode
        };
        products.push(newItem);
        newItems.push(newItem);
      });
      saveOk = await saveProducts(newItems);
      if (!saveOk) products = products.filter(x => !newItems.includes(x));
    }
    
    if (!saveOk) {
      renderPage();
      return showAlertModal('บันทึกขึ้น Supabase ไม่สำเร็จค่ะ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
    }
    
    closeModal();
    showToast('✅ บันทึกสินค้าสำเร็จ');
    renderPage();
  });
}

function toggleNoDateMode(wrapId, checkboxId, warnAreaId, submitBtnId) {
  const wrap = document.getElementById(wrapId);

    wrap.querySelectorAll('.lot-date-input').forEach(inp => { inp.required = !checked; });
  }
  if (checked) {
    if (warnAreaId) { const w = document.getElementById(warnAreaId); if (w) w.innerHTML = ''; }
    if (submitBtnId) { const b = document.getElementById(submitBtnId); if (b) { b.disabled = false; b.classList.remove('opacity-50'); } }
  }
}

function handlePluSearch() {
  const el = document.getElementById('plu-search-input');
  if (!el) return;
  const plu = el.value.trim();
  if (!plu) return showToast('พิมพ์เลข PLU ที่จะค้นหาก่อนนะคะ');
  const exact = products.filter(p => !p.removed && isVisibleBranch(p) && p.plu && String(p.plu) === plu);
  const partial = products.filter(p => !p.removed && isVisibleBranch(p) && p.plu && String(p.plu) !== plu && String(p.plu).includes(plu));
  const matches = [...exact, ...partial].slice(0, 8);
  showPluSearchResults(plu, matches);
}
