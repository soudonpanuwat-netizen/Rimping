<script>
'use strict';

// ==================== Constants ====================
const ADMIN_ID = '63042';
const ADMIN_PIN = '0898';
const URGENT_WINDOW_DAYS = 7;
const STORAGE_KEY = 'rimping_products_v1';
const PENDING_KEY = 'rimping_pending_v1';

const STATUS_LABEL_TH = { expired: 'หมดอายุแล้ว', urgent: 'เร่งด่วน', safe: 'ปลอดภัย' };
const STATUS_COLOR = { expired: '#dc2626', urgent: '#d97706', safe: '#059669' };

const WEEKDAYS_TH = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
const MONTHS_TH = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

const NAV_ITEMS = [
  { id: 'dashboard', label: 'หน้าแรก', emoji: '🏠' },
  { id: 'scanner', label: 'สแกน', emoji: '📷' },
  { id: 'calendar', label: 'ปฏิทิน', emoji: '🗓️' },
  { id: 'admin', label: 'แอดมิน', emoji: '🛠️' },
];

const FILTER_CHIPS = [
  { id: 'all', label: 'ทั้งหมด' },
  { id: 'expired', label: '🔴 หมดอายุแล้ว' },
  { id: 'urgent', label: '🟡 เร่งด่วน' },
  { id: 'safe', label: '🟢 ปลอดภัย' },
];

// ==================== State ====================
const state = {
  entered: false,
  isAdminSession: false,
  tab: 'dashboard',
  search: '',
  filter: 'all',
  cal: { year: new Date().getFullYear(), month: new Date().getMonth() + 1, selected: null },
  scanner: { scannedCode: null },
};

let html5QrCode = null;
let pendingLoginSuccess = null;
let pendingRestoreProducts = null;

// ==================== Storage ====================
function seedProducts() {
  const today = new Date();
  const offset = (days) => {
    const d = new Date(today);
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  };
  return [
    { id: 1, barcode: '8851234567890', name: 'นมสดพาสเจอร์ไรส์ 1 ลิตร', category: 'นม/ผลิตภัณฑ์นม', imageUrl: '', expiryDate: offset(-1), notes: 'หมดอายุแล้ว - ตัวอย่าง', addedDate: today.toISOString() },
    { id: 2, barcode: '8859012345671', name: 'ขนมปังโฮลวีต', category: 'เบเกอรี่', imageUrl: '', expiryDate: offset(2), notes: 'เร่งด่วน - ตัวอย่าง', addedDate: today.toISOString() },
    { id: 3, barcode: '40123456', name: 'โยเกิร์ตรสธรรมชาติ', category: 'นม/ผลิตภัณฑ์นม', imageUrl: '', expiryDate: offset(5), notes: '', addedDate: today.toISOString() },
    { id: 4, barcode: '8850999888771', name: 'ไข่ไก่เบอร์ 1 แพ็ค 10', category: 'ไข่', imageUrl: '', expiryDate: offset(14), notes: '', addedDate: today.toISOString() },
    { id: 5, barcode: 'CUST0001', name: 'ผักกาดขาวออร์แกนิก', category: 'ผัก/ผลไม้', imageUrl: '', expiryDate: offset(30), notes: 'บาร์โค้ดแบบกำหนดเอง', addedDate: today.toISOString() },
  ];
}

function loadProducts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      const seeded = seedProducts();
      saveProducts(seeded);
      return seeded;
    }
    return JSON.parse(raw);
  } catch {
    return [];
  }
}
function saveProducts(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

function isAdmin() { return state.isAdminSession === true; }
function setAdmin(value) { state.isAdminSession = !!value; }

function loadPending() {
  try {
    const raw = localStorage.getItem(PENDING_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}
function savePending(list) { localStorage.setItem(PENDING_KEY, JSON.stringify(list)); }

let products = loadProducts();
let pendingSubmissions = loadPending();

// ==================== Domain helpers ====================
function getStatus(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function formatThaiDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}
function computeStats() {
  const counts = { expired: 0, urgent: 0, safe: 0 };
  products.forEach((p) => counts[getStatus(p.expiryDate)]++);
  return counts;
}

function detectBarcodeType(raw) {
  const code = (raw ?? '').trim();
  if (/^\d{13}$/.test(code)) return 'EAN-13';
  if (/^\d{12}$/.test(code)) return 'UPC-A';
  if (/^\d{8}$/.test(code)) return 'EAN-8';
  if (/^[A-Za-z0-9]{4,}$/.test(code) && /[A-Za-z]/.test(code)) return 'CODE128';
  if (code.length >= 4) return 'CUSTOM';
  return 'INVALID';
}
function isValidBarcode(code) { return detectBarcodeType(code) !== 'INVALID'; }
const BARCODE_TYPE_LABEL_TH = {
  'EAN-13': 'EAN-13 (13 หลัก)', 'EAN-8': 'EAN-8 (8 หลัก)', 'UPC-A': 'UPC-A (12 หลัก)',
  CODE128: 'Code128', CUSTOM: 'บาร์โค้ดกำหนดเอง', INVALID: 'รูปแบบไม่ถูกต้อง',
};

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function playBeep() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1046;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.13);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.14);
    osc.onended = () => ctx.close();
  } catch { /* เบราว์เซอร์บล็อก autoplay เสียง - ไม่ต้องทำอะไร */ }
}

// ==================== Shared UI pieces ====================
function basketIconSVG(size, color, strokeWidth) {
  size = size || 24; color = color || '#047857'; strokeWidth = strokeWidth || 2;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z"/>
      <path d="M9 9V6.5a3 3 0 0 1 6 0V9"/>
      <path d="M9.5 13v3.2"/>
      <path d="M12 13v3.2"/>
      <path d="M14.5 13v3.2"/>
    </svg>`;
}
function basketFilledSVG(size, color) {
  size = size || 24; color = color || '#047857';
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}">
      <path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z" />
      <path d="M9 9V6.5a3 3 0 0 1 6 0V9h-1.6V6.5a1.4 1.4 0 0 0-2.8 0V9H9Z" />
    </svg>`;
}

function freshnessRingSVG(daysLeft, status, size) {
  size = size || 64;
  const stroke = 6;
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const ratio = status === 'expired' ? 0 : Math.min(Math.max(daysLeft, 0), 30) / 30;
  const dashOffset = circumference * (1 - ratio);
  const color = STATUS_COLOR[status];
  const c = size / 2;
  return `
    <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
      <svg width="${size}" height="${size}" class="-rotate-90">
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="#e3efe7" stroke-width="${stroke}" fill="none" />
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none"
          stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
          style="transition: stroke-dashoffset .4s ease;" />
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-xl font-extrabold leading-none" style="color:${color}">${status === 'expired' ? '!' : daysLeft}</span>
        ${status !== 'expired' ? '<span class="text-[10px] font-semibold text-stone-500">วัน</span>' : ''}
      </div>
    </div>`;
}

function statusBadgeHTML(status) {
  const styles = {
    expired: 'bg-red-50 text-red-600 ring-1 ring-red-200',
    urgent: 'bg-amber-50 text-amber-600 ring-1 ring-amber-200',
    safe: 'bg-brand-50 text-brand-700 ring-1 ring-brand-200',
  };
  return `<span class="rounded-full px-2.5 py-0.5 text-xs font-semibold ${styles[status]}">${STATUS_LABEL_TH[status]}</span>`;
}

function productThumbHTML(p, size) {
  size = size || 64;
  if (p.imageUrl) {
    const badgeText = p.status === 'expired' ? 'หมดอายุ' : `${p.daysLeft} วัน`;
    return `
      <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
        <img src="${p.imageUrl}" class="h-full w-full rounded-2xl object-cover ring-1 ring-brand-100" />
        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-full border-2 border-white px-2 py-0.5 text-[10px] font-extrabold text-white shadow-sm" style="background-color:${STATUS_COLOR[p.status]}">${badgeText}</span>
      </div>`;
  }
  return freshnessRingSVG(p.daysLeft, p.status, size);
}

function statCardHTML(label, count, colorClass, active, onclickAttr) {
  return `
    <button onclick="${onclickAttr}" class="flex flex-1 flex-col items-start gap-1 rounded-2xl px-3 py-3 text-left ring-1 transition-all ${colorClass} ${active ? 'scale-[1.02] shadow-card ring-2' : 'ring-1'}">
      <span class="text-2xl font-bold leading-none">${count}</span>
      <span class="text-xs font-medium opacity-80">${label}</span>
    </button>`;
}

function productCardHTML(p, opts) {
  opts = opts || {};
  const showActions = !!opts.showActions;
  // เพิ่ม cursor-pointer และ onclick เพื่อดูรูปสินค้าตามข้อ 2
  return `
    <div class="flex items-center gap-3 rounded-2xl bg-white p-3 shadow-card ring-1 ring-brand-100/60 cursor-pointer active:bg-stone-50" onclick="viewProductDetail(${p.id})">
      ${productThumbHTML(p)}
      <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
          <p class="truncate text-sm font-semibold text-stone-800">${escapeHtml(p.name)}</p>
          ${statusBadgeHTML(p.status)}
        </div>
        <p class="mt-0.5 truncate text-xs text-stone-400">${p.category ? escapeHtml(p.category) + ' · ' : ''}${escapeHtml(p.barcode)}</p>
        <p class="mt-1 text-xs text-stone-500">หมดอายุ ${formatThaiDate(p.expiryDate)}</p>
      </div>
      ${showActions ? `
        <div class="flex shrink-0 flex-col gap-1.5" onclick="event.stopPropagation()">
          <button onclick="openProductForm(${p.id})" class="rounded-full bg-brand-50 p-1.5 text-brand-700 active:scale-95" aria-label="แก้ไข">✏️</button>
          <button onclick="confirmDeleteProduct(${p.id})" class="rounded-full bg-red-50 p-1.5 text-red-600 active:scale-95" aria-label="ลบ">🗑️</button>
        </div>` : ''}
    </div>`;
}

// ฟังก์ชันใหม่: ดูรายละเอียดและรูปภาพสินค้า (ข้อ 2)
function viewProductDetail(id) {
  const p = products.map(withComputed).find(x => x.id === id);
  if (!p) return;
  
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/60 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-md overflow-hidden rounded-3xl bg-white shadow-2xl animate-in slide-in-from-bottom duration-300">
        <div class="relative h-64 w-full bg-stone-100">
          ${p.imageUrl 
            ? `<img src="${p.imageUrl}" class="h-full w-full object-cover" />` 
            : `<div class="flex h-full w-full flex-col items-center justify-center text-stone-400">
                 <span class="text-5xl mb-2">📦</span>
                 <p class="text-sm">ไม่มีรูปภาพสินค้า</p>
               </div>`
          }
          <button onclick="closeModal()" class="absolute right-4 top-4 flex h-10 w-10 items-center justify-center rounded-full bg-black/20 text-white backdrop-blur-md active:scale-95">✕</button>
          <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-6 pt-12">
            <div class="flex items-center justify-between">
              <h3 class="text-xl font-bold text-white">${escapeHtml(p.name)}</h3>
              ${statusBadgeHTML(p.status)}
            </div>
          </div>
        </div>
        <div class="p-6 space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div class="rounded-2xl bg-stone-50 p-3">
              <p class="text-[10px] font-bold uppercase tracking-wider text-stone-400">บาร์โค้ด</p>
              <p class="text-sm font-semibold text-stone-700">${escapeHtml(p.barcode)}</p>
            </div>
            <div class="rounded-2xl bg-stone-50 p-3">
              <p class="text-[10px] font-bold uppercase tracking-wider text-stone-400">หมวดหมู่</p>
              <p class="text-sm font-semibold text-stone-700">${escapeHtml(p.category || 'ไม่ระบุ')}</p>
            </div>
          </div>
          <div class="rounded-2xl border-2 border-brand-100 bg-brand-50/30 p-4">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-[10px] font-bold uppercase tracking-wider text-brand-600">วันหมดอายุ</p>
                <p class="text-lg font-bold text-stone-800">${formatThaiDate(p.expiryDate)}</p>
              </div>
              <div class="text-right">
                <p class="text-[10px] font-bold uppercase tracking-wider text-stone-400">คงเหลือ</p>
                <p class="text-lg font-black ${p.status === 'expired' ? 'text-red-600' : 'text-brand-700'}">${p.daysLeft} วัน</p>
              </div>
            </div>
          </div>
          ${p.notes ? `
            <div class="rounded-2xl bg-amber-50 p-3 text-xs text-amber-800">
              <p class="font-bold mb-1">📝 หมายเหตุ:</p>
              <p>${escapeHtml(p.notes)}</p>
            </div>
          ` : ''}
          <button onclick="closeModal()" class="w-full rounded-2xl bg-brand-600 py-3.5 text-sm font-bold text-white shadow-lg active:scale-[0.98] transition-transform">ตกลง</button>
        </div>
      </div>
    </div>
  `);
}

function bottomNavHTML() {
  const stats = computeStats();
  return `
    <nav id="bottom-nav" class="fixed inset-x-0 bottom-0 z-20 border-t border-brand-100 bg-white/95 backdrop-blur-sm">
      <div class="mx-auto flex max-w-md items-stretch justify-between px-2" style="padding-bottom: env(safe-area-inset-bottom);">
        ${NAV_ITEMS.map((item) => {
          const isActive = state.tab === item.id;
          let badge = '';
          if (item.id === 'scanner' && stats.urgent > 0) {
            badge = `<span class="absolute -right-2 -top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-amber-500 px-1 text-[10px] font-bold text-white">${stats.urgent > 9 ? '9+' : stats.urgent}</span>`;
          }
          if (item.id === 'admin' && pendingSubmissions.length > 0) {
            badge = `<span class="absolute -right-2 -top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-sky-500 px-1 text-[10px] font-bold text-white">${pendingSubmissions.length > 9 ? '9+' : pendingSubmissions.length}</span>`;
          }
          return `
            <button onclick="setTab('${item.id}')" class="relative flex flex-1 flex-col items-center gap-1 py-3 transition-colors ${isActive ? 'text-brand-700' : 'text-stone-400'}">
              <span class="text-xl transition-transform ${isActive ? 'scale-110' : ''}">${item.emoji}</span>
              <span class="text-[10px] font-bold">${item.label}</span>
              ${badge}
              ${isActive ? '<span class="absolute top-0 h-0.5 w-8 rounded-full bg-brand-600"></span>' : ''}
            </button>`;
        }).join('')}
      </div>
    </nav>`;
}

// ==================== Pages ====================
function dashboardHTML() {
  const stats = computeStats();
  const filtered = products
    .map(withComputed)
    .filter((p) => {
      const matchSearch = !state.search || p.name.toLowerCase().includes(state.search.toLowerCase()) || p.barcode.includes(state.search);
      const matchFilter = state.filter === 'all' || p.status === state.filter;
      return matchSearch && matchFilter;
    })
    .sort((a, b) => a.daysLeft - b.daysLeft);

  return `
    <div class="space-y-5 pb-4">
      <header class="flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="rounded-2xl bg-brand-600 p-2.5 text-white shadow-lg shadow-brand-200">${basketFilledSVG(24, 'white')}</div>
          <div>
            <h1 class="text-xl font-black tracking-tight text-stone-800">Rimping <span class="text-brand-600">Expiry</span></h1>
            <p class="text-[10px] font-bold uppercase tracking-widest text-stone-400">Smart Tracker System</p>
          </div>
        </div>
        <div class="text-right">
          <p class="text-xs font-bold text-stone-800">${formatThaiDate(new Date().toISOString().slice(0, 10))}</p>
          <p class="text-[10px] font-medium text-stone-400">เชียงใหม่, ประเทศไทย</p>
        </div>
      </header>

      <div class="flex gap-2.5">
        ${statCardHTML('หมดอายุ', stats.expired, 'bg-red-50 text-red-600 ring-red-100', state.filter === 'expired', "setFilter('expired')")}
        ${statCardHTML('เร่งด่วน', stats.urgent, 'bg-amber-50 text-amber-600 ring-amber-100', state.filter === 'urgent', "setFilter('urgent')")}
        ${statCardHTML('ปลอดภัย', stats.safe, 'bg-brand-50 text-brand-700 ring-brand-100', state.filter === 'safe', "setFilter('safe')")}
      </div>

      <div class="sticky top-0 z-10 -mx-4 space-y-3 bg-brand-50/80 px-4 py-2 backdrop-blur-md">
        <div class="relative group">

        </div>
        <div class="no-scrollbar flex gap-2 overflow-x-auto pb-1">
          ${FILTER_CHIPS.map((c) => `
            <button onclick="setFilter('${c.id}')" class="whitespace-nowrap rounded-full px-5 py-2 text-xs font-bold transition-all ${state.filter === c.id ? 'bg-brand-600 text-white shadow-md' : 'bg-white text-stone-500 ring-1 ring-brand-100 active:bg-brand-50'}">

        </div>
        ${filtered.length === 0 
          ? `<div class="rounded-3xl bg-white py-16 text-center shadow-card ring-1 ring-brand-100/60">
               <p class="text-4xl mb-3">🔍</p>
               <p class="text-sm font-bold text-stone-400">ไม่พบสินค้าที่คุณต้องการ</p>
               <button onclick="state.search=''; state.filter='all'; renderPage();" class="mt-4 text-xs font-bold text-brand-600">ล้างการค้นหา</button>
             </div>`

}

function scannerHTML() {
  return `
    <div class="space-y-4">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">📷</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">สแกนบาร์โค้ด</h1>
          <p class="text-xs text-stone-400">สแกนเพื่อตรวจสอบ หรือเพิ่มข้อมูลสินค้า</p>
        </div>
      </header>

      <div class="relative aspect-[4/3] overflow-hidden rounded-3xl bg-black shadow-2xl ring-4 ring-white">
        <div id="qr-reader" class="h-full w-full"></div>
        <div id="camera-status" class="absolute inset-0 flex items-center justify-center bg-stone-900 text-center text-xs text-white/70">กำลังเปิดกล้อง...</div>
        <div id="camera-frame" class="pointer-events-none absolute inset-6 rounded-xl border-2 border-brand-400 hidden"></div>
      </div>

      <button type="button" onclick="document.getElementById('scan-image-input').click()" class="flex w-full items-center justify-center gap-1.5 rounded-xl bg-white py-2.5 text-xs font-semibold text-brand-700 ring-1 ring-brand-200 active:scale-95">
        🖼️ แทรกรูปภาพเพื่อสแกนบาร์โค้ด
      </button>
      <input id="scan-image-input" type="file" accept="image/*" class="hidden" onchange="handleScanImageFile(event)" />
      <div id="file-scan-temp" class="hidden"></div>

      <form id="manual-form" class="flex gap-2">
        <input id="manual-input" placeholder="หรือพิมพ์บาร์โค้ดด้วยตนเอง" class="flex-1 rounded-xl border border-stone-200 bg-white px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
        <button type="submit" class="rounded-xl bg-brand-600 px-4 text-white active:scale-95">🔍</button>
      </form>

      <div id="scan-result"></div>

      ${!isAdmin() ? `
        <button onclick="openSubmissionModal()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-sky-600 py-3 text-sm font-semibold text-white shadow-card active:scale-95">
          📋 ไม่พบสินค้าที่ต้องการ? แจ้งเพิ่มสินค้าใหม่
        </button>` : ''}
    </div>`;
}

function initScanner() {
  document.getElementById('manual-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = document.getElementById('manual-input').value.trim();
    if (code) handleScanResult(code);
  });
  startScanner();
}

function handleScanImageFile(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const resultEl = document.getElementById('scan-result');
  if (resultEl) {
    resultEl.innerHTML = `<div class="rounded-2xl bg-white p-4 text-center text-xs text-stone-400 shadow-card ring-1 ring-brand-100/60">กำลังอ่านบาร์โค้ดจากรูปภาพ...</div>`;
  }
  if (!window.Html5Qrcode) {
    if (resultEl) resultEl.innerHTML = `<p class="text-xs text-red-600">ไม่พบไลบรารีสแกน กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p>`;
    return;
  }
  const fileScanner = new Html5Qrcode('file-scan-temp');
  fileScanner
    .scanFile(file, false)
    .then((decodedText) => {
      playBeep();
      handleScanResult(decodedText);
      try { fileScanner.clear(); } catch {}
    })
    .catch(() => {
      if (resultEl) {
        resultEl.innerHTML = `
          <div class="rounded-2xl bg-white p-4 text-center shadow-card ring-1 ring-brand-100/60">
            <p class="text-xs text-red-600">ไม่พบบาร์โค้ดในรูปภาพนี้</p>
            <p class="mt-1 text-[11px] text-stone-400">ลองรูปอื่น หรือพิมพ์บาร์โค้ดด้วยตนเองด้านล่าง</p>
          </div>`;
      }
      try { fileScanner.clear(); } catch {}
    });
}

function startScanner() {
  if (!window.Html5Qrcode) {
    const statusEl = document.getElementById('camera-status');
    if (statusEl) statusEl.textContent = 'ไม่พบไลบรารีกล้อง (ต้องต่ออินเทอร์เน็ตเพื่อโหลด html5-qrcode)';
    return;
  }
  html5QrCode = new Html5Qrcode('qr-reader');
  html5QrCode
    .start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => { playBeep(); handleScanResult(decodedText); },
      () => { /* ไม่เจอบาร์โค้ดในเฟรมนี้ - ไม่ต้องทำอะไร */ },
    )
    .then(() => {
      const statusEl = document.getElementById('camera-status');
      if (statusEl) statusEl.remove();
      const frame = document.getElementById('camera-frame');
      if (frame) frame.classList.remove('hidden');
    })
    .catch((err) => {
      console.error(err);
      const statusEl = document.getElementById('camera-status');
      if (statusEl) {
        statusEl.innerHTML = `
          <div class="flex flex-col items-center gap-2 px-6 text-center">
            <span class="text-2xl">📵</span>
            <span>ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้กล้อง หรือกรอกบาร์โค้ดด้วยตนเองด้านล่าง<br><span class="text-[10px] text-white/50">(กล้องต้องเปิดผ่าน HTTPS หรือ localhost)</span></span>
          </div>`;
      }
    });
}

function stopScanner() {
  if (html5QrCode) {
    const instance = html5QrCode;
    html5QrCode = null;
    instance.stop().catch(() => {}).finally(() => { try { instance.clear(); } catch {} });
  }
}

function handleScanResult(code) {
  state.scanner.scannedCode = code;
  const product = products.map(withComputed).find((p) => p.barcode === code) || null;
  const type = detectBarcodeType(code);
  const resultEl = document.getElementById('scan-result');
  if (!resultEl) return;

  const notFoundAction = isAdmin()
    ? `<button onclick="handleAddFromScanCurrent()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white active:scale-95">➕ เพิ่มสินค้าใหม่จากบาร์โค้ดนี้</button>`
    : `<button onclick="openSubmissionModal()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-sky-600 py-2.5 text-sm font-semibold text-white active:scale-95">📋 แจ้งเพิ่มสินค้าใหม่</button>`;

  const foundAction = `
    <div class="mt-3 space-y-2">
      <div class="h-px bg-stone-100"></div>
      <p class="text-[10px] font-bold text-stone-400 uppercase tracking-wider">พบสินค้าในระบบแล้ว</p>
      <button onclick="openSubmissionModal(true)" class="flex w-full items-center justify-center gap-2 rounded-xl bg-amber-500 py-2.5 text-sm font-semibold text-white shadow-sm active:scale-95 transition-transform">
        🆕 เพิ่มวันหมดอายุรอบใหม่ (ล็อตใหม่)
      </button>
    </div>`;

  resultEl.innerHTML = `
    <div class="space-y-3 rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
      <div class="flex items-center justify-between">
        <p class="text-sm font-semibold text-stone-700">บาร์โค้ด: ${escapeHtml(code)}</p>
        <span class="rounded-full px-2 py-0.5 text-[11px] font-semibold ${isValidBarcode(code) ? 'bg-brand-50 text-brand-700' : 'bg-red-50 text-red-600'}">${BARCODE_TYPE_LABEL_TH[type]}</span>
      </div>
      ${product ? (productCardHTML(product) + foundAction) : `
        <div class="space-y-2">
          <p class="text-xs text-stone-400">ไม่พบสินค้านี้ในระบบ</p>
          ${notFoundAction}
        </div>`}
    </div>`;
}

function handleAddFromScanCurrent() {
  const code = state.scanner.scannedCode;
  if (isAdmin()) openProductForm(null, code);
  else openAdminLogin(() => openProductForm(null, code));
}

// ==================== Public submission (pending admin approval) ====================
function openSubmissionModal(isNewLot = false) {
  const prefillBarcode = state.scanner.scannedCode || '';
  const existingProduct = isNewLot ? products.find(p => p.barcode === prefillBarcode) : null;
  
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 sm:items-center sm:p-4">
      <div class="max-h-[92vh] w-full max-w-md overflow-y-auto rounded-t-2xl bg-white p-5 sm:rounded-2xl">
        <div class="flex items-center justify-between">
          <h3 class="text-base font-bold text-stone-800">📋 ${isNewLot ? 'เพิ่มวันหมดอายุรอบใหม่' : 'แจ้งเพิ่มสินค้าใหม่'}</h3>
          <button onclick="closeModal()" class="text-stone-400">✕</button>
        </div>
        
        ${isNewLot ? `
          <div class="mt-3 flex items-center gap-3 rounded-2xl bg-amber-50 p-3 ring-1 ring-amber-100">
            ${existingProduct.imageUrl ? `<img src="${existingProduct.imageUrl}" class="h-12 w-12 rounded-lg object-cover" />` : `<div class="flex h-12 w-12 items-center justify-center rounded-lg bg-amber-100 text-xl">📦</div>`}
            <div class="min-w-0 flex-1">
              <p class="truncate text-sm font-bold text-amber-900">${escapeHtml(existingProduct.name)}</p>
              <p class="text-[10px] font-medium text-amber-700">บาร์โค้ด: ${escapeHtml(prefillBarcode)}</p>
            </div>
          </div>
          <p class="mt-3 text-xs text-stone-500 font-medium">ถ่ายรูป "วันหมดอายุรอบใหม่" เพื่อส่งให้แอดมินอนุมัติล็อตใหม่เข้าระบบครับ</p>
        ` : `
          <p class="mt-1 text-xs text-stone-400">ถ่ายรูป 2 รูปแล้วส่งให้แอดมินตรวจสอบ ไม่ต้องพิมพ์ชื่อหรือวันหมดอายุเอง แอดมินจะดูจากรูปแล้วใส่ให้ เมื่ออนุมัติแล้วจะเข้าระบบทันที</p>
        `}

        <form id="submission-form" class="mt-4 space-y-4">
          ${!isNewLot ? `
          <div>
            <label class="mb-1.5 block text-[10px] font-bold uppercase tracking-wider text-stone-400">1) รูปหน้าสินค้า *</label>
            <label class="flex flex-col items-center justify-center gap-1 rounded-2xl border-2 border-dashed border-sky-200 bg-sky-50/50 py-6 text-sky-700 cursor-pointer active:bg-sky-100 transition-colors">
              <div id="submission-product-preview" class="text-center">
                <span class="text-3xl">📷</span>
                <span class="text-xs font-bold block mt-1">ถ่ายรูปหน้าสินค้า</span>
              </div>
              <input id="submission-product-image" type="file" accept="image/*" class="hidden" />
            </label>
          </div>
          ` : ''}

          <div>
            <label class="mb-1.5 block text-[10px] font-bold uppercase tracking-wider text-stone-400">${isNewLot ? 'รูปวันหมดอายุรอบใหม่ *' : '2) รูปวันหมดอายุ *'}</label>
            <label class="flex flex-col items-center justify-center gap-1 rounded-2xl border-2 border-dashed border-amber-200 bg-amber-50/50 py-6 text-amber-700 cursor-pointer active:bg-amber-100 transition-colors">
              <div id="submission-expiry-preview" class="text-center">
                <span class="text-3xl">📅</span>
                <span class="text-xs font-bold block mt-1">ถ่ายรูปวันหมดอายุ</span>
              </div>
              <input id="submission-expiry-image" type="file" accept="image/*" class="hidden" />
            </label>
          </div>

          <p id="submission-error" class="hidden text-xs font-medium text-red-600"></p>

          <button type="submit" class="w-full rounded-2xl ${isNewLot ? 'bg-amber-600' : 'bg-sky-600'} py-3.5 text-sm font-bold text-white shadow-lg active:scale-[0.98] transition-transform">
            ${isNewLot ? 'ส่งคำขอเพิ่มล็อตใหม่' : 'ส่งคำขอให้แอดมินอนุมัติ'}
          </button>
        </form>
      </div>
    </div>
  `);

  let productImageData = isNewLot ? (existingProduct.imageUrl || '') : '';
  let expiryImageData = '';

  if (!isNewLot) {
    document.getElementById('submission-product-image').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        productImageData = String(reader.result);
        document.getElementById('submission-product-preview').innerHTML = `<img src="${productImageData}" class="h-32 w-32 rounded-xl object-cover shadow-md" />`;
      };
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('submission-expiry-image').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      expiryImageData = String(reader.result);
      document.getElementById('submission-expiry-preview').innerHTML = `<img src="${expiryImageData}" class="h-32 w-32 rounded-xl object-cover shadow-md" />`;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('submission-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const errEl = document.getElementById('submission-error');

    if ((!isNewLot && !productImageData) || !expiryImageData) {
      errEl.textContent = isNewLot ? 'กรุณาถ่ายรูปวันหมดอายุรอบใหม่' : 'กรุณาถ่ายรูปให้ครบทั้ง 2 รูป (รูปสินค้า และรูปวันหมดอายุ)';
      errEl.classList.remove('hidden');
      return;
    }

    const newPending = {
      id: pendingSubmissions.length > 0 ? Math.max(...pendingSubmissions.map((p) => p.id)) + 1 : 1,
      barcode: prefillBarcode,
      name: isNewLot ? existingProduct.name : '',
      productPhoto: productImageData,
      expiryPhoto: expiryImageData,
      submittedAt: new Date().toISOString(),
      isNewLot: isNewLot
    };
    pendingSubmissions.push(newPending);
    savePending(pendingSubmissions);
    state.scanner.scannedCode = null;
    showSubmissionSuccess();
    refreshCurrentTabData();
  });
}

function showSubmissionSuccess() {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-6 text-center shadow-xl">
        <p class="text-3xl">✅</p>
        <h3 class="mt-2 text-base font-bold text-stone-800">ส่งคำขอเรียบร้อยแล้ว</h3>
        <p class="mt-1 text-sm text-stone-500">ขอบคุณ! รอแอดมินตรวจสอบและอนุมัติ เมื่ออนุมัติแล้วสินค้าจะเข้าระบบทันที</p>
        <button onclick="closeModal()" class="mt-4 w-full rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white active:scale-95">ปิด</button>
      </div>
    </div>
  `);
}

function adminPendingListHTML() {
  if (pendingSubmissions.length === 0) {
    return `<p class="py-4 text-center text-xs text-stone-400">ยังไม่มีคำขอเพิ่มสินค้าใหม่</p>`;
  }
  return pendingSubmissions.map((item) => {
    const productPhoto = item.productPhoto || item.imageUrl || '';
    const expiryPhoto = item.expiryPhoto || '';
    return `
    <div class="space-y-3 rounded-2xl bg-white p-3 shadow-card ring-1 ring-sky-100">
      <div class="grid grid-cols-2 gap-2">
        <div>
          ${productPhoto
            ? `<button type="button" onclick="viewPendingPhoto(${item.id}, 'product')" class="block w-full"><img src="${productPhoto}" class="h-32 w-full rounded-xl object-cover ring-1 ring-stone-100" /></button>`
            : `<div class="flex h-32 w-full items-center justify-center rounded-xl bg-stone-100 text-xs text-stone-400">ไม่มีรูป</div>`}
          <p class="mt-1 text-center text-[11px] text-stone-400">📷 รูปสินค้า</p>
        </div>
        <div>
          ${expiryPhoto
            ? `<button type="button" onclick="viewPendingPhoto(${item.id}, 'expiry')" class="block w-full"><img src="${expiryPhoto}" class="h-32 w-full rounded-xl object-cover ring-1 ring-stone-100" /></button>`
            : `<div class="flex h-32 w-full items-center justify-center rounded-xl bg-stone-100 text-xs text-stone-400">ไม่มีรูป</div>`}
          <p class="mt-1 text-center text-[11px] text-stone-400">📅 รูปวันหมดอายุ</p>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-[10px] font-bold text-sky-600 uppercase">ชื่อสินค้า (แก้ไขได้)</label>
        <input id="pending-name-${item.id}" value="${escapeHtml(item.name || '')}" placeholder="ใส่ชื่อสินค้า (ดูจากรูป) *" class="w-full rounded-lg border border-stone-200 px-2 py-1.5 text-sm font-semibold outline-none focus:border-sky-500" />
        <div class="flex gap-1.5">
          <div class="w-1/2">
            <label class="text-[10px] font-bold text-stone-400 uppercase">บาร์โค้ด</label>
            <input id="pending-barcode-${item.id}" value="${escapeHtml(item.barcode || '')}" placeholder="บาร์โค้ด" class="w-full rounded-lg border border-stone-200 px-2 py-1.5 text-xs outline-none focus:border-sky-500" />
          </div>
          <div class="w-1/2">
            <label class="text-[10px] font-bold text-stone-400 uppercase">วันหมดอายุ</label>
            <input id="pending-expiry-${item.id}" type="date" value="${item.expiryDate || ''}" class="w-full rounded-lg border border-stone-200 px-2 py-1.5 text-xs outline-none focus:border-sky-500" />
          </div>
        </div>
      </div>

      <p class="text-[11px] text-stone-400">ส่งคำขอเมื่อ ${formatThaiDate(item.submittedAt.slice(0,10))}</p>
      <div class="flex gap-2">
        <button onclick="rejectPending(${item.id})" class="flex-1 rounded-lg bg-stone-100 py-1.5 text-xs font-semibold text-stone-600 active:scale-95">❌ ปฏิเสธ</button>
        <button onclick="approvePending(${item.id})" class="flex-1 rounded-lg bg-brand-600 py-1.5 text-xs font-semibold text-white active:scale-95">✅ อนุมัติเข้าระบบ</button>
      </div>
    </div>`;
  }).join('');
}

function viewPendingPhoto(id, which) {
  const item = pendingSubmissions.find((p) => p.id === id);
  if (!item) return;
  const src = which === 'product' ? (item.productPhoto || item.imageUrl || '') : (item.expiryPhoto || '');
  if (!src) return;
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4" onclick="closeModal()">
      <img src="${src}" class="max-h-full max-w-full rounded-lg object-contain" />
      <button onclick="closeModal()" class="absolute right-4 top-4 flex h-9 w-9 items-center justify-center rounded-full bg-white/20 text-white">✕</button>
    </div>
  `);
}

function approvePending(id) {
  const item = pendingSubmissions.find((p) => p.id === id);
  if (!item) return;

  const name = document.getElementById(`pending-name-${id}`).value.trim();
  const expiryDate = document.getElementById(`pending-expiry-${id}`).value;
  let barcode = document.getElementById(`pending-barcode-${id}`).value.trim();

  if (!name || !expiryDate) {
    alert('กรุณาดูรูปแล้วใส่ชื่อสินค้าและวันหมดอายุให้ครบก่อนอนุมัติ');
    return;
  }
  if (!barcode) barcode = `REQ${String(Date.now()).slice(-8)}`;
  if (products.some((p) => p.barcode === barcode)) {
    alert('บาร์โค้ดนี้มีอยู่ในระบบแล้ว กรุณาแก้ไขบาร์โค้ดก่อนอนุมัติ');
    return;
  }

  const newId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;
  products.push({
    id: newId, barcode, name, category: '',
    imageUrl: item.productPhoto || item.imageUrl || '',
    expiryDate, notes: 'อนุมัติจากคำขอของผู้ใช้งาน', addedDate: new Date().toISOString(),
  });
  saveProducts(products);

  pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
  savePending(pendingSubmissions);
  refreshCurrentTabData();
}

function rejectPending(id) {
  pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
  savePending(pendingSubmissions);
  refreshCurrentTabData();
}

// ==================== Calendar ====================
function toDateKey(y, m, d) { return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }

function calendarHTML() {
  return `
    <div class="space-y-4 pb-2">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">🗓️</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">ปฏิทินวันหมดอายุ</h1>
          <p class="text-xs text-stone-400">แตะวันที่เพื่อดูสินค้าที่หมดอายุในวันนั้น</p>
        </div>
      </header>
      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60" id="calendar-card">${calendarCardHTML()}</div>
      <div id="calendar-day-list">${calendarDayListHTML()}</div>
    </div>`;
}

function monthSummary(year, month) {
  const prefix = `${year}-${String(month).padStart(2, '0')}-`;
  const summary = {};
  products.forEach((p) => { if (p.expiryDate.startsWith(prefix)) summary[p.expiryDate] = { status: getStatus(p.expiryDate) }; });
  return summary;
}

function calendarCardHTML() {
  const { year, month } = state.cal;
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = Array.from({ length: firstDay }, () => null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const today = new Date();
  const todayKey = toDateKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
  const summary = monthSummary(year, month);
  const dotColor = { expired: 'bg-red-500', urgent: 'bg-amber-500', safe: 'bg-brand-500' };

  return `
    <div class="mb-3 flex items-center justify-between">
      <button onclick="goToMonth(-1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">‹</button>
      <p class="text-sm font-semibold text-stone-700">${MONTHS_TH[month - 1]} ${year + 543}</p>
      <button onclick="goToMonth(1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">›</button>
    </div>
    <div class="grid grid-cols-7 gap-1 text-center">
      ${WEEKDAYS_TH.map((wd) => `<span class="text-[11px] font-medium text-stone-400">${wd}</span>`).join('')}
      ${cells.map((day) => {
        if (day === null) return '<span></span>';
        const key = toDateKey(year, month, day);
        const info = summary[key];
        const isToday = key === todayKey;
        const isSelected = key === state.cal.selected;
        return `
          <button onclick="selectCalendarDay('${key}')" class="flex flex-col items-center gap-0.5 rounded-lg py-1.5 text-xs ${isSelected ? 'bg-brand-600 text-white' : isToday ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-stone-600'}">
            ${day}
            <span class="h-1.5 w-1.5 rounded-full ${info ? (isSelected ? 'bg-white' : dotColor[info.status]) : 'bg-transparent'}"></span>
          </button>`;
      }).join('')}
    </div>`;
}

function calendarDayListHTML() {
  if (!state.cal.selected) return '';
  const list = products.map(withComputed).filter((p) => p.expiryDate === state.cal.selected).sort((a, b) => a.name.localeCompare(b.name));
  return `
    <div class="space-y-2.5 mt-4">
      <p class="text-xs font-medium text-stone-500">สินค้าที่หมดอายุวันที่ ${state.cal.selected}</p>
      ${list.length === 0
        ? `<div class="rounded-2xl bg-white py-8 text-center shadow-card ring-1 ring-brand-100/60"><p class="text-sm text-stone-400">ไม่มีสินค้าหมดอายุในวันนี้</p></div>`
        : list.map((p) => productCardHTML(p)).join('')}
    </div>`;
}

function goToMonth(delta) {
  let m = state.cal.month + delta, y = state.cal.year;
  if (m > 12) { m = 1; y++; } else if (m < 1) { m = 12; y--; }
  state.cal.month = m; state.cal.year = y; state.cal.selected = null;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}
function selectCalendarDay(key) {
  state.cal.selected = key;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}

// ==================== Export / Import ====================
function exportCSV() {
  const headers = ['ID', 'Barcode', 'Name', 'Category', 'ExpiryDate', 'Status', 'DaysLeft', 'Notes', 'AddedDate'];
  const rows = products.map(withComputed).map((p) => [
    p.id, p.barcode, p.name, p.category, p.expiryDate, p.status, p.daysLeft, p.notes, p.addedDate,
  ]);
  const content = [headers, ...rows].map((r) => r.map((c) => `"${String(c ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `rimping_products_${new Date().toISOString().slice(0, 10)}.csv`;
  link.click();
}

  const file = e.target.files[0];

  const reader = new FileReader();

    try {

      pendingRestoreProducts = data.products;
      const panel = document.getElementById('restore-panel');
      panel.innerHTML = `
        <div class="mt-3 rounded-xl bg-amber-50 p-3 ring-1 ring-amber-200 animate-in fade-in duration-300">
          <p class="text-xs font-bold text-amber-800">พบข้อมูลสินค้า ${data.products.length} รายการ</p>
          <p class="mt-0.5 text-[10px] text-amber-700">คำเตือน: การกู้คืนจะเขียนทับข้อมูลปัจจุบันทั้งหมด</p>
          <div class="mt-2 flex gap-2">
            <button onclick="confirmRestore()" class="flex-1 rounded-lg bg-amber-600 py-1.5 text-[11px] font-bold text-white">ยืนยันการกู้คืน</button>
            <button onclick="document.getElementById('restore-panel').innerHTML=''" class="flex-1 rounded-lg bg-white py-1.5 text-[11px] font-bold text-amber-700 ring-1 ring-amber-200">ยกเลิก</button>
          </div>
        </div>`;
    } catch (err) {
      alert('ไม่สามารถอ่านไฟล์ได้: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function confirmRestore() {
  if (pendingRestoreProducts) {
    products = pendingRestoreProducts;
    saveProducts(products);
    pendingRestoreProducts = null;
    alert('กู้คืนข้อมูลสำเร็จ');
    renderPage();
  }
}

// ==================== Core Navigation ====================
function setTab(t) {
  if (state.tab === 'scanner' && t !== 'scanner') stopScanner();
  state.tab = t;
  renderPage();
  if (t === 'scanner') initScanner();
}

function handleSearch(e) { state.search = e.target.value; renderPage(); }
function setFilter(f) { state.filter = f; renderPage(); }

function refreshCurrentTabData() {
  if (state.tab === 'dashboard') {
    const app = document.getElementById('app');
    if (app) app.innerHTML = dashboardHTML() + bottomNavHTML();
  } else if (state.tab === 'admin') {
    const app = document.getElementById('app');
    if (app) app.innerHTML = adminHTML() + bottomNavHTML();
  } else {
    renderPage();
  }
}

function renderPage() {
  const app = document.getElementById('app');
  let content = '';
  switch (state.tab) {
    case 'dashboard': content = dashboardHTML(); break;
    case 'scanner': content = scannerHTML(); break;
    case 'calendar': content = calendarHTML(); break;
    case 'admin': content = adminHTML(); break;
  }
  app.innerHTML = `<div class="mx-auto max-w-md p-4 pb-24">${content}</div>` + bottomNavHTML();
}

function openModal(html) {
  const root = document.getElementById('modal-root');
  root.innerHTML = html;
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
  document.body.style.overflow = '';
}

// ==================== Initialization ====================
function init() {
  renderPage();
}

window.addEventListener('DOMContentLoaded', init);

</script>
</body>
</html>
