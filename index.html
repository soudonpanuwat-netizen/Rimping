  ];
}

function loadProducts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);

      saveProducts(seeded);
      return seeded;
    }
    return JSON.parse(raw);
  } catch {
    return [];
  }
}
function saveProducts(list) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    return true;
  } catch (err) {
    console.error('saveProducts failed:', err);
    return false;
  }
}

// ==================== Domain helpers ====================
function getStatus(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function formatThaiDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}
function computeStats() {
  const counts = { expired: 0, urgent: 0, safe: 0 };
  products.filter((p) => !p.removed).forEach((p) => counts[getStatus(p.expiryDate)]++);
  return counts;
}

function detectBarcodeType(raw) {
  const code = (raw ?? '').trim();
  if (/^\d{13}$/.test(code)) return 'EAN-13';
  if (/^\d{12}$/.test(code)) return 'UPC-A';
  if (/^\d{8}$/.test(code)) return 'EAN-8';
  if (/^[A-Za-z0-9]{4,}$/.test(code) && /[A-Za-z]/.test(code)) return 'CODE128';
  if (code.length >= 4) return 'CUSTOM';
  return 'INVALID';
}
function isValidBarcode(code) { return detectBarcodeType(code) !== 'INVALID'; }
const BARCODE_TYPE_LABEL_TH = {
  'EAN-13': 'EAN-13 (13 หลัก)', 'EAN-8': 'EAN-8 (8 หลัก)', 'UPC-A': 'UPC-A (12 หลัก)',
  CODE128: 'Code128', CUSTOM: 'บาร์โค้ดกำหนดเอง', INVALID: 'รูปแบบไม่ถูกต้อง',
};

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// บีบอัด/ย่อขนาดรูปก่อนแปลงเป็น base64 เพื่อไม่ให้ localStorage เต็มเร็วเกินไป
// (รูปถ่ายจากกล้องมือถือตรงๆ อาจมีขนาด 3-8MB ต่อรูป ถ้าไม่ย่อจะทำให้บันทึกข้อมูลไม่ได้)
function compressImageFile(file, maxDim = 1000, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width >= height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        try { resolve(canvas.toDataURL('image/jpeg', quality)); }
        catch { resolve(String(reader.result)); }
      };
      img.onerror = () => resolve(String(reader.result));
      img.src = String(reader.result);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// แจ้งเตือนแบบไม่บังหน้าจอ ปิดเองอัตโนมัติ ไม่ต้องกดตกลง
let toastTimer = null;
function showToast(message) {
  const root = document.getElementById('toast-root');
  if (!root) return;
  root.innerHTML = `
    <div class="pointer-events-none fixed inset-x-0 bottom-28 z-[60] flex justify-center px-4">

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { root.innerHTML = ''; }, 2500);
}

function playBeep() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1046;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.13);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.14);
    osc.onended = () => ctx.close();
  } catch { /* เบราว์เซอร์บล็อก autoplay เสียง - ไม่ต้องทำอะไร */ }
}

function freshnessRingSVG(daysLeft, status, size) {
  size = size || 64;
  const stroke = 6;
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const ratio = status === 'expired' ? 0 : Math.min(Math.max(daysLeft, 0), 30) / 30;
  const dashOffset = circumference * (1 - ratio);
  const color = STATUS_COLOR[status];
  const c = size / 2;
  return `
    <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
      <svg width="${size}" height="${size}" class="-rotate-90">
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="#e3efe7" stroke-width="${stroke}" fill="none" />
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none"
          stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
          style="transition: stroke-dashoffset .4s ease;" />
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-xl font-extrabold leading-none" style="color:${color}">${status === 'expired' ? '!' : daysLeft}</span>
        ${status !== 'expired' ? '<span class="text-[10px] font-semibold text-stone-500">วัน</span>' : ''}
      </div>
    </div>`;
}

// ==================== Autocomplete ====================
function setupAutocomplete(inp, arr) {
  let currentFocus;
  inp.addEventListener("input", function(e) {
      let a, b, i, val = this.value;
      closeAllLists();
      if (!val) { return false;}
      currentFocus = -1;
      a = document.getElementById("autocomplete-list");
      const uniqueArr = [...new Set(arr)];
      let count = 0;
      for (i = 0; i < uniqueArr.length; i++) {
        if (uniqueArr[i].toUpperCase().includes(val.toUpperCase())) {
          b = document.createElement("DIV");
          b.innerHTML = "<strong>" + uniqueArr[i].substr(0, val.length) + "</strong>";
          b.innerHTML += uniqueArr[i].substr(val.length);
          b.innerHTML += "<input type='hidden' value='" + uniqueArr[i] + "'>";
          b.addEventListener("click", function(e) {
              inp.value = this.getElementsByTagName("input")[0].value;
              closeAllLists();
          });
          a.appendChild(b);
          count++;
          if (count >= 5) break;
        }
      }
  });
  inp.addEventListener("keydown", function(e) {
      let x = document.getElementById("autocomplete-list");
      if (x) x = x.getElementsByTagName("div");
      if (e.keyCode == 40) {
        currentFocus++;
        addActive(x);
      } else if (e.keyCode == 38) {
        currentFocus--;
        addActive(x);
      } else if (e.keyCode == 13) {
        e.preventDefault();
        if (currentFocus > -1) {
          if (x) x[currentFocus].click();
        }
      }
  });
  function addActive(x) {
    if (!x) return false;
    removeActive(x);
    if (currentFocus >= x.length) currentFocus = 0;
    if (currentFocus < 0) currentFocus = (x.length - 1);
    x[currentFocus].classList.add("autocomplete-active");
  }
  function removeActive(x) {
    for (let i = 0; i < x.length; i++) {
      x[i].classList.remove("autocomplete-active");
    }
  }
  function closeAllLists(elmnt) {
    const x = document.getElementsByClassName("autocomplete-items");
    for (let i = 0; i < x.length; i++) {
      if (elmnt != x[i] && elmnt != inp) {
        x[i].innerHTML = '';
      }
    }
  }
  document.addEventListener("click", function (e) {
      closeAllLists(e.target);
  });
}

function initScanner() {
  document.getElementById('manual-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = document.getElementById('manual-input').value.trim();
    if (code) handleScanResult(code);
  });
  startScanner();
}

function handleScanImageFile(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const resultEl = document.getElementById('scan-result');
  if (resultEl) {
    resultEl.innerHTML = `<div class="rounded-2xl bg-white p-4 text-center text-xs text-stone-400 shadow-card ring-1 ring-brand-100/60">กำลังอ่านบาร์โค้ดจากรูปภาพ...</div>`;
  }
  if (!window.Html5Qrcode) {
    if (resultEl) resultEl.innerHTML = `<p class="text-xs text-red-600">ไม่พบไลบรารีสแกน กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p>`;
    return;
  }
  const fileScanner = new Html5Qrcode('file-scan-temp');
  fileScanner
    .scanFile(file, false)
    .then((decodedText) => {
      playBeep();
      handleScanResult(decodedText);
      try { fileScanner.clear(); } catch {}
    })
    .catch(() => {
      if (resultEl) {
        resultEl.innerHTML = `
          <div class="rounded-2xl bg-white p-4 text-center shadow-card ring-1 ring-brand-100/60">
            <p class="text-xs text-red-600">ไม่พบบาร์โค้ดในรูปภาพนี้</p>
            <p class="mt-1 text-[11px] text-stone-400">ลองรูปอื่น หรือพิมพ์บาร์โค้ดด้วยตนเองด้านล่าง</p>
          </div>`;
      }
      try { fileScanner.clear(); } catch {}
    });
}

function startScanner() {
  if (!window.Html5Qrcode) {
    const statusEl = document.getElementById('camera-status');
    if (statusEl) statusEl.textContent = 'ไม่พบไลบรารีกล้อง (ต้องต่ออินเทอร์เน็ตเพื่อโหลด html5-qrcode)';
    return;
  }
  html5QrCode = new Html5Qrcode('qr-reader');
  html5QrCode
    .start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => { playBeep(); handleScanResult(decodedText); },
      () => { /* ไม่เจอบาร์โค้ดในเฟรมนี้ - ไม่ต้องทำอะไร */ },
    )
    .then(() => {
      const statusEl = document.getElementById('camera-status');
      if (statusEl) statusEl.remove();
      const frame = document.getElementById('camera-frame');
      if (frame) frame.classList.remove('hidden');
    })
    .catch((err) => {
      console.error(err);
      const statusEl = document.getElementById('camera-status');
      if (statusEl) {
        statusEl.innerHTML = `
          <div class="flex flex-col items-center gap-2 px-6 text-center">
            <span class="text-2xl">📵</span>
            <span>ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้กล้อง หรือกรอกบาร์โค้ดด้วยตนเองด้านล่าง<br><span class="text-[10px] text-white/50">(กล้องต้องเปิดผ่าน HTTPS หรือ localhost)</span></span>
          </div>`;
      }
    });
}

function stopScanner() {
  if (html5QrCode) {
    const instance = html5QrCode;
    html5QrCode = null;
    instance.stop().catch(() => {}).finally(() => { try { instance.clear(); } catch {} });
  }
}

function handleScanResult(code) {
  state.scanner.scannedCode = code;
  const product = products.map(withComputed).find((p) => p.barcode === code) || null;
  const type = detectBarcodeType(code);
  const resultEl = document.getElementById('scan-result');
  if (!resultEl) return;

  const notFoundAction = `<button onclick="openSubmissionModal()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-sky-600 py-2.5 text-sm font-semibold text-white active:scale-95">📋 แจ้งเพิ่มสินค้าใหม่</button>`;

  const foundAction = `

      <p class="text-[10px] font-bold text-stone-400 uppercase tracking-wider">พบสินค้าในระบบแล้ว</p>

        🆕 เพิ่มวันหมดอายุรอบใหม่ (ล็อตใหม่)
      </button>
    </div>`;

  resultEl.innerHTML = `
    <div class="space-y-3 rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
      <div class="flex items-center justify-between">
        <p class="text-sm font-semibold text-stone-700">บาร์โค้ด: ${escapeHtml(code)}</p>
        <span class="rounded-full px-2 py-0.5 text-[11px] font-semibold ${isValidBarcode(code) ? 'bg-brand-50 text-brand-700' : 'bg-red-50 text-red-600'}">${BARCODE_TYPE_LABEL_TH[type]}</span>

      ${product ? (productCardHTML(product) + foundAction) : `

          <p class="text-xs text-stone-400">ไม่พบสินค้านี้ในระบบ</p>
          ${notFoundAction}
        </div>`}
    </div>`;
}

          errEl.classList.remove('hidden');
          return;
        }
    }

    const newSubmission = {
      id: Date.now(),
      barcode,
      name,
      expiryDate,
      imageUrl: productImageData,
      expiryPhoto: expiryImageData,
      submittedAt: new Date().toISOString(),
    };

    const updatedPending = [...pendingSubmissions, newSubmission];
    const saved = savePending(updatedPending);
    if (!saved) {
      errEl.textContent = 'พื้นที่จัดเก็บข้อมูลในเครื่องเต็ม ไม่สามารถส่งคำขอได้ กรุณาแจ้งแอดมินให้กดสำรองข้อมูลแล้วล้างแคชเบราว์เซอร์';
      errEl.classList.remove('hidden');
      return;
    }
    pendingSubmissions = updatedPending;
    closeModal();
    showToast('✅ ส่งข้อมูลให้ AI ตรวจสอบแล้ว');
    if (state.tab === 'scanner') {

  });
}

function approvePending(id) {
  const item = pendingSubmissions.find((p) => p.id === id);
  if (!item) return;

  const nameInput = document.getElementById(`pending-name-${id}`);
  const expiryInput = document.getElementById(`pending-expiry-${id}`);
  const barcodeInput = document.getElementById(`pending-barcode-${id}`);

  if (!nameInput || !expiryInput || !barcodeInput) {
    showAlertModal('ไม่พบข้อมูล กรุณาลองใหม่อีกครั้ง');
    return;
  }

  const name = nameInput.value.trim();
  const expiryDate = expiryInput.value;
  let barcode = barcodeInput.value.trim();

  if (!name || !expiryDate) {
    showAlertModal('กรุณากรอกชื่อและวันหมดอายุให้ครบถ้วน');
    return;
  }

  if (!barcode) barcode = `REQ${String(Date.now()).slice(-8)}`;

  // เก็บสำเนาไว้ก่อน เผื่อบันทึกไม่สำเร็จจะได้คืนค่าของเดิม ไม่เสียข้อมูล
  const productsSnapshot = products.slice();

  // หาสินค้าที่ "บาร์โค้ดตรงกัน + วันหมดอายุตรงกัน" เพื่ออัปเดตของเดิม
  // ถ้าบาร์โค้ดตรงกันแต่วันหมดอายุต่างกัน ถือเป็นล็อตใหม่ -> เพิ่มเป็นรายการใหม่แยกต่างหาก
  const existingIndex = products.findIndex((p) => p.barcode === barcode && p.expiryDate === expiryDate);

  if (existingIndex !== -1) {
    products[existingIndex] = {
      ...products[existingIndex],
      name,
      imageUrl: item.imageUrl || products[existingIndex].imageUrl,
      notes: 'อัปเดตข้อมูลโดย AI',
    };
  } else {
    const newId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;
    products.push({
      id: newId, barcode, name, category: '',
      imageUrl: item.imageUrl || '',
      expiryDate, notes: 'เพิ่มข้อมูลโดย AI', addedDate: new Date().toISOString(),
    });
  }

  const saved = saveProducts(products);
  if (!saved) {
    products = productsSnapshot; // คืนค่าของเดิม ไม่ให้ข้อมูลเพี้ยน
    showAlertModal('พื้นที่จัดเก็บข้อมูลในเครื่อง (localStorage) เต็ม จึงบันทึกไม่สำเร็จ\n\nวิธีแก้: กดปุ่ม "💾 สำรอง" เพื่อดาวน์โหลดข้อมูลทั้งหมดเก็บไว้ก่อน จากนั้นลองลบรูปภาพสินค้าที่ไม่จำเป็นออกบางส่วน หรือล้างแคชเบราว์เซอร์แล้วกู้คืนข้อมูล ก่อนลองอนุมัติรายการนี้ใหม่อีกครั้งค่ะ');
    return;
  }

  pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
  savePending(pendingSubmissions);
  renderPage();
}

function rejectPending(id) {
  showConfirmModal('ต้องการปฏิเสธคำขอนี้ใช่หรือไม่?', () => {
    pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
    savePending(pendingSubmissions);
    renderPage();
  }, { danger: true, confirmLabel: 'ปฏิเสธ' });
}

// ==================== Calendar ====================
function toDateKey(y, m, d) { return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }

function calendarHTML() {
  return `
    <div class="space-y-4 pb-2">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">🗓️</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">ปฏิทินวันหมดอายุ</h1>
          <p class="text-xs text-stone-400">แตะวันที่เพื่อดูสินค้า</p>
        </div>
      </header>
      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60" id="calendar-card">${calendarCardHTML()}</div>
      <div id="calendar-day-list">${calendarDayListHTML()}</div>
    </div>`;
}

function monthSummary(year, month) {
  const prefix = `${year}-${String(month).padStart(2, '0')}-`;
  const summary = {};
  products.filter((p) => !p.removed).forEach((p) => { if (p.expiryDate.startsWith(prefix)) summary[p.expiryDate] = { status: getStatus(p.expiryDate) }; });
  return summary;
}

function calendarCardHTML() {
  const { year, month } = state.cal;
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = Array.from({ length: firstDay }, () => null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const today = new Date();
  const todayKey = toDateKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
  const summary = monthSummary(year, month);
  const dotColor = { expired: 'bg-red-500', urgent: 'bg-amber-500', safe: 'bg-brand-500' };
  return `
    <div class="mb-3 flex items-center justify-between">
      <button onclick="goToMonth(-1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">‹</button>
      <p class="text-sm font-semibold text-stone-700">${MONTHS_TH[month - 1]} ${year + 543}</p>
      <button onclick="goToMonth(1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">›</button>
    </div>
    <div class="grid grid-cols-7 gap-1 text-center">
      ${WEEKDAYS_TH.map((wd) => `<span class="text-[11px] font-medium text-stone-400">${wd}</span>`).join('')}
      ${cells.map((day) => {
        if (day === null) return '<span></span>';
        const key = toDateKey(year, month, day);
        const info = summary[key];
        const isToday = key === todayKey;
        const isSelected = key === state.cal.selected;
        return `
          <button onclick="selectCalendarDay('${key}')" class="flex flex-col items-center gap-0.5 rounded-lg py-1.5 text-xs ${isSelected ? 'bg-brand-600 text-white' : isToday ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-stone-600'}">
            ${day}
            <span class="h-1.5 w-1.5 rounded-full ${info ? (isSelected ? 'bg-white' : dotColor[info.status]) : 'bg-transparent'}"></span>
          </button>`;
      }).join('')}
    </div>`;
}

function calendarDayListHTML() {
  if (!state.cal.selected) return '';
  const list = products.map(withComputed).filter((p) => !p.removed && p.expiryDate === state.cal.selected).sort((a, b) => a.name.localeCompare(b.name));
  return `
    <div class="space-y-2.5 mt-4">
      <p class="text-xs font-medium text-stone-500">หมดอายุวันที่ ${state.cal.selected}</p>
      ${list.length === 0
        ? `<div class="rounded-2xl bg-white py-8 text-center shadow-card ring-1 ring-brand-100/60"><p class="text-sm text-stone-400">ไม่มีสินค้าหมดอายุ</p></div>`
        : list.map((p) => productCardHTML(p)).join('')}
    </div>`;
}

function goToMonth(delta) {
  let m = state.cal.month + delta, y = state.cal.year;
  if (m > 12) { m = 1; y++; } else if (m < 1) { m = 12; y--; }
  state.cal.month = m; state.cal.year = y; state.cal.selected = null;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}
function selectCalendarDay(key) {
  state.cal.selected = key;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}

        </div>
        <form id="product-form" class="mt-4 space-y-3">
          <div><label class="mb-1 block text-xs font-medium text-stone-500">บาร์โค้ด *</label><input id="form-barcode" value="${escapeHtml(v.barcode)}" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" /></div>
          <div><label class="mb-1 block text-xs font-medium text-stone-500">ชื่อสินค้า *</label><input id="form-name" value="${escapeHtml(v.name)}" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" /></div>
          <div><label class="mb-1 block text-xs font-medium text-stone-500">วันหมดอายุ *</label><input id="form-expiry" type="date" value="${v.expiryDate}" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" /></div>
          <div><label class="mb-1 block text-xs font-medium text-stone-500">URL รูปภาพ</label><input id="form-image" value="${escapeHtml(v.imageUrl)}" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" /></div>
          <button type="submit" class="mt-2 w-full rounded-xl bg-brand-600 py-3 text-sm font-semibold text-white active:scale-95">${productId ? 'บันทึก' : 'เพิ่มสินค้า'}</button>
        </form>
      </div>
    </div>
  `);
  document.getElementById('product-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const barcode = document.getElementById('form-barcode').value.trim();
    const name = document.getElementById('form-name').value.trim();
    const expiryDate = document.getElementById('form-expiry').value;
    const imageUrl = document.getElementById('form-image').value.trim();
    if (productId) {
      const idx = products.findIndex((p) => p.id === productId);
      if (idx !== -1) products[idx] = { ...products[idx], barcode, name, expiryDate, imageUrl };
    } else {
      const existingIdx = products.findIndex((p) => p.barcode === barcode);
      if (existingIdx !== -1) { products[existingIdx].expiryDate = expiryDate; products[existingIdx].name = name; } 
      else {
        const newId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;
        products.push({ id: newId, barcode, name, category: '', imageUrl, expiryDate, addedDate: new Date().toISOString() });
      }
    }
    if (saveProductsOrWarn()) { closeModal(); renderPage(); }
  });
}

function markRemovedConfirm(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  showConfirmModal(`เก็บ "${p.name}" ออกจากชั้นแล้วใช่ไหมคะ?`, () => {
    p.removed = true;
    p.removedDate = new Date().toISOString();
    if (saveProductsOrWarn()) switchTab('admin');
  }, { confirmLabel: '✅ เก็บออกแล้ว' });
}

function undoRemoveProduct(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  delete p.removed;
  delete p.removedDate;
  if (saveProductsOrWarn()) renderPage();
}

function confirmDeleteProduct(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  showConfirmModal(`ลบสินค้า "${p.name}"?`, () => {
    products = products.filter((x) => x.id !== id);
    if (saveProductsOrWarn()) renderPage();
  }, { danger: true, confirmLabel: 'ลบ' });
}

function exportCSV() {
  const headers = ['Barcode', 'Name', 'ExpiryDate', 'Status'];
  const rows = products.map(withComputed).map(p => [p.barcode, p.name, p.expiryDate, STATUS_LABEL_TH[p.status]]);
  const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url); link.setAttribute("download", `expiry_report.csv`);
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

function backupJSON() {
  const data = { products, pendingSubmissions };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a"); link.href = url; link.download = `rimping_backup.json`; link.click();
}

function handleRestoreFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const data = JSON.parse(String(event.target.result));
      if (data && Array.isArray(data.products)) {
        pendingRestoreProducts = data.products;
        document.getElementById('restore-panel').innerHTML = `<div class="mt-2 p-2 bg-amber-50 rounded-lg text-xs">พบ ${data.products.length} รายการ <button onclick="confirmRestore()" class="text-brand-600 font-bold ml-2">กู้คืน</button></div>`;
      }
    } catch { showAlertModal('ไฟล์ไม่ถูกต้อง'); }
  };
  reader.readAsText(file);
}
function confirmRestore() { if (pendingRestoreProducts) { products = pendingRestoreProducts; if (saveProductsOrWarn()) { pendingRestoreProducts = null; document.getElementById('restore-panel').innerHTML = ''; renderPage(); showAlertModal('สำเร็จ'); } } }

function openModal(html) { document.getElementById('modal-root').innerHTML = html; document.body.style.overflow = 'hidden'; }
function closeModal() { document.getElementById('modal-root').innerHTML = ''; document.body.style.overflow = ''; }

// ==================== Custom alert/confirm (replaces native confirm()/alert()) ====================
// หมายเหตุ: เมื่อแอปถูก "เพิ่มไปยังหน้าจอโฮม" บน iPhone (standalone mode) คำสั่ง confirm()/alert()
// ของเบราว์เซอร์จะไม่ทำงานและทำให้หน้าจอค้างทั้งหน้า จึงต้องใช้หน้าต่างยืนยันที่สร้างขึ้นเองแทน
let pendingConfirmAction = null;
function showAlertModal(message) {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl text-center">
        <p class="text-sm text-stone-700 whitespace-pre-line">${escapeHtml(message)}</p>
        <button onclick="closeModal()" class="mt-4 w-full rounded-xl bg-brand-600 py-2.5 text-sm font-bold text-white active:scale-95">ตกลง</button>
      </div>
    </div>
  `);
}
function showConfirmModal(message, onConfirm, opts) {
  opts = opts || {};
  pendingConfirmAction = onConfirm;
  const confirmLabel = opts.confirmLabel || 'ยืนยัน';
  const confirmClass = opts.danger ? 'bg-red-600' : 'bg-brand-600';
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onclick="if(event.target===this){ pendingConfirmAction=null; closeModal(); }">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl text-center">
        <p class="text-sm text-stone-700 whitespace-pre-line">${escapeHtml(message)}</p>
        <div class="mt-4 flex gap-2">
          <button onclick="pendingConfirmAction=null; closeModal();" class="flex-1 rounded-xl bg-stone-100 py-2.5 text-sm font-bold text-stone-600 active:scale-95">ยกเลิก</button>
          <button onclick="runPendingConfirm()" class="flex-1 rounded-xl ${confirmClass} py-2.5 text-sm font-bold text-white active:scale-95">${confirmLabel}</button>
        </div>
      </div>
    </div>
  `);
}
function runPendingConfirm() {
  const action = pendingConfirmAction;
  pendingConfirmAction = null;
  closeModal();
  if (action) action();
}

renderPage();

// ==================== Lock zoom (กันซูมเข้า-ออก) ====================
// บางเวอร์ชันของ iOS ไม่สนใจ user-scalable=no ใน viewport meta จึงกันซ้ำด้วย JS
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
let lastTapTime = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTapTime < 300) e.preventDefault();
  lastTapTime = now;
}, { passive: false });
</script>
</body>
</html>
