// ==================== Supabase (ใช้งานหลายเครื่อง/หลายคนพร้อมกัน) ====================
// ใส่ค่า 2 ตัวนี้จากหน้า Supabase: Project Settings > API
// ถ้าเว้นว่างไว้ (เป็น '') แอปจะทำงานแบบเดิม คือเก็บข้อมูลในเครื่องนี้เครื่องเดียว
const SUPABASE_URL = 'https://ndipoaxxbqwxafgvgmlu.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HAHfwDUD3x68d-w7JQYbFw_WhVfvBta';

const sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

async function cloudGet(key) {
  if (!sb) return null;
  try {
    const { data, error } = await sb.from('app_storage').select('value').eq('key', key).maybeSingle();
    if (error || !data) return null;
    return data.value;
  } catch {
    return null;
  }
}

async function cloudSet(key, value) {
  if (!sb) return;
  try {
    await sb.from('app_storage').upsert({ key, value, updated_at: new Date().toISOString() });
  } catch {
    // เน็ตหลุด/เชื่อมต่อ Supabase ไม่ได้ชั่วคราว - ข้อมูลยังอยู่ในเครื่องนี้
    // (บันทึกอีกครั้งตอนเน็ตกลับมา ข้อมูลจะถูกส่งขึ้นไปแชร์กับเครื่องอื่นเอง)
  }
}

// ฟังก์ชันด้านล่างนี้ใช้แทน cloudSet สำหรับการ เพิ่ม/ลบ/แก้ ทีละรายการ
// (ต่างจาก cloudSet ที่เขียนทับทั้งลิสต์ - ถ้าใช้ cloudSet ตอนมีคนบันทึกพร้อมกัน
// หลายคน คนที่บันทึกทีหลังจะเขียนทับของคนก่อนหายไปเงียบๆ)
// ฟังก์ชันนี้สั่งให้ฐานข้อมูล (Postgres function) เป็นคนเพิ่ม/ลบ/แก้ให้แทน
// ซึ่งปลอดภัยต่อการบันทึกพร้อมกันจากหลายเครื่อง
async function cloudAppendItem(key, item) {
  if (!sb) return;
  try {
    await sb.rpc('array_append_item', { p_key: key, p_item: item });
  } catch {
    // เน็ตหลุดชั่วคราว ข้อมูลยังอยู่ในเครื่องนี้
  }
}
async function cloudRemoveItem(key, id) {
  if (!sb) return;
  try {
    await sb.rpc('array_remove_item', { p_key: key, p_id: id });
  } catch {}
}
async function cloudUpdateItem(key, id, item) {
  if (!sb) return;
  try {
    await sb.rpc('array_update_item', { p_key: key, p_id: id, p_item: item });
  } catch {}
}

let realtimeChannel = null;
function setupRealtimeSync() {
  if (!sb || realtimeChannel) return;
  realtimeChannel = sb.channel('app_storage_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_storage' }, (payload) => {
      const row = payload.new;
      if (!row) return;
      if (row.key === 'products') {
        products = row.value || [];
        safeStorageSet(STORAGE_KEY, JSON.stringify(products));
      } else if (row.key === 'pending') {
        pendingSubmissions = row.value || [];
        safeStorageSet(PENDING_KEY, JSON.stringify(pendingSubmissions));
      } else if (row.key === 'admins') {
        adminUsers = row.value || defaultAdminUsers();
        safeStorageSet(ADMIN_USERS_KEY, JSON.stringify(adminUsers));
      } else if (row.key === 'catalog') {
        catalog = row.value || [];
        safeStorageSet(CATALOG_KEY, JSON.stringify(catalog));
      } else if (row.key === 'removal_log') {
        removalLog = row.value || [];
        safeStorageSet(REMOVAL_LOG_KEY, JSON.stringify(removalLog));
      } else if (row.key === 'approval_log') {
        approvalLog = row.value || [];
        safeStorageSet(APPROVAL_LOG_KEY, JSON.stringify(approvalLog));
      } else if (row.key === 'settings') {
        appSettings = row.value || { urgentWindowDays: 7 };
        safeStorageSet(SETTINGS_KEY, JSON.stringify(appSettings));
      }
      if (state.entered) render();
    })
    .subscribe();
}

function categorySelectHTML(idPrefix, currentValue) {
  const val = currentValue || '';
  const inList = PRODUCT_CATEGORIES.includes(val);
  return `
    <select id="${idPrefix}-select" onchange="document.getElementById('${idPrefix}-other').classList.toggle('hidden', this.value !== 'อื่นๆ')" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100">
      <option value="">-- เลือกหมวดหมู่ --</option>
      ${PRODUCT_CATEGORIES.map((c) => `<option value="${escapeHtml(c)}" ${val === c ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
    </select>
    <input id="${idPrefix}-other" value="${escapeHtml(!inList ? val : '')}" placeholder="ระบุหมวดหมู่ (ถ้าเลือกอื่นๆ)" class="mt-2 w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 ${(val === 'อื่นๆ' || (!inList && val)) ? '' : 'hidden'}" />`;
}
// ดึงค่าหมวดหมู่จริงจาก select+other ที่สร้างด้วย categorySelectHTML
function readCategorySelect(idPrefix) {
  const sel = document.getElementById(`${idPrefix}-select`);
  const other = document.getElementById(`${idPrefix}-other`);
  if (!sel) return '';
  if (sel.value === 'อื่นๆ') return (other && other.value.trim()) || '';
  return sel.value;
}

// บางเบราว์เซอร์/บางช่องทางเปิดไฟล์ (เช่น เปิดไฟล์ตรงๆแบบ file://, เปิดผ่าน

// localStorage ทั้งหมด ฟังก์ชันด้านล่างนี้ช่วยให้แอปยังใช้งานได้ต่อไป

let storageAvailable = true;
const memoryStore = {};

function safeStorageGet(key) {
  try {
    return localStorage.getItem(key);
  } catch {
    storageAvailable = false;
    return key in memoryStore ? memoryStore[key] : null;
  }
}
function safeStorageSet(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch {
    storageAvailable = false;
    memoryStore[key] = value;
  }
}

function loadProducts() {
  const raw = safeStorageGet(STORAGE_KEY);
  if (!raw) {
    const seeded = seedProducts();
    saveProducts(seeded);
    return seeded;
  }
  try {
    return JSON.parse(raw);
  } catch {
    return seedProducts();
  }
}
function saveProducts(list) {
  // เก็บ cache ไว้ในเครื่องนี้เท่านั้น ไม่เขียนทับข้อมูลทั้งก้อนขึ้นคลาวด์
  // (จุดที่เพิ่ม/ลบ/แก้สินค้าแต่ละจุด จะเรียก cloudAppendItem/cloudRemoveItem/cloudUpdateItem เองแยกต่างหาก
  // เพื่อไม่ให้การบันทึกพร้อมกันจากหลายเครื่องเขียนทับกันหายไป)
  safeStorageSet(STORAGE_KEY, JSON.stringify(list));
}

// ใช้สร้าง id ใหม่แทนการนับ "max + 1" เดิม เพราะถ้าสองเครื่องเพิ่มรายการพร้อมกัน
// การนับ max+1 จากข้อมูลในเครื่องตัวเอง (ซึ่งอาจไม่ทันอัปเดต) มีโอกาสได้ id ชนกันได้

}

function formatLogTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yy = String((d.getFullYear() + 543) % 100).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${dd}/${mm}/${yy} ${hh}:${mi}`;
}

// ==================== Product catalog (ข้อมูลแม่ของสินค้า: ชื่อ+รูป+บาร์โค้ด ไม่มีวันหมดอายุ) ====================
// ใช้จดจำชื่อ/รูปสินค้าไว้ตามบาร์โค้ด เพื่อให้สแกนซ้ำครั้งหน้าไม่ต้องกรอกชื่อ/ถ่ายรูปใหม่
// อีกครั้ง - กรอกแค่วันหมดอายุก็พอ
function loadCatalog() {
  const raw = safeStorageGet(CATALOG_KEY);
  try {
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}
function saveCatalog(list) {
  safeStorageSet(CATALOG_KEY, JSON.stringify(list));
}
function findCatalogByBarcode(barcode) {
  return catalog.find((c) => c.barcode === barcode) || null;
}
function addCatalogEntry({ barcode, name, category, imageUrl }) {
  const entry = {
    id: generateLocalId(),
    barcode,
    name: name || '',
    category: category || '',
    imageUrl: imageUrl || '',

// ถูกบันทึกไว้เผื่อใช้ตอนสแกนซ้ำในอนาคต (ไม่ทับของเดิมถ้ามีอยู่แล้ว)
function upsertCatalogFromProduct({ barcode, name, category, imageUrl }) {

  addCatalogEntry({ barcode, name, category, imageUrl });
}

// ==================== ค้นหาสินค้าจาก "ชื่อ" (ใช้กับสินค้าชั่งอิชิดะที่ไม่มีบาร์โค้ดถาวร) ====================
// รวมชื่อ+รูปจากทั้ง catalog (มีบาร์โค้ดจริง) และ products เดิม (รวมของชั่งเก่าที่เคยลงไว้)
// เพื่อให้พิมพ์ชื่อบริษัท/สินค้าแล้วเจอของเดิมที่เคยมีในระบบ ไม่ต้องพิมพ์/ถ่ายรูปใหม่ทุกครั้ง
function getNameSearchIndex() {
  const seen = new Map();
  catalog.forEach((c) => {
    if (!c.name || seen.has(c.name)) return;
    seen.set(c.name, { name: c.name, category: c.category || '', imageUrl: c.imageUrl || '' });
  });
  products.forEach((p) => {
    if (!p.name || seen.has(p.name)) return;
    seen.set(p.name, { name: p.name, category: p.category || '', imageUrl: p.imageUrl || '' });
  });
  return Array.from(seen.values());
}
function searchNameSuggestions(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  return getNameSearchIndex()
    .filter((item) => item.name.toLowerCase().includes(q))
    .slice(0, 6);
}

// ==================== ค้นหาชื่อ/รูปสินค้าจากฐานข้อมูลบาร์โค้ดสาธารณะ (Open Food Facts) ====================
// ใช้เมื่อบาร์โค้ด EAN-13/UPC-A/EAN-8 ยังไม่มีในระบบของเราเลย จะลองเช็คกับฐานข้อมูลโลกก่อน
// เผื่อเป็นสินค้าแบรนด์ที่มีคนบันทึกไว้แล้ว จะได้ไม่ต้องพิมพ์ชื่อ/ถ่ายรูปเอง
const offCache = {};
async function lookupOpenFoodFacts(barcode) {
  if (offCache[barcode] !== undefined) return offCache[barcode];
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json?fields=product_name,image_front_small_url,image_url`);
    const data = await res.json();
    const pname = data && data.product && (data.product.product_name);
    if (data && data.status === 1 && pname) {
      const match = { name: pname, imageUrl: (data.product.image_front_small_url || data.product.image_url || '') };
      offCache[barcode] = match;
      return match;
    }
    offCache[barcode] = false;
    return false;
  } catch {
    offCache[barcode] = false;
    return false;
  }
}

// ==================== รูปภาพ: บีบอัดรูปก่อนเก็บ เพื่อไม่ให้ข้อมูลบวมเกินไป ====================
function compressImageFile(file, maxDim = 900, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round(height * (maxDim / width));
          width = maxDim;
        } else if (height >= width && height > maxDim) {
          width = Math.round(width * (maxDim / height));
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('โหลดรูปภาพไม่สำเร็จ'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
    reader.readAsDataURL(file);
  });
}

// ==================== Domain helpers ====================
function getStatus(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= getUrgentWindowDays()) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function formatThaiDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}
function computeStats() {
  const counts = { expired: 0, urgent: 0, safe: 0 };
  products.forEach((p) => counts[getStatus(p.expiryDate)]++);
  return counts;
}

function detectBarcodeType(raw) {
  const code = (raw ?? '').trim();
  if (/^\d{13}$/.test(code)) return 'EAN-13';
  if (/^\d{12}$/.test(code)) return 'UPC-A';
  if (/^\d{8}$/.test(code)) return 'EAN-8';
  if (/^[A-Za-z0-9]{4,}$/.test(code) && /[A-Za-z]/.test(code)) return 'CODE128';
  if (code.length >= 4) return 'CUSTOM';
  return 'INVALID';
}
function isValidBarcode(code) { return detectBarcodeType(code) !== 'INVALID'; }
const BARCODE_TYPE_LABEL_TH = {
  'EAN-13': 'EAN-13 (13 หลัก)', 'EAN-8': 'EAN-8 (8 หลัก)', 'UPC-A': 'UPC-A (12 หลัก)',
  CODE128: 'Code128', CUSTOM: 'บาร์โค้ดกำหนดเอง', INVALID: 'รูปแบบไม่ถูกต้อง',
};

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function playBeep() {
  try {
    if (navigator.vibrate) navigator.vibrate(80);
  } catch {}
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1046;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.13);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.14);
    osc.onended = () => ctx.close();
  } catch { /* เบราว์เซอร์บล็อก autoplay เสียง - ไม่ต้องทำอะไร */ }
}

  return `

      <svg width="${size}" height="${size}" class="-rotate-90">
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="#e3efe7" stroke-width="${stroke}" fill="none" />
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none"
          stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
          style="transition: stroke-dashoffset .4s ease;" />

      <div class="absolute inset-0 flex flex-col items-center justify-center">

function categoryBreakdownHTML() {
  const byCategory = {};
  products.map(withComputed).forEach((p) => {
    const cat = p.category || 'ไม่ระบุหมวดหมู่';
    if (!byCategory[cat]) byCategory[cat] = { total: 0, urgent: 0, expired: 0 };
    byCategory[cat].total++;
    if (p.status === 'urgent') byCategory[cat].urgent++;
    if (p.status === 'expired') byCategory[cat].expired++;
  });
  const entries = Object.entries(byCategory).sort((a, b) => (b[1].urgent + b[1].expired) - (a[1].urgent + a[1].expired));
  if (entries.length === 0) return `<p class="py-3 text-center text-xs text-stone-400">ยังไม่มีสินค้าในระบบ</p>`;
  return entries.map(([cat, c]) => `
    <div class="flex items-center justify-between gap-2 text-xs">
      <span class="truncate text-stone-600">${escapeHtml(cat)}</span>
      <span class="flex shrink-0 gap-1.5">
        ${c.expired > 0 ? `<span class="rounded-full bg-red-50 px-2 py-0.5 font-semibold text-red-600">${c.expired} หมดอายุ</span>` : ''}
        ${c.urgent > 0 ? `<span class="rounded-full bg-amber-50 px-2 py-0.5 font-semibold text-amber-600">${c.urgent} เร่งด่วน</span>` : ''}
        <span class="rounded-full bg-stone-100 px-2 py-0.5 font-semibold text-stone-500">${c.total} รวม</span>
      </span>
    </div>`).join('');
}
function toggleCategoryBreakdown() {
  state.dashboard.showCategoryBreakdown = !state.dashboard.showCategoryBreakdown;
  document.getElementById('category-breakdown-card').outerHTML = categoryBreakdownCardHTML();
}
function categoryBreakdownCardHTML() {

      <button onclick="toggleCategoryBreakdown()" class="flex w-full items-center justify-between p-3.5 active:scale-95">
        <span class="text-sm font-semibold text-stone-800">📊 สรุปตามหมวดหมู่</span>
        <span class="text-stone-400">${state.dashboard.showCategoryBreakdown ? '▲' : '▼'}</span>

// ==================== เช็คลิสต์ประจำวัน ====================
// ติ๊กว่าตรวจสอบแล้วสำหรับสินค้าที่หมดอายุ/ใกล้หมดอายุของ "วันนี้" กันสแกน/เช็คซ้ำของที่ดูแล้ว
// บันทึกแยกตามวันที่ พอข้ามวันลิสต์จะรีเซ็ตเองโดยอัตโนมัติ (ไม่ต้องกดรีเซ็ต)
function loadChecklist() {
  const raw = safeStorageGet(CHECKLIST_KEY);
  try { return raw ? JSON.parse(raw) : {}; } catch { return {}; }
}
function saveChecklistState(obj) { safeStorageSet(CHECKLIST_KEY, JSON.stringify(obj)); }
function todayKey() { return new Date().toISOString().slice(0, 10); }
function isChecked(productId) {
  const data = loadChecklist();
  return !!(data[todayKey()] && data[todayKey()][productId]);
}
function toggleChecklistItem(productId) {
  const data = loadChecklist();
  const key = todayKey();
  if (!data[key]) data[key] = {};
  data[key][productId] = !data[key][productId];
  saveChecklistState(data);
  document.getElementById('checklist-card').outerHTML = checklistCardHTML();
}
function toggleChecklist() {
  state.dashboard.showChecklist = !state.dashboard.showChecklist;
  document.getElementById('checklist-card').outerHTML = checklistCardHTML();
}
function checklistItemsHTML() {
  const items = products.map(withComputed).filter((p) => p.status === 'urgent' || p.status === 'expired')
    .sort((a, b) => a.expiryDate.localeCompare(b.expiryDate));
  if (items.length === 0) return `<p class="py-3 text-center text-xs text-stone-400">วันนี้ไม่มีสินค้าที่ต้องเช็ค 🎉</p>`;
  return items.map((p) => {
    const checked = isChecked(p.id);
    return `
      <label class="flex items-center gap-3 rounded-xl p-2 ${checked ? 'opacity-50' : ''}">
        <input type="checkbox" onchange="toggleChecklistItem(${p.id})" ${checked ? 'checked' : ''} class="h-5 w-5 shrink-0 accent-brand-600" />
        ${productThumbHTML(p, 48)}
        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-medium ${checked ? 'text-stone-400 line-through' : 'text-stone-700'}">${escapeHtml(p.name)}</p>
          <p class="text-[11px] text-stone-400">หมดอายุ ${formatThaiDate(p.expiryDate)}</p>
        </div>
      </label>`;
  }).join('');
}
function checklistCardHTML() {
  const items = products.map(withComputed).filter((p) => p.status === 'urgent' || p.status === 'expired');
  const checkedCount = items.filter((p) => isChecked(p.id)).length;
  return `
    <div id="checklist-card" class="overflow-hidden rounded-2xl bg-white shadow-card ring-1 ring-brand-100/60">
      <button onclick="toggleChecklist()" class="flex w-full items-center justify-between p-3.5 active:scale-95">
        <span class="text-sm font-semibold text-stone-800">✅ เช็คลิสต์วันนี้</span>
        <span class="flex items-center gap-2">
          ${items.length > 0 ? `<span class="rounded-full bg-brand-50 px-2 py-0.5 text-[11px] font-semibold text-brand-700">${checkedCount}/${items.length}</span>` : ''}
          <span class="text-stone-400">${state.dashboard.showChecklist ? '▲' : '▼'}</span>
        </span>
      </button>
      ${state.dashboard.showChecklist ? `<div class="space-y-1 border-t border-stone-100 p-3.5">${checklistItemsHTML()}</div>` : ''}
    </div>`;
}

function filterChipsHTML() {
  return FILTER_CHIPS.map((chip) => `

  `).join('');
}

function getFilteredProducts() {
  const search = state.search.trim().toLowerCase();
  let list = products.map(withComputed);
  if (search) list = list.filter((p) => p.name.toLowerCase().includes(search) || p.barcode.toLowerCase().includes(search));
  if (state.filter !== 'all') list = list.filter((p) => p.status === state.filter);
  list.sort((a, b) => a.expiryDate.localeCompare(b.expiryDate) || a.name.localeCompare(b.name));
  return list;
}

function productListHTML() {
  const list = getFilteredProducts();
  if (list.length === 0) {
    return `
      <div class="rounded-2xl bg-white py-10 text-center shadow-card ring-1 ring-brand-100/60">
        <p class="text-sm font-medium text-stone-500">ไม่พบสินค้าตามเงื่อนไขนี้</p>

function initDashboard() {

function toggleAdminApprovals() {
  state.admin.showApprovals = !state.admin.showApprovals;
  renderPage();
}

function approveSubmission(id) {
  const item = pendingSubmissions.find((s) => String(s.id) === String(id));
  if (!item) return;

  const newProduct = {
    id: generateLocalId(),
    barcode: item.barcode || `NOBC_${generateLocalId()}`,
    name: item.name || '',
    category: item.category || '',
    expiryDate: item.expiryDate,
    notes: item.notes || '',
    imageUrl: item.productPhoto || item.imageUrl || '',
    addedDate: new Date().toISOString(),
  };
  products.push(newProduct);
  saveProducts(products);
  cloudAppendItem('products', newProduct);
  upsertCatalogFromProduct(newProduct);
  logApprovalAction(item, 'approved');

  pendingSubmissions = pendingSubmissions.filter((s) => String(s.id) !== String(id));
  savePending(pendingSubmissions);
  cloudRemoveItem('pending', id);

  refreshCurrentTabData();
}

function rejectSubmission(id) {
  const item = pendingSubmissions.find((s) => String(s.id) === String(id));
  if (!confirm('ยืนยันการปฏิเสธคำขอนี้?')) return;
  if (item) logApprovalAction(item, 'rejected');
  pendingSubmissions = pendingSubmissions.filter((s) => String(s.id) !== String(id));
  savePending(pendingSubmissions);
  cloudRemoveItem('pending', id);
  refreshCurrentTabData();
}

function toggleScanHistory() {
  state.scanner.showHistory = !state.scanner.showHistory;
  renderPage();
}

function scannerHTML() {
  return `
    <div class="space-y-4 pb-2">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">📷</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">สแกนบาร์โค้ด</h1>
          <p class="text-xs text-stone-400">วางบาร์โค้ดให้อยู่ในกรอบเพื่อสแกน</p>
        </div>
      </header>

      <div class="relative overflow-hidden rounded-2xl bg-black shadow-card" style="aspect-ratio: 4/3;">
        <div id="qr-reader" class="h-full w-full"></div>
        <div id="camera-status" class="absolute inset-0 flex items-center justify-center text-xs text-white/70">กำลังเปิดกล้อง...</div>
        <div id="camera-frame" class="pointer-events-none absolute inset-6 rounded-xl border-2 border-brand-400 hidden"></div>
      </div>

      <button type="button" onclick="document.getElementById('scan-image-input').click()" class="flex w-full items-center justify-center gap-1.5 rounded-xl bg-white py-2.5 text-xs font-semibold text-brand-700 ring-1 ring-brand-200 active:scale-95">

        <button type="submit" class="rounded-xl bg-brand-600 px-4 text-white active:scale-95">🔍</button>
      </form>

      <div id="scan-result"></div>

      <button onclick="openNoBarcodeFlow()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-white py-3 text-sm font-semibold text-brand-700 shadow-card ring-1 ring-brand-200 active:scale-95">
        ✏️ สินค้าชั่งจากเครื่องชั่งอิชิดะ? เพิ่มด้วยชื่อ
      </button>

      ${!isAdmin() ? `
        <button onclick="openSubmissionModal()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-sky-600 py-3 text-sm font-semibold text-white shadow-card active:scale-95">
          📋 ไม่พบสินค้าที่ต้องการ? แจ้งเพิ่มสินค้าใหม่
        </button>` : ''}

      ${!isAdmin() ? `
        <button onclick="toggleScanHistory()" class="flex w-full items-center justify-between rounded-xl bg-white px-4 py-3 text-sm font-semibold text-stone-600 shadow-card ring-1 ring-stone-100 active:scale-95">

function initScanner() {
  document.getElementById('manual-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = document.getElementById('manual-input').value.trim();
    if (code) handleScanResult(code);
  });
  startScanner();
}

function handleScanImageFile(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const resultEl = document.getElementById('scan-result');
  if (resultEl) {
    resultEl.innerHTML = `<div class="rounded-2xl bg-white p-4 text-center text-xs text-stone-400 shadow-card ring-1 ring-brand-100/60">กำลังอ่านบาร์โค้ดจากรูปภาพ...</div>`;
  }
  if (!window.Html5Qrcode) {
    if (resultEl) resultEl.innerHTML = `<p class="text-xs text-red-600">ไม่พบไลบรารีสแกน กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p>`;
    return;
  }
  const fileScanner = new Html5Qrcode('file-scan-temp');
  fileScanner
    .scanFile(file, false)
    .then((decodedText) => {
      playBeep();
      handleScanResult(decodedText);
      try { fileScanner.clear(); } catch {}
    })
    .catch(() => {
      if (resultEl) {
        resultEl.innerHTML = `
          <div class="rounded-2xl bg-white p-4 text-center shadow-card ring-1 ring-brand-100/60">
            <p class="text-xs text-red-600">ไม่พบบาร์โค้ดในรูปภาพนี้</p>
            <p class="mt-1 text-[11px] text-stone-400">ลองรูปอื่น หรือพิมพ์บาร์โค้ดด้วยตนเองด้านล่าง</p>
          </div>`;
      }
      try { fileScanner.clear(); } catch {}
    });
}

function startScanner() {
  if (!window.Html5Qrcode) {
    const statusEl = document.getElementById('camera-status');
    if (statusEl) statusEl.textContent = 'ไม่พบไลบรารีกล้อง (ต้องต่ออินเทอร์เน็ตเพื่อโหลด html5-qrcode)';
    return;
  }
  html5QrCode = new Html5Qrcode('qr-reader');
  html5QrCode
    .start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => { playBeep(); handleScanResult(decodedText); },
      () => { /* ไม่เจอบาร์โค้ดในเฟรมนี้ - ไม่ต้องทำอะไร */ },
    )
    .then(() => {
      const statusEl = document.getElementById('camera-status');
      if (statusEl) statusEl.remove();
      const frame = document.getElementById('camera-frame');
      if (frame) frame.classList.remove('hidden');
    })
    .catch((err) => {
      console.error(err);

function stopScanner() {

}

function handleScanResult(code) {
  state.scanner.scannedCode = code;
  const matches = products.map(withComputed).filter((p) => p.barcode === code);

          <p class="text-xs text-stone-500"><strong>ประเภท:</strong> ${BARCODE_TYPE_LABEL_TH[type]}</p>

            <button onclick="openCatalogOnlyModal('${code}')" class="w-full rounded-lg bg-stone-100 py-2 text-xs font-semibold text-stone-600 active:scale-95">📝 บันทึกข้อมูลสินค้า (ยังไม่ระบุวันหมดอายุ)</button>
            <button onclick="openNearExpiryModal('${code}')" class="w-full rounded-lg bg-sky-600 py-2 text-xs font-semibold text-white active:scale-95">⚠️ เพิ่มสินค้าใกล้หมดอายุ</button>
          </div>
          <div id="off-lookup-box"></div>
        </div>`;

      if (type === 'EAN-13' || type === 'UPC-A' || type === 'EAN-8') {
        lookupOpenFoodFacts(code).then((match) => {

// ==================== Calendar ====================
function calendarHTML() {
  const { year, month, selected } = state.cal;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - firstDay.getDay());
  const days = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const dateStr = (d) => d.toISOString().slice(0, 10);
  const getStatusForDate = (d) => {
    const dateProducts = products.map(withComputed).filter((p) => p.expiryDate === dateStr(d));
    if (dateProducts.length === 0) return null;
    if (dateProducts.some((p) => p.status === 'expired')) return 'expired';
    if (dateProducts.some((p) => p.status === 'urgent')) return 'urgent';
    return 'safe';
  };

  const prevMonth = () => {
    state.cal.month--;
    if (state.cal.month < 1) { state.cal.month = 12; state.cal.year--; }
    render();
  };
  const nextMonth = () => {
    state.cal.month++;
    if (state.cal.month > 12) { state.cal.month = 1; state.cal.year++; }
    render();
  };

  const selectDate = (d) => {
    state.cal.selected = dateStr(d);
    renderPage();
  };

  return `
    <div class="space-y-4">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">🗓️</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">ปฏิทิน</h1>
          <p class="text-xs text-stone-400">ดูวันหมดอายุตามปฏิทิน</p>
        </div>
      </header>

      <div class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400">🔍</span>
        <input id="cal-search" placeholder="ค้นหาชื่อสินค้า/หมวดหมู่/บาร์โค้ด..." class="w-full rounded-xl border border-stone-200 bg-white py-2.5 pl-9 pr-3 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
      </div>

      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
        <div class="flex items-center justify-between mb-4">
          <button onclick="prevMonth()" class="rounded-lg bg-stone-100 p-2 text-stone-600 active:scale-95">◀</button>
          <h2 class="text-sm font-bold text-stone-800">${MONTHS_TH[month - 1]} ${year}</h2>
          <button onclick="nextMonth()" class="rounded-lg bg-stone-100 p-2 text-stone-600 active:scale-95">▶</button>
        </div>

        <div class="grid grid-cols-7 gap-1 text-center">
          ${WEEKDAYS_TH.map((w) => `<div class="text-[10px] font-bold text-stone-400 py-1">${w}</div>`).join('')}
          ${days.map((d) => {
            const isCurrentMonth = d.getMonth() === month - 1;
            const status = getStatusForDate(d);
            const isSelected = state.cal.selected === dateStr(d);
            const isToday = dateStr(d) === dateStr(today);
            let bgClass = 'bg-white';
            if (status === 'expired') bgClass = 'bg-red-100 text-red-700';
            else if (status === 'urgent') bgClass = 'bg-amber-100 text-amber-700';
            else if (status === 'safe') bgClass = 'bg-brand-100 text-brand-700';
            else if (!isCurrentMonth) bgClass = 'bg-stone-50 text-stone-300';
            if (isSelected) bgClass += ' ring-2 ring-brand-600';
            if (isToday && !isSelected) bgClass += ' ring-1 ring-brand-400';
            return `
              <button onclick="selectDate(new Date(${d.getTime()}))" class="rounded-lg p-1.5 text-xs font-semibold transition-colors ${bgClass} ${isCurrentMonth ? 'cursor-pointer active:scale-95' : 'cursor-default'}">${d.getDate()}</button>`;
          }).join('')}
        </div>
      </div>

      <div id="cal-results">${calendarResultsHTML()}</div>
    </div>`;
}

function calendarResultsHTML() {
  const q = state.cal.search.trim().toLowerCase();
  if (q) {
    const matches = products.map(withComputed)
      .filter((p) => p.name.toLowerCase().includes(q) || (p.category || '').toLowerCase().includes(q) || p.barcode.toLowerCase().includes(q))
      .sort((a, b) => a.expiryDate.localeCompare(b.expiryDate));
    return `
      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
        <p class="mb-3 text-xs font-medium text-stone-500">ผลค้นหา "${escapeHtml(state.cal.search)}" (${matches.length} รายการ)</p>
        ${matches.length === 0 ? `<p class="text-xs text-stone-400">ไม่พบสินค้าที่ค้นหา</p>` : matches.map((p) => productCardHTML(p, { showActions: isAdmin() })).join('')}
      </div>`;
  }
  if (state.cal.selected) {
    const selectedProducts = products.map(withComputed).filter((p) => p.expiryDate === state.cal.selected);
    return `
      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
        <p class="mb-3 text-xs font-medium text-stone-500">วันที่ ${formatThaiDate(state.cal.selected)} (${selectedProducts.length} รายการ)</p>
        ${selectedProducts.length === 0 ? `<p class="text-xs text-stone-400">ไม่มีสินค้าหมดอายุในวันนี้</p>` : selectedProducts.map((p) => productCardHTML(p, { showActions: isAdmin() })).join('')}
      </div>`;
  }
  return '';
}

function initCalendar() {
  const input = document.getElementById('cal-search');
  if (!input) return;
  input.value = state.cal.search || '';
  input.addEventListener('input', (e) => {
    state.cal.search = e.target.value;
    document.getElementById('cal-results').innerHTML = calendarResultsHTML();
  });
}

    const name = document.getElementById('form-name').value.trim();
    const expiryDate = document.getElementById('form-expiry').value;
    const errEl = document.getElementById('form-error');

    if (!isValidBarcode(barcode)) {
      errEl.textContent = 'รูปแบบบาร์โค้ดไม่ถูกต้อง (ต้องมีอย่างน้อย 4 ตัวอักษร)';

      return;
    }

    if (sb) {
      const freshProducts = await cloudGet('products');
      if (freshProducts !== null) products = freshProducts;
    }

    const duplicate = products.find((p) => p.barcode === barcode && p.expiryDate === expiryDate && p.id !== (initial ? initial.id : null));

      errEl.textContent = 'มีสินค้าบาร์โค้ดนี้กับวันหมดอายุนี้อยู่ในระบบแล้ว';

      return;
    }

    const payload = {
      barcode, name,
      category: readCategorySelect('form-category'),
      imageUrl: currentImageData,
      expiryDate,
      notes: document.getElementById('form-notes').value.trim(),
    };

    if (initial) {
      const idx = products.findIndex((p) => p.id === initial.id);
      products[idx] = { ...products[idx], ...payload };
      saveProducts(products);
      cloudUpdateItem('products', initial.id, products[idx]);
    } else {
      const newId = generateLocalId();
      const newProduct = { id: newId, ...payload, addedDate: new Date().toISOString() };
      products.push(newProduct);
      saveProducts(products);
      cloudAppendItem('products', newProduct);
      upsertCatalogFromProduct(newProduct);
    }
    closeModal();
    refreshCurrentTabData();

    if (state.tab === 'scanner' && state.scanner.scannedCode) handleScanResult(state.scanner.scannedCode);
  });
}

function removeFromShelf(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  const entry = {
    id: generateLocalId(),
    productId: p.id,
    name: p.name,
    barcode: p.barcode,
    category: p.category,
    expiryDate: p.expiryDate,
    imageUrl: p.imageUrl || '',
    removedBy: state.adminName || 'ไม่ระบุ',
    removedAt: new Date().toISOString(),
  };
  removalLog.push(entry);
  saveRemovalLog(removalLog);

  saveProducts(products);

function deleteProductSilently(id) {
  products = products.filter((p) => p.id !== id);

  cloudRemoveItem('products', id);
  closeModal();
  refreshCurrentTabData();
}

// ==================== Export / backup / restore ====================
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function todayStamp() { return new Date().toISOString().slice(0, 10); }

function exportCSV() {
  const headers = ['บาร์โค้ด', 'ชื่อสินค้า', 'หมวดหมู่', 'วันหมดอายุ', 'สถานะ', 'หมายเหตุ'];
  const rows = products.map(withComputed).map((p) => [p.barcode, p.name, p.category || '', p.expiryDate, STATUS_LABEL_TH[p.status], (p.notes || '').replace(/\n/g, ' ')]);
  const esc = (c) => `"${String(c).replace(/"/g, '""')}"`;
  const csv = [headers, ...rows].map((r) => r.map(esc).join(',')).join('\r\n');
  downloadBlob(new Blob([`\uFEFF${csv}`], { type: 'text/csv;charset=utf-8;' }), `rimping-products-${todayStamp()}.csv`);
}

function handleRestoreFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(String(reader.result));
      const list = Array.isArray(parsed) ? parsed : parsed.products;
      if (!Array.isArray(list)) throw new Error('ไฟล์ไม่มีรายการสินค้าที่ถูกต้อง');
      pendingRestoreProducts = list;
      document.getElementById('restore-panel').innerHTML = `
        <div class="mt-3 rounded-xl bg-amber-50 p-3 text-xs text-amber-700">
          <p>พบ ${list.length} รายการในไฟล์ที่เลือก หากบาร์โค้ดซ้ำกับของเดิมในระบบ ต้องการให้เขียนทับหรือไม่?</p>
          <div class="mt-2 flex gap-2">
            <button onclick="runRestore(false)" class="flex-1 rounded-lg bg-white py-1.5 font-semibold text-amber-700 ring-1 ring-amber-200">ข้ามรายการซ้ำ</button>
            <button onclick="runRestore(true)" class="flex-1 rounded-lg bg-amber-600 py-1.5 font-semibold text-white">เขียนทับรายการซ้ำ</button>
          </div>
        </div>`;
    } catch (err) {
      document.getElementById('restore-panel').innerHTML = `<p class="mt-2 text-xs font-medium text-red-600">${escapeHtml(err.message || 'อ่านไฟล์ไม่สำเร็จ')}</p>`;
    }
  };
  reader.readAsText(file, 'utf-8');
  e.target.value = '';
}

function runRestore(overwrite) {
  if (!pendingRestoreProducts) return;
  let inserted = 0, updated = 0, skipped = 0;
  let nextId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;

  pendingRestoreProducts.forEach((raw) => {
    const barcode = raw.barcode;
    if (!barcode) { skipped++; return; }
    const idx = products.findIndex((p) => p.barcode === barcode);
    const normalized = {
      barcode,
      name: raw.name || '(ไม่มีชื่อ)',
      category: raw.category || '',
      imageUrl: raw.image_url || raw.imageUrl || '',
      expiryDate: raw.expiry_date || raw.expiryDate,
      notes: raw.notes || '',
    };
    if (idx >= 0) {
      if (overwrite) { products[idx] = { ...products[idx], ...normalized }; updated++; }
      else skipped++;
    } else {
      products.push({ id: nextId++, ...normalized, addedDate: new Date().toISOString() });
      inserted++;
    }
  });

  saveProducts(products);
  cloudSet('products', products);
  pendingRestoreProducts = null;
  document.getElementById('restore-panel').innerHTML = `<p class="mt-2 text-xs font-medium text-brand-700">กู้คืนสำเร็จ: เพิ่มใหม่ ${inserted} รายการ, อัปเดต ${updated} รายการ, ข้าม ${skipped} รายการ</p>`;
  refreshCurrentTabData();
}

        ${quick ? `

          </div>` : ''}

        <form id="near-expiry-form" class="mt-4 space-y-3">
          ${!quick ? `
            <div>
              <label class="mb-1 block text-xs font-medium text-stone-500">ชื่อสินค้า *</label>
              <input id="ne-name" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-medium text-stone-500">รูปสินค้า (หน้าสินค้า) *</label>
              <input id="ne-photo1" type="file" accept="image/*" capture="environment" required class="w-full text-xs text-stone-500" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-medium text-stone-500">หมวดหมู่</label>
              ${categorySelectHTML('ne-category', '')}

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">รูปถ่ายวันหมดอายุ (ไม่บังคับ)</label>
            <input id="ne-photo2" type="file" accept="image/*" capture="environment" class="w-full text-xs text-stone-500" />
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">วันหมดอายุ *</label>
            <input id="ne-expiry" required type="date" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">หมายเหตุ</label>
            <textarea id="ne-notes" rows="2" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100"></textarea>
          </div>

          <p id="ne-error" class="hidden text-xs font-medium text-red-600"></p>

          <button type="submit" class="w-full rounded-xl bg-sky-600 py-2.5 text-sm font-semibold text-white active:scale-95">${isAdmin() ? 'เพิ่มสินค้า' : 'ส่งคำขอ'}</button>
        </form>
      </div>
    </div>
  `);

  document.getElementById('near-expiry-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('ne-error');
    const submitBtn = e.target.querySelector('button[type="submit"]');

    if (!isAdmin()) {
      if (sb) {
        const freshPending = await cloudGet('pending');
        if (freshPending !== null) pendingSubmissions = freshPending;
      }
      if (pendingSubmissions.some((s) => s.barcode === barcode)) {
        errEl.textContent = 'บาร์โค้ดนี้มีคำขอที่ส่งไปแล้ว กำลังอยู่ในขั้นตอนที่ AI ตรวจสอบอยู่ ไม่สามารถส่งซ้ำได้ในขณะนี้';
        errEl.classList.remove('hidden');
        return;
      }
    }

    const expiryDate = document.getElementById('ne-expiry').value;
    if (!expiryDate) {
      errEl.textContent = 'กรุณาระบุวันหมดอายุ';
      errEl.classList.remove('hidden');
      return;
    }

    let name, category, photo1;
    if (quick) {
      name = cat.name;
      category = cat.category || '';
      photo1 = cat.imageUrl;
    } else {
      name = document.getElementById('ne-name').value.trim();
      category = readCategorySelect('ne-category');
      const f1 = document.getElementById('ne-photo1').files[0];
      if (!name || !f1) {
        errEl.textContent = 'กรุณากรอกชื่อสินค้าและถ่ายรูปสินค้า';
        errEl.classList.remove('hidden');
        return;
      }
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'กำลังบันทึก...';

    try {
      if (!quick) {
        const f1 = document.getElementById('ne-photo1').files[0];
        photo1 = await compressImageFile(f1);
      }
      const f2 = document.getElementById('ne-photo2').files[0];
      const photo2 = f2 ? await compressImageFile(f2) : '';
      const notes = document.getElementById('ne-notes').value.trim();

      if (!findCatalogByBarcode(barcode)) {
        addCatalogEntry({ barcode, name, category, imageUrl: photo1 });
      }

      if (isAdmin()) {
        const newProduct = {
          id: generateLocalId(),
          barcode, name, category, expiryDate, notes,
          imageUrl: photo1 || '',
          addedDate: new Date().toISOString(),
        };
        products.push(newProduct);
        saveProducts(products);
        cloudAppendItem('products', newProduct);
      } else {
        const submission = {
          id: generateLocalId(),
          barcode, name, category, expiryDate, notes,
          productPhoto: photo1 || '',
          expiryPhoto: photo2 || '',
          submittedAt: new Date().toISOString(),
        };
        pendingSubmissions.push(submission);
        savePending(pendingSubmissions);
        cloudAppendItem('pending', submission);
      }

      closeModal();
      refreshCurrentTabData();
      if (state.tab === 'scanner' && state.scanner.scannedCode) handleScanResult(state.scanner.scannedCode);
    } catch {
      errEl.textContent = 'เกิดข้อผิดพลาดในการอ่านรูปภาพ กรุณาลองใหม่';
      errEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.textContent = isAdmin() ? 'เพิ่มสินค้า' : 'ส่งคำขอ';
    }
  });
}

  openModal(`

          </div>

            <label class="mb-1 block text-xs font-medium text-stone-500">วันหมดอายุ *</label>
            <input id="nb-expiry" required type="date" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">หมายเหตุ</label>

        </form>
      </div>
    </div>
  `);

  let nbSelectedMatch = null;
  let nbMatches = [];

  window.handleNbNameInput = (value) => {
    nbSelectedMatch = null;
    document.getElementById('nb-manual-fields').classList.remove('hidden');
    document.getElementById('nb-quick-preview').classList.add('hidden');
    document.getElementById('nb-photo').required = true;
    const box = document.getElementById('nb-suggestions');
    nbMatches = searchNameSuggestions(value);
    if (!value.trim() || nbMatches.length === 0) {
      box.innerHTML = '';
      box.classList.add('hidden');
      return;
    }
    box.classList.remove('hidden');
    box.innerHTML = nbMatches.map((m, i) => `
      <button type="button" onclick="selectNbSuggestion(${i})" class="flex w-full items-center gap-2 border-b border-stone-100 px-3 py-2 text-left last:border-b-0 active:bg-stone-50">

        <span class="truncate text-sm text-stone-700">${escapeHtml(m.name)}</span>
      </button>`).join('');
  };

  window.selectNbSuggestion = (i) => {
    const m = nbMatches[i];
    if (!m) return;
    nbSelectedMatch = m;
    document.getElementById('nb-name').value = m.name;
    document.getElementById('nb-suggestions').classList.add('hidden');
    document.getElementById('nb-manual-fields').classList.add('hidden');
    document.getElementById('nb-photo').required = false;
    document.getElementById('nb-quick-preview').classList.remove('hidden');
    document.getElementById('nb-quick-preview-img').innerHTML = m.imageUrl
      ? `<img src="${m.imageUrl}" class="h-12 w-12 rounded-lg object-cover" />`
      : `<div class="flex h-12 w-12 items-center justify-center rounded-lg bg-stone-100 text-lg">📦</div>`;
    document.getElementById('nb-quick-preview-name').textContent = m.name;
  };

  window.clearNbSuggestion = () => {
    nbSelectedMatch = null;
    document.getElementById('nb-quick-preview').classList.add('hidden');
    document.getElementById('nb-manual-fields').classList.remove('hidden');
    document.getElementById('nb-photo').required = true;
    document.getElementById('nb-name').value = '';
    document.getElementById('nb-name').focus();
  };

  document.getElementById('no-barcode-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const expiryDate = document.getElementById('nb-expiry').value;
    const errEl = document.getElementById('nb-error');
    const submitBtn = e.target.querySelector('button[type="submit"]');

    let name, category, photoFile;
    if (nbSelectedMatch) {
      name = nbSelectedMatch.name;
      category = nbSelectedMatch.category || '';
      photoFile = null;
    } else {
      name = document.getElementById('nb-name').value.trim();
      category = readCategorySelect('nb-category');
      photoFile = document.getElementById('nb-photo').files[0];
    }

    if (!name || !expiryDate || (!nbSelectedMatch && !photoFile)) {
      errEl.textContent = 'กรุณากรอกชื่อสินค้า ถ่ายรูปสินค้า และระบุวันหมดอายุ';
      errEl.classList.remove('hidden');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'กำลังบันทึก...';

    let photo = nbSelectedMatch ? (nbSelectedMatch.imageUrl || '') : '';
    try {
      if (photoFile) photo = await compressImageFile(photoFile);
    } catch {
      errEl.textContent = 'เกิดข้อผิดพลาดในการอ่านรูปภาพ กรุณาลองใหม่';
      errEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.textContent = isAdmin() ? 'เพิ่มสินค้า' : 'ส่งคำขอ';
      return;
    }

    if (isAdmin()) {
      const newId = generateLocalId();
      const newProduct = {
        id: newId,
        barcode: `NOBC_${newId}`,
        name,
        category,
        expiryDate,
        notes: document.getElementById('nb-notes').value.trim(),
        imageUrl: photo,
        addedDate: new Date().toISOString(),
      };
      products.push(newProduct);
      saveProducts(products);
      cloudAppendItem('products', newProduct);
    } else {
      const submission = {
        id: generateLocalId(),
        barcode: '',
        name,
        category,
        expiryDate,
        notes: document.getElementById('nb-notes').value.trim(),
        productPhoto: photo,
        submittedAt: new Date().toISOString(),
      };
      pendingSubmissions.push(submission);
      savePending(pendingSubmissions);
      cloudAppendItem('pending', submission);
    }

    closeModal();
    refreshCurrentTabData();
  });
}

function activityLogHTML() {
  const combined = [
    ...approvalLog.map((e) => ({ ...e })),
    ...removalLog.map((e) => ({ ...e, action: 'removed', at: e.removedAt, by: e.removedBy })),
  ].sort((a, b) => (b.at || '').localeCompare(a.at || ''));
  if (combined.length === 0) return `<p class="py-4 text-center text-xs text-stone-400">ยังไม่มีประวัติการทำงาน</p>`;
  const META = {
    approved: { icon: '✅', text: 'อนุมัติ' },
    rejected: { icon: '✕', text: 'ปฏิเสธ' },
    removed: { icon: '📦', text: 'นำออกจากชั้น' },
  };
  return combined.slice(0, 50).map((e) => {
    const meta = META[e.action] || { icon: '•', text: e.action };
    return `
      <div class="flex items-center gap-3 rounded-xl bg-stone-50 p-2.5 ring-1 ring-stone-100">
        <span class="shrink-0 text-base">${meta.icon}</span>
        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-medium text-stone-700">${escapeHtml(e.name || '(ไม่ทราบชื่อ)')}</p>
          <p class="text-[11px] text-stone-400">${meta.text} โดย ${escapeHtml(e.by || 'ไม่ระบุ')} · ${formatLogTime(e.at)}</p>
        </div>
      </div>`;
  }).join('');
}

function copyViewOnlyLink() {

    if (el) { el.classList.remove('hidden'); setTimeout(() => el.classList.add('hidden'), 2000); }

    prompt('คัดลอกลิงก์นี้:', url);

function removeAdminUser(id) {
  const target = adminUsers.find((a) => a.id === id);
  if (!target || target.isOwner) return;
  if (!confirm(`ลบสิทธิ์แอดมินของ "${target.name}"?`)) return;
  adminUsers = adminUsers.filter((a) => a.id !== id);
  saveAdminUsers(adminUsers);
  cloudRemoveItem('admins', id);
  refreshCurrentTabData();
}

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">PIN</label>
            <input id="admin-pin" required type="password" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>

          <p id="admin-error" class="hidden text-xs font-medium text-red-600"></p>

          <button type="submit" class="w-full rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white active:scale-95">เข้าสู่ระบบ</button>
        </form>
      </div>
    </div>
  `);

  document.getElementById('admin-login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const id = document.getElementById('admin-id').value.trim();
    const pin = document.getElementById('admin-pin').value.trim();
    const errEl = document.getElementById('admin-error');

    const match = findAdminUser(id, pin);
    if (match) {
      setAdmin(true);
      state.adminName = match.name;
      closeModal();
      if (onSuccess) onSuccess();
    } else {
      errEl.textContent = 'รหัสพนักงานหรือ PIN ไม่ถูกต้อง';
      errEl.classList.remove('hidden');
    }
  });
}

// ==================== สำรองให้หน้าแอดมินอัปเดตเอง (เผื่อ realtime ไม่ทำงาน) ====================
// เช็คทุก 5 วินาทีว่ามีคำขอใหม่จากพนักงานไหม โดยไม่รบกวนถ้ามี modal เปิดอยู่
function startAdminPolling() {
  setInterval(async () => {
    if (!sb || !isAdmin() || state.tab !== 'admin') return;
    const modalRoot = document.getElementById('modal-root');
    if (modalRoot && modalRoot.innerHTML.trim()) return;
    try {
      const freshPending = await cloudGet('pending');
      if (freshPending !== null && JSON.stringify(freshPending) !== JSON.stringify(pendingSubmissions)) {
        pendingSubmissions = freshPending;
        safeStorageSet(PENDING_KEY, JSON.stringify(pendingSubmissions));
        refreshCurrentTabData();
      }
    } catch {}
  }, 5000);
}

// ==================== Init ====================
(function detectViewOnlyMode() {
  try {
    const params = new URLSearchParams(location.search);
    if (params.get('view') === 'public') {
      state.viewOnly = true;
      state.entered = true;
      state.tab = 'dashboard';
    }
  } catch {}
})();
applyDarkModeClass();
bootstrapData().then(() => {
  setupRealtimeSync();
  startAdminPolling();
  render();
});
</script>
