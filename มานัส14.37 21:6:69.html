<script>
'use strict';

// ==================== Constants ====================
const ADMIN_ID = '63042';
const ADMIN_PIN = '0898';
const URGENT_WINDOW_DAYS = 7;
const STORAGE_KEY = 'rimping_products_v1';
const PENDING_KEY = 'rimping_pending_v1';

const STATUS_LABEL_TH = { expired: 'หมดอายุแล้ว', urgent: 'เร่งด่วน', safe: 'ปลอดภัย' };
const STATUS_COLOR = { expired: '#dc2626', urgent: '#d97706', safe: '#059669' };

const WEEKDAYS_TH = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
const MONTHS_TH = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

const NAV_ITEMS = [
  { id: 'dashboard', label: 'หน้าแรก', emoji: '🏠' },
  { id: 'scanner', label: 'สแกน', emoji: '📷' },
  { id: 'calendar', label: 'ปฏิทิน', emoji: '🗓️' },
  { id: 'admin', label: 'แอดมิน', emoji: '🛠️' },
];

const FILTER_CHIPS = [
  { id: 'all', label: 'ทั้งหมด' },
  { id: 'expired', label: '🔴 หมดอายุแล้ว' },
  { id: 'urgent', label: '🟡 เร่งด่วน' },
  { id: 'safe', label: '🟢 ปลอดภัย' },
];

// ==================== State ====================
const state = {
  entered: false,
  isAdminSession: false,
  tab: 'dashboard',
  search: '',
  filter: 'all',
  cal: { year: new Date().getFullYear(), month: new Date().getMonth() + 1, selected: null },
  scanner: { scannedCode: null },
};

let html5QrCode = null;
let pendingLoginSuccess = null;
let pendingRestoreProducts = null;

// ==================== Storage ====================
function seedProducts() {
  const today = new Date();
  const offset = (days) => {
    const d = new Date(today);
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  };
  return [
    { id: 1, barcode: '8851234567890', name: 'นมสดพาสเจอร์ไรส์ 1 ลิตร',  imageUrl: '', expiryDate: offset(-1), notes: 'หมดอายุแล้ว - ตัวอย่าง', addedDate: today.toISOString() },
    { id: 2, barcode: '8859012345671', name: 'ขนมปังโฮลวีต',  imageUrl: '', expiryDate: offset(2), notes: 'เร่งด่วน - ตัวอย่าง', addedDate: today.toISOString() },
    { id: 3, barcode: '40123456', name: 'โยเกิร์ตรสธรรมชาติ',  imageUrl: '', expiryDate: offset(5), notes: '', addedDate: today.toISOString() },
    { id: 4, barcode: '8850999888771', name: 'ไข่ไก่เบอร์ 1 แพ็ค 10',  imageUrl: '', expiryDate: offset(14), notes: '', addedDate: today.toISOString() },
    { id: 5, barcode: 'CUST0001', name: 'ผักกาดขาวออร์แกนิก',  imageUrl: '', expiryDate: offset(30), notes: 'บาร์โค้ดแบบกำหนดเอง', addedDate: today.toISOString() },
  ];
}

function loadProducts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      const seeded = seedProducts();
      saveProducts(seeded);
      return seeded;
    }
    return JSON.parse(raw);
  } catch {
    return [];
  }
}
function saveProducts(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

function isAdmin() { return state.isAdminSession === true; }
function setAdmin(value) { state.isAdminSession = !!value; }

function loadPending() {
  try {
    const raw = localStorage.getItem(PENDING_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}
function savePending(list) { localStorage.setItem(PENDING_KEY, JSON.stringify(list)); }

let products = loadProducts();
let pendingSubmissions = loadPending();

// ==================== Domain helpers ====================
function getStatus(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function formatThaiDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}
function computeStats() {
  const counts = { expired: 0, urgent: 0, safe: 0 };
  products.forEach((p) => counts[getStatus(p.expiryDate)]++);
  return counts;
}

function detectBarcodeType(raw) {
  const code = (raw ?? '').trim();
  if (/^\d{13}$/.test(code)) return 'EAN-13';
  if (/^\d{12}$/.test(code)) return 'UPC-A';
  if (/^\d{8}$/.test(code)) return 'EAN-8';
  if (/^[A-Za-z0-9]{4,}$/.test(code) && /[A-Za-z]/.test(code)) return 'CODE128';
  if (code.length >= 4) return 'CUSTOM';
  return 'INVALID';
}
function isValidBarcode(code) { return detectBarcodeType(code) !== 'INVALID'; }
const BARCODE_TYPE_LABEL_TH = {
  'EAN-13': 'EAN-13 (13 หลัก)', 'EAN-8': 'EAN-8 (8 หลัก)', 'UPC-A': 'UPC-A (12 หลัก)',
  CODE128: 'Code128', CUSTOM: 'บาร์โค้ดกำหนดเอง', INVALID: 'รูปแบบไม่ถูกต้อง',
};

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function playBeep() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1046;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.13);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.14);
    osc.onended = () => ctx.close();
  } catch { /* เบราว์เซอร์บล็อก autoplay เสียง - ไม่ต้องทำอะไร */ }
}

// ==================== Shared UI pieces ====================
function basketIconSVG(size, color, strokeWidth) {
  size = size || 24; color = color || '#047857'; strokeWidth = strokeWidth || 2;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z"/>
      <path d="M9 9V6.5a3 3 0 0 1 6 0V9"/>
      <path d="M9.5 13v3.2"/>
      <path d="M12 13v3.2"/>
      <path d="M14.5 13v3.2"/>
    </svg>`;
}
function basketFilledSVG(size, color) {
  size = size || 24; color = color || '#047857';
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}">
      <path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z" />
      <path d="M9 9V6.5a3 3 0 0 1 6 0V9h-1.6V6.5a1.4 1.4 0 0 0-2.8 0V9H9Z" />
    </svg>`;
}

function freshnessRingSVG(daysLeft, status, size) {
  size = size || 64;
  const stroke = 6;
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const ratio = status === 'expired' ? 0 : Math.min(Math.max(daysLeft, 0), 30) / 30;
  const dashOffset = circumference * (1 - ratio);
  const color = STATUS_COLOR[status];
  const c = size / 2;
  return `
    <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
      <svg width="${size}" height="${size}" class="-rotate-90">
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="#e3efe7" stroke-width="${stroke}" fill="none" />
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none"
          stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
          style="transition: stroke-dashoffset .4s ease;" />
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-xl font-extrabold leading-none" style="color:${color}">${status === 'expired' ? '!' : daysLeft}</span>
        ${status !== 'expired' ? '<span class="text-[10px] font-semibold text-stone-500">วัน</span>' : ''}
      </div>
    </div>`;
}

function statusBadgeHTML(status) {
  const styles = {
    expired: 'bg-red-50 text-red-600 ring-1 ring-red-200',
    urgent: 'bg-amber-50 text-amber-600 ring-1 ring-amber-200',
    safe: 'bg-brand-50 text-brand-700 ring-1 ring-brand-200',
  };
  return `<span class="rounded-full px-2.5 py-0.5 text-xs font-semibold ${styles[status]}">${STATUS_LABEL_TH[status]}</span>`;
}

function productThumbHTML(p, size) {
  size = size || 64;
  if (p.imageUrl) {
    const badgeText = p.status === 'expired' ? 'หมดอายุ' : `${p.daysLeft} วัน`;
    return `
      <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
        <img src="${p.imageUrl}" class="h-full w-full rounded-2xl object-cover ring-1 ring-brand-100" />
        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-full border-2 border-white px-2 py-0.5 text-[10px] font-extrabold text-white shadow-sm" style="background-color:${STATUS_COLOR[p.status]}">${badgeText}</span>
      </div>`;
  }
  return freshnessRingSVG(p.daysLeft, p.status, size);
}

function statCardHTML(label, count, colorClass, active, onclickAttr) {
  return `
    <button onclick="${onclickAttr}" class="flex flex-1 flex-col items-start gap-1 rounded-2xl px-3 py-3 text-left ring-1 transition-all ${colorClass} ${active ? 'scale-[1.02] shadow-card ring-2' : 'ring-1'}">
      <span class="text-2xl font-bold leading-none">${count}</span>
      <span class="text-xs font-medium opacity-80">${label}</span>
    </button>`;
}

function productCardHTML(p, opts) {
  opts = opts || {};
  const showActions = !!opts.showActions;
  return `
    <div class="flex items-center gap-3 rounded-2xl bg-white p-3 shadow-card ring-1 ring-brand-100/60 cursor-pointer active:bg-stone-50" onclick="viewProductDetail(${p.id})">
      ${productThumbHTML(p)}
      <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
          <p class="truncate text-sm font-semibold text-stone-800">${escapeHtml(p.name)}</p>
          ${statusBadgeHTML(p.status)}
        </div>
        <p class="mt-0.5 truncate text-xs text-stone-400">${escapeHtml(p.barcode)}</p>
        <p class="mt-1 text-xs text-stone-500">หมดอายุ ${formatThaiDate(p.expiryDate)}</p>
      </div>
      ${showActions ? `
        <div class="flex shrink-0 flex-col gap-1.5" onclick="event.stopPropagation()">
          <button onclick="openProductForm(${p.id})" class="rounded-full bg-brand-50 p-1.5 text-brand-700 active:scale-95" aria-label="แก้ไข">✏️</button>
          <button onclick="confirmDeleteProduct(${p.id})" class="rounded-full bg-red-50 p-1.5 text-red-600 aria-label="ลบ">🗑️</button>
        </div>` : ''}
    </div>`;
}

function viewProductDetail(id) {
  const p = products.map(withComputed).find(x => x.id === id);
  if (!p) return;
  
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/60 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-md overflow-hidden rounded-3xl bg-white shadow-2xl animate-in slide-in-from-bottom duration-300">
        <div class="relative h-64 w-full bg-stone-100">
          ${p.imageUrl 
            ? `<img src="${p.imageUrl}" class="h-full w-full object-cover" />` 
            : `<div class="flex h-full w-full items-center justify-center text-6xl">📦</div>`}
          <button onclick="closeModal()" class="absolute right-4 top-4 flex h-9 w-9 items-center justify-center rounded-full bg-black/20 text-white backdrop-blur-sm">✕</button>
        </div>
        <div class="p-6">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="text-xl font-bold text-stone-800">${escapeHtml(p.name)}</h2>
              <p class="text-sm font-medium text-stone-400">บาร์โค้ด: ${escapeHtml(p.barcode)}</p>
            </div>
            ${statusBadgeHTML(p.status)}
          </div>
          <div class="mt-6 grid grid-cols-2 gap-4">
            <div class="rounded-2xl bg-stone-50 p-3 ring-1 ring-stone-100">
              <p class="text-[10px] font-bold uppercase tracking-wider text-stone-400">วันหมดอายุ</p>
              <p class="mt-1 text-sm font-bold text-stone-700">${formatThaiDate(p.expiryDate)}</p>
            </div>
            <div class="rounded-2xl bg-stone-50 p-3 ring-1 ring-stone-100">
              <p class="text-[10px] font-bold uppercase tracking-wider text-stone-400">สถานะ</p>
              <p class="mt-1 text-sm font-bold" style="color:${STATUS_COLOR[p.status]}">${p.status === 'expired' ? 'หมดอายุแล้ว' : `เหลือ ${p.daysLeft} วัน`}</p>
            </div>
          </div>
          ${p.notes ? `
            <div class="mt-4 rounded-2xl bg-stone-50 p-3 ring-1 ring-stone-100">
              <p class="text-[10px] font-bold uppercase tracking-wider text-stone-400">หมายเหตุ</p>
              <p class="mt-1 text-xs text-stone-600">${escapeHtml(p.notes)}</p>
            </div>
          ` : ''}
          <button onclick="closeModal()" class="mt-6 w-full rounded-2xl bg-stone-100 py-3.5 text-sm font-bold text-stone-600 active:scale-[0.98]">ปิดหน้าต่าง</button>
        </div>
      </div>
    </div>
  `);
}

// ==================== Navigation ====================
function renderPage() {
  const app = document.getElementById('app');
  let content = '';
  switch (state.tab) {
    case 'dashboard': content = dashboardHTML(); break;
    case 'scanner': content = scannerHTML(); break;
    case 'calendar': content = calendarHTML(); break;
    case 'admin': content = adminHTML(); break;
  }
  app.innerHTML = `
    <main class="mx-auto min-h-screen max-w-lg px-4 pb-24 pt-6">
      ${content}
    </main>
    <nav class="fixed bottom-0 left-0 right-0 z-40 border-t border-brand-100 bg-white/80 pb-safe pt-2 backdrop-blur-lg">
      <div class="mx-auto flex max-w-lg items-center justify-around px-2">
        ${NAV_ITEMS.map((item) => {
          const active = state.tab === item.id;
          return `
            <button onclick="switchTab('${item.id}')" class="flex flex-1 flex-col items-center gap-1 py-1 transition-colors ${active ? 'text-brand-600' : 'text-stone-400'}">
              <span class="text-xl">${item.emoji}</span>
              <span class="text-[10px] font-bold">${item.label}</span>
              ${active ? '<span class="h-1 w-1 rounded-full bg-brand-600"></span>' : '<span class="h-1 w-1"></span>'}
            </button>`;
        }).join('')}
      </div>
    </nav>`;
  if (state.tab === 'scanner') initScanner();
}

function switchTab(id) {
  if (state.tab === 'scanner') stopScanner();
  state.tab = id;
  renderPage();
}

function refreshCurrentTabData() {
  if (state.tab === 'dashboard') {
    const counts = computeStats();
    const statsContainer = document.getElementById('stats-container');
    if (statsContainer) statsContainer.innerHTML = dashboardStatsHTML(counts);
    const listContainer = document.getElementById('dashboard-product-list');
    if (listContainer) listContainer.innerHTML = dashboardProductListHTML();
  } else if (state.tab === 'admin' && isAdmin()) {
    const pendingList = document.getElementById('admin-pending-list');
    if (pendingList) pendingList.innerHTML = adminPendingListHTML();
    const productList = document.getElementById('admin-product-list');
    if (productList) productList.innerHTML = adminProductListHTML();
  } else if (state.tab === 'calendar') {
    const card = document.getElementById('calendar-card');
    if (card) card.innerHTML = calendarCardHTML();
    const list = document.getElementById('calendar-day-list');
    if (list) list.innerHTML = calendarDayListHTML();
  }
}

// ==================== Dashboard ====================
function dashboardHTML() {
  const counts = computeStats();
  return `
    <div class="space-y-6">
      <header class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-brand-600 text-white shadow-lg shadow-brand-200">
            ${basketFilledSVG(28, 'white')}
          </div>
          <div>
            <h1 class="text-xl font-extrabold tracking-tight text-stone-800">Expiry Tracker</h1>
            <p class="text-xs font-medium text-stone-400">ยินดีต้อนรับ, ${isAdmin() ? 'แอดมิน' : 'พนักงาน'}</p>
          </div>
        </div>
        <button onclick="switchTab('scanner')" class="flex h-10 w-10 items-center justify-center rounded-full bg-white shadow-card ring-1 ring-brand-100 active:scale-95">🔍</button>
      </header>

      <div id="stats-container" class="flex gap-3">${dashboardStatsHTML(counts)}</div>

      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <h2 class="text-sm font-bold text-stone-700">รายการสินค้า</h2>
          <div class="flex gap-1 overflow-x-auto no-scrollbar">
            ${FILTER_CHIPS.map(chip => `
              <button onclick="setFilter('${chip.id}')" class="whitespace-nowrap rounded-full px-3 py-1 text-[11px] font-bold transition-all ${state.filter === chip.id ? 'bg-brand-600 text-white' : 'bg-white text-stone-400 ring-1 ring-stone-100'}">${chip.label}</button>
            `).join('')}
          </div>
        </div>
        <div id="dashboard-product-list" class="space-y-3">${dashboardProductListHTML()}</div>
      </div>
    </div>`;
}

function dashboardStatsHTML(counts) {
  return `
    ${statCardHTML('ทั้งหมด', products.length, 'bg-white text-stone-700', state.filter === 'all', "setFilter('all')")}

function initScanner() {
  document.getElementById('manual-form').addEventListener('submit', (e) => {
    e.preventDefault();

    if (code) handleScanResult(code);
  });

function handleScanImageFile(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const resultEl = document.getElementById('scan-result');
  if (resultEl) {
    resultEl.innerHTML = `<div class="rounded-2xl bg-white p-4 text-center text-xs text-stone-400 shadow-card ring-1 ring-brand-100/60">กำลังอ่านบาร์โค้ดจากรูปภาพ...</div>`;
  }
  if (!window.Html5Qrcode) {
    if (resultEl) resultEl.innerHTML = `<p class="text-xs text-red-600">ไม่พบไลบรารีสแกน กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p>`;
    return;
  }
  const fileScanner = new Html5Qrcode('file-scan-temp');
  fileScanner
    .scanFile(file, false)
    .then((decodedText) => {
      playBeep();
      handleScanResult(decodedText);
      try { fileScanner.clear(); } catch {}
    })
    .catch(() => {
      if (resultEl) {
        resultEl.innerHTML = `
          <div class="rounded-2xl bg-white p-4 text-center shadow-card ring-1 ring-brand-100/60">
            <p class="text-xs text-red-600">ไม่พบบาร์โค้ดในรูปภาพนี้</p>
            <p class="mt-1 text-[11px] text-stone-400">ลองรูปอื่น หรือพิมพ์บาร์โค้ดด้วยตนเองด้านล่าง</p>
          </div>`;
      }
      try { fileScanner.clear(); } catch {}
    });
}

function startScanner() {
  if (!window.Html5Qrcode) {
    const statusEl = document.getElementById('camera-status');
    if (statusEl) statusEl.textContent = 'ไม่พบไลบรารีกล้อง (ต้องต่ออินเทอร์เน็ตเพื่อโหลด html5-qrcode)';
    return;
  }
  html5QrCode = new Html5Qrcode('qr-reader');
  html5QrCode
    .start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => { playBeep(); handleScanResult(decodedText); },
      () => { /* ไม่เจอบาร์โค้ดในเฟรมนี้ - ไม่ต้องทำอะไร */ },
    )
    .then(() => {
      const statusEl = document.getElementById('camera-status');
      if (statusEl) statusEl.remove();
      const frame = document.getElementById('camera-frame');
      if (frame) frame.classList.remove('hidden');
    })
    .catch((err) => {
      console.error(err);
      const statusEl = document.getElementById('camera-status');
      if (statusEl) {
        statusEl.innerHTML = `
          <div class="flex flex-col items-center gap-2 px-6 text-center">
            <span class="text-2xl">📵</span>
            <span>ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้กล้อง หรือกรอกบาร์โค้ดด้วยตนเองด้านล่าง<br><span class="text-[10px] text-white/50">(กล้องต้องเปิดผ่าน HTTPS หรือ localhost)</span></span>
          </div>`;
      }
    });
}

function stopScanner() {
  if (html5QrCode) {
    const instance = html5QrCode;
    html5QrCode = null;
    instance.stop().catch(() => {}).finally(() => { try { instance.clear(); } catch {} });
  }
}

function setupAutocomplete(inp, arr) {
  let currentFocus;
  inp.addEventListener("input", function(e) {
      let a, b, i, val = this.value;
      closeAllLists();
      if (!val) { return false;}
      currentFocus = -1;
      a = document.getElementById("autocomplete-list");
      
      // ค้นหารายการที่ใกล้เคียง (ไม่จำเป็นต้องเริ่มด้วยตัวอักษรนั้น)
      const matches = [...new Set(arr)].filter(item => item.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
      
      matches.forEach(match => {
          b = document.createElement("DIV");
          // เน้นข้อความที่ตรงกัน
          const idx = match.toLowerCase().indexOf(val.toLowerCase());
          b.innerHTML = match.substr(0, idx);
          b.innerHTML += "<strong>" + match.substr(idx, val.length) + "</strong>";
          b.innerHTML += match.substr(idx + val.length);
          b.innerHTML += "<input type='hidden' value='" + match + "'>";
          b.addEventListener("click", function(e) {
              inp.value = this.getElementsByTagName("input")[0].value;
              closeAllLists();
              
              // เมื่อเลือกแล้ว ให้ลองดึงบาร์โค้ดมาด้วยถ้ามี
              const p = products.find(x => x.name === inp.value);
              const barcodeInput = document.getElementById('submission-barcode');
              if (p && barcodeInput) {
                  barcodeInput.value = p.barcode;
              }
          });
          a.appendChild(b);
      });
  });
  
  inp.addEventListener("keydown", function(e) {
      let x = document.getElementById("autocomplete-list");
      if (x) x = x.getElementsByTagName("div");
      if (e.keyCode == 40) {
        currentFocus++;
        addActive(x);
      } else if (e.keyCode == 38) {
        currentFocus--;
        addActive(x);
      } else if (e.keyCode == 13) {
        e.preventDefault();
        if (currentFocus > -1) {
          if (x) x[currentFocus].click();
        }
      }
  });
  
  function addActive(x) {
    if (!x) return false;
    removeActive(x);
    if (currentFocus >= x.length) currentFocus = 0;
    if (currentFocus < 0) currentFocus = (x.length - 1);
    x[currentFocus].classList.add("autocomplete-active");
  }
  function removeActive(x) {
    for (let i = 0; i < x.length; i++) {
      x[i].classList.remove("autocomplete-active");
    }
  }
  function closeAllLists(elmnt) {
    const x = document.getElementById("autocomplete-list");
    if (x) x.innerHTML = "";
  }
  document.addEventListener("click", function (e) {
      closeAllLists(e.target);
  });
}

        <button onclick="approvePending(${item.id})" class="flex-1 rounded-lg bg-brand-600 py-1.5 text-xs font-semibold text-white active:scale-95">✅ อนุมัติ</button>

function viewPendingPhoto(id, which) {
  const item = pendingSubmissions.find((p) => p.id === id);
  if (!item) return;
  const src = item.expiryPhoto || '';
  if (!src) return;
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4" onclick="closeModal()">
      <img src="${src}" class="max-h-full max-w-full rounded-lg object-contain" />
      <button onclick="closeModal()" class="absolute right-4 top-4 flex h-9 w-9 items-center justify-center rounded-full bg-white/20 text-white">✕</button>
    </div>
  `);
}

function approvePending(id) {
  const item = pendingSubmissions.find((p) => p.id === id);
  if (!item) return;

  const nameInput = document.getElementById(`pending-name-${id}`);
  const expiryInput = document.getElementById(`pending-expiry-${id}`);
  const barcodeInput = document.getElementById(`pending-barcode-${id}`);

  if (!nameInput || !expiryInput || !barcodeInput) {
    alert('เกิดข้อผิดพลาดในการอ่านข้อมูล กรุณาลองใหม่อีกครั้ง');
    return;
  }

  const name = nameInput.value.trim();
  const expiryDate = expiryInput.value;
  let barcode = barcodeInput.value.trim();

  if (!name || !expiryDate) {
    alert('กรุณาใส่ชื่อสินค้าและวันหมดอายุให้ครบก่อนอนุมัติ');
    return;
  }
  
  if (!barcode) barcode = `REQ${String(Date.now()).slice(-8)}`;

  const existingIndex = products.findIndex((p) => p.barcode === barcode);
  
  if (existingIndex !== -1) {
    products[existingIndex].expiryDate = expiryDate;
    products[existingIndex].name = name;
    products[existingIndex].notes = 'อัปเดตวันหมดอายุจากการอนุมัติคำขอ';
  } else {
    const newId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;
    products.push({
      id: newId, barcode, name, category: '',
      imageUrl: item.imageUrl || '',
      expiryDate, notes: 'อนุมัติจากคำขอของผู้ใช้งาน', addedDate: new Date().toISOString(),
    });
  }
  
  saveProducts(products);
  pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
  savePending(pendingSubmissions);
  
  closeModal();
  refreshCurrentTabData();
}

function rejectPending(id) {
  pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
  savePending(pendingSubmissions);
  refreshCurrentTabData();
}

// ==================== Calendar ====================
function toDateKey(y, m, d) { return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }

function calendarHTML() {
  return `
    <div class="space-y-4 pb-2">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">🗓️</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">ปฏิทินวันหมดอายุ</h1>
          <p class="text-xs text-stone-400">แตะวันที่เพื่อดูสินค้าที่หมดอายุในวันนั้น</p>
        </div>
      </header>
      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60" id="calendar-card">${calendarCardHTML()}</div>
      <div id="calendar-day-list">${calendarDayListHTML()}</div>
    </div>`;
}

function monthSummary(year, month) {
  const prefix = `${year}-${String(month).padStart(2, '0')}-`;
  const summary = {};
  products.forEach((p) => { if (p.expiryDate.startsWith(prefix)) summary[p.expiryDate] = { status: getStatus(p.expiryDate) }; });
  return summary;
}

function calendarCardHTML() {
  const { year, month } = state.cal;
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = Array.from({ length: firstDay }, () => null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const today = new Date();
  const todayKey = toDateKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
  const summary = monthSummary(year, month);
  const dotColor = { expired: 'bg-red-500', urgent: 'bg-amber-500', safe: 'bg-brand-500' };

  return `
    <div class="mb-3 flex items-center justify-between">
      <button onclick="goToMonth(-1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">‹</button>
      <p class="text-sm font-semibold text-stone-700">${MONTHS_TH[month - 1]} ${year + 543}</p>
      <button onclick="goToMonth(1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">›</button>
    </div>
    <div class="grid grid-cols-7 gap-1 text-center">
      ${WEEKDAYS_TH.map((wd) => `<span class="text-[11px] font-medium text-stone-400">${wd}</span>`).join('')}
      ${cells.map((day) => {
        if (day === null) return '<span></span>';
        const key = toDateKey(year, month, day);
        const info = summary[key];
        const isToday = key === todayKey;
        const isSelected = key === state.cal.selected;
        return `
          <button onclick="selectCalendarDay('${key}')" class="flex flex-col items-center gap-0.5 rounded-lg py-1.5 text-xs ${isSelected ? 'bg-brand-600 text-white' : isToday ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-stone-600'}">
            ${day}
            <span class="h-1.5 w-1.5 rounded-full ${info ? (isSelected ? 'bg-white' : dotColor[info.status]) : 'bg-transparent'}"></span>
          </button>`;
      }).join('')}
    </div>`;
}

function calendarDayListHTML() {
  if (!state.cal.selected) return '';
  const list = products.map(withComputed).filter((p) => p.expiryDate === state.cal.selected).sort((a, b) => a.name.localeCompare(b.name));
  return `
    <div class="space-y-2.5 mt-4">
      <p class="text-xs font-medium text-stone-500">สินค้าที่หมดอายุวันที่ ${state.cal.selected}</p>
      ${list.length === 0
        ? `<div class="rounded-2xl bg-white py-8 text-center shadow-card ring-1 ring-brand-100/60"><p class="text-sm text-stone-400">ไม่มีสินค้าหมดอายุในวันนี้</p></div>`
        : list.map((p) => productCardHTML(p)).join('')}
    </div>`;
}

function goToMonth(delta) {
  let m = state.cal.month + delta, y = state.cal.year;
  if (m > 12) { m = 1; y++; } else if (m < 1) { m = 12; y--; }
  state.cal.month = m; state.cal.year = y; state.cal.selected = null;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}
function selectCalendarDay(key) {
  state.cal.selected = key;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}

// ==================== Utilities & Export ====================
function exportCSV() {
  const headers = ['Barcode', 'Name', 'ExpiryDate', 'Status', 'DaysLeft', 'AddedDate'];
  const rows = products.map(withComputed).map(p => [p.barcode, p.name, p.expiryDate, STATUS_LABEL_TH[p.status], p.daysLeft, p.addedDate.slice(0,10)]);
  const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `rimping_expiry_report_${new Date().toISOString().slice(0,10)}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function backupJSON() {
  const data = { products, pendingSubmissions, version: '1.0', exportDate: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `rimping_backup_${new Date().toISOString().slice(0,10)}.json`;
  link.click();
}

function handleRestoreFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const data = JSON.parse(String(event.target.result));
      if (data && Array.isArray(data.products)) {
        pendingRestoreProducts = data.products;
        const panel = document.getElementById('restore-panel');
        panel.innerHTML = `
          <div class="mt-3 rounded-xl bg-amber-50 p-3 ring-1 ring-amber-100">
            <p class="text-xs font-bold text-amber-900">พบข้อมูลสินค้า ${data.products.length} รายการ</p>
            <p class="text-[10px] text-amber-700">ต้องการกู้คืนข้อมูลนี้ใช่หรือไม่? (ข้อมูลเดิมจะถูกแทนที่)</p>
            <div class="mt-2 flex gap-2">
              <button onclick="confirmRestore()" class="rounded-lg bg-amber-600 px-3 py-1 text-[10px] font-bold text-white">ตกลง</button>
              <button onclick="cancelRestore()" class="rounded-lg bg-stone-200 px-3 py-1 text-[10px] font-bold text-stone-600">ยกเลิก</button>
            </div>
          </div>`;
      } else { alert('รูปแบบไฟล์ไม่ถูกต้อง'); }
    } catch { alert('ไม่สามารถอ่านไฟล์ได้'); }
  };
  reader.readAsText(file);
}
function confirmRestore() {
  if (pendingRestoreProducts) {
    products = pendingRestoreProducts;
    saveProducts(products);
    pendingRestoreProducts = null;
    document.getElementById('restore-panel').innerHTML = '';
    refreshCurrentTabData();
    alert('กู้คืนข้อมูลสำเร็จ');
  }
}
function cancelRestore() {
  pendingRestoreProducts = null;
  document.getElementById('restore-panel').innerHTML = '';
  document.getElementById('restore-file-input').value = '';
}

// ==================== Modal helpers ====================
function openModal(html) {
  const root = document.getElementById('modal-root');
  root.innerHTML = html;
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  document.body.style.overflow = '';
}

// ==================== Start app ====================
renderPage();
</script>
</body>
</html>
