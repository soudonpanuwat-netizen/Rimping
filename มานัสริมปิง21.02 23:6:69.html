let products = [];

// ==================== ENHANCED VISUAL SEARCH ====================

/**
 * โหลดโมเดล MobileNet สำหรับการวิเคราะห์รูปภาพ
 */
function loadVisualSearchModel() {
  if (window.__mobilenetModel) return Promise.resolve(window.__mobilenetModel);
  if (window.__mobilenetLoadingPromise) return window.__mobilenetLoadingPromise;
  
  window.__mobilenetLoadingPromise = new Promise((resolve, reject) => {
    const tfScript = document.createElement('script');
    tfScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js';
    tfScript.onload = () => {
      const mnScript = document.createElement('script');
      mnScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js';
      mnScript.onload = async () => {
        try {
          const model = await mobilenet.load({ version: 2, alpha: 1.0 });
          window.__mobilenetModel = model;
          resolve(model);
        } catch (e) { reject(e); }
      };
      mnScript.onerror = () => reject(new Error('โหลดโมเดลไม่สำเร็จ'));
      document.head.appendChild(mnScript);
    };
    tfScript.onerror = () => reject(new Error('โหลด TensorFlow.js ไม่สำเร็จ'));
    document.head.appendChild(tfScript);
  });
  
  return window.__mobilenetLoadingPromise;
}

/**
 * โหลดรูปภาพจาก URL
 */
function loadImageElement(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('โหลดรูปไม่สำเร็จ'));
    img.src = src;
  });
}

/**
 * คำนวณ embedding (ลายนิ้วมือดิจิทัล) ของรูปภาพ
 */
async function computeImageEmbedding(imgEl) {
  const model = await loadVisualSearchModel();
  const t = model.infer(imgEl, true);
  const data = await t.data();
  t.dispose();
  return Array.from(data);
}

/**
 * คำนวณค่าความคล้ายคลึง (Cosine Similarity) ระหว่างสองรูป
 * ค่า 1.0 = เหมือนกันเป๊ะ, 0.0 = ต่างกันเป๊ะ
 */
function cosineSimilarity(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na += a[i] * a[i];
    nb += b[i] * b[i];
  }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-8);
}

/**
 * จัดอันดับความคล้ายคลึงและส่งคืนข้อมูลคะแนน
 */
function getMatchQuality(score) {
  if (score >= 0.75) return { label: 'ตรงเป๊ะ', color: 'match-score-excellent', emoji: '✅' };
  if (score >= 0.60) return { label: 'คล้ายมาก', color: 'match-score-good', emoji: '👍' };
  if (score >= 0.45) return { label: 'คล้ายพอสมควร', color: 'match-score-fair', emoji: '🤔' };
  return { label: 'คล้ายน้อย', color: 'match-score-poor', emoji: '❌' };
}

/**
 * ค้นหาสินค้าที่คล้ายกัน 3 อันดับแรก
 */
async function findSimilarProducts(queryEmbedding, minScore = 0.35) {
  const candidates = products.filter(p => !p.removed && p.imageUrl);
  let needsSave = false;
  const scored = [];
  
  for (const p of candidates) {
    let emb = p.imageEmbedding;
    
    // ถ้ายังไม่มี embedding ให้คำนวณ
    if (!emb || !emb.length) {
      try {
        const img = await loadImageElement(p.imageUrl);
        emb = await computeImageEmbedding(img);
        p.imageEmbedding = emb;
        needsSave = true;
      } catch (e) {
        console.error('Error computing embedding:', e);
        continue;
      }
    }
    
    const score = cosineSimilarity(queryEmbedding, emb);
    scored.push({
      product: p,
      score: score,
      quality: getMatchQuality(score)
    });
  }
  
  if (needsSave) {
    localStorage.setItem('rimping_products', JSON.stringify(products));
  }
  
  // เรียงลำดับจากคะแนนสูงสุด
  scored.sort((a, b) => b.score - a.score);
  
  // ส่งคืน 3 อันดับแรกที่มีคะแนนมากกว่า minScore
  return scored.slice(0, 3).filter(s => s.score > minScore);
}

/**
 * แสดงหน้าต่างความคืบหน้า
 */
function showVisualSearchProgress(text) {

  modal.innerHTML = `
    <div class="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 p-6">
      <div class="w-full max-w-xs rounded-3xl bg-white p-6 shadow-2xl text-center fx-fade-up">
        <div class="mx-auto h-10 w-10 animate-spin rounded-full border-4 border-stone-200 border-t-brand-600"></div>
        <p class="mt-4 text-sm font-bold text-stone-700">${text}</p>
        <p class="mt-1 text-xs text-stone-400">ครั้งแรกอาจใช้เวลาสักครู่ ครั้งต่อไปจะเร็วขึ้น</p>
        <button onclick="cancelVisualSearch()" class="mt-4 text-xs font-bold text-stone-400 underline">ยกเลิก</button>
      </div>
    </div>
  `;
}

/**
 * ยกเลิกการค้นหา
 */
function cancelVisualSearch() {
  state.visualSearchCancelled = true;
  closeModal();
}

/**
 * แสดงผลการค้นหา (Top 3 matches)
 */
function showVisualSearchResults(matches) {

      <p class="text-xs text-stone-400 mt-1">ลองถ่ายรูปใหม่ให้ชัดและสว่างขึ้น หรือใช้วิธีเพิ่มด้วยชื่อแทน</p>
    </div>
  `;
  
  const resultsHtml = matches.map((m, idx) => `
    <div class="rounded-2xl bg-stone-50 overflow-hidden ring-1 ring-stone-100 hover:ring-brand-300 transition-all">
      <div class="flex gap-3 p-3">
        <!-- รูปภาพ -->
        <div class="h-16 w-16 shrink-0 overflow-hidden rounded-xl bg-stone-100">
          <img src="${m.product.imageUrl}" class="h-full w-full object-cover" />
        </div>
        
        <!-- ข้อมูล -->
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0 flex-1">
              <p class="text-sm font-bold text-stone-800 truncate">${escapeHtml(truncateName(m.product.name))}</p>
              <p class="text-xs text-stone-500 mt-0.5">${m.product.barcode ? escapeHtml(m.product.barcode) : (m.product.plu ? `PLU ${m.product.plu}` : 'ไม่มีบาร์โค้ด')}</p>
            </div>
            <span class="shrink-0 text-lg">${m.quality.emoji}</span>
          </div>
          
          <!-- คะแนนความคล้ายคลึง -->
          <div class="mt-2 flex items-center gap-2">
            <div class="flex-1 h-1.5 bg-stone-200 rounded-full overflow-hidden">
              <div class="h-full bg-brand-600 rounded-full" style="width: ${Math.round(m.score * 100)}%"></div>
            </div>
            <span class="text-xs font-bold text-stone-600">${Math.round(m.score * 100)}%</span>
          </div>
          
          <!-- ป้ายคุณภาพ -->
          <div class="mt-2">
            <span class="inline-block px-2 py-1 rounded-full text-[10px] font-bold ${m.quality.color}">${m.quality.label}</span>
          </div>
        </div>
      </div>
      
      <!-- ปุ่มเลือก -->
      <button onclick="selectVisualSearchResult(${m.product.id})" class="w-full bg-brand-600 hover:bg-brand-700 text-white py-2 text-sm font-bold transition-colors">
        เลือกสินค้านี้
      </button>
    </div>
  `).join('');
  
  modal.innerHTML = `
    <div class="fixed inset-0 z-[200] flex items-end justify-center bg-black/60 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl overflow-y-auto max-h-[90vh] fx-fade-up">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold text-stone-800">📷 สินค้าที่คล้ายกัน</h3>
          <button onclick="closeModal()" class="text-stone-400 hover:text-stone-600">✕</button>
        </div>
        
        <p class="text-xs text-stone-500 mb-4">เลือกสินค้าที่ตรงที่สุด แล้วใส่แค่วันหมดอายุ</p>
        
        <div class="space-y-3">
          ${matches.length === 0 ? noResultsHtml : resultsHtml}
        </div>
        
        <button onclick="closeModal(); openManualAddByName();" class="mt-4 w-full rounded-2xl border border-stone-200 bg-white py-3 text-sm font-bold text-stone-600 hover:bg-stone-50 transition-colors">
          ไม่ตรงสักอัน — เพิ่มด้วยชื่อแทน
        </button>
      </div>
    </div>
  `;
}

/**
 * เลือกผลการค้นหา
 */
function selectVisualSearchResult(productId) {
  const product = products.find(p => p.id === productId);
  if (!product) return;
  
  closeModal();
  openQuickAddLotById(productId);
}

/**
 * จัดการไฟล์ที่เลือก
 */
async function handleVisualSearchFileSelected(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  
  state.visualSearchCancelled = false;
  showVisualSearchProgress('🔎 กำลังโหลดระบบจำรูปภาพ...');
  
  try {
    await loadVisualSearchModel();
    if (state.visualSearchCancelled) return;
    
    showVisualSearchProgress('📸 กำลังวิเคราะห์รูปที่ถ่าย...');
    
    const fileUrl = URL.createObjectURL(file);
    const capturedImg = await loadImageElement(fileUrl);
    const queryEmbedding = await computeImageEmbedding(capturedImg);
    URL.revokeObjectURL(fileUrl);
    
    if (state.visualSearchCancelled) return;
    
    showVisualSearchProgress('🔍 กำลังเทียบรูปภาพกับสินค้า...');
    
    const matches = await findSimilarProducts(queryEmbedding, 0.35);
    
    if (state.visualSearchCancelled) return;
    
    closeModal();
    showVisualSearchResults(matches);
  } catch (err) {
    console.error('Visual search error:', err);
    if (state.visualSearchCancelled) return;
    closeModal();
    alert('ค้นหาด้วยรูปภาพไม่สำเร็จ ลองใหม่ หรือตรวจสอบอินเทอร์เน็ต');
  }
}

/**
 * เปิดตัวเลือกไฟล์
 */
function triggerVisualSearch() {
  let input = document.getElementById('visual-search-file-input');
  if (!input) {
    input = document.createElement('input');
    input.id = 'visual-search-file-input';
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.className = 'hidden';
    input.addEventListener('change', handleVisualSearchFileSelected);
    document.body.appendChild(input);
  }
  input.click();
}

// ==================== UTILITY FUNCTIONS ====================
function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

function truncateName(name, maxLen = 25) {
  return name.length > maxLen ? name.substring(0, maxLen) + '...' : name;
}

function formatThaiDate(dateStr) {
  if (!dateStr) return '-';
  const date = new Date(dateStr + 'T00:00:00');
  const day = date.getDate();
  const month = date.getMonth() + 1;
  const year = date.getFullYear() + 543;
  return `${day}/${month}/${year}`;
}

// ==================== MODAL ====================
function openModal(html) {
  let modal = document.getElementById('modal-root');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modal-root';
    document.body.appendChild(modal);
  }
  modal.innerHTML = html;
}

function closeModal() {
  const modal = document.getElementById('modal-root');
  if (modal) modal.innerHTML = '';
}

// ==================== DEMO FUNCTIONS ====================
function openQuickAddLotById(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;
  
  alert(`✅ เลือก: ${product.name}\n\nตอนนี้ให้ใส่วันหมดอายุ (ในระบบจริงจะเปิด Quick Add Modal)`);
}

function openManualAddByName() {
  alert('เปิดหน้าเพิ่มสินค้าด้วยชื่อ (ในระบบจริง)');
}
