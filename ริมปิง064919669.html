<script>
'use strict';

// ==================== Constants ====================
const ADMIN_ID = '63042';
const ADMIN_PIN = '0898';
const URGENT_WINDOW_DAYS = 7;
const STORAGE_KEY = 'rimping_products_v1';
const PENDING_KEY = 'rimping_pending_v1';

const STATUS_LABEL_TH = { expired: 'หมดอายุแล้ว', urgent: 'เร่งด่วน', safe: 'ปลอดภัย' };
const STATUS_COLOR = { expired: '#dc2626', urgent: '#d97706', safe: '#059669' };

const WEEKDAYS_TH = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
const MONTHS_TH = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

const NAV_ITEMS = [
  { id: 'dashboard', label: 'หน้าแรก', emoji: '🏠' },
  { id: 'scanner', label: 'สแกน', emoji: '📷' },
  { id: 'calendar', label: 'ปฏิทิน', emoji: '🗓️' },
  { id: 'admin', label: 'แอดมิน', emoji: '🛠️' },
];

const FILTER_CHIPS = [
  { id: 'all', label: 'ทั้งหมด' },
  { id: 'expired', label: '🔴 หมดอายุแล้ว' },
  { id: 'urgent', label: '🟡 เร่งด่วน' },
  { id: 'safe', label: '🟢 ปลอดภัย' },
];

// ==================== State ====================
const state = {
  entered: false,
  isAdminSession: false,
  tab: 'dashboard',
  search: '',
  filter: 'all',
  cal: { year: new Date().getFullYear(), month: new Date().getMonth() + 1, selected: null },
  scanner: { scannedCode: null },
};

let html5QrCode = null;
let pendingLoginSuccess = null;
let pendingRestoreProducts = null;

// ==================== Storage ====================
function seedProducts() {
  const today = new Date();
  const offset = (days) => {
    const d = new Date(today);
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  };
  return [
    { id: 1, barcode: '8851234567890', name: 'นมสดพาสเจอร์ไรส์ 1 ลิตร', category: 'นม/ผลิตภัณฑ์นม', imageUrl: '', expiryDate: offset(-1), notes: 'หมดอายุแล้ว - ตัวอย่าง', addedDate: today.toISOString() },
    { id: 2, barcode: '8859012345671', name: 'ขนมปังโฮลวีต', category: 'เบเกอรี่', imageUrl: '', expiryDate: offset(2), notes: 'เร่งด่วน - ตัวอย่าง', addedDate: today.toISOString() },
    { id: 3, barcode: '40123456', name: 'โยเกิร์ตรสธรรมชาติ', category: 'นม/ผลิตภัณฑ์นม', imageUrl: '', expiryDate: offset(5), notes: '', addedDate: today.toISOString() },
    { id: 4, barcode: '8850999888771', name: 'ไข่ไก่เบอร์ 1 แพ็ค 10', category: 'ไข่', imageUrl: '', expiryDate: offset(14), notes: '', addedDate: today.toISOString() },
    { id: 5, barcode: 'CUST0001', name: 'ผักกาดขาวออร์แกนิก', category: 'ผัก/ผลไม้', imageUrl: '', expiryDate: offset(30), notes: 'บาร์โค้ดแบบกำหนดเอง', addedDate: today.toISOString() },
  ];
}

// บางเบราว์เซอร์/บางช่องทางเปิดไฟล์ (เช่น เปิดไฟล์ตรงๆแบบ file://, เปิดผ่าน
// in-app browser ของแอปแชท, หรือโหมดส่วนตัวบางรุ่น) จะบล็อกการเข้าถึง
// localStorage ทั้งหมด ฟังก์ชันด้านล่างนี้ช่วยให้แอปยังใช้งานได้ต่อไป
// (ข้อมูลจะอยู่ในความจำชั่วคราวระหว่างเปิดหน้านี้) แทนที่จะค้าง/พังเงียบๆ
let storageAvailable = true;
const memoryStore = {};

function safeStorageGet(key) {
  try {
    return localStorage.getItem(key);
  } catch {
    storageAvailable = false;
    return key in memoryStore ? memoryStore[key] : null;
  }
}
function safeStorageSet(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch {
    storageAvailable = false;
    memoryStore[key] = value;
  }
}

function loadProducts() {
  const raw = safeStorageGet(STORAGE_KEY);
  if (!raw) {
    const seeded = seedProducts();
    saveProducts(seeded);
    return seeded;
  }
  try {
    return JSON.parse(raw);
  } catch {
    return seedProducts();
  }
}
function saveProducts(list) { safeStorageSet(STORAGE_KEY, JSON.stringify(list)); }

function isAdmin() { return state.isAdminSession === true; }
function setAdmin(value) { state.isAdminSession = !!value; }

function loadPending() {
  const raw = safeStorageGet(PENDING_KEY);
  try {
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}
function savePending(list) { safeStorageSet(PENDING_KEY, JSON.stringify(list)); }

let products = loadProducts();
let pendingSubmissions = loadPending();

// ==================== Domain helpers ====================
function getStatus(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function formatThaiDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}
function computeStats() {
  const counts = { expired: 0, urgent: 0, safe: 0 };
  products.forEach((p) => counts[getStatus(p.expiryDate)]++);
  return counts;
}

function detectBarcodeType(raw) {
  const code = (raw ?? '').trim();
  if (/^\d{13}$/.test(code)) return 'EAN-13';
  if (/^\d{12}$/.test(code)) return 'UPC-A';
  if (/^\d{8}$/.test(code)) return 'EAN-8';
  if (/^[A-Za-z0-9]{4,}$/.test(code) && /[A-Za-z]/.test(code)) return 'CODE128';
  if (code.length >= 4) return 'CUSTOM';
  return 'INVALID';
}
function isValidBarcode(code) { return detectBarcodeType(code) !== 'INVALID'; }
const BARCODE_TYPE_LABEL_TH = {
  'EAN-13': 'EAN-13 (13 หลัก)', 'EAN-8': 'EAN-8 (8 หลัก)', 'UPC-A': 'UPC-A (12 หลัก)',
  CODE128: 'Code128', CUSTOM: 'บาร์โค้ดกำหนดเอง', INVALID: 'รูปแบบไม่ถูกต้อง',
};

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function playBeep() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1046;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.13);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.14);
    osc.onended = () => ctx.close();
  } catch { /* เบราว์เซอร์บล็อก autoplay เสียง - ไม่ต้องทำอะไร */ }
}

// ==================== Shared UI pieces ====================
function basketIconSVG(size, color, strokeWidth) {
  size = size || 24; color = color || '#047857'; strokeWidth = strokeWidth || 2;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z"/>
      <path d="M9 9V6.5a3 3 0 0 1 6 0V9"/>
      <path d="M9.5 13v3.2"/>
      <path d="M12 13v3.2"/>
      <path d="M14.5 13v3.2"/>
    </svg>`;
}
function basketFilledSVG(size, color) {
  size = size || 24; color = color || '#047857';
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}">
      <path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z" />
      <path d="M9 9V6.5a3 3 0 0 1 6 0V9h-1.6V6.5a1.4 1.4 0 0 0-2.8 0V9H9Z" />
    </svg>`;
}

function freshnessRingSVG(daysLeft, status, size) {
  size = size || 64;
  const stroke = 6;
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const ratio = status === 'expired' ? 0 : Math.min(Math.max(daysLeft, 0), 30) / 30;
  const dashOffset = circumference * (1 - ratio);
  const color = STATUS_COLOR[status];
  const c = size / 2;
  return `
    <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
      <svg width="${size}" height="${size}" class="-rotate-90">
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="#e3efe7" stroke-width="${stroke}" fill="none" />
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none"
          stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
          style="transition: stroke-dashoffset .4s ease;" />
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-xl font-extrabold leading-none" style="color:${color}">${status === 'expired' ? '!' : daysLeft}</span>
        ${status !== 'expired' ? '<span class="text-[10px] font-semibold text-stone-500">วัน</span>' : ''}
      </div>
    </div>`;
}

function statusBadgeHTML(status) {
  const styles = {
    expired: 'bg-red-50 text-red-600 ring-1 ring-red-200',
    urgent: 'bg-amber-50 text-amber-600 ring-1 ring-amber-200',
    safe: 'bg-brand-50 text-brand-700 ring-1 ring-brand-200',
  };
  return `<span class="rounded-full px-2.5 py-0.5 text-xs font-semibold ${styles[status]}">${STATUS_LABEL_TH[status]}</span>`;
}

function productThumbHTML(p, size) {
  size = size || 64;
  if (p.imageUrl) {
    const badgeText = p.status === 'expired' ? 'หมดอายุ' : `${p.daysLeft} วัน`;
    return `
      <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
        <img src="${p.imageUrl}" class="h-full w-full rounded-2xl object-cover ring-1 ring-brand-100" />
        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-full border-2 border-white px-2 py-0.5 text-[10px] font-extrabold text-white shadow-sm" style="background-color:${STATUS_COLOR[p.status]}">${badgeText}</span>
      </div>`;
  }
  return freshnessRingSVG(p.daysLeft, p.status, size);
}

function statCardHTML(label, count, colorClass, active, onclickAttr) {
  return `
    <button onclick="${onclickAttr}" class="flex flex-1 flex-col items-start gap-1 rounded-2xl px-3 py-3 text-left ring-1 transition-all ${colorClass} ${active ? 'scale-[1.02] shadow-card ring-2' : 'ring-1'}">
      <span class="text-2xl font-bold leading-none">${count}</span>
      <span class="text-xs font-medium opacity-80">${label}</span>
    </button>`;
}

function productCardHTML(p, opts) {
  opts = opts || {};
  const showActions = !!opts.showActions;
  return `
    <div class="flex items-center gap-3 rounded-2xl bg-white p-3 shadow-card ring-1 ring-brand-100/60">
      ${productThumbHTML(p)}
      <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
          <p class="truncate text-sm font-semibold text-stone-800">${escapeHtml(p.name)}</p>
          ${statusBadgeHTML(p.status)}
        </div>
        <p class="mt-0.5 truncate text-xs text-stone-400">${p.category ? escapeHtml(p.category) + ' · ' : ''}${escapeHtml(p.barcode)}</p>
        <p class="mt-1 text-xs text-stone-500">หมดอายุ ${formatThaiDate(p.expiryDate)}</p>
      </div>
      ${showActions ? `
        <div class="flex shrink-0 flex-col gap-1.5">
          <button onclick="openProductForm(${p.id})" class="rounded-full bg-brand-50 p-1.5 text-brand-700 active:scale-95" aria-label="แก้ไข">✏️</button>
          <button onclick="confirmDeleteProduct(${p.id})" class="rounded-full bg-red-50 p-1.5 text-red-600 active:scale-95" aria-label="ลบ">🗑️</button>
        </div>` : ''}
    </div>`;
}

function bottomNavHTML() {
  const stats = computeStats();
  return `
    <nav id="bottom-nav" class="fixed inset-x-0 bottom-0 z-20 border-t border-brand-100 bg-white/95 backdrop-blur-sm">
      <div class="mx-auto flex max-w-md items-stretch justify-between px-2" style="padding-bottom: env(safe-area-inset-bottom);">
        ${NAV_ITEMS.map((item) => {
          const isActive = state.tab === item.id;
          let badge = '';
          if (item.id === 'scanner' && stats.urgent > 0) {
            badge = `<span class="absolute -right-2 -top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-amber-500 px-1 text-[10px] font-bold text-white">${stats.urgent > 9 ? '9+' : stats.urgent}</span>`;
          }
          if (item.id === 'admin' && isAdmin() && pendingSubmissions.length > 0) {
            badge = `<span class="absolute -right-2 -top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-sky-500 px-1 text-[10px] font-bold text-white">${pendingSubmissions.length > 9 ? '9+' : pendingSubmissions.length}</span>`;
          }
          return `
            <button onclick="setTab('${item.id}')" class="relative flex flex-1 flex-col items-center gap-1 py-2.5 text-xs font-medium transition-colors ${isActive ? 'text-brand-600' : 'text-stone-400'}">
              <span class="relative text-[20px] leading-none">${item.emoji}${badge}</span>
              ${item.label}
            </button>`;
        }).join('')}
      </div>
    </nav>`;
}

// ==================== Modal helpers ====================
function openModal(html) { document.getElementById('modal-root').innerHTML = html; }
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

function refreshCurrentTabData() {
  const nav = document.querySelector('#bottom-nav');
  if (nav) nav.outerHTML = bottomNavHTML();
  renderPage();
}

// ==================== Landing / entry page ====================
function landingHTML() {
  return `
    <div class="relative min-h-screen overflow-hidden bg-gradient-to-br from-brand-800 via-brand-700 to-brand-900 flex flex-col items-center justify-center px-6 text-center">
      <div class="pointer-events-none absolute -top-12 -left-14 opacity-20 blur-2xl">${basketFilledSVG(220, '#ffffff')}</div>
      <div class="pointer-events-none absolute top-1/4 -right-16 opacity-15 blur-3xl" style="transform: rotate(15deg);">${basketFilledSVG(260, '#bbf7d6')}</div>
      <div class="pointer-events-none absolute bottom-0 left-1/4 opacity-10 blur-2xl">${basketFilledSVG(200, '#ffffff')}</div>
      <div class="pointer-events-none absolute bottom-10 -right-10 opacity-15 blur-2xl" style="transform: rotate(-10deg);">${basketFilledSVG(180, '#bbf7d6')}</div>
      <div class="pointer-events-none absolute top-10 left-1/3 opacity-10 blur-2xl" style="transform: rotate(8deg);">${basketFilledSVG(140, '#ffffff')}</div>

      <div class="relative z-10 flex flex-col items-center">
        <div class="flex h-24 w-24 items-center justify-center rounded-3xl bg-white shadow-2xl">
          ${basketIconSVG(48, '#047857', 2)}
        </div>
        <h1 class="mt-6 text-2xl font-bold text-white">Rimping Expiry Tracker</h1>
        <p class="mt-2 max-w-xs text-sm text-brand-100">ระบบติดตามวันหมดอายุสินค้า สำหรับพนักงาน Rimping Supermarket</p>

        <button onclick="enterApp()" class="mt-10 w-64 rounded-2xl bg-white py-3 text-sm font-bold text-brand-700 shadow-xl active:scale-95">
          เข้าใช้งาน
        </button>
        <button onclick="landingAdminLogin()" class="mt-5 inline-flex items-center justify-center rounded-full bg-white/10 px-6 py-2.5 text-sm font-semibold text-white backdrop-blur-sm ring-1 ring-white/30 transition-colors active:scale-95 active:bg-white/20">
          เข้าสู่ระบบแอดมิน
        </button>
      </div>
    </div>`;
}

function enterApp() {
  state.entered = true;
  state.tab = 'dashboard';
  render();
}

function landingAdminLogin() {
  openAdminLogin(() => {
    state.entered = true;
    state.tab = 'admin';
    render();
  });
}

// ==================== Root render ====================
function render() {
  const app = document.getElementById('app');
  if (!state.entered) {
    app.innerHTML = landingHTML();
    return;
  }
  app.innerHTML = `
    <div class="min-h-screen bg-brand-50 pb-24 font-sans text-stone-800">
      ${!storageAvailable ? `
        <div class="bg-amber-500 px-4 py-2 text-center text-xs font-semibold text-white">
          ⚠️ เบราว์เซอร์นี้ไม่อนุญาตให้บันทึกข้อมูลถาวร การเปลี่ยนแปลงจะหายไปเมื่อปิดหน้านี้ — ลองเปิดผ่าน Chrome/Safari ปกติ (ไม่ใช่ในแอปแชท) แทน
        </div>` : ''}
      <main class="mx-auto max-w-md px-4 pt-6" id="main"></main>
    </div>
    ${bottomNavHTML()}
  `;
  renderPage();
}

function renderPage() {
  const main = document.getElementById('main');
  if (state.tab === 'dashboard') { main.innerHTML = dashboardHTML(); initDashboard(); }
  if (state.tab === 'scanner') { main.innerHTML = scannerHTML(); initScanner(); }
  if (state.tab === 'calendar') { main.innerHTML = calendarHTML(); }
  if (state.tab === 'admin') { main.innerHTML = adminHTML(); }
}

function setTab(tab) {
  if (state.tab === 'scanner' && tab !== 'scanner') stopScanner();
  state.tab = tab;
  render();
}

// ==================== Dashboard ====================
function dashboardHTML() {
  return `
    <div class="space-y-4">
      <header class="flex items-center gap-2">
        <span class="flex items-center justify-center rounded-xl bg-brand-700 p-2">${basketIconSVG(20, '#ffffff', 2)}</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">Rimping Expiry Tracker</h1>
          <p class="text-xs text-stone-400">ตรวจสอบวันหมดอายุสินค้าได้ในที่เดียว</p>
        </div>
      </header>
      <div class="grid grid-cols-3 gap-2" id="stat-cards">${statCardsHTML()}</div>
      <div class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400">🔍</span>
        <input id="search-input" placeholder="ค้นหาชื่อสินค้าหรือบาร์โค้ด..." class="w-full rounded-xl border border-stone-200 bg-white py-2.5 pl-9 pr-3 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
      </div>
      <div id="filter-chips" class="no-scrollbar -mx-1 flex gap-2 overflow-x-auto px-1">${filterChipsHTML()}</div>
      <div id="product-list" class="space-y-2.5">${productListHTML()}</div>
    </div>`;
}

function statCardsHTML() {
  const stats = computeStats();
  return `
    ${statCardHTML('หมดอายุแล้ว', stats.expired, 'bg-red-50 text-red-600 ring-red-200', state.filter === 'expired', "setFilter('expired')")}
    ${statCardHTML('เร่งด่วน', stats.urgent, 'bg-amber-50 text-amber-600 ring-amber-200', state.filter === 'urgent', "setFilter('urgent')")}
    ${statCardHTML('ปลอดภัย', stats.safe, 'bg-brand-50 text-brand-700 ring-brand-200', state.filter === 'safe', "setFilter('safe')")}
  `;
}

function filterChipsHTML() {
  return FILTER_CHIPS.map((chip) => `
    <button onclick="setFilter('${chip.id}', true)" class="shrink-0 rounded-full px-3 py-1.5 text-xs font-medium transition-colors ${state.filter === chip.id ? 'bg-brand-600 text-white' : 'bg-white text-stone-500 ring-1 ring-stone-200'}">${chip.label}</button>
  `).join('');
}

function getFilteredProducts() {
  const search = state.search.trim().toLowerCase();
  let list = products.map(withComputed);
  if (search) list = list.filter((p) => p.name.toLowerCase().includes(search) || p.barcode.toLowerCase().includes(search));
  if (state.filter !== 'all') list = list.filter((p) => p.status === state.filter);
  list.sort((a, b) => a.expiryDate.localeCompare(b.expiryDate) || a.name.localeCompare(b.name));
  return list;
}

function productListHTML() {
  const list = getFilteredProducts();
  if (list.length === 0) {
    return `
      <div class="rounded-2xl bg-white py-10 text-center shadow-card ring-1 ring-brand-100/60">
        <p class="text-sm font-medium text-stone-500">ไม่พบสินค้าตามเงื่อนไขนี้</p>
        <p class="mt-1 text-xs text-stone-400">ลองเปลี่ยนคำค้นหาหรือตัวกรองสถานะ</p>
      </div>`;
  }
  return list.map((p) => productCardHTML(p)).join('');
}

function initDashboard() {
  const input = document.getElementById('search-input');
  input.value = state.search;
  input.addEventListener('input', (e) => {
    state.search = e.target.value;
    document.getElementById('product-list').innerHTML = productListHTML();
  });
}

function setFilter(filterId, fromChip) {
  state.filter = fromChip ? filterId : (state.filter === filterId ? 'all' : filterId);
  document.getElementById('stat-cards').innerHTML = statCardsHTML();
  document.getElementById('filter-chips').innerHTML = filterChipsHTML();
  document.getElementById('product-list').innerHTML = productListHTML();
}

// ==================== Scanner ====================
function scannerHTML() {
  return `
    <div class="space-y-4 pb-2">

        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">📷</span>

      <div class="relative overflow-hidden rounded-2xl bg-black shadow-card" style="aspect-ratio: 4/3;">

      <input id="scan-image-input" type="file" accept="image/*" class="hidden" onchange="handleScanImageFile(event)" />

      <button onclick="openNoBarcodeFlow()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-white py-3 text-sm font-semibold text-brand-700 shadow-card ring-1 ring-brand-200 active:scale-95">

      </button>

      ${!isAdmin() ? `
        <button onclick="openSubmissionModal()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-sky-600 py-3 text-sm font-semibold text-white shadow-card active:scale-95">
          📋 ไม่พบสินค้าที่ต้องการ? แจ้งเพิ่มสินค้าใหม่
        </button>` : ''}

}

function initScanner() {
  document.getElementById('manual-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = document.getElementById('manual-input').value.trim();
    if (code) handleScanResult(code);
  });
  startScanner();
}

function handleScanImageFile(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const resultEl = document.getElementById('scan-result');
  if (resultEl) {
    resultEl.innerHTML = `<div class="rounded-2xl bg-white p-4 text-center text-xs text-stone-400 shadow-card ring-1 ring-brand-100/60">กำลังอ่านบาร์โค้ดจากรูปภาพ...</div>`;
  }
  if (!window.Html5Qrcode) {
    if (resultEl) resultEl.innerHTML = `<p class="text-xs text-red-600">ไม่พบไลบรารีสแกน กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p>`;
    return;
  }
  const fileScanner = new Html5Qrcode('file-scan-temp');
  fileScanner
    .scanFile(file, false)
    .then((decodedText) => {
      playBeep();
      handleScanResult(decodedText);
      try { fileScanner.clear(); } catch {}
    })
    .catch(() => {
      if (resultEl) {
        resultEl.innerHTML = `
          <div class="rounded-2xl bg-white p-4 text-center shadow-card ring-1 ring-brand-100/60">
            <p class="text-xs text-red-600">ไม่พบบาร์โค้ดในรูปภาพนี้</p>
            <p class="mt-1 text-[11px] text-stone-400">ลองรูปอื่น หรือพิมพ์บาร์โค้ดด้วยตนเองด้านล่าง</p>
          </div>`;
      }
      try { fileScanner.clear(); } catch {}
    });
}

function startScanner() {
  if (!window.Html5Qrcode) {
    const statusEl = document.getElementById('camera-status');
    if (statusEl) statusEl.textContent = 'ไม่พบไลบรารีกล้อง (ต้องต่ออินเทอร์เน็ตเพื่อโหลด html5-qrcode)';
    return;
  }
  html5QrCode = new Html5Qrcode('qr-reader');
  html5QrCode
    .start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => { playBeep(); handleScanResult(decodedText); },
      () => { /* ไม่เจอบาร์โค้ดในเฟรมนี้ - ไม่ต้องทำอะไร */ },
    )
    .then(() => {
      const statusEl = document.getElementById('camera-status');
      if (statusEl) statusEl.remove();
      const frame = document.getElementById('camera-frame');
      if (frame) frame.classList.remove('hidden');
    })
    .catch((err) => {
      console.error(err);
      const statusEl = document.getElementById('camera-status');
      if (statusEl) {
        statusEl.innerHTML = `
          <div class="flex flex-col items-center gap-2 px-6 text-center">
            <span class="text-2xl">📵</span>
            <span>ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้กล้อง หรือกรอกบาร์โค้ดด้วยตนเองด้านล่าง<br><span class="text-[10px] text-white/50">(กล้องต้องเปิดผ่าน HTTPS หรือ localhost)</span></span>
          </div>`;
      }
    });
}

function stopScanner() {
  if (html5QrCode) {
    const instance = html5QrCode;
    html5QrCode = null;
    instance.stop().catch(() => {}).finally(() => { try { instance.clear(); } catch {} });
  }
}

function handleScanResult(code) {
  state.scanner.scannedCode = code;
  const matches = products.map(withComputed).filter((p) => p.barcode === code);
  const type = detectBarcodeType(code);
  const resultEl = document.getElementById('scan-result');
  if (!resultEl) return;

  const addMoreLabel = matches.length > 0 ? 'เพิ่มอีกชุด (วันหมดอายุอื่น)' : 'เพิ่มสินค้าใหม่จากบาร์โค้ดนี้';
  const submitMoreLabel = matches.length > 0 ? 'แจ้งเพิ่มสินค้าชุดใหม่ (วันหมดอายุอื่น)' : 'แจ้งเพิ่มสินค้าใหม่';
  const action = isAdmin()
    ? `<button onclick="handleAddFromScanCurrent()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white active:scale-95">➕ ${addMoreLabel}</button>`
    : `<button onclick="openSubmissionModal()" class="flex w-full items-center justify-center gap-2 rounded-xl bg-sky-600 py-2.5 text-sm font-semibold text-white active:scale-95">📋 ${submitMoreLabel}</button>`;

  resultEl.innerHTML = `
    <div class="space-y-3 rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
      <div class="flex items-center justify-between">
        <p class="text-sm font-semibold text-stone-700">บาร์โค้ด: ${escapeHtml(code)}</p>
        <span class="rounded-full px-2 py-0.5 text-[11px] font-semibold ${isValidBarcode(code) ? 'bg-brand-50 text-brand-700' : 'bg-red-50 text-red-600'}">${BARCODE_TYPE_LABEL_TH[type]}</span>
      </div>
      ${matches.length > 1 ? `<p class="text-xs text-stone-400">พบสินค้านี้ในระบบ ${matches.length} ชุด (คนละวันหมดอายุ)</p>` : ''}
      ${matches.length > 0
        ? `<div class="space-y-2">${matches.map((p) => productCardHTML(p, { showActions: isAdmin() })).join('')}</div>`
        : `<p class="text-xs text-stone-400">ไม่พบสินค้านี้ในระบบ</p>`}
      ${action}
    </div>`;
}

function handleAddFromScanCurrent() {
  const code = state.scanner.scannedCode;
  if (isAdmin()) openProductForm(null, code);
  else openAdminLogin(() => openProductForm(null, code));
}

// ==================== Public submission (pending admin approval) ====================
function openSubmissionModal() {
  const prefillBarcode = state.scanner.scannedCode || '';
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 sm:items-center sm:p-4">
      <div class="max-h-[92vh] w-full max-w-md overflow-y-auto rounded-t-2xl bg-white p-5 sm:rounded-2xl">
        <div class="flex items-center justify-between">
          <h3 class="text-base font-bold text-stone-800">📋 แจ้งเพิ่มสินค้าใหม่</h3>
          <button onclick="closeModal()" class="text-stone-400">✕</button>
        </div>
        <p class="mt-1 text-xs text-stone-400">ถ่ายรูปหน้า-หลังสินค้า และใส่วันหมดอายุ ไม่ต้องพิมพ์ชื่อเอง แอดมินจะดูจากรูปแล้วใส่ชื่อให้ เมื่ออนุมัติแล้วจะเข้าระบบทันที</p>

        <form id="submission-form" class="mt-4 space-y-3">
          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">1) รูปหน้าสินค้า *</label>
            <label class="flex flex-col items-center justify-center gap-1 rounded-xl border-2 border-dashed border-sky-200 bg-sky-50/50 py-4 text-sky-700 cursor-pointer">
              <div id="submission-product-preview"><span class="text-2xl">📷</span><span class="text-xs font-medium block mt-1">ถ่ายรูปหรือเลือกรูปหน้าสินค้า</span></div>
              <input id="submission-product-image" type="file" accept="image/*" class="hidden" />
            </label>
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">2) รูปหลังสินค้า *</label>
            <label class="flex flex-col items-center justify-center gap-1 rounded-xl border-2 border-dashed border-sky-200 bg-sky-50/50 py-4 text-sky-700 cursor-pointer">
              <div id="submission-back-preview"><span class="text-2xl">📷</span><span class="text-xs font-medium block mt-1">ถ่ายรูปหรือเลือกรูปหลังสินค้า</span></div>
              <input id="submission-back-image" type="file" accept="image/*" class="hidden" />
            </label>
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">3) วันหมดอายุ *</label>
            <input id="submission-expiry" required type="date" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-100" />
          </div>

          <p id="submission-error" class="hidden text-xs font-medium text-red-600"></p>

          <button type="submit" class="w-full rounded-xl bg-sky-600 py-2.5 text-sm font-semibold text-white active:scale-95">ส่งคำขอให้แอดมินอนุมัติ</button>
        </form>
      </div>
    </div>
  `);

  let productImageData = '';
  let backImageData = '';

  document.getElementById('submission-product-image').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      productImageData = String(reader.result);
      document.getElementById('submission-product-preview').innerHTML = `<img src="${productImageData}" class="h-28 w-28 rounded-lg object-cover" />`;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('submission-back-image').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      backImageData = String(reader.result);
      document.getElementById('submission-back-preview').innerHTML = `<img src="${backImageData}" class="h-28 w-28 rounded-lg object-cover" />`;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('submission-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const errEl = document.getElementById('submission-error');
    const expiryDate = document.getElementById('submission-expiry').value;

    if (!productImageData || !backImageData) {
      errEl.textContent = 'กรุณาถ่ายรูปให้ครบทั้ง 2 รูป (รูปหน้า และรูปหลังสินค้า)';
      errEl.classList.remove('hidden');
      return;
    }
    if (!expiryDate) {
      errEl.textContent = 'กรุณาเลือกวันหมดอายุ';
      errEl.classList.remove('hidden');
      return;
    }

    const newPending = {
      id: pendingSubmissions.length > 0 ? Math.max(...pendingSubmissions.map((p) => p.id)) + 1 : 1,
      barcode: prefillBarcode,
      productPhoto: productImageData,
      backPhoto: backImageData,
      expiryDate,
      submittedAt: new Date().toISOString(),
    };
    pendingSubmissions.push(newPending);
    savePending(pendingSubmissions);
    state.scanner.scannedCode = null;
    showSubmissionSuccess();
    refreshCurrentTabData();
  });
}

function showSubmissionSuccess() {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-6 text-center shadow-xl">
        <p class="text-3xl">✅</p>

        <p class="mt-1 text-sm text-stone-500">ขอบคุณ! รอแอดมินตรวจสอบและอนุมัติ เมื่ออนุมัติแล้วสินค้าจะเข้าระบบทันที</p>
        <button onclick="closeModal()" class="mt-4 w-full rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white active:scale-95">ปิด</button>
      </div>

}

// ==================== สินค้าไม่มีบาร์โค้ด (เพิ่มด้วยชื่อ + รูป + วันหมดอายุ) ====================
function generateNoBarcodeCode() {
  let code;
  do {
    code = `NB${Date.now()}${Math.floor(Math.random() * 100)}`;
  } while (products.some((p) => p.barcode === code));
  return code;
}

function openNoBarcodeFlow() {
  if (isAdmin()) openNoBarcodeProductForm();
  else openNoBarcodeSubmissionModal();
}

function viewPendingPhoto(id, which) {
  const item = pendingSubmissions.find((p) => p.id === id);

  if (!src) return;
  openModal(`
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4" onclick="closeModal()">
      <img src="${src}" class="max-h-full max-w-full rounded-lg object-contain" />

function approvePending(id) {
  const item = pendingSubmissions.find((p) => p.id === id);
  if (!item) return;

  const name = document.getElementById(`pending-name-${id}`).value.trim();
  const expiryDate = document.getElementById(`pending-expiry-${id}`).value;
  let barcode = document.getElementById(`pending-barcode-${id}`).value.trim();

  if (!name || !expiryDate) {
    alert('กรุณาดูรูปแล้วใส่ชื่อสินค้าและวันหมดอายุให้ครบก่อนอนุมัติ');
    return;
  }
  if (!barcode) barcode = `REQ${String(Date.now()).slice(-8)}`;
  if (products.some((p) => p.barcode === barcode && p.expiryDate === expiryDate)) {
    alert('สินค้าบาร์โค้ดนี้กับวันหมดอายุนี้มีอยู่ในระบบแล้ว ไม่ต้องเพิ่มซ้ำค่ะ');
    return;
  }

  const newId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;
  products.push({
    id: newId, barcode, name, category: '',
    imageUrl: item.productPhoto || item.imageUrl || '',
    expiryDate, notes: 'อนุมัติจากคำขอของผู้ใช้งาน', addedDate: new Date().toISOString(),
  });
  saveProducts(products);

  pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
  savePending(pendingSubmissions);
  refreshCurrentTabData();
}

function rejectPending(id) {
  pendingSubmissions = pendingSubmissions.filter((p) => p.id !== id);
  savePending(pendingSubmissions);
  refreshCurrentTabData();
}

// ==================== Calendar ====================
function toDateKey(y, m, d) { return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }

function calendarHTML() {
  return `
    <div class="space-y-4 pb-2">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">🗓️</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">ปฏิทินวันหมดอายุ</h1>
          <p class="text-xs text-stone-400">แตะวันที่เพื่อดูสินค้าที่หมดอายุในวันนั้น</p>
        </div>
      </header>
      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60" id="calendar-card">${calendarCardHTML()}</div>
      <div id="calendar-day-list">${calendarDayListHTML()}</div>
    </div>`;
}

function monthSummary(year, month) {
  const prefix = `${year}-${String(month).padStart(2, '0')}-`;
  const summary = {};
  products.forEach((p) => { if (p.expiryDate.startsWith(prefix)) summary[p.expiryDate] = { status: getStatus(p.expiryDate) }; });
  return summary;
}

function calendarCardHTML() {
  const { year, month } = state.cal;
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = Array.from({ length: firstDay }, () => null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const today = new Date();
  const todayKey = toDateKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
  const summary = monthSummary(year, month);
  const dotColor = { expired: 'bg-red-500', urgent: 'bg-amber-500', safe: 'bg-brand-500' };

  return `
    <div class="mb-3 flex items-center justify-between">
      <button onclick="goToMonth(-1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">‹</button>
      <p class="text-sm font-semibold text-stone-700">${MONTHS_TH[month - 1]} ${year + 543}</p>
      <button onclick="goToMonth(1)" class="rounded-full p-1.5 text-stone-400 active:bg-stone-100">›</button>
    </div>
    <div class="grid grid-cols-7 gap-1 text-center">
      ${WEEKDAYS_TH.map((wd) => `<span class="text-[11px] font-medium text-stone-400">${wd}</span>`).join('')}
      ${cells.map((day) => {
        if (day === null) return '<span></span>';
        const key = toDateKey(year, month, day);
        const info = summary[key];
        const isToday = key === todayKey;
        const isSelected = key === state.cal.selected;
        return `
          <button onclick="selectCalendarDay('${key}')" class="flex flex-col items-center gap-0.5 rounded-lg py-1.5 text-xs ${isSelected ? 'bg-brand-600 text-white' : isToday ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-stone-600'}">
            ${day}
            <span class="h-1.5 w-1.5 rounded-full ${info ? (isSelected ? 'bg-white' : dotColor[info.status]) : 'bg-transparent'}"></span>
          </button>`;
      }).join('')}
    </div>`;
}

function calendarDayListHTML() {
  if (!state.cal.selected) return '';
  const list = products.map(withComputed).filter((p) => p.expiryDate === state.cal.selected).sort((a, b) => a.name.localeCompare(b.name));
  return `
    <div class="space-y-2.5 mt-4">
      <p class="text-xs font-medium text-stone-500">สินค้าที่หมดอายุวันที่ ${state.cal.selected}</p>
      ${list.length === 0
        ? `<div class="rounded-2xl bg-white py-8 text-center shadow-card ring-1 ring-brand-100/60"><p class="text-sm text-stone-400">ไม่มีสินค้าหมดอายุในวันนี้</p></div>`
        : list.map((p) => productCardHTML(p)).join('')}
    </div>`;
}

function goToMonth(delta) {
  let m = state.cal.month + delta, y = state.cal.year;
  if (m > 12) { m = 1; y++; } else if (m < 1) { m = 12; y--; }
  state.cal.month = m; state.cal.year = y; state.cal.selected = null;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}
function selectCalendarDay(key) {
  state.cal.selected = key;
  document.getElementById('calendar-card').innerHTML = calendarCardHTML();
  document.getElementById('calendar-day-list').innerHTML = calendarDayListHTML();
}

  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 sm:items-center sm:p-4">
      <div class="max-h-[92vh] w-full max-w-md overflow-y-auto rounded-t-2xl bg-white p-5 sm:rounded-2xl">
        <div class="flex items-center justify-between">
          <h3 class="text-base font-bold text-stone-800">${initial ? 'แก้ไขสินค้า' : 'เพิ่มสินค้าใหม่'}</h3>
          <button onclick="closeModal()" class="text-stone-400">✕</button>
        </div>
        <form id="product-form" class="mt-4 space-y-3">
          <label class="flex flex-col items-center justify-center gap-1 rounded-xl border-2 border-dashed border-brand-200 bg-brand-50/50 py-4 text-brand-600 cursor-pointer">
            <div id="image-preview">${v.imageUrl ? `<img src="${v.imageUrl}" class="h-24 w-24 rounded-lg object-cover" />` : `<span class="text-2xl">🖼️</span><span class="text-xs font-medium block mt-1">อัปโหลดรูปสินค้า</span>`}</div>
            <input id="form-image" type="file" accept="image/*" class="hidden" />
          </label>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">บาร์โค้ด *</label>
            <input id="form-barcode" required value="${escapeHtml(v.barcode)}" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" placeholder="สแกนหรือพิมพ์บาร์โค้ด" />
            <p id="barcode-type-hint" class="mt-1 text-[11px] text-stone-400">${v.barcode ? 'ประเภท: ' + BARCODE_TYPE_LABEL_TH[detectBarcodeType(v.barcode)] : ''}</p>
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">ชื่อสินค้า *</label>
            <input id="form-name" required value="${escapeHtml(v.name)}" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">หมวดหมู่</label>
            <input id="form-category" value="${escapeHtml(v.category || '')}" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" placeholder="เช่น นม/ผลิตภัณฑ์นม" />
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">วันหมดอายุ *</label>
            <input id="form-expiry" required type="date" value="${v.expiryDate}" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">หมายเหตุ</label>
            <textarea id="form-notes" rows="2" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100">${escapeHtml(v.notes || '')}</textarea>
          </div>

          <p id="form-error" class="hidden text-xs font-medium text-red-600"></p>

          <button type="submit" class="w-full rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white active:scale-95">${initial ? 'บันทึกการแก้ไข' : 'เพิ่มสินค้า'}</button>
        </form>
      </div>
    </div>
  `);

  let currentImageData = v.imageUrl || '';

  document.getElementById('form-image').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      currentImageData = String(reader.result);
      document.getElementById('image-preview').innerHTML = `<img src="${currentImageData}" class="h-24 w-24 rounded-lg object-cover" />`;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('form-barcode').addEventListener('input', (e) => {
    const code = e.target.value.trim();
    document.getElementById('barcode-type-hint').textContent = code ? 'ประเภท: ' + BARCODE_TYPE_LABEL_TH[detectBarcodeType(code)] : '';
  });

  document.getElementById('product-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const barcode = document.getElementById('form-barcode').value.trim();
    const name = document.getElementById('form-name').value.trim();
    const expiryDate = document.getElementById('form-expiry').value;
    const errEl = document.getElementById('form-error');

    if (!isValidBarcode(barcode)) {
      errEl.textContent = 'รูปแบบบาร์โค้ดไม่ถูกต้อง (ต้องมีอย่างน้อย 4 ตัวอักษร)';
      errEl.classList.remove('hidden');
      return;
    }
    const duplicate = products.find((p) => p.barcode === barcode && p.expiryDate === expiryDate && p.id !== (initial ? initial.id : null));
    if (duplicate) {
      errEl.textContent = 'มีสินค้าบาร์โค้ดนี้กับวันหมดอายุนี้อยู่ในระบบแล้ว';
      errEl.classList.remove('hidden');
      return;
    }

    const payload = {
      barcode, name,
      category: document.getElementById('form-category').value.trim(),
      imageUrl: currentImageData,
      expiryDate,
      notes: document.getElementById('form-notes').value.trim(),
    };

    if (initial) {
      const idx = products.findIndex((p) => p.id === initial.id);
      products[idx] = { ...products[idx], ...payload };
    } else {
      const newId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;
      products.push({ id: newId, ...payload, addedDate: new Date().toISOString() });
    }
    saveProducts(products);
    closeModal();
    refreshCurrentTabData();

    if (state.tab === 'scanner' && state.scanner.scannedCode) handleScanResult(state.scanner.scannedCode);
  });
}

// ==================== Delete confirm ====================
function confirmDeleteProduct(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl">
        <h3 class="text-base font-bold text-stone-800">ลบสินค้านี้?</h3>
        <p class="mt-2 text-sm text-stone-500">ต้องการลบ "${escapeHtml(p.name)}" ออกจากระบบหรือไม่ การลบนี้ไม่สามารถย้อนกลับได้</p>
        <div class="mt-5 flex gap-2">
          <button onclick="closeModal()" class="flex-1 rounded-xl bg-stone-100 py-2.5 text-sm font-semibold text-stone-600 active:scale-95">ยกเลิก</button>
          <button onclick="deleteProduct(${id})" class="flex-1 rounded-xl bg-red-600 py-2.5 text-sm font-semibold text-white active:scale-95">ลบสินค้า</button>
        </div>
      </div>
    </div>
  `);
}
function deleteProduct(id) {
  products = products.filter((p) => p.id !== id);
  saveProducts(products);
  closeModal();
  refreshCurrentTabData();
}

// ==================== Export / backup / restore ====================
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function todayStamp() { return new Date().toISOString().slice(0, 10); }

function exportCSV() {
  const headers = ['บาร์โค้ด', 'ชื่อสินค้า', 'หมวดหมู่', 'วันหมดอายุ', 'สถานะ', 'หมายเหตุ'];
  const rows = products.map(withComputed).map((p) => [p.barcode, p.name, p.category || '', p.expiryDate, STATUS_LABEL_TH[p.status], (p.notes || '').replace(/\n/g, ' ')]);
  const esc = (c) => `"${String(c).replace(/"/g, '""')}"`;
  const csv = [headers, ...rows].map((r) => r.map(esc).join(',')).join('\r\n');
  downloadBlob(new Blob([`\uFEFF${csv}`], { type: 'text/csv;charset=utf-8;' }), `rimping-products-${todayStamp()}.csv`);
}

// หมายเหตุ: ใช้กล่องโต้ตอบ "พิมพ์" ของเบราว์เซอร์ (แล้วเลือก "บันทึกเป็น PDF") แทนการสร้าง PDF ในแอปโดยตรง
// เพราะวิธีนี้ใช้การแสดงผลฟอนต์ของเบราว์เซอร์เอง ทำให้ภาษาไทยแสดงผลถูกต้อง 100% โดยไม่ต้องฝังไฟล์ฟอนต์เพิ่ม
function exportPrintPDF() {
  const list = products.map(withComputed).sort((a, b) => a.expiryDate.localeCompare(b.expiryDate));
  const rowsHtml = list.map((p) => `
    <tr>
      <td>${escapeHtml(p.barcode)}</td>
      <td>${escapeHtml(p.name)}</td>
      <td>${escapeHtml(p.category || '-')}</td>
      <td>${p.expiryDate}</td>
      <td>${STATUS_LABEL_TH[p.status]}</td>
    </tr>`).join('');

  document.getElementById('print-area').innerHTML = `
    <h2>รายการสินค้า - Rimping Expiry Tracker</h2>
    <p>วันที่ออกรายงาน: ${todayStamp()}</p>
    <table>
      <thead><tr><th>บาร์โค้ด</th><th>ชื่อสินค้า</th><th>หมวดหมู่</th><th>วันหมดอายุ</th><th>สถานะ</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
  window.print();
}

function backupJSON() {
  const payload = { app: 'Rimping Supermarket Expiry Tracker', version: 1, exportedAt: new Date().toISOString(), products };
  downloadBlob(new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }), `rimping-backup-${todayStamp()}.json`);
}

function handleRestoreFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(String(reader.result));
      const list = Array.isArray(parsed) ? parsed : parsed.products;
      if (!Array.isArray(list)) throw new Error('ไฟล์ไม่มีรายการสินค้าที่ถูกต้อง');
      pendingRestoreProducts = list;
      document.getElementById('restore-panel').innerHTML = `
        <div class="mt-3 rounded-xl bg-amber-50 p-3 text-xs text-amber-700">
          <p>พบ ${list.length} รายการในไฟล์ที่เลือก หากบาร์โค้ดซ้ำกับของเดิมในระบบ ต้องการให้เขียนทับหรือไม่?</p>
          <div class="mt-2 flex gap-2">
            <button onclick="runRestore(false)" class="flex-1 rounded-lg bg-white py-1.5 font-semibold text-amber-700 ring-1 ring-amber-200">ข้ามรายการซ้ำ</button>
            <button onclick="runRestore(true)" class="flex-1 rounded-lg bg-amber-600 py-1.5 font-semibold text-white">เขียนทับรายการซ้ำ</button>
          </div>
        </div>`;
    } catch (err) {
      document.getElementById('restore-panel').innerHTML = `<p class="mt-2 text-xs font-medium text-red-600">${escapeHtml(err.message || 'อ่านไฟล์ไม่สำเร็จ')}</p>`;
    }
  };
  reader.readAsText(file, 'utf-8');
  e.target.value = '';
}

function runRestore(overwrite) {
  if (!pendingRestoreProducts) return;
  let inserted = 0, updated = 0, skipped = 0;
  let nextId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;

  pendingRestoreProducts.forEach((raw) => {
    const barcode = raw.barcode;
    if (!barcode) { skipped++; return; }
    const idx = products.findIndex((p) => p.barcode === barcode);
    const normalized = {
      barcode,
      name: raw.name || '(ไม่มีชื่อ)',
      category: raw.category || '',
      imageUrl: raw.image_url || raw.imageUrl || '',
      expiryDate: raw.expiry_date || raw.expiryDate,
      notes: raw.notes || '',
    };
    if (idx >= 0) {
      if (overwrite) { products[idx] = { ...products[idx], ...normalized }; updated++; }
      else skipped++;
    } else {
      products.push({ id: nextId++, ...normalized, addedDate: new Date().toISOString() });
      inserted++;
    }
  });

  saveProducts(products);
  pendingRestoreProducts = null;
  document.getElementById('restore-panel').innerHTML = `<p class="mt-2 text-xs font-medium text-brand-700">กู้คืนสำเร็จ: เพิ่มใหม่ ${inserted} รายการ, อัปเดต ${updated} รายการ, ข้าม ${skipped} รายการ</p>`;
  refreshCurrentTabData();
}

// ==================== Init ====================
render();
</script>
