async function cloudGet(key) {
  if (!sb) return null;
  try {
    const { data, error } = await sb.from('app_storage').select('value').eq('key', key).maybeSingle();
    if (error || !data) return null;
    return data.value;
  } catch {
    return null;
  }
}

async function cloudSet(key, value) {
  if (!sb) return;
  try {
    await sb.from('app_storage').upsert({ key, value, updated_at: new Date().toISOString() });
  } catch {
    // เน็ตหลุด/เชื่อมต่อ Supabase ไม่ได้ชั่วคราว - ข้อมูลยังอยู่ในเครื่องนี้

async function cloudAppendItem(key, item) {
  if (!sb) return;
  try {
    await sb.rpc('array_append_item', { p_key: key, p_item: item });
  } catch {
    // เน็ตหลุดชั่วคราว ข้อมูลยังอยู่ในเครื่องนี้
  }
}
async function cloudRemoveItem(key, id) {
  if (!sb) return;
  try {
    await sb.rpc('array_remove_item', { p_key: key, p_id: id });
  } catch {}
}
async function cloudUpdateItem(key, id, item) {
  if (!sb) return;
  try {
    await sb.rpc('array_update_item', { p_key: key, p_id: id, p_item: item });
  } catch {}
}

  realtimeChannel = sb.channel('app_storage_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_storage' }, (payload) => {
      const row = payload.new;
      if (!row) return;
      if (row.key === 'products') {
        products = row.value || [];
        safeStorageSet(STORAGE_KEY, JSON.stringify(products));
      } else if (row.key === 'pending') {

        catalog = row.value || [];
        safeStorageSet(CATALOG_KEY, JSON.stringify(catalog));
      }
      if (state.entered) render();
    })
    .subscribe();
}

let storageAvailable = true;
const memoryStore = {};

function safeStorageGet(key) {
  try {
    return localStorage.getItem(key);
  } catch {
    storageAvailable = false;
    return key in memoryStore ? memoryStore[key] : null;
  }
}
function safeStorageSet(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch {
    storageAvailable = false;
    memoryStore[key] = value;
  }
}

function loadProducts() {

  if (!raw) {
    const seeded = seedProducts();
    saveProducts(seeded);
    return seeded;
  }
  try {
    return JSON.parse(raw);
  } catch {
    return seedProducts();
  }
}
function saveProducts(list) {

}

// ==================== รูปภาพ: บีบอัดรูปก่อนเก็บ เพื่อไม่ให้ข้อมูลบวมเกินไป ====================
function compressImageFile(file, maxDim = 900, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round(height * (maxDim / width));
          width = maxDim;
        } else if (height >= width && height > maxDim) {
          width = Math.round(width * (maxDim / height));
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('โหลดรูปภาพไม่สำเร็จ'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
    reader.readAsDataURL(file);
  });
}

    adminUsers = loadAdminUsers();
    catalog = loadCatalog();
  }
}

// ==================== Domain helpers ====================
function getStatus(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  const diffDays = Math.ceil((exp - today) / 86400000);
  if (diffDays < 0) return 'expired';
  if (diffDays <= URGENT_WINDOW_DAYS) return 'urgent';
  return 'safe';
}
function daysUntil(expiryDateStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiryDateStr + 'T00:00:00');
  return Math.ceil((exp - today) / 86400000);
}
function withComputed(p) { return { ...p, status: getStatus(p.expiryDate), daysLeft: daysUntil(p.expiryDate) }; }
function formatThaiDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}
function computeStats() {
  const counts = { expired: 0, urgent: 0, safe: 0 };
  products.forEach((p) => counts[getStatus(p.expiryDate)]++);
  return counts;
}

function detectBarcodeType(raw) {
  const code = (raw ?? '').trim();
  if (/^\d{13}$/.test(code)) return 'EAN-13';
  if (/^\d{12}$/.test(code)) return 'UPC-A';
  if (/^\d{8}$/.test(code)) return 'EAN-8';
  if (/^[A-Za-z0-9]{4,}$/.test(code) && /[A-Za-z]/.test(code)) return 'CODE128';
  if (code.length >= 4) return 'CUSTOM';
  return 'INVALID';
}
function isValidBarcode(code) { return detectBarcodeType(code) !== 'INVALID'; }
const BARCODE_TYPE_LABEL_TH = {
  'EAN-13': 'EAN-13 (13 หลัก)', 'EAN-8': 'EAN-8 (8 หลัก)', 'UPC-A': 'UPC-A (12 หลัก)',
  CODE128: 'Code128', CUSTOM: 'บาร์โค้ดกำหนดเอง', INVALID: 'รูปแบบไม่ถูกต้อง',
};

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function playBeep() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1046;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.13);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.14);
    osc.onended = () => ctx.close();
  } catch { /* เบราว์เซอร์บล็อก autoplay เสียง - ไม่ต้องทำอะไร */ }
}

function basketIconSVG(size, color, strokeWidth) {
  size = size || 24; color = color || '#047857'; strokeWidth = strokeWidth || 2;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z"/>
      <path d="M9 9V6.5a3 3 0 0 1 6 0V9"/>
      <path d="M9.5 13v3.2"/>
      <path d="M12 13v3.2"/>
      <path d="M14.5 13v3.2"/>
    </svg>`;
}
function basketFilledSVG(size, color) {
  size = size || 24; color = color || '#047857';
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}">
      <path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z" />
      <path d="M9 9V6.5a3 3 0 0 1 6 0V9h-1.6V6.5a1.4 1.4 0 0 0-2.8 0V9H9Z" />
    </svg>`;
}

function freshnessRingSVG(daysLeft, status, size) {
  size = size || 64;
  const stroke = 6;
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const ratio = status === 'expired' ? 0 : Math.min(Math.max(daysLeft, 0), 30) / 30;
  const dashOffset = circumference * (1 - ratio);
  const color = STATUS_COLOR[status];
  const c = size / 2;
  return `
    <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
      <svg width="${size}" height="${size}" class="-rotate-90">
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="#e3efe7" stroke-width="${stroke}" fill="none" />
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none"
          stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
          style="transition: stroke-dashoffset .4s ease;" />
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-xl font-extrabold leading-none" style="color:${color}">${status === 'expired' ? '!' : daysLeft}</span>
        ${status !== 'expired' ? '<span class="text-[10px] font-semibold text-stone-500">วัน</span>' : ''}
      </div>
    </div>`;
}

function statusBadgeHTML(status) {
  const styles = {
    expired: 'bg-red-50 text-red-600 ring-1 ring-red-200',
    urgent: 'bg-amber-50 text-amber-600 ring-1 ring-amber-200',
    safe: 'bg-brand-50 text-brand-700 ring-1 ring-brand-200',
  };
  return `<span class="rounded-full px-2.5 py-0.5 text-xs font-semibold ${styles[status]}">${STATUS_LABEL_TH[status]}</span>`;
}

function productThumbHTML(p, size) {
  size = size || 64;
  if (p.imageUrl) {
    const badgeText = p.status === 'expired' ? 'หมดอายุ' : `${p.daysLeft} วัน`;
    return `
      <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
        <img src="${p.imageUrl}" class="h-full w-full rounded-2xl object-cover ring-1 ring-brand-100" />
        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-full border-2 border-white px-2 py-0.5 text-[10px] font-extrabold text-white shadow-sm" style="background-color:${STATUS_COLOR[p.status]}">${badgeText}</span>
      </div>`;
  }
  return freshnessRingSVG(p.daysLeft, p.status, size);
}

function statCardHTML(label, count, colorClass, active, onclickAttr) {
  return `
    <button onclick="${onclickAttr}" class="flex flex-1 flex-col items-start gap-1 rounded-2xl px-3 py-3 text-left ring-1 transition-all ${colorClass} ${active ? 'scale-[1.02] shadow-card ring-2' : 'ring-1'}">
      <span class="text-2xl font-bold leading-none">${count}</span>
      <span class="text-xs font-medium opacity-80">${label}</span>
    </button>`;
}

function productCardHTML(p, opts) {
  opts = opts || {};
  const showActions = !!opts.showActions;
  return `
    <div class="flex items-center gap-3 rounded-2xl bg-white p-3 shadow-card ring-1 ring-brand-100/60">
      ${productThumbHTML(p)}
      <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
          <p class="truncate text-sm font-semibold text-stone-800">${escapeHtml(p.name)}</p>
          ${statusBadgeHTML(p.status)}
        </div>
        <p class="mt-0.5 truncate text-xs text-stone-400">${p.category ? escapeHtml(p.category) + ' · ' : ''}${escapeHtml(p.barcode)}</p>
        <p class="mt-1 text-xs text-stone-500">หมดอายุ ${formatThaiDate(p.expiryDate)}</p>
      </div>
      ${showActions ? `
        <div class="flex shrink-0 flex-col gap-1.5">
          <button onclick="openProductForm(${p.id})" class="rounded-full bg-brand-50 p-1.5 text-brand-700 active:scale-95" aria-label="แก้ไข">✏️</button>
          <button onclick="confirmDeleteProduct(${p.id})" class="rounded-full bg-red-50 p-1.5 text-red-600 active:scale-95" aria-label="ลบ">🗑️</button>
        </div>` : ''}
    </div>`;
}

function bottomNavHTML() {
  const stats = computeStats();
  return `
    <nav id="bottom-nav" class="fixed inset-x-0 bottom-0 z-20 border-t border-brand-100 bg-white/95 backdrop-blur-sm">
      <div class="mx-auto flex max-w-md items-stretch justify-between px-2" style="padding-bottom: env(safe-area-inset-bottom);">
        ${NAV_ITEMS.map((item) => {
          const isActive = state.tab === item.id;
          let badge = '';
          if (item.id === 'scanner' && stats.urgent > 0) {
            badge = `<span class="absolute -right-2 -top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-amber-500 px-1 text-[10px] font-bold text-white">${stats.urgent > 9 ? '9+' : stats.urgent}</span>`;
          }
          if (item.id === 'admin' && isAdmin() && pendingSubmissions.length > 0) {
            badge = `<span class="absolute -right-2 -top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-sky-500 px-1 text-[10px] font-bold text-white">${pendingSubmissions.length > 9 ? '9+' : pendingSubmissions.length}</span>`;
          }
          return `
            <button onclick="setTab('${item.id}')" class="relative flex flex-1 flex-col items-center gap-1 py-2.5 text-xs font-medium transition-colors ${isActive ? 'text-brand-600' : 'text-stone-400'}">
              <span class="relative text-[20px] leading-none">${item.emoji}${badge}</span>
              ${item.label}

        }).join('')}

    </nav>`;
}

function enterApp() {
  state.entered = true;
  state.tab = 'dashboard';
  render();
}

    state.tab = 'admin';

// ==================== Root render ====================
function render() {
  const app = document.getElementById('app');
  if (!state.entered) {
    app.innerHTML = landingHTML();
    return;
  }
  app.innerHTML = `
    <div class="min-h-screen bg-brand-50 pb-24 font-sans text-stone-800">
      ${!storageAvailable ? `
        <div class="bg-amber-500 px-4 py-2 text-center text-xs font-semibold text-white">
          ⚠️ เบราว์เซอร์นี้ไม่อนุญาตให้บันทึกข้อมูลถาวร การเปลี่ยนแปลงจะหายไปเมื่อปิดหน้านี้ — ลองเปิดผ่าน Chrome/Safari ปกติ (ไม่ใช่ในแอปแชท) แทน
        </div>` : ''}
      <main class="mx-auto max-w-md px-4 pt-6" id="main"></main>
    </div>
    ${bottomNavHTML()}
  `;
  renderPage();
}

function renderPage() {
  const main = document.getElementById('main');
  if (state.tab === 'dashboard') { main.innerHTML = dashboardHTML(); initDashboard(); }
  if (state.tab === 'scanner') { main.innerHTML = scannerHTML(); initScanner(); }
  if (state.tab === 'calendar') { main.innerHTML = calendarHTML(); }
  if (state.tab === 'admin') { main.innerHTML = adminHTML(); }
}

function setTab(tab) {
  if (state.tab === 'scanner' && tab !== 'scanner') stopScanner();
  if (tab === 'admin' && !isAdmin()) {
    openAdminLogin(() => {
      state.tab = 'admin';
      render();
    });
    return;
  }
  state.tab = tab;
  render();
}

function statCardsHTML() {
  const stats = computeStats();
  return `
    ${statCardHTML('หมดอายุแล้ว', stats.expired, 'bg-red-50 text-red-600 ring-red-200', state.filter === 'expired', "setFilter('expired')")}
    ${statCardHTML('เร่งด่วน', stats.urgent, 'bg-amber-50 text-amber-600 ring-amber-200', state.filter === 'urgent', "setFilter('urgent')")}
    ${statCardHTML('ปลอดภัย', stats.safe, 'bg-brand-50 text-brand-700 ring-brand-200', state.filter === 'safe', "setFilter('safe')")}
  `;
}

function filterChipsHTML() {
  return FILTER_CHIPS.map((chip) => `
    <button onclick="setFilter('${chip.id}', true)" class="shrink-0 rounded-full px-3 py-1.5 text-xs font-medium transition-colors ${state.filter === chip.id ? 'bg-brand-600 text-white' : 'bg-white text-stone-500 ring-1 ring-stone-200'}">${chip.label}</button>
  `).join('');
}

function getFilteredProducts() {
  const search = state.search.trim().toLowerCase();
  let list = products.map(withComputed);
  if (search) list = list.filter((p) => p.name.toLowerCase().includes(search) || p.barcode.toLowerCase().includes(search));
  if (state.filter !== 'all') list = list.filter((p) => p.status === state.filter);
  list.sort((a, b) => a.expiryDate.localeCompare(b.expiryDate) || a.name.localeCompare(b.name));
  return list;
}

function productListHTML() {
  const list = getFilteredProducts();
  if (list.length === 0) {
    return `
      <div class="rounded-2xl bg-white py-10 text-center shadow-card ring-1 ring-brand-100/60">
        <p class="text-sm font-medium text-stone-500">ไม่พบสินค้าตามเงื่อนไขนี้</p>
        <p class="mt-1 text-xs text-stone-400">ลองเปลี่ยนคำค้นหาหรือตัวกรองสถานะ</p>
      </div>`;
  }
  return list.map((p) => productCardHTML(p)).join('');
}

function initDashboard() {
  const input = document.getElementById('search-input');
  input.value = state.search;
  input.addEventListener('input', (e) => {
    state.search = e.target.value;
    document.getElementById('product-list').innerHTML = productListHTML();
  });
}

function setFilter(filterId, fromChip) {
  state.filter = fromChip ? filterId : (state.filter === filterId ? 'all' : filterId);
  document.getElementById('stat-cards').innerHTML = statCardsHTML();
  document.getElementById('filter-chips').innerHTML = filterChipsHTML();
  document.getElementById('product-list').innerHTML = productListHTML();
}

        <button onclick="rejectSubmission('${item.id}')" class="rounded-lg bg-red-50 px-2.5 py-1.5 text-[11px] font-semibold text-red-600 active:scale-95">✕ ปฏิเสธ</button>

function toggleAdminApprovals() {
  state.admin.showApprovals = !state.admin.showApprovals;
  renderPage();
}

function approveSubmission(id) {
  const item = pendingSubmissions.find((s) => String(s.id) === String(id));
  if (!item) return;

  const newProduct = {
    id: generateLocalId(),
    barcode: item.barcode || `NOBC_${generateLocalId()}`,
    name: item.name || '',
    category: item.category || '',
    expiryDate: item.expiryDate,
    notes: item.notes || '',
    imageUrl: item.productPhoto || item.imageUrl || '',
    addedDate: new Date().toISOString(),
  };
  products.push(newProduct);
  saveProducts(products);
  cloudAppendItem('products', newProduct);
  upsertCatalogFromProduct(newProduct);

  pendingSubmissions = pendingSubmissions.filter((s) => String(s.id) !== String(id));
  savePending(pendingSubmissions);
  cloudRemoveItem('pending', id);

  refreshCurrentTabData();
}

function rejectSubmission(id) {
  if (!confirm('ยืนยันการปฏิเสธคำขอนี้?')) return;
  pendingSubmissions = pendingSubmissions.filter((s) => String(s.id) !== String(id));
  savePending(pendingSubmissions);
  cloudRemoveItem('pending', id);
  refreshCurrentTabData();
}

function toggleScanHistory() {
  state.scanner.showHistory = !state.scanner.showHistory;
  renderPage();
}

function initScanner() {
  document.getElementById('manual-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = document.getElementById('manual-input').value.trim();
    if (code) handleScanResult(code);
  });
  startScanner();
}

function handleScanImageFile(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const resultEl = document.getElementById('scan-result');
  if (resultEl) {
    resultEl.innerHTML = `<div class="rounded-2xl bg-white p-4 text-center text-xs text-stone-400 shadow-card ring-1 ring-brand-100/60">กำลังอ่านบาร์โค้ดจากรูปภาพ...</div>`;
  }
  if (!window.Html5Qrcode) {
    if (resultEl) resultEl.innerHTML = `<p class="text-xs text-red-600">ไม่พบไลบรารีสแกน กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p>`;
    return;
  }
  const fileScanner = new Html5Qrcode('file-scan-temp');
  fileScanner
    .scanFile(file, false)
    .then((decodedText) => {
      playBeep();
      handleScanResult(decodedText);
      try { fileScanner.clear(); } catch {}
    })
    .catch(() => {
      if (resultEl) {
        resultEl.innerHTML = `
          <div class="rounded-2xl bg-white p-4 text-center shadow-card ring-1 ring-brand-100/60">
            <p class="text-xs text-red-600">ไม่พบบาร์โค้ดในรูปภาพนี้</p>
            <p class="mt-1 text-[11px] text-stone-400">ลองรูปอื่น หรือพิมพ์บาร์โค้ดด้วยตนเองด้านล่าง</p>
          </div>`;
      }
      try { fileScanner.clear(); } catch {}
    });
}

function startScanner() {
  if (!window.Html5Qrcode) {
    const statusEl = document.getElementById('camera-status');
    if (statusEl) statusEl.textContent = 'ไม่พบไลบรารีกล้อง (ต้องต่ออินเทอร์เน็ตเพื่อโหลด html5-qrcode)';
    return;
  }
  html5QrCode = new Html5Qrcode('qr-reader');
  html5QrCode
    .start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => { playBeep(); handleScanResult(decodedText); },
      () => { /* ไม่เจอบาร์โค้ดในเฟรมนี้ - ไม่ต้องทำอะไร */ },
    )
    .then(() => {
      const statusEl = document.getElementById('camera-status');
      if (statusEl) statusEl.remove();
      const frame = document.getElementById('camera-frame');
      if (frame) frame.classList.remove('hidden');
    })
    .catch((err) => {
      console.error(err);
      const statusEl = document.getElementById('camera-status');
      if (statusEl) {
        statusEl.innerHTML = `
          <div class="flex flex-col items-center gap-2 px-6 text-center">
            <span class="text-2xl">📵</span>
            <span>ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้กล้อง หรือกรอกบาร์โค้ดด้วยตนเองด้านล่าง<br><span class="text-[10px] text-white/50">(กล้องต้องเปิดผ่าน HTTPS หรือ localhost)</span></span>
          </div>`;
      }
    });
}

function stopScanner() {
  if (html5QrCode) {
    const instance = html5QrCode;
    html5QrCode = null;
    instance.stop().catch(() => {}).finally(() => { try { instance.clear(); } catch {} });
  }
}

// ==================== Calendar ====================
function calendarHTML() {
  const { year, month, selected } = state.cal;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - firstDay.getDay());
  const days = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const dateStr = (d) => d.toISOString().slice(0, 10);
  const getStatusForDate = (d) => {
    const dateProducts = products.map(withComputed).filter((p) => p.expiryDate === dateStr(d));
    if (dateProducts.length === 0) return null;
    if (dateProducts.some((p) => p.status === 'expired')) return 'expired';
    if (dateProducts.some((p) => p.status === 'urgent')) return 'urgent';
    return 'safe';
  };

  const prevMonth = () => {
    state.cal.month--;
    if (state.cal.month < 1) { state.cal.month = 12; state.cal.year--; }
    render();
  };
  const nextMonth = () => {
    state.cal.month++;
    if (state.cal.month > 12) { state.cal.month = 1; state.cal.year++; }
    render();
  };

  const selectDate = (d) => {
    state.cal.selected = dateStr(d);
    renderPage();
  };

  const selectedProducts = state.cal.selected ? products.map(withComputed).filter((p) => p.expiryDate === state.cal.selected) : [];

  return `
    <div class="space-y-4">
      <header class="flex items-center gap-2">
        <span class="rounded-xl bg-brand-600 p-2 text-white text-lg">🗓️</span>
        <div>
          <h1 class="text-lg font-bold text-stone-800">ปฏิทิน</h1>
          <p class="text-xs text-stone-400">ดูวันหมดอายุตามปฏิทิน</p>
        </div>
      </header>

      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
        <div class="flex items-center justify-between mb-4">
          <button onclick="prevMonth()" class="rounded-lg bg-stone-100 p-2 text-stone-600 active:scale-95">◀</button>
          <h2 class="text-sm font-bold text-stone-800">${MONTHS_TH[month - 1]} ${year}</h2>
          <button onclick="nextMonth()" class="rounded-lg bg-stone-100 p-2 text-stone-600 active:scale-95">▶</button>
        </div>

        <div class="grid grid-cols-7 gap-1 text-center">
          ${WEEKDAYS_TH.map((w) => `<div class="text-[10px] font-bold text-stone-400 py-1">${w}</div>`).join('')}
          ${days.map((d) => {
            const isCurrentMonth = d.getMonth() === month - 1;
            const status = getStatusForDate(d);
            const isSelected = state.cal.selected === dateStr(d);
            const isToday = dateStr(d) === dateStr(today);
            let bgClass = 'bg-white';
            if (status === 'expired') bgClass = 'bg-red-100 text-red-700';
            else if (status === 'urgent') bgClass = 'bg-amber-100 text-amber-700';
            else if (status === 'safe') bgClass = 'bg-brand-100 text-brand-700';
            else if (!isCurrentMonth) bgClass = 'bg-stone-50 text-stone-300';
            if (isSelected) bgClass += ' ring-2 ring-brand-600';
            if (isToday && !isSelected) bgClass += ' ring-1 ring-brand-400';
            return `
              <button onclick="selectDate(new Date(${d.getTime()}))" class="rounded-lg p-1.5 text-xs font-semibold transition-colors ${bgClass} ${isCurrentMonth ? 'cursor-pointer active:scale-95' : 'cursor-default'}">${d.getDate()}</button>`;
          }).join('')}
        </div>
      </div>

      ${state.cal.selected ? `
        <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
          <p class="text-xs font-medium text-stone-500 mb-3">วันที่ ${formatThaiDate(state.cal.selected)} (${selectedProducts.length} รายการ)</p>
          ${selectedProducts.length === 0 ? `<p class="text-xs text-stone-400">ไม่มีสินค้าหมดอายุในวันนี้</p>` : selectedProducts.map((p) => productCardHTML(p, { showActions: isAdmin() })).join('')}
        </div>` : ''}
    </div>`;
}

    document.getElementById('barcode-type-hint').textContent = code ? 'ประเภท: ' + BARCODE_TYPE_LABEL_TH[detectBarcodeType(code)] : '';
  });

    e.preventDefault();
    const barcode = document.getElementById('form-barcode').value.trim();
    const name = document.getElementById('form-name').value.trim();
    const expiryDate = document.getElementById('form-expiry').value;
    const errEl = document.getElementById('form-error');

      errEl.classList.remove('hidden');
      return;
    }

      const freshProducts = await cloudGet('products');
      if (freshProducts !== null) products = freshProducts;
    }

    const duplicate = products.find((p) => p.barcode === barcode && p.expiryDate === expiryDate && p.id !== (initial ? initial.id : null));
    if (duplicate) {
      errEl.textContent = 'มีสินค้าบาร์โค้ดนี้กับวันหมดอายุนี้อยู่ในระบบแล้ว';
      errEl.classList.remove('hidden');
      return;
    }

    const payload = {
      barcode, name,
      category: document.getElementById('form-category').value.trim(),
      imageUrl: currentImageData,
      expiryDate,
      notes: document.getElementById('form-notes').value.trim(),
    };

    if (initial) {
      const idx = products.findIndex((p) => p.id === initial.id);
      products[idx] = { ...products[idx], ...payload };
      saveProducts(products);
      cloudUpdateItem('products', initial.id, products[idx]);
    } else {
      const newId = generateLocalId();
      const newProduct = { id: newId, ...payload, addedDate: new Date().toISOString() };
      products.push(newProduct);
      saveProducts(products);
      cloudAppendItem('products', newProduct);
      upsertCatalogFromProduct(newProduct);
    }
    closeModal();
    refreshCurrentTabData();

    if (state.tab === 'scanner' && state.scanner.scannedCode) handleScanResult(state.scanner.scannedCode);

// ==================== Export / backup / restore ====================
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function todayStamp() { return new Date().toISOString().slice(0, 10); }

function exportCSV() {
  const headers = ['บาร์โค้ด', 'ชื่อสินค้า', 'หมวดหมู่', 'วันหมดอายุ', 'สถานะ', 'หมายเหตุ'];
  const rows = products.map(withComputed).map((p) => [p.barcode, p.name, p.category || '', p.expiryDate, STATUS_LABEL_TH[p.status], (p.notes || '').replace(/\n/g, ' ')]);
  const esc = (c) => `"${String(c).replace(/"/g, '""')}"`;
  const csv = [headers, ...rows].map((r) => r.map(esc).join(',')).join('\r\n');
  downloadBlob(new Blob([`\uFEFF${csv}`], { type: 'text/csv;charset=utf-8;' }), `rimping-products-${todayStamp()}.csv`);
}

function handleRestoreFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(String(reader.result));
      const list = Array.isArray(parsed) ? parsed : parsed.products;
      if (!Array.isArray(list)) throw new Error('ไฟล์ไม่มีรายการสินค้าที่ถูกต้อง');
      pendingRestoreProducts = list;
      document.getElementById('restore-panel').innerHTML = `
        <div class="mt-3 rounded-xl bg-amber-50 p-3 text-xs text-amber-700">
          <p>พบ ${list.length} รายการในไฟล์ที่เลือก หากบาร์โค้ดซ้ำกับของเดิมในระบบ ต้องการให้เขียนทับหรือไม่?</p>
          <div class="mt-2 flex gap-2">
            <button onclick="runRestore(false)" class="flex-1 rounded-lg bg-white py-1.5 font-semibold text-amber-700 ring-1 ring-amber-200">ข้ามรายการซ้ำ</button>
            <button onclick="runRestore(true)" class="flex-1 rounded-lg bg-amber-600 py-1.5 font-semibold text-white">เขียนทับรายการซ้ำ</button>
          </div>
        </div>`;
    } catch (err) {
      document.getElementById('restore-panel').innerHTML = `<p class="mt-2 text-xs font-medium text-red-600">${escapeHtml(err.message || 'อ่านไฟล์ไม่สำเร็จ')}</p>`;
    }
  };
  reader.readAsText(file, 'utf-8');
  e.target.value = '';
}

function runRestore(overwrite) {
  if (!pendingRestoreProducts) return;
  let inserted = 0, updated = 0, skipped = 0;
  let nextId = products.length > 0 ? Math.max(...products.map((p) => p.id)) + 1 : 1;

  pendingRestoreProducts.forEach((raw) => {
    const barcode = raw.barcode;
    if (!barcode) { skipped++; return; }
    const idx = products.findIndex((p) => p.barcode === barcode);
    const normalized = {
      barcode,
      name: raw.name || '(ไม่มีชื่อ)',
      category: raw.category || '',
      imageUrl: raw.image_url || raw.imageUrl || '',
      expiryDate: raw.expiry_date || raw.expiryDate,
      notes: raw.notes || '',
    };
    if (idx >= 0) {
      if (overwrite) { products[idx] = { ...products[idx], ...normalized }; updated++; }
      else skipped++;
    } else {
      products.push({ id: nextId++, ...normalized, addedDate: new Date().toISOString() });
      inserted++;
    }
  });

  saveProducts(products);
  cloudSet('products', products);
  pendingRestoreProducts = null;
  document.getElementById('restore-panel').innerHTML = `<p class="mt-2 text-xs font-medium text-brand-700">กู้คืนสำเร็จ: เพิ่มใหม่ ${inserted} รายการ, อัปเดต ${updated} รายการ, ข้าม ${skipped} รายการ</p>`;
  refreshCurrentTabData();
}

  document.getElementById('near-expiry-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('ne-error');
    const submitBtn = e.target.querySelector('button[type="submit"]');

    if (!isAdmin()) {
      if (sb) {
        const freshPending = await cloudGet('pending');
        if (freshPending !== null) pendingSubmissions = freshPending;
      }
      if (pendingSubmissions.some((s) => s.barcode === barcode)) {
        errEl.textContent = 'บาร์โค้ดนี้มีคำขอที่ส่งไปแล้ว กำลังรอแอดมินตรวจสอบอยู่ ไม่สามารถส่งซ้ำได้';
        errEl.classList.remove('hidden');
        return;
      }
    }

    const expiryDate = document.getElementById('ne-expiry').value;
    if (!expiryDate) {
      errEl.textContent = 'กรุณาระบุวันหมดอายุ';
      errEl.classList.remove('hidden');
      return;
    }

    let name, category, photo1;
    if (quick) {
      name = cat.name;
      category = cat.category;
      photo1 = cat.imageUrl;
    } else {
      name = document.getElementById('ne-name').value.trim();
      category = document.getElementById('ne-category').value.trim();
      const f1 = document.getElementById('ne-photo1').files[0];
      if (!name || !f1) {
        errEl.textContent = 'กรุณากรอกชื่อสินค้าและถ่ายรูปสินค้า';
        errEl.classList.remove('hidden');
        return;
      }
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'กำลังบันทึก...';

    try {
      if (!quick) {
        const f1 = document.getElementById('ne-photo1').files[0];
        photo1 = await compressImageFile(f1);
      }
      const f2 = document.getElementById('ne-photo2').files[0];
      const photo2 = f2 ? await compressImageFile(f2) : '';
      const notes = document.getElementById('ne-notes').value.trim();

      if (!quick) {
        addCatalogEntry({ barcode, name, category, imageUrl: photo1 });
      }

      if (isAdmin()) {
        const newProduct = {
          id: generateLocalId(),
          barcode, name, category, expiryDate, notes,
          imageUrl: photo1 || '',
          addedDate: new Date().toISOString(),
        };
        products.push(newProduct);
        saveProducts(products);
        cloudAppendItem('products', newProduct);
      } else {
        const submission = {
          id: generateLocalId(),
          barcode, name, category, expiryDate, notes,
          productPhoto: photo1 || '',
          expiryPhoto: photo2 || '',
          submittedAt: new Date().toISOString(),
        };
        pendingSubmissions.push(submission);
        savePending(pendingSubmissions);
        cloudAppendItem('pending', submission);
      }

      closeModal();
      refreshCurrentTabData();
      if (state.tab === 'scanner' && state.scanner.scannedCode) handleScanResult(state.scanner.scannedCode);
    } catch {
      errEl.textContent = 'เกิดข้อผิดพลาดในการอ่านรูปภาพ กรุณาลองใหม่';
      errEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.textContent = isAdmin() ? 'เพิ่มสินค้า' : 'ส่งคำขอ';
    }
  });
}

  state.admin.showAdminMgmt = !state.admin.showAdminMgmt;

      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-brand-100 text-sm font-bold text-brand-700">${escapeHtml((a.name || '?').slice(0, 1))}</div>
      <div class="min-w-0 flex-1">
        <p class="truncate text-sm font-medium text-stone-700">${escapeHtml(a.name || '')}</p>
        <p class="text-[11px] text-stone-400">รหัสพนักงาน: ${escapeHtml(a.loginId)}</p>

function openAddAdminModal() {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl">
        <h2 class="text-lg font-bold text-stone-800">เพิ่มแอดมินใหม่</h2>
        <p class="mt-1 text-xs text-stone-400">กำหนดรหัสพนักงานและ PIN ให้ผู้ใช้งานคนนี้เข้าระบบแอดมินได้</p>
        <form id="add-admin-form" class="mt-4 space-y-3">
          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">ชื่อ</label>
            <input id="new-admin-name" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">รหัสพนักงาน (สำหรับล็อกอิน)</label>
            <input id="new-admin-id" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">PIN</label>
            <input id="new-admin-pin" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>
          <p id="add-admin-error" class="hidden text-xs font-medium text-red-600"></p>
          <button type="submit" class="w-full rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white active:scale-95">เพิ่มแอดมิน</button>
        </form>
      </div>
    </div>
  `);

  document.getElementById('add-admin-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('new-admin-name').value.trim();
    const loginId = document.getElementById('new-admin-id').value.trim();
    const pin = document.getElementById('new-admin-pin').value.trim();
    const errEl = document.getElementById('add-admin-error');

    if (!name || !loginId || !pin) {
      errEl.textContent = 'กรุณากรอกข้อมูลให้ครบทุกช่อง';
      errEl.classList.remove('hidden');
      return;
    }
    if (adminUsers.some((a) => a.loginId === loginId)) {
      errEl.textContent = 'รหัสพนักงานนี้ถูกใช้เป็นแอดมินอยู่แล้ว';
      errEl.classList.remove('hidden');
      return;
    }

    const entry = { id: String(generateLocalId()), loginId, pin, name, isOwner: false };
    adminUsers.push(entry);
    saveAdminUsers(adminUsers);
    cloudAppendItem('admins', entry);

    closeModal();
    refreshCurrentTabData();
  });
}

function removeAdminUser(id) {
  const target = adminUsers.find((a) => a.id === id);
  if (!target || target.isOwner) return;
  if (!confirm(`ลบสิทธิ์แอดมินของ "${target.name}"?`)) return;
  adminUsers = adminUsers.filter((a) => a.id !== id);
  saveAdminUsers(adminUsers);
  cloudRemoveItem('admins', id);
  refreshCurrentTabData();
}

// ==================== Admin login ====================
function openAdminLogin(onSuccess) {
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl">
        <h2 class="text-lg font-bold text-stone-800">เข้าสู่ระบบแอดมิน</h2>
        <form id="admin-login-form" class="mt-4 space-y-3">
          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">รหัสพนักงาน</label>
            <input id="admin-id" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium text-stone-500">PIN</label>
            <input id="admin-pin" required type="password" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" />
          </div>

          <p id="admin-error" class="hidden text-xs font-medium text-red-600"></p>

          <button type="submit" class="w-full rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white active:scale-95">เข้าสู่ระบบ</button>
        </form>
      </div>
    </div>
  `);

  document.getElementById('admin-login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const id = document.getElementById('admin-id').value.trim();
    const pin = document.getElementById('admin-pin').value.trim();
    const errEl = document.getElementById('admin-error');

    const match = findAdminUser(id, pin);
    if (match) {
      setAdmin(true);
      state.adminName = match.name;
      closeModal();
      if (onSuccess) onSuccess();
    } else {
      errEl.textContent = 'รหัสพนักงานหรือ PIN ไม่ถูกต้อง';
      errEl.classList.remove('hidden');
    }
  });
}
