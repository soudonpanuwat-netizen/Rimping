<script>
'use strict';

// ==================== Constants ====================
const ADMIN_ID = '63042';
const ADMIN_PIN = '0898';
const URGENT_WINDOW_DAYS = 7;
const STORAGE_KEY = 'rimping_products_v1';
const PENDING_KEY = 'rimping_pending_v1';
const ADMIN_USERS_KEY = 'rimping_admins_v1';
const CATALOG_KEY = 'rimping_catalog_v1';

// ==================== Supabase (ใช้งานหลายเครื่อง/หลายคนพร้อมกัน) ====================
const SUPABASE_URL = 'https://ndipoaxxbqwxafgvgmlu.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HAHfwDUD3x68d-w7JQYbFw_WhVfvBta';

const sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

async function cloudGet(key) {
  if (!sb) return null;
  try {
    const { data, error } = await sb.from('app_storage').select('value').eq('key', key).maybeSingle();
    if (error || !data) return null;
    return data.value;
  } catch { return null; }
}

async function cloudSet(key, value) {
  if (!sb) return;
  try {
    await sb.from('app_storage').upsert({ key, value, updated_at: new Date().toISOString() });
  } catch {}
}

async function cloudAppendItem(key, item) {
  if (!sb) return;
  try {
    await sb.rpc('array_append_item', { p_key: key, p_item: item });
  } catch {}
}

async function cloudRemoveItem(key, id) {
  if (!sb) return;
  try {
    await sb.rpc('array_remove_item', { p_key: key, p_id: id });
  } catch {}
}

async function cloudUpdateItem(key, id, item) {
  if (!sb) return;
  try {
    await sb.rpc('array_update_item', { p_key: key, p_id: id, p_item: item });
  } catch {}
}

let realtimeChannel = null;
function setupRealtimeSync() {
  if (!sb || realtimeChannel) return;
  realtimeChannel = sb.channel('app_storage_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_storage' }, (payload) => {
      const row = payload.new;
      if (!row) return;
      if (row.key === 'products') {
        products = row.value || [];
        safeStorageSet(STORAGE_KEY, JSON.stringify(products));
      } else if (row.key === 'pending') {
        pendingSubmissions = row.value || [];
        safeStorageSet(PENDING_KEY, JSON.stringify(pendingSubmissions));
      } else if (row.key === 'admins') {
        adminUsers = row.value || defaultAdminUsers();
        safeStorageSet(ADMIN_USERS_KEY, JSON.stringify(adminUsers));
      } else if (row.key === 'catalog') {
        catalog = row.value || [];
        safeStorageSet(CATALOG_KEY, JSON.stringify(catalog));
      }
      if (state.entered) render();
    })
    .subscribe();
}

const STATUS_LABEL_TH = { expired: 'หมดอายุแล้ว', urgent: 'เร่งด่วน', safe: 'ปลอดภัย' };
const STATUS_COLOR = { expired: '#dc2626', urgent: '#d97706', safe: '#059669' };

const WEEKDAYS_TH = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
const MONTHS_TH = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

const NAV_ITEMS = [
  { id: 'dashboard', label: 'หน้าแรก', emoji: '🏠' },
  { id: 'scanner', label: 'สแกน', emoji: '📷' },
  { id: 'calendar', label: 'ปฏิทิน', emoji: '🗓️' },
  { id: 'admin', label: 'แอดมิน', emoji: '🛠️' },
];

const FILTER_CHIPS = [
  { id: 'all', label: 'ทั้งหมด' },
  { id: 'expired', label: '🔴 หมดอายุแล้ว' },
  { id: 'urgent', label: '🟡 เร่งด่วน' },
  { id: 'safe', label: '🟢 ปลอดภัย' },
];

// ==================== State ====================
const state = {
  entered: false,
  isAdminSession: false,
  tab: 'dashboard',
  search: '',
  filter: 'all',
  cal: { year: new Date().getFullYear(), month: new Date().getMonth() + 1, selected: null },
  scanner: { scannedCode: null, showHistory: true },
  admin: { showApprovals: true, showAdminMgmt: false },
  adminName: '',
};

let html5QrCode = null;
let pendingLoginSuccess = null;
let pendingRestoreProducts = null;

// ==================== Storage ====================
function seedProducts() {
  const today = new Date();
  const offset = (days) => {
    const d = new Date(today);
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  };
  return [
    { id: 1, barcode: '8851234567890', name: 'นมสดพาสเจอร์ไรส์ 1 ลิตร', category: 'นม/ผลิตภัณฑ์นม', imageUrl: '', expiryDate: offset(-1), notes: 'หมดอายุแล้ว - ตัวอย่าง', addedDate: today.toISOString() },
    { id: 2, barcode: '8859012345671', name: 'ขนมปังโฮลวีต', category: 'เบเกอรี่', imageUrl: '', expiryDate: offset(2), notes: 'เร่งด่วน - ตัวอย่าง', addedDate: today.toISOString() },
    { id: 3, barcode: '40123456', name: 'โยเกิร์ตรสธรรมชาติ', category: 'นม/ผลิตภัณฑ์นม', imageUrl: '', expiryDate: offset(5), notes: '', addedDate: today.toISOString() },
    { id: 4, barcode: '8850999888771', name: 'ไข่ไก่เบอร์ 1 แพ็ค 10', category: 'ไข่', imageUrl: '', expiryDate: offset(14), notes: '', addedDate: today.toISOString() },
    { id: 5, barcode: 'CUST0001', name: 'ผักกาดขาวออร์แกนิก', category: 'ผัก/ผลไม้', imageUrl: '', expiryDate: offset(30), notes: 'บาร์โค้ดแบบกำหนดเอง', addedDate: today.toISOString() },
  ];
}

let storageAvailable = true;
const memoryStore = {};

function safeStorageGet(key) {
  try { return localStorage.getItem(key); } catch { storageAvailable = false; return key in memoryStore ? memoryStore[key] : null; }
}
function safeStorageSet(key, value) {
  try { localStorage.setItem(key, value); } catch { storageAvailable = false; memoryStore[key] = value; }
}

function loadProducts() {
  const raw = safeStorageGet(STORAGE_KEY);
  if (!raw) { const seeded = seedProducts(); saveProducts(seeded); return seeded; }
  try { return JSON.parse(raw); } catch { return seedProducts(); }
}
function saveProducts(list) { safeStorageSet(STORAGE_KEY, JSON.stringify(list)); }

function isAdmin() { return state.isAdminSession === true; }
function setAdmin(value) {
  state.isAdminSession = !!value;
  if (!value) state.adminName = '';
}

function generateLocalId() { return Date.now() * 1000 + Math.floor(Math.random() * 1000); }

function loadPending() {
  const raw = safeStorageGet(PENDING_KEY);
  try { return raw ? JSON.parse(raw) : []; } catch { return []; }
}
function savePending(list) { safeStorageSet(PENDING_KEY, JSON.stringify(list)); }

function defaultAdminUsers() { return [{ id: 'owner', loginId: ADMIN_ID, pin: ADMIN_PIN, name: 'แอดมินหลัก', isOwner: true }]; }
function loadAdminUsers() {
  const raw = safeStorageGet(ADMIN_USERS_KEY);
  try {
    const parsed = raw ? JSON.parse(raw) : null;
    return (parsed && parsed.length) ? parsed : defaultAdminUsers();
  } catch { return defaultAdminUsers(); }
}
function saveAdminUsers(list) { safeStorageSet(ADMIN_USERS_KEY, JSON.stringify(list)); }
function findAdminUser(loginId, pin) { return adminUsers.find((a) => a.loginId === loginId && a.pin === pin) || null; }

let products = [];
let pendingSubmissions = [];
let adminUsers = [];
let catalog = [];

function loadCatalog() {
  const raw = safeStorageGet(CATALOG_KEY);
  try { return raw ? JSON.parse(raw) : []; } catch { return []; }
}
function saveCatalog(list) { safeStorageSet(CATALOG_KEY, JSON.stringify(list)); }
function findCatalogByBarcode(barcode) { return catalog.find((c) => c.barcode === barcode) || null; }
function addCatalogEntry(entry) {
  if (!entry.barcode) return;
  const existing = findCatalogByBarcode(entry.barcode);
  if (existing) {
    existing.name = entry.name || existing.name;
    existing.category = entry.category || existing.category;
    existing.imageUrl = entry.imageUrl || existing.imageUrl;
    existing.updatedAt = new Date().toISOString();
    cloudUpdateItem('catalog', existing.barcode, existing);
  } else {
    const newEntry = { ...entry, createdAt: new Date().toISOString() };
    catalog.push(newEntry);
    cloudAppendItem('catalog', newEntry);
  }
  saveCatalog(catalog);
}
function upsertCatalogFromProduct(p) {
  if (!p.barcode || p.barcode.startsWith('NOBC_')) return;
  addCatalogEntry({ barcode: p.barcode, name: p.name, category: p.category, imageUrl: p.imageUrl });
}

async function bootstrapData() {
  products = loadProducts();
  pendingSubmissions = loadPending();
  adminUsers = loadAdminUsers();
  catalog = loadCatalog();

  if (sb) {
    const [cProducts, cPending, cAdmins, cCatalog] = await Promise.all([
      cloudGet('products'), cloudGet('pending'), cloudGet('admins'), cloudGet('catalog')
    ]);
    if (cProducts !== null) { products = cProducts; saveProducts(products); }
    if (cPending !== null) { pendingSubmissions = cPending; savePending(pendingSubmissions); }
    if (cAdmins !== null) { adminUsers = cAdmins; saveAdminUsers(adminUsers); }
    if (cCatalog !== null) { catalog = cCatalog; saveCatalog(catalog); }
  }
}

// ==================== Helpers ====================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function formatThaiDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const day = d.getDate();
  const month = MONTHS_TH[d.getMonth()];
  const year = d.getFullYear() + 543;
  return `${day} ${month} ${year}`;
}

function withComputed(p) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const exp = new Date(p.expiryDate);
  exp.setHours(0, 0, 0, 0);
  const diffTime = exp - today;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  let status = 'safe';
  if (diffDays < 0) status = 'expired';
  else if (diffDays <= URGENT_WINDOW_DAYS) status = 'urgent';
  return { ...p, daysLeft: diffDays, status };
}

function computeStats() {
  const list = products.map(withComputed);
  return {
    expired: list.filter((p) => p.status === 'expired').length,
    urgent: list.filter((p) => p.status === 'urgent').length,
    safe: list.filter((p) => p.status === 'safe').length,
  };
}

async function compressImageFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (e) => {
      const img = new Image();
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        const max = 600;
        if (width > height && width > max) { height *= max / width; width = max; }
        else if (height > max) { width *= max / height; height = max; }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = reject;
    };
    reader.onerror = reject;
  });
}

// ==================== UI SVG Helpers ====================
function basketIconSVG(size, color, stroke) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z"/><path d="M9 9V6.5a3 3 0 0 1 6 0V9"/><path d="M9.5 13v3.2"/><path d="M12 13v3.2"/><path d="M14.5 13v3.2"/></svg>`;
}
function basketFilledSVG(size, color) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}" opacity="1"><path d="M5.5 9h13l-1.4 9.3a2 2 0 0 1-2 1.7H8.9a2 2 0 0 1-2-1.7L5.5 9Z"/><path d="M9 9V6.5a3 3 0 0 1 6 0V9"/></svg>`;
}

function freshnessRingSVG(daysLeft, status, size) {
  const c = size / 2, stroke = size / 10, radius = (size - stroke) / 2, circumference = 2 * Math.PI * radius;
  let color = '#059669', progress = 1;
  if (status === 'expired') { color = '#dc2626'; progress = 1; }
  else if (status === 'urgent') { color = '#d97706'; progress = Math.max(0, daysLeft) / URGENT_WINDOW_DAYS; }
  const dashOffset = circumference * (1 - progress);
  return `
    <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
      <svg width="${size}" height="${size}" class="-rotate-90">
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="#e3efe7" stroke-width="${stroke}" fill="none" />
        <circle cx="${c}" cy="${c}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round" style="transition: stroke-dashoffset .4s ease;" />
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-xl font-extrabold leading-none" style="color:${color}">${status === 'expired' ? '!' : daysLeft}</span>
        ${status !== 'expired' ? '<span class="text-[10px] font-semibold text-stone-500">วัน</span>' : ''}
      </div>
    </div>`;
}

function statusBadgeHTML(status) {
  const styles = { expired: 'bg-red-50 text-red-600 ring-1 ring-red-200', urgent: 'bg-amber-50 text-amber-600 ring-1 ring-amber-200', safe: 'bg-brand-50 text-brand-700 ring-1 ring-brand-200' };
  return `<span class="rounded-full px-2.5 py-0.5 text-xs font-semibold ${styles[status]}">${STATUS_LABEL_TH[status]}</span>`;
}

function productThumbHTML(p, size = 64) {
  if (p.imageUrl) {
    const badgeText = p.status === 'expired' ? 'หมดอายุ' : `${p.daysLeft} วัน`;
    return `
      <div class="relative shrink-0" style="width:${size}px;height:${size}px;">
        <img src="${p.imageUrl}" class="h-full w-full rounded-2xl object-cover ring-1 ring-brand-100" />
        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-full border-2 border-white px-2 py-0.5 text-[10px] font-extrabold text-white shadow-sm" style="background-color:${STATUS_COLOR[p.status]}">${badgeText}</span>
      </div>`;
  }
  return freshnessRingSVG(p.daysLeft, p.status, size);
}

function statCardHTML(label, count, colorClass, active, onclickAttr) {

      </div>
      ${showActions ? `

          <button onclick="confirmDeleteProduct(${p.id})" class="rounded-full bg-red-50 p-1.5 text-red-600 active:scale-95">🗑️</button>
        </div>` : ''}

function bottomNavHTML() {
  const stats = computeStats();
  return `
    <nav id="bottom-nav" class="fixed inset-x-0 bottom-0 z-20 border-t border-brand-100 bg-white/95 backdrop-blur-sm">
      <div class="mx-auto flex max-w-md items-stretch justify-between px-2" style="padding-bottom: env(safe-area-inset-bottom);">

          if (item.id === 'admin' && isAdmin() && pendingSubmissions.length > 0) badge = `<span class="absolute -right-2 -top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-sky-500 px-1 text-[10px] font-bold text-white">${pendingSubmissions.length > 9 ? '9+' : pendingSubmissions.length}</span>`;
          return `
            <button onclick="setTab('${item.id}')" class="relative flex flex-1 flex-col items-center gap-1 py-2.5 text-xs font-medium transition-colors ${isActive ? 'text-brand-600' : 'text-stone-400'}">
              <span class="relative text-[20px] leading-none">${item.emoji}${badge}</span>
              ${item.label}
            </button>`;
        }).join('')}
      </div>
    </nav>`;
}

function enterApp() { state.entered = true; state.tab = 'dashboard'; render(); }
function landingAdminLogin() { openAdminLogin(() => { state.entered = true; state.tab = 'admin'; render(); }); }

function render() {
  const app = document.getElementById('app');
  if (!state.entered) { app.innerHTML = landingHTML(); return; }
  app.innerHTML = `
    <div class="min-h-screen bg-brand-50 pb-24 font-sans text-stone-800">

      <main class="mx-auto max-w-md px-4 pt-6" id="main"></main>
    </div>
    ${bottomNavHTML()}
  `;
  renderPage();
}

function renderPage() {
  const main = document.getElementById('main');
  if (state.tab === 'dashboard') { main.innerHTML = dashboardHTML(); initDashboard(); }
  if (state.tab === 'scanner') { main.innerHTML = scannerHTML(); initScanner(); }
  if (state.tab === 'calendar') { main.innerHTML = calendarHTML(); }
  if (state.tab === 'admin') { main.innerHTML = adminHTML(); }
}

function setTab(tab) {
  if (state.tab === 'scanner' && tab !== 'scanner') stopScanner();
  if (tab === 'admin') {
    openAdminLogin(() => { state.tab = 'admin'; render(); });
    return;
  }
  state.tab = tab;
  render();
}

function initScanner() {
  html5QrCode = new Html5Qrcode("qr-reader");
  html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, (code) => {
    state.scanner.scannedCode = code;
    handleScanResult(code);
  }).catch(() => {
    document.getElementById('qr-reader').innerHTML = `<div class="flex h-full items-center justify-center p-6 text-center text-white"><p class="text-sm">ไม่สามารถเข้าถึงกล้องได้</p></div>`;

      resultEl.innerHTML = `

        <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
          <p class="text-xs text-stone-500">บาร์โค้ด: ${escapeHtml(code)}</p>

            <button onclick="openNearExpiryModal('${code}')" class="w-full rounded-lg bg-sky-600 py-2 text-xs font-semibold text-white">⚠️ เพิ่มสินค้าใกล้หมดอายุ</button>
          </div>
        </div>`;

  } else {
    resultEl.innerHTML = `
      <div class="space-y-2">
        <p class="text-xs font-medium text-stone-500">พบ ${matches.length} รายการ:</p>
        ${matches.map(p => productCardHTML(p, { showActions: isAdmin() })).join('')}

      </div>`;
  }
}

async function approveSubmission(id) {
  const s = pendingSubmissions.find(x => x.id === id);
  if (!s) return;
  const newProduct = { id: generateLocalId(), barcode: s.barcode, name: s.name, category: s.category, expiryDate: s.expiryDate, notes: s.notes, imageUrl: s.productPhoto || '', addedDate: new Date().toISOString() };
  products.push(newProduct);
  pendingSubmissions = pendingSubmissions.filter(x => x.id !== id);
  saveProducts(products); savePending(pendingSubmissions);
  await Promise.all([cloudAppendItem('products', newProduct), cloudRemoveItem('pending', id)]);
  refreshCurrentTabData();
}
async function rejectSubmission(id) {
  if (!confirm('ปฏิเสธคำขอนี้?')) return;
  pendingSubmissions = pendingSubmissions.filter(x => x.id !== id);
  savePending(pendingSubmissions); await cloudRemoveItem('pending', id);
  refreshCurrentTabData();
}

  openModal(`

      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl max-h-[90vh] overflow-y-auto">

        <form id="product-form" class="mt-4 space-y-3">
          <input id="form-barcode" required value="${escapeHtml(v.barcode)}" placeholder="บาร์โค้ด" class="w-full rounded-xl border p-2.5 text-sm outline-none" />
          <input id="form-name" required value="${escapeHtml(v.name)}" placeholder="ชื่อสินค้า" class="w-full rounded-xl border p-2.5 text-sm outline-none" />
          <input id="form-category" value="${escapeHtml(v.category || '')}" placeholder="หมวดหมู่" class="w-full rounded-xl border p-2.5 text-sm outline-none" />
          <input id="form-expiry" required type="date" value="${v.expiryDate}" class="w-full rounded-xl border p-2.5 text-sm outline-none" />
          <textarea id="form-notes" placeholder="หมายเหตุ" class="w-full rounded-xl border p-2.5 text-sm outline-none">${escapeHtml(v.notes || '')}</textarea>
          <button type="submit" class="w-full rounded-xl bg-brand-600 py-2.5 text-sm font-bold text-white">บันทึก</button>
        </form>
      </div>
    </div>`);
  document.getElementById('product-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = { barcode: document.getElementById('form-barcode').value, name: document.getElementById('form-name').value, category: document.getElementById('form-category').value, expiryDate: document.getElementById('form-expiry').value, notes: document.getElementById('form-notes').value };
    if (initial) {
      const idx = products.findIndex(p => p.id === id);
      products[idx] = { ...products[idx], ...data };
      await cloudUpdateItem('products', id, products[idx]);
    } else {
      const newP = { id: generateLocalId(), ...data, addedDate: new Date().toISOString(), imageUrl: '' };
      products.push(newP); await cloudAppendItem('products', newP);
    }
    saveProducts(products); closeModal(); refreshCurrentTabData();
  });
}

function confirmDeleteProduct(id) {
  if (confirm('ต้องการลบสินค้านี้?')) { products = products.filter(p => p.id !== id); saveProducts(products); cloudRemoveItem('products', id); refreshCurrentTabData(); }
}

// ==================== Near Expiry Modal ====================
function openNearExpiryModal(barcode) {
  const cat = findCatalogByBarcode(barcode);
  openModal(`
    <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center" onclick="if(event.target===this) closeModal()">
      <div class="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl max-h-[90vh] overflow-y-auto">
        <h2 class="text-lg font-bold">${cat ? 'แจ้งสินค้าใกล้หมดอายุ' : 'เพิ่มสินค้าใหม่'}</h2>
        <form id="near-expiry-form" class="mt-4 space-y-3">
          ${!cat ? `
            <input id="ne-name" required placeholder="ชื่อสินค้า *" class="w-full rounded-xl border p-2.5 text-sm outline-none" />
            <div class="text-xs text-stone-500">รูปสินค้า (หน้าสินค้า) *</div>
            <input id="ne-photo1" type="file" accept="image/*" capture="environment" required class="w-full text-xs" />
          ` : `<div class="flex items-center gap-3 p-2 bg-stone-50 rounded-xl">${cat.imageUrl ? `<img src="${cat.imageUrl}" class="h-12 w-12 rounded-lg object-cover" />` : ''}<p class="text-sm font-bold">${escapeHtml(cat.name)}</p></div>`}
          <div class="text-xs text-stone-500">รูปถ่ายวันหมดอายุ (ไม่บังคับ)</div>
          <input id="ne-photo2" type="file" accept="image/*" capture="environment" class="w-full text-xs" />
          <input id="ne-expiry" required type="date" class="w-full rounded-xl border p-2.5 text-sm outline-none" />
          <p id="ne-error" class="hidden text-xs text-red-600 font-bold"></p>
          <button type="submit" class="w-full rounded-xl bg-sky-600 py-2.5 text-sm font-bold text-white">ส่งข้อมูล</button>
        </form>
      </div>
    </div>`);
  document.getElementById('near-expiry-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('ne-error');
    if (!isAdmin() && pendingSubmissions.some(s => s.barcode === barcode && barcode !== '')) { err.textContent = 'มีคำขอค้างอยู่ ไม่สามารถส่งซ้ำได้'; err.classList.remove('hidden'); return; }
    const btn = e.target.querySelector('button');
    btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
    try {
      let name = cat ? cat.name : document.getElementById('ne-name').value;
      let photo1 = cat ? cat.imageUrl : await compressImageFile(document.getElementById('ne-photo1').files[0]);
      let photo2 = document.getElementById('ne-photo2').files[0] ? await compressImageFile(document.getElementById('ne-photo2').files[0]) : '';
      let expiry = document.getElementById('ne-expiry').value;
      if (!cat && barcode) addCatalogEntry({ barcode, name, imageUrl: photo1 });
      if (isAdmin()) {
        const p = { id: generateLocalId(), barcode, name, expiryDate: expiry, imageUrl: photo1, addedDate: new Date().toISOString() };
        products.push(p); saveProducts(products); await cloudAppendItem('products', p);
      } else {
        const s = { id: generateLocalId(), barcode, name, expiryDate: expiry, productPhoto: photo1, expiryPhoto: photo2, submittedAt: new Date().toISOString() };
        pendingSubmissions.push(s); savePending(pendingSubmissions); await cloudAppendItem('pending', s);
      }
      closeModal(); refreshCurrentTabData();
    } catch { btn.disabled = false; btn.textContent = 'ส่งข้อมูล'; err.textContent = 'เกิดข้อผิดพลาด'; err.classList.remove('hidden'); }
  });
}

        <form id="admin-login-form" class="mt-4 space-y-4">
          <input id="admin-id" placeholder="รหัสพนักงาน" required class="w-full rounded-xl border p-3 outline-none focus:ring-2 focus:ring-brand-100" />
          <input id="admin-pin" type="password" placeholder="PIN" required class="w-full rounded-xl border p-3 outline-none focus:ring-2 focus:ring-brand-100" />
          <p id="admin-error" class="hidden text-xs text-red-600 font-bold"></p>
          <button type="submit" class="w-full rounded-xl bg-brand-600 py-3 font-bold text-white">ตกลง</button>
        </form>
      </div>
    </div>`);
  document.getElementById('admin-login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const match = findAdminUser(document.getElementById('admin-id').value, document.getElementById('admin-pin').value);
    if (match) { setAdmin(true); state.adminName = match.name; closeModal(); if (onSuccess) onSuccess(); }
    else { const err = document.getElementById('admin-error'); err.textContent = 'รหัสไม่ถูกต้อง'; err.classList.remove('hidden'); }
  });
}

// ==================== Calendar ====================
function calendarHTML() {
  const { year, month } = state.cal;
  const days = [];
  const first = new Date(year, month - 1, 1), last = new Date(year, month, 0);
  const start = new Date(first); start.setDate(start.getDate() - first.getDay());
  for (let i = 0; i < 42; i++) { const d = new Date(start); d.setDate(d.getDate() + i); days.push(d); }
  return `
    <div class="space-y-4">
      <div class="rounded-2xl bg-white p-4 shadow-card ring-1 ring-brand-100/60">
        <div class="flex items-center justify-between mb-4">
          <button onclick="state.cal.month--; if(state.cal.month<1){state.cal.month=12;state.cal.year--;} renderPage();" class="p-2">◀</button>
          <h2 class="font-bold">${MONTHS_TH[month-1]} ${year+543}</h2>
          <button onclick="state.cal.month++; if(state.cal.month>12){state.cal.month=1;state.cal.year++;} renderPage();" class="p-2">▶</button>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center">
          ${WEEKDAYS_TH.map(w => `<div class="text-[10px] font-bold text-stone-400">${w}</div>`).join('')}
          ${days.map(d => {
            const dateStr = d.toISOString().slice(0, 10);
            const count = products.filter(p => p.expiryDate === dateStr).length;
            const isCurr = d.getMonth() === month - 1;
            return `<div class="aspect-square flex flex-col items-center justify-center rounded-lg text-xs ${isCurr ? 'text-stone-800' : 'text-stone-300'} ${count > 0 ? 'bg-red-50 ring-1 ring-red-200' : ''}">${d.getDate()}${count > 0 ? `<span class="text-[8px] font-bold text-red-600">${count}</span>` : ''}</div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
}

// ==================== Export / Backup / Restore (รักษาของเดิม) ====================
function downloadBlob(blob, filename) { const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
function exportCSV() {
  const headers = ['บาร์โค้ด', 'ชื่อสินค้า', 'หมวดหมู่', 'วันหมดอายุ', 'สถานะ', 'หมายเหตุ'];
  const rows = products.map(withComputed).map(p => [p.barcode, p.name, p.category || '', p.expiryDate, STATUS_LABEL_TH[p.status], (p.notes || '').replace(/\n/g, ' ')]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\r\n');
  downloadBlob(new Blob([`\uFEFF${csv}`], { type: 'text/csv;charset=utf-8;' }), `rimping-products-${new Date().toISOString().slice(0,10)}.csv`);
}
function exportPrintPDF() {
  const list = products.map(withComputed).sort((a, b) => a.expiryDate.localeCompare(b.expiryDate));
  const rows = list.map(p => `<tr><td>${escapeHtml(p.barcode)}</td><td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.category || '-')}</td><td>${p.expiryDate}</td><td>${STATUS_LABEL_TH[p.status]}</td></tr>`).join('');
  document.getElementById('print-area').innerHTML = `<h2>รายการสินค้า - Rimping Expiry Tracker</h2><p>วันที่: ${new Date().toISOString().slice(0,10)}</p><table><thead><tr><th>บาร์โค้ด</th><th>ชื่อสินค้า</th><th>หมวดหมู่</th><th>วันหมดอายุ</th><th>สถานะ</th></tr></thead><tbody>${rows}</tbody></table>`;
  window.print();
}
function backupJSON() {
  const payload = { app: 'Rimping Supermarket Expiry Tracker', version: 1, exportedAt: new Date().toISOString(), products };
  downloadBlob(new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }), `rimping-backup-${new Date().toISOString().slice(0,10)}.json`);
}
function handleRestoreFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(String(reader.result));
      const list = Array.isArray(parsed) ? parsed : parsed.products;
      if (!Array.isArray(list)) throw new Error('ไฟล์ไม่ถูกต้อง');
      pendingRestoreProducts = list;
      document.getElementById('restore-panel').innerHTML = `<div class="mt-3 rounded-xl bg-amber-50 p-3 text-xs text-amber-700"><p>พบ ${list.length} รายการ ต้องการเขียนทับรายการซ้ำหรือไม่?</p><div class="mt-2 flex gap-2"><button onclick="runRestore(false)" class="flex-1 rounded-lg bg-white py-1.5 font-semibold text-amber-700 ring-1 ring-amber-200">ข้าม</button><button onclick="runRestore(true)" class="flex-1 rounded-lg bg-amber-600 py-1.5 font-semibold text-white">เขียนทับ</button></div></div>`;
    } catch (err) { document.getElementById('restore-panel').innerHTML = `<p class="mt-2 text-xs font-medium text-red-600">อ่านไฟล์ไม่สำเร็จ</p>`; }
  };
  reader.readAsText(file, 'utf-8'); e.target.value = '';
}
function runRestore(overwrite) {
  if (!pendingRestoreProducts) return;
  let inserted = 0, updated = 0, skipped = 0;
  pendingRestoreProducts.forEach(raw => {
    const idx = products.findIndex(p => p.barcode === raw.barcode);
    if (idx >= 0) { if (overwrite) { products[idx] = { ...products[idx], ...raw }; updated++; } else skipped++; }
    else { products.push({ id: generateLocalId(), ...raw, addedDate: new Date().toISOString() }); inserted++; }
  });
  saveProducts(products); cloudSet('products', products); pendingRestoreProducts = null;
  document.getElementById('restore-panel').innerHTML = `<p class="mt-2 text-xs font-medium text-brand-700">สำเร็จ: เพิ่ม ${inserted}, อัปเดต ${updated}, ข้าม ${skipped}</p>`;
  refreshCurrentTabData();
}
